<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Pro - Calibración Píxel a Píxel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 200px; border-radius: 15px; border: 1px solid #cbd5e1; margin-bottom: 20px; }
        #givoni-wrapper { position: relative; width: 100%; max-width: 1200px; margin: auto; border-radius: 20px; overflow: hidden; border: 2px solid #334155; }
        #givoni-bg { width: 100%; display: block; }
        #data-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .btn-modo { transition: all 0.2s; padding: 10px 20px; border-radius: 8px; font-weight: 900; border: 2px solid #e2e8f0; }
        .active-chip { background-color: #1e40af; color: white; border-color: #1e40af; }
    </style>
</head>
<body class="bg-slate-50 p-4">

    <main class="max-w-[1600px] mx-auto">
        <header class="bg-white p-6 rounded-2xl shadow-sm flex justify-between items-center mb-6 border">
            <h1 class="text-2xl font-black tracking-tighter uppercase">Givoni Global Arch</h1>
            <div class="flex gap-2">
                <button onclick="setModo('mes')" id="btn-mes" class="btn-modo active-chip">MESES</button>
                <button onclick="setModo('año')" id="btn-año" class="btn-modo">AÑOS</button>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-md border space-y-4">
                <div id="year-selector" class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto p-2 border rounded-lg bg-gray-50 font-bold text-xs"></div>
                <div id="month-selector" class="grid grid-cols-3 gap-1"></div>
                <button onclick="ejecutarAnalisis()" class="w-full bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg uppercase tracking-widest hover:bg-blue-800">Trazar Análisis</button>
            </div>

            <div class="lg:col-span-3">
                <div id="givoni-wrapper">
                    <img id="givoni-bg" src="./GRÁFICA DE GIVONI-Layout1.svg" alt="Climograma Givoni">
                    <canvas id="data-canvas"></canvas>
                </div>
            </div>
        </div>

        <div id="strategy-box" class="mt-8 bg-slate-900 p-8 rounded-3xl text-white hidden border-b-8 border-blue-600">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                <div id="diagnostico-info"></div>
                <div id="isometric-container" class="bg-white rounded-xl h-[350px]"></div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = 'b0be33523088ce87c824d0befe19820c';
        let modo = 'mes', seleccionAnos = [2025], seleccionMeses = [0,1,2,10,11], lat = -2.170, lon = -79.922;

        let map = L.map('map').setView([lat, lon], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([lat, lon]).addTo(map);

        function setModo(m) {
            modo = m;
            document.querySelectorAll('.btn-modo').forEach(b => b.classList.remove('active-chip'));
            document.getElementById(`btn-${m}`).classList.add('active-chip');
        }

        // --- CALIBRACIÓN DE COORDENADAS (VALORES CRÍTICOS) ---
        // Estos porcentajes definen dónde están los ejes en tu dibujo de AutoCAD
        const CALIB = {
            xMin: 8.4,  // Posición del -5° en % del ancho de la imagen
            xMax: 94.2, // Posición del 50° en % del ancho de la imagen
            yMin: 91.5, // Posición del 0% HR en % del alto de la imagen
            yMax: 5.5   // Posición del 100% HR en % del alto de la imagen
        };

        function tempToX(temp, width) {
            let pct = (temp + 5) / 55; // Rango de 55 grados (-5 a 50)
            return width * (CALIB.xMin / 100 + pct * (CALIB.xMax - CALIB.xMin) / 100);
        }

        function hrToY(hr, height) {
            let pct = hr / 100;
            return height * (CALIB.yMin / 100 - pct * (CALIB.yMin - CALIB.yMax) / 100);
        }

        function ejecutarAnalisis() {
            const canvas = document.getElementById('data-canvas');
            const img = document.getElementById('givoni-bg');
            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const items = modo === 'mes' ? seleccionMeses : seleccionAnos;

            items.forEach((val, i) => {
                let tMax = 28 + (Math.random() * 10);
                let tMin = 18 + (Math.random() * 6);
                let hr = 60 + (Math.random() * 30);
                let color = `hsl(${(i * 360 / items.length)}, 80%, 50%)`;

                // Dibujar curva psicrométrica
                ctx.beginPath();
                ctx.lineWidth = 6;
                ctx.strokeStyle = color;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                for(let s=0; s<=20; s++) {
                    let t = tMin + (tMax - tMin) * (s/20);
                    // Curvatura de humedad constante
                    let hCurva = hr + Math.pow((t - tMin)/8, 2) * 4; 
                    let x = tempToX(t, canvas.width);
                    let y = hrToY(hCurva, canvas.height);
                    if(s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();

                // Marcadores extremos
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(tempToX(tMin, canvas.width), hrToY(hr, canvas.height), 8, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            document.getElementById('strategy-box').classList.remove('hidden');
        }

        // Llenar selectores (meses/años)
        const yearBox = document.getElementById('year-selector');
        for(let y=2026; y>=2015; y--) {
            let d = document.createElement('div');
            d.className = "cursor-pointer p-2 border rounded text-center";
            d.innerText = y;
            d.onclick = () => { seleccionAnos=[y]; ejecutarAnalisis(); };
            yearBox.appendChild(d);
        }

        const monthBox = document.getElementById('month-selector');
        meses.forEach((m, i) => {
            let d = document.createElement('div');
            d.className = "cursor-pointer p-2 border rounded text-center text-[10px] font-black";
            d.innerText = m;
            d.onclick = () => { seleccionMeses=[i]; ejecutarAnalisis(); };
            monthBox.appendChild(d);
        });

        window.onload = () => {
            setTimeout(ejecutarAnalisis, 1000); // Esperar a que cargue la imagen
        };
    </script>
</body>
</html>
