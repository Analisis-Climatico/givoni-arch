<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Givoni Climate Engine V4</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
    background:#f1f5f9;
    font-family:Inter,sans-serif;
}

#map{
    height:260px;
    border-radius:20px;
    overflow:hidden;
    border:1px solid #dbe2ea;
}

#chart{
    width:100%;
    height:850px;
    background:white;
    border-radius:24px;
    overflow:hidden;
    border:1px solid #dbe2ea;
}

.btn-mode{
    padding:10px 20px;
    border-radius:12px;
    border:1px solid #dbe2ea;
    font-size:11px;
    font-weight:900;
    transition:.2s;
}

.active-mode{
    background:#2563eb;
    color:white;
    border-color:#2563eb;
}

.selector-chip{
    padding:10px;
    border-radius:10px;
    border:1px solid #dbe2ea;
    text-align:center;
    font-size:11px;
    font-weight:800;
    cursor:pointer;
    transition:.2s;
}

.selector-chip:hover{
    transform:translateY(-2px);
}

.selected-item{
    background:#2563eb;
    color:white;
}

</style>
</head>

<body class="p-4 md:p-8">

<main class="max-w-[1900px] mx-auto space-y-6">

<header class="bg-white border rounded-3xl shadow-sm p-6 flex justify-between items-center">

<div>

<h1 class="text-3xl font-black uppercase tracking-tight text-slate-800">
Givoni Climate Engine
</h1>

<p class="text-xs uppercase tracking-[0.3em] text-slate-400 font-black mt-2">
Arquitectura Bioclimática
</p>

</div>

<div class="flex gap-2">

<button onclick="setMode('mes')" id="btn-mes"
class="btn-mode active-mode">
MESES
</button>

<button onclick="setMode('año')" id="btn-año"
class="btn-mode">
AÑOS
</button>

</div>

</header>

<div id="map"></div>

<div class="grid grid-cols-1 xl:grid-cols-4 gap-6">

<!-- SIDEBAR -->

<div class="bg-white rounded-3xl border shadow-sm p-6 space-y-6">

<div>

<p id="location-text"
class="text-blue-600 font-black text-xs uppercase mb-4">
Ubicación: Guayaquil
</p>

<p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">
Seleccionar Año
</p>

<div id="year-selector"
class="grid grid-cols-2 gap-2"></div>

</div>

<div id="month-section">

<p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">
Meses
</p>

<div id="month-selector"
class="grid grid-cols-3 gap-2"></div>

</div>

<button onclick="runClimateAnalysis()"
class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black uppercase rounded-2xl py-4 text-xs transition-all">

Actualizar Climograma

</button>

</div>

<!-- CONTENT -->

<div class="xl:col-span-3 space-y-6">

<div id="chart"></div>

<!-- TABLA -->

<div class="bg-white rounded-3xl border overflow-hidden shadow-sm">

<table class="w-full text-xs">

<thead class="bg-slate-50 border-b text-slate-500 uppercase font-black">

<tr>
<th class="p-4">Mes/Año</th>
<th class="p-4 text-center">Temp Máx</th>
<th class="p-4 text-center">Temp Mín</th>
<th class="p-4 text-center">HR</th>
<th class="p-4 text-center">Zona Dominante</th>
</tr>

</thead>

<tbody id="table-body"
class="font-bold text-slate-700"></tbody>

</table>

</div>

<!-- ANALISIS -->

<div class="bg-[#0f172a] rounded-3xl p-10 text-white border-l-[10px] border-blue-500">

<div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

<div>

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Diagnóstico Bioclimático
</p>

<p id="analysis-text"
class="text-slate-300 leading-relaxed text-lg"></p>

</div>

<div>

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Estrategias Arquitectónicas
</p>

<div id="strategy-list"
class="space-y-4"></div>

</div>

</div>

</div>

</div>

</div>

</main>

<script>

/* ======================================================
VARIABLES
====================================================== */

const months = [
'Ene','Feb','Mar','Abr','May','Jun',
'Jul','Ago','Sep','Oct','Nov','Dic'
];

let mode = 'mes';

let selectedYears = [2025];
let selectedMonths = [0,1,2,3,4];

let lat = -2.17;
let lon = -79.92;

/* ======================================================
MAPA
====================================================== */

const map = L.map('map').setView([lat,lon],7);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

const marker = L.marker([lat,lon]).addTo(map);

map.on('click', async(e)=>{

lat = e.latlng.lat;
lon = e.latlng.lng;

marker.setLatLng([lat,lon]);

await updateLocation();

runClimateAnalysis();

});

/* ======================================================
UI
====================================================== */

function setMode(m){

mode = m;

document.querySelectorAll('.btn-mode')
.forEach(btn=>btn.classList.remove('active-mode'));

document.getElementById(`btn-${m}`)
.classList.add('active-mode');

document.getElementById('month-section').style.display =
mode === 'mes'
? 'block'
: 'none';

renderSelectors();

}

function renderSelectors(){

const yearBox = document.getElementById('year-selector');
yearBox.innerHTML = '';

for(let y=2026;y>=2015;y--){

const chip = document.createElement('div');

chip.className = `selector-chip ${
selectedYears.includes(y)
? 'selected-item'
: ''
}`;

chip.innerText = y;

chip.onclick = ()=>{

if(mode === 'mes'){

selectedYears = [y];

}
else{

if(selectedYears.includes(y)){
selectedYears =
selectedYears.filter(v=>v!==y);
}
else{
selectedYears.push(y);
}

}

renderSelectors();

};

yearBox.appendChild(chip);

}

const monthBox =
document.getElementById('month-selector');

monthBox.innerHTML = '';

months.forEach((m,i)=>{

const chip = document.createElement('div');

chip.className = `selector-chip ${
selectedMonths.includes(i)
? 'selected-item'
: ''
}`;

chip.innerText = m;

chip.onclick = ()=>{

if(selectedMonths.includes(i)){

selectedMonths =
selectedMonths.filter(v=>v!==i);

}
else{

selectedMonths.push(i);

}

renderSelectors();

};

monthBox.appendChild(chip);

});

}

/* ======================================================
LOCATION
====================================================== */

async function updateLocation(){

try{

const response = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
);

const data = await response.json();

const city =
data.address.city ||
data.address.town ||
data.address.state ||
'Ubicación';

document.getElementById('location-text')
.innerText = `Ubicación: ${city}`;

}
catch(err){}

}

/* ======================================================
OPEN METEO
====================================================== */

async function fetchClimate(year){

const url = `
https://archive-api.open-meteo.com/v1/archive?
latitude=${lat}&
longitude=${lon}&
start_date=${year}-01-01&
end_date=${year}-12-31&
daily=temperature_2m_max,temperature_2m_min,relative_humidity_2m_mean&
timezone=auto
`;

const response = await fetch(
url.replace(/\s+/g,'')
);

return await response.json();

}

/* ======================================================
GIVONI Y
====================================================== */

function givoniY(hr,temp){

const factor =
Math.exp((temp-20)/18);

return hr * factor;

}

/* ======================================================
DRAW
====================================================== */

function drawChart(monthData){

d3.select('#chart').html('');

const width = 1500;
const height = 850;

const margin = {
top:40,
right:70,
bottom:90,
left:70
};

const innerWidth =
width - margin.left - margin.right;

const innerHeight =
height - margin.top - margin.bottom;

const svg = d3.select('#chart')
.append('svg')
.attr('width','100%')
.attr('height',height)
.attr('viewBox',`0 0 ${width} ${height}`);

const g = svg.append('g')
.attr('transform',
`translate(${margin.left},${margin.top})`);

const x = d3.scaleLinear()
.domain([-5,50])
.range([0,innerWidth]);

const y = d3.scaleLinear()
.domain([0,140])
.range([innerHeight,0]);

/* GRID */

for(let t=-5;t<=50;t+=1){

g.append('line')
.attr('x1',x(t))
.attr('x2',x(t))
.attr('y1',0)
.attr('y2',innerHeight)
.attr('stroke',
t % 5 === 0
? '#d1d5db'
: '#edf2f7')
.attr('stroke-width',
t % 5 === 0
? 1
: 0.5);

}

for(let h=0;h<=140;h+=5){

g.append('line')
.attr('x1',0)
.attr('x2',innerWidth)
.attr('y1',y(h))
.attr('y2',y(h))
.attr('stroke','#edf2f7');

}

/* CURVAS RH */

for(let hr=10;hr<=100;hr+=10){

const points = [];

for(let t=-5;t<=50;t+=0.5){

points.push([
x(t),
y(givoniY(hr,t))
]);

}

const line = d3.line()
.curve(d3.curveBasis);

g.append('path')
.attr('d',line(points))
.attr('fill','none')
.attr('stroke','#cbd5e1')
.attr('stroke-width',1);

}

/* ZONAS */

const zones = [

{
stroke:'#eab308',
fill:'rgba(250,204,21,0.12)',
points:[
[21,20],
[24,28],
[24,60],
[21,50]
],
label:'1'
},

{
stroke:'#dc2626',
fill:'rgba(220,38,38,0.08)',
points:[
[20,20],
[27,35],
[27,60],
[24,75],
[20,55]
],
label:'2'
},

{
stroke:'#10b981',
fill:'rgba(16,185,129,0.10)',
points:[
[20,55],
[24,75],
[28,110],
[33,55],
[33,28],
[27,35]
],
label:'12'
},

{
stroke:'#ef4444',
fill:'rgba(244,114,182,0.10)',
points:[
[24,75],
[33,55],
[37,40],
[37,20],
[24,20]
],
label:'9'
},

{
stroke:'#9333ea',
fill:'rgba(168,85,247,0.08)',
points:[
[24,75],
[40,30],
[40,0],
[27,0]
],
label:'10'
},

{
stroke:'#1d4ed8',
fill:'rgba(59,130,246,0.08)',
points:[
[33,55],
[50,55],
[50,0],
[40,0],
[40,30]
],
label:'13'
}

];

zones.forEach(zone=>{

const polygon =
zone.points.map(p=>[
x(p[0]),
y(p[1])
]);

g.append('polygon')
.attr('points',
polygon.join(' '))
.attr('fill',zone.fill)
.attr('stroke',zone.stroke)
.attr('stroke-width',3);

g.append('text')
.attr('x',x(zone.points[0][0])+5)
.attr('y',y(zone.points[0][1])-5)
.attr('font-size','18px')
.attr('font-weight','900')
.attr('fill',zone.stroke)
.text(zone.label);

});

/* CURVAS CLIMÁTICAS */

monthData.forEach((d,i)=>{

const color =
d3.interpolateRainbow(i/monthData.length);

const points = [];

for(let step=0;step<=20;step++){

const t =
d.tMin +
((d.tMax-d.tMin)*(step/20));

const hrCurve =
givoniY(d.hr,t);

points.push([
x(t),
y(hrCurve)
]);

}

const line = d3.line()
.curve(d3.curveBasis);

g.append('path')
.attr('d',line(points))
.attr('fill','none')
.attr('stroke',color)
.attr('stroke-width',8)
.attr('stroke-linecap','round')
.attr('opacity',0.95);

});

/* EJES */

g.append('g')
.attr('transform',
`translate(0,${innerHeight})`)
.call(d3.axisBottom(x));

g.append('g')
.call(d3.axisLeft(y).ticks(0));

/* LABELS */

g.append('text')
.attr('x',innerWidth/2)
.attr('y',innerHeight+60)
.attr('font-size','20px')
.attr('font-weight','900')
.text('TEMPERATURA BULBO SECO (°C)');

g.append('text')
.attr('transform','rotate(-90)')
.attr('x',-innerHeight/2)
.attr('y',-40)
.attr('font-size','20px')
.attr('font-weight','900')
.text('HUMEDAD RELATIVA (%)');

}

/* ======================================================
TABLE
====================================================== */

function updateTable(monthData){

const tbody =
document.getElementById('table-body');

tbody.innerHTML = '';

monthData.forEach(d=>{

tbody.innerHTML += `

<tr class="border-b hover:bg-slate-50">

<td class="p-4">
${d.label}
</td>

<td class="p-4 text-center">
${d.tMax.toFixed(1)}°C
</td>

<td class="p-4 text-center">
${d.tMin.toFixed(1)}°C
</td>

<td class="p-4 text-center text-blue-600 font-black">
${d.hr.toFixed(0)}%
</td>

<td class="p-4 text-center font-black">
${d.zone}
</td>

</tr>

`;

});

}

/* ======================================================
ZONE
====================================================== */

function detectZone(temp,hr){

if(temp>=21 && temp<=27 && hr>=40 && hr<=70){
return 'Confort';
}

if(temp>27 && hr>70){
return 'Deshumidificación';
}

if(temp>30){
return 'Ventilación';
}

if(temp<20){
return 'Calefacción';
}

return 'Protección Solar';

}

/* ======================================================
ANALYSIS
====================================================== */

function updateAnalysis(monthData){

const analysis =
document.getElementById('analysis-text');

const strategyList =
document.getElementById('strategy-list');

strategyList.innerHTML = '';

let avgTemp = 0;
let avgHR = 0;

monthData.forEach(d=>{

avgTemp += d.tMax;
avgHR += d.hr;

});

avgTemp /= monthData.length;
avgHR /= monthData.length;

let text = '';
let strategies = [];

if(avgTemp > 28 && avgHR > 75){

text = `
Predomina un clima cálido húmedo con altas tasas
de humedad relativa y temperaturas elevadas durante
gran parte del año. El comportamiento climático se
ubica principalmente en zonas de ventilación y
deshumidificación.
`;

strategies = [
'Ventilación cruzada continua',
'Cubiertas ventiladas',
'Protección solar profunda',
'Fachadas permeables',
'Disipación térmica pasiva'
];

}
else{

text = `
El comportamiento climático presenta condiciones
moderadas cercanas a confort térmico parcial.
`;

strategies = [
'Ventilación moderada',
'Protección solar parcial',
'Control térmico pasivo'
];

}

analysis.innerText = text;

strategies.forEach(s=>{

strategyList.innerHTML += `

<div class="bg-slate-900 border border-slate-800 rounded-2xl p-5">

<p class="text-sm font-bold text-slate-300">
${s}
</p>

</div>

`;

});

}

/* ======================================================
RUN
====================================================== */

async function runClimateAnalysis(){

const year =
selectedYears[0];

const data =
await fetchClimate(year);

const monthData = [];

if(!data.daily) return;

for(let m=0;m<12;m++){

if(mode === 'mes' &&
!selectedMonths.includes(m)){
continue;
}

const tMax =
data.daily.temperature_2m_max
.filter((v,i)=>
new Date(data.daily.time[i]).getMonth()===m
);

const tMin =
data.daily.temperature_2m_min
.filter((v,i)=>
new Date(data.daily.time[i]).getMonth()===m
);

const hr =
data.daily.relative_humidity_2m_mean
.filter((v,i)=>
new Date(data.daily.time[i]).getMonth()===m
);

const avgMax =
tMax.reduce((a,b)=>a+b,0)/tMax.length;

const avgMin =
tMin.reduce((a,b)=>a+b,0)/tMin.length;

const avgHR =
hr.reduce((a,b)=>a+b,0)/hr.length;

monthData.push({

label:months[m],

tMax:avgMax,
tMin:avgMin,
hr:avgHR,

zone:detectZone(avgMax,avgHR)

});

}

drawChart(monthData);

updateTable(monthData);

updateAnalysis(monthData);

}

/* ======================================================
INIT
====================================================== */

renderSelectors();

updateLocation();

runClimateAnalysis();

</script>

</body>
</html>
