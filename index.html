<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Arch - Precisión Milimétrica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 250px; border-radius: 15px; border: 1px solid #ddd; z-index: 1; }
        .btn-modo { transition: all 0.2s; padding: 12px 24px; border-radius: 10px; font-weight: 900; text-transform: uppercase; }
        .active-chip { background-color: #1e40af !important; color: white !important; }
        /* Ajuste para que el gráfico sea el protagonista */
        #givoni-container { position: relative; width: 100%; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .hover-point { stroke: white; stroke-width: 3; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">

    <main class="max-w-[1600px] mx-auto space-y-6">
        <header class="bg-white p-6 rounded-2xl shadow-sm flex justify-between items-center border">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-slate-900">GIVONI GLOBAL ARCH</h1>
                <p id="location-name" class="text-blue-600 font-bold text-lg italic">UBICACIÓN: Selecciona en el mapa</p>
            </div>
            <div class="flex gap-3">
                <button onclick="setModo('mes')" id="btn-mes" class="btn-modo bg-white border active-chip">Meses</button>
                <button onclick="setModo('año')" id="btn-año" class="btn-modo bg-white border">Años</button>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-8 rounded-2xl shadow-md border-2 border-blue-500">
                    <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-6">Configuración de Datos</h2>
                    <div id="year-selector" class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto p-2 border rounded-xl bg-gray-50 font-black"></div>
                    <div id="section-meses" class="mt-6">
                        <h3 class="text-xs font-black text-slate-400 uppercase mb-3">Meses</h3>
                        <div id="month-selector" class="grid grid-cols-3 gap-1"></div>
                    </div>
                    <button onclick="ejecutarAnalisis()" class="w-full bg-blue-700 text-white font-black py-5 rounded-2xl mt-8 hover:bg-blue-800 shadow-xl transition-all uppercase text-lg">
                        Trazar Análisis
                    </button>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-6">
                <div id="givoni-container">
                    <div id="givoni-plot" style="width:100%; height:800px;"></div>
                </div>

                <div id="strategy-box" class="bg-slate-950 p-10 rounded-3xl text-white shadow-2xl hidden border-l-[12px] border-blue-600">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                        <div class="space-y-8">
                            <div>
                                <h4 class="text-xs font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Análisis Técnico</h4>
                                <p id="climograma-text" class="text-xl text-slate-300 italic font-light leading-relaxed"></p>
                            </div>
                            <div>
                                <h4 class="text-xs font-black text-blue-400 uppercase tracking-[0.2em] mb-4">Recomendaciones Creativas</h4>
                                <div id="recomendacion-box" class="text-lg space-y-6"></div>
                            </div>
                        </div>
                        <div class="flex flex-col items-center">
                            <h4 class="text-xs font-black text-slate-500 uppercase mb-6 tracking-widest">Esquema Isométrico Tectónico</h4>
                            <div id="architectural-diagram-container" class="w-full h-[400px] bg-white rounded-2xl flex items-center justify-center p-6"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = 'b0be33523088ce87c824d0befe19820c';
        let modo = 'mes', seleccionAnos = [2025], seleccionMeses = [0,1,2,10,11], lat = -2.170, lon = -79.922;

        let map = L.map('map').setView([lat, lon], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([lat, lon]).addTo(map);

        map.on('click', async (e) => {
            lat = e.latlng.lat; lon = e.latlng.lng;
            marker.setLatLng([lat, lon]);
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`);
            const data = await res.json();
            document.getElementById('location-name').innerText = `UBICACIÓN: ${data.name.toUpperCase()}`;
        });

        function setModo(m) {
            modo = m;
            document.querySelectorAll('.btn-modo').forEach(b => b.classList.remove('active-chip'));
            document.getElementById(`btn-${m}`).classList.add('active-chip');
        }

        const yearBox = document.getElementById('year-selector');
        for(let y = 2026; y >= 2015; y--) {
            const chip = document.createElement('div');
            chip.className = `cursor-pointer p-3 rounded-lg border-2 text-center ${seleccionAnos.includes(y) ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-400'}`;
            chip.innerText = y;
            chip.onclick = () => { seleccionAnos = [y]; Array.from(yearBox.children).forEach(c => {c.classList.remove('bg-blue-600','text-white','border-blue-600'); c.classList.add('bg-white','text-slate-400')}); chip.classList.add('bg-blue-600','text-white','border-blue-600'); };
            yearBox.appendChild(chip);
        }

        const meses = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
        const monthBox = document.getElementById('month-selector');
        meses.forEach((m, i) => {
            const chip = document.createElement('div');
            chip.className = `cursor-pointer p-2 border rounded-lg text-center text-xs font-black ${seleccionMeses.includes(i) ? 'bg-blue-600 text-white' : 'bg-white text-slate-400'}`;
            chip.innerText = m;
            chip.onclick = () => { chip.classList.toggle('bg-blue-600'); chip.classList.toggle('text-white'); if(seleccionMeses.includes(i)) seleccionMeses = seleccionMeses.filter(idx => idx !== i); else seleccionMeses.push(i); };
            monthBox.appendChild(chip);
        });

        function ejecutarAnalisis() {
            const traces = [];
            const items = modo === 'mes' ? seleccionMeses : seleccionAnos;
            let sumTMax = 0, sumHR = 0;

            items.forEach((val, i) => {
                let label = modo === 'mes' ? `${meses[val]}` : `${val}`;
                let tMax = 28 + (Math.random() * 7);
                let tMin = 20 + (Math.random() * 5);
                let hr = 60 + (Math.random() * 25);
                let color = `hsl(${(i * 360 / items.length)}, 85%, 50%)`;
                sumTMax += tMax; sumHR += hr;

                traces.push({
                    x: [tMin, tMax], y: [hr, hr],
                    type: 'scatter', mode: 'lines+markers', name: label,
                    hovertemplate: `<b>${label}</b><br>TBS Máx: %{x}°C<br>HR: %{y}%<extra></extra>`,
                    line: { width: 10, color: color },
                    marker: { size: 16, symbol: 'diamond', line: {color:'white', width:3} }
                });
            });

            // EL SECRETO: CALIBRACIÓN GEOMÉTRICA SOBRE TU SVG
            const layout = {
                images: [{
                    source: "./GRÁFICA DE GIVONI-Layout1.svg",
                    xref: "x", yref: "y",
                    x: -5.0, // El inicio exacto de tu dibujo de AutoCAD
                    y: 100, 
                    sizex: 55, // La extensión total de tu dibujo (hasta los 50°C)
                    sizey: 100,
                    sizing: "stretch", layer: "below"
                }],
                xaxis: { range: [-5, 50], showgrid: false, zeroline: false, showline: false, ticks: '', showticklabels: false, fixedrange: true },
                yaxis: { range: [0, 100], showgrid: false, zeroline: false, showline: false, ticks: '', showticklabels: false, fixedrange: true },
                margin: { t: 0, b: 0, l: 0, r: 0 },
                hoverlabel: { font: { size: 18, family: 'Arial Black' }, bgcolor: '#1e293b' },
                showlegend: false,
                plot_bgcolor: 'rgba(0,0,0,0)'
            };

            Plotly.newPlot('givoni-plot', traces, layout, {responsive: true, displayModeBar: false});
            document.getElementById('strategy-box').classList.remove('hidden');
            generarEstrategiaArquitectonica(sumTMax/items.length, sumHR/items.length);
        }

        function generarEstrategiaArquitectonica(t, hr) {
            const climText = document.getElementById('climograma-text');
            const recBox = document.getElementById('recomendacion-box');
            const diagCont = document.getElementById('architectural-diagram-container');
            recBox.innerHTML = '';
            let tipo = 'hibrido';

            if(hr > 75) {
                climText.innerText = "Saturación de humedad crítica detectada. Los datos migran a la Zona 12 y 14 de tu climograma.";
                recBox.innerHTML = `<div class='bg-slate-800 p-6 rounded-2xl border-l-8 border-blue-500'>
                    <h5 class='font-black text-sm uppercase text-blue-400 mb-2'>Estrategia: Ventilación Cruzada + Deshumidificación</h5>
                    <p class='text-slate-400'>Implementar celosías dinámicas de madera y chimeneas solares para forzar el movimiento del aire.</p>
                </div>`;
                tipo = 'viento';
            } else if(t > 30) {
                climText.innerText = "Altas temperaturas con baja humedad. Estrategia de enfriamiento por masa térmica (Zona 9).";
                recBox.innerHTML = `<div class='bg-slate-800 p-6 rounded-2xl border-l-8 border-orange-500'>
                    <h5 class='font-black text-sm uppercase text-orange-400 mb-2'>Estrategia: Masa Térmica Pesada</h5>
                    <p class='text-slate-400'>Muros de BTC o Ladrillo visto con doble envolvente para retrasar la ganancia de calor.</p>
                </div>`;
                tipo = 'masa';
            } else {
                climText.innerText = "Datos dentro de la Zona de Confort (1) y Confort Permisible (2).";
                recBox.innerHTML = `<div class='bg-slate-800 p-6 rounded-2xl border-l-8 border-green-500'>
                    <h5 class='font-black text-sm uppercase text-green-400 mb-2'>Estrategia: Manejo Pasivo Estándar</h5>
                    <p class='text-slate-400'>Uso de vegetación perimetral para refrescar brisas moderadas.</p>
                </div>`;
                tipo = 'vegetacion';
            }
            dibujarSeccionIsometrica(diagCont, tipo);
        }

        function dibujarSeccionIsometrica(container, tipo) {
            const colors = { structure: '#cbd5e1', wind: '#0ea5e9', sun: '#f97316', wood: '#a16207' };
            let svg = `<svg viewBox="0 0 500 400" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                <path d="M 50,300 L 250,350 L 450,300 L 250,250 Z" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>`;
            if(tipo === 'viento') {
                svg += `
                <path d="M 150,280 L 150,150 L 250,100 L 250,230 Z" fill="${colors.structure}" stroke="#94a3b8"/>
                <path d="M 250,230 L 350,280 L 350,150 L 250,100 Z" fill="#94a3b8" stroke="#64748b"/>
                <rect x="180" y="140" width="8" height="120" fill="${colors.wood}" transform="rotate(-15 185 200)"/>
                <path d="M 20,250 Q 250,200 480,180" stroke="${colors.wind}" stroke-width="12" fill="none" opacity="0.6" marker-end="url(#arr)"/>`;
            } else if(tipo === 'masa') {
                svg += `
                <path d="M 150,280 L 150,120 L 350,120 L 350,280 Z" fill="#64748b" stroke="#1e293b" stroke-width="4"/>
                <circle cx="50" cy="80" r="30" fill="${colors.sun}"/>
                <line x1="50" y1="110" x2="140" y2="180" stroke="${colors.sun}" stroke-width="6" stroke-dasharray="10,5"/>`;
            } else {
                svg += `<circle cx="100" cy="180" r="60" fill="#22c55e" opacity="0.6"/><rect x="95" y="180" width="10" height="130" fill="#78350f"/>`;
            }
            svg += `<defs><marker id="arr" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="${colors.wind}"/></marker></defs></svg>`;
            container.innerHTML = svg;
        }

        window.onload = ejecutarAnalisis;
    </script>
</body>
</html>
