<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://d3js.org/d3.v7.min.js"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
background:#f1f5f9;
font-family:Inter,sans-serif;
}

#map{
height:260px;
border-radius:22px;
overflow:hidden;
border:1px solid #dbe2ea;
}

#chart{
width:100%;
height:760px;
background:white;
border-radius:24px;
overflow:hidden;
border:1px solid #dbe2ea;
position:relative;
}

.btn-mode{
padding:10px 22px;
border-radius:12px;
border:1px solid #dbe2ea;
font-size:11px;
font-weight:900;
transition:.2s;
}

.active-mode{
background:#2563eb;
color:white;
border-color:#2563eb;
}

.selector-chip{
padding:10px;
border-radius:10px;
border:1px solid #dbe2ea;
text-align:center;
font-size:11px;
font-weight:800;
cursor:pointer;
transition:.2s;
background:white;
}

.selected-item{
background:#2563eb;
color:white;
}

.tooltip-box{
position:absolute;
pointer-events:none;
background:#0f172a;
color:white;
padding:12px;
border-radius:12px;
font-size:11px;
font-weight:700;
opacity:0;
transition:.2s;
z-index:9999;
}

.export-btn{
padding:10px 16px;
border-radius:12px;
background:white;
border:1px solid #dbe2ea;
font-size:11px;
font-weight:900;
cursor:pointer;
transition:.2s;
}

.export-btn:hover{
background:#2563eb;
color:white;
}

</style>
</head>

<body class="p-4 md:p-8">

<main class="max-w-[1900px] mx-auto space-y-6">

<header class="bg-white rounded-3xl border shadow-sm p-6 flex justify-between items-center">

<div>

<h1 class="text-3xl font-black uppercase tracking-tight text-slate-800">
Givoni Climate Engine
</h1>

<p class="text-xs uppercase tracking-[0.3em] text-slate-400 font-black mt-2">
Arquitectura Bioclimática
</p>

</div>

<div class="flex gap-2">

<button onclick="setMode('mes')"
id="btn-mes"
class="btn-mode active-mode">
MESES
</button>

<button onclick="setMode('año')"
id="btn-año"
class="btn-mode">
AÑOS
</button>

</div>

</header>

<div id="map"></div>

<div class="grid grid-cols-1 xl:grid-cols-4 gap-6">

<div class="bg-white rounded-3xl border shadow-sm p-6 space-y-6">

<div>

<p id="location-text"
class="text-blue-600 font-black text-xs uppercase mb-4">
Ubicación: Guayaquil
</p>

<p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">
Seleccionar Año
</p>

<div id="year-selector"
class="grid grid-cols-2 gap-2 max-h-[420px] overflow-y-auto pr-1">
</div>

</div>

<div id="month-section">

<p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">
Meses
</p>

<div id="month-selector"
class="grid grid-cols-3 gap-2">
</div>

</div>

<button onclick="runClimateAnalysis()"
class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black uppercase rounded-2xl py-4 text-xs transition-all">

Actualizar Climograma

</button>

</div>

<div class="xl:col-span-3 space-y-6">

<div class="flex gap-3">

<button class="export-btn" onclick="downloadChart('png')">
DESCARGAR PNG
</button>

<button class="export-btn" onclick="downloadChart('jpg')">
DESCARGAR JPG
</button>

<button class="export-btn" onclick="downloadPDF()">
DESCARGAR PDF
</button>

</div>

<div id="chart">

<div id="tooltip"
class="tooltip-box">
</div>

</div>

<div class="bg-white rounded-3xl border overflow-hidden shadow-sm">

<table class="w-full text-xs">

<thead class="bg-slate-50 border-b text-slate-500 uppercase font-black">

<tr>

<th class="p-4 text-center">Color</th>
<th class="p-4 text-center">Mes/Año</th>
<th class="p-4 text-center">Temp Máx</th>
<th class="p-4 text-center">Temp Mín</th>
<th class="p-4 text-center">HR</th>
<th class="p-4 text-center">Zonas Detectadas</th>

</tr>

</thead>

<tbody id="table-body"
class="font-bold text-slate-700 text-center">
</tbody>

</table>

</div>

<div class="bg-[#0f172a] rounded-3xl p-10 text-white border-l-[10px] border-blue-500">

<div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

<div>

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Diagnóstico Bioclimático
</p>

<p id="analysis-text"
class="text-slate-300 leading-relaxed text-lg">
</p>

</div>

<div>

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Estrategias Arquitectónicas
</p>

<div id="strategy-list"
class="space-y-4">
</div>

</div>

</div>

<div class="mt-10">

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Gráfico Conceptual Arquitectónico
</p>

<div id="strategy-graphic"
class="bg-white rounded-3xl p-6 flex justify-center items-center">
</div>

</div>

</div>

</div>

</div>

</main>

<script>

const months = [
'Ene','Feb','Mar','Abr','May','Jun',
'Jul','Ago','Sep','Oct','Nov','Dic'
];

const zoneNames = {

'Z1':'Confort',
'Z2':'Ventilación Natural',
'Z3':'Masa Térmica',
'Z4':'Enfriamiento Evaporativo',
'Z5':'Ganancia Solar',
'Z6':'Humidificación',
'Z7':'Protección Solar',
'Z8':'Deshumidificación',
'Z9':'Ventilación Cruzada',
'Z10':'Enfriamiento Mecánico',
'Z11':'Calefacción Pasiva',
'Z12':'Alta Humedad',
'Z13':'Ventilación Intensiva',
'Z14':'Clima Extremo'

};

const zoneColors = {

Z1:[254,204,102],
Z2:[153,27,30],
Z3:[19,103,52],
Z4:[19,155,72],
Z5:[24,125,129],
Z6:[209,156,199],
Z7:[50,162,210],
Z8:[205,105,40],
Z9:[242,113,114],
Z10:[147,39,143],
Z11:[241,235,31],
Z12:[46,173,141],
Z13:[69,84,165],
Z14:[159,119,197]

};

let mode = 'mes';

let selectedYears = [2025];
let selectedMonths = [0,1,2,3,4];

let lat = -2.17;
let lon = -79.92;

let currentZonesSVG = null;

const map = L.map('map').setView([lat,lon],7);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

const marker = L.marker([lat,lon]).addTo(map);

map.on('click', async(e)=>{

lat = e.latlng.lat;
lon = e.latlng.lng;

marker.setLatLng([lat,lon]);

await updateLocation();

runClimateAnalysis();

});

function setMode(m){

mode = m;

document.querySelectorAll('.btn-mode')
.forEach(btn=>btn.classList.remove('active-mode'));

document.getElementById(`btn-${m}`)
.classList.add('active-mode');

document.getElementById('month-section').style.display =
mode === 'mes'
? 'block'
: 'none';

renderSelectors();

}

function renderSelectors(){

const yearBox = document.getElementById('year-selector');

yearBox.innerHTML = '';

const currentYear = new Date().getFullYear();

for(let y=currentYear;y>=2000;y--){

const chip = document.createElement('div');

chip.className = `selector-chip ${
selectedYears.includes(y)
? 'selected-item'
: ''
}`;

chip.innerText = y;

chip.onclick = ()=>{

if(mode === 'mes'){

selectedYears = [y];

}else{

if(selectedYears.includes(y)){

selectedYears =
selectedYears.filter(v=>v!==y);

}else{

selectedYears.push(y);

}

}

renderSelectors();

};

yearBox.appendChild(chip);

}

const monthBox =
document.getElementById('month-selector');

monthBox.innerHTML = '';

months.forEach((m,i)=>{

const chip = document.createElement('div');

chip.className = `selector-chip ${
selectedMonths.includes(i)
? 'selected-item'
: ''
}`;

chip.innerText = m;

chip.onclick = ()=>{

if(selectedMonths.includes(i)){

selectedMonths =
selectedMonths.filter(v=>v!==i);

}else{

selectedMonths.push(i);

}

renderSelectors();

};

monthBox.appendChild(chip);

});

}

async function updateLocation(){

try{

const response = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
);

const data = await response.json();

const city =
data.address.city ||
data.address.town ||
data.address.state ||
'Ubicación';

document.getElementById('location-text')
.innerText = `Ubicación: ${city}`;

}catch(err){}

}

async function fetchClimate(year){

const url = `
https://archive-api.open-meteo.com/v1/archive?
latitude=${lat}&
longitude=${lon}&
start_date=${year}-01-01&
end_date=${year}-12-31&
daily=temperature_2m_max,temperature_2m_min,relative_humidity_2m_mean&
timezone=auto
`;

const response = await fetch(
url.replace(/\s+/g,'')
);

return await response.json();

}

async function loadZonesSVG(){

if(currentZonesSVG) return currentZonesSVG;

const response = await fetch('pruega-de-svg.svg');

const text = await response.text();

currentZonesSVG = text;

return text;

}

function detectZones(hr,tMax,tMin){

let detected = [];

function add(zone){

if(!detected.includes(zone)){
detected.push(zone);
}

}

/* ZONA 14 */
if(tMax >= 30 && hr >= 75){
add('Z14');
}

/* ZONA 12 */
if(hr >= 78){
add('Z12');
}

/* ZONA 9 */
if(tMax >= 27 && hr >= 65){
add('Z9');
}

/* ZONA 8 */
if(hr >= 70 && tMax >= 26){
add('Z8');
}

/* ZONA 7 */
if(tMax >= 29){
add('Z7');
}

/* ZONA 4 */
if(hr <= 55 && tMax >= 24){
add('Z4');
}

/* ZONA 2 */
if(
tMax >= 24 &&
tMax <= 30 &&
hr >= 45 &&
hr <= 75
){
add('Z2');
}

/* ZONA 3 */
if(
tMin <= 20 &&
tMax >= 26
){
add('Z3');
}

/* ZONA 5 */
if(
tMin <= 18
){
add('Z5');
}

/* ZONA 13 */
if(
hr >= 65 &&
tMax >= 28
){
add('Z13');
}

/* ZONA 10 */
if(
tMax >= 32 &&
hr >= 60
){
add('Z10');
}

/* ZONA 11 */
if(
tMin <= 16
){
add('Z11');
}

/* ZONA 6 */
if(
hr <= 40
){
add('Z6');
}

/* ZONA 1 */
if(detected.length===0){
add('Z1');
}

return detected;

}

/* NO SE MODIFICÓ NADA DEL CHART */

</script>

</body>
</html>
