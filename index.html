<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Histórico Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        .month-chip { cursor: pointer; transition: all 0.2s; }
        .month-chip.active { background-color: #2563eb; color: white; border-color: #1e40af; }
        #givoni-plot { border-radius: 12px; overflow: hidden; border: 1px solid #e5e7eb; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 p-4">

    <main class="max-w-7xl mx-auto">
        <header class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900 border-b-2 border-blue-600 inline-block">Análisis Climático Multianual</h1>
            <p class="text-gray-500 text-sm mt-1">Plataforma de Diagnóstico Bioclimático Pasado</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-5 rounded-xl shadow-sm border">
                    <h2 class="font-bold text-xs uppercase tracking-wider text-gray-400 mb-4">1. Seleccionar Año</h2>
                    <select id="year-select" class="w-full border rounded-lg p-2 bg-gray-50 font-medium">
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                        <option value="2023" selected>2023</option>
                        <option value="2022">2022</option>
                    </select>

                    <h2 class="font-bold text-xs uppercase tracking-wider text-gray-400 mt-6 mb-4">2. Seleccionar Meses</h2>
                    <div id="month-selector" class="grid grid-cols-3 gap-2">
                        </div>

                    <button onclick="ejecutarAnalisis()" class="w-full mt-6 bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 shadow-lg shadow-blue-200 transition">
                        TRAZAR ANÁLISIS
                    </button>
                </div>

                <div class="bg-gray-900 p-5 rounded-xl text-white">
                    <h3 class="text-blue-400 font-bold text-xs mb-2 uppercase">Estrategia Detectada</h3>
                    <p id="analysis-text" class="text-xs leading-relaxed opacity-80 italic">Configura los parámetros para ver el diagnóstico.</p>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-4">
                <div id="givoni-plot" style="width:100%; height:750px;"></div>
                
                <div class="bg-white p-4 rounded-xl shadow-sm border overflow-x-auto">
                    <table class="w-full text-xs text-left">
                        <thead>
                            <tr class="text-gray-400 border-b italic">
                                <th class="p-2">COLOR</th>
                                <th class="p-2">MES/AÑO</th>
                                <th class="p-2">TBS MÁX</th>
                                <th class="p-2">TBS MÍN</th>
                                <th class="p-2">HR PROM.</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const mesesNombres = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
        let seleccionados = [1, 2, 3, 10, 11]; // Feb, Mar, Abr, Nov, Dic por defecto

        // Inicializar selector de meses
        const selector = document.getElementById('month-selector');
        mesesNombres.forEach((m, i) => {
            const btn = document.createElement('div');
            btn.className = `month-chip border rounded text-center py-1 text-xs font-medium ${seleccionados.includes(i) ? 'active' : 'bg-white'}`;
            btn.innerText = m;
            btn.onclick = () => {
                if(seleccionados.includes(i)) seleccionados = seleccionados.filter(idx => idx !== i);
                else seleccionados.push(i);
                btn.classList.toggle('active');
                btn.classList.toggle('bg-white');
            };
            selector.appendChild(btn);
        });

        function ejecutarAnalisis() {
            const anio = document.getElementById('year-select').value;
            const traces = [];
            const tableBody = document.getElementById('data-table-body');
            tableBody.innerHTML = '';

            seleccionados.sort((a,b) => a-b).forEach(idx => {
                // Simulación de datos históricos con inclinación psicrométrica
                // En un sistema real, aquí se llamaría a la base de datos por mes
                let tMax = 30 + Math.random() * 4;
                let tMin = 22 + Math.random() * 3;
                let hr = 75 + Math.random() * 12;
                let color = `hsl(${(idx * 30)}, 80%, 45%)`;

                // Trazado inclinado: La línea sigue la pendiente de la humedad constante
                // Calculamos un pequeño ajuste en Y (humedad) basado en la temperatura para que no sea una línea plana
                traces.push({
                    x: [tMin, tMax],
                    y: [hr - (tMax-tMin)*0.5, hr + (tMax-tMin)*0.5], // Ajuste de inclinación técnica
                    type: 'scatter',
                    mode: 'lines+markers',
                    name: `${mesesNombres[idx]}-${anio}`,
                    line: { width: 4, color: color },
                    marker: { size: 8, symbol: 'circle' }
                });

                tableBody.innerHTML += `
                    <tr class="border-b">
                        <td class="p-2"><div class="w-3 h-3 rounded-full" style="background:${color}"></div></td>
                        <td class="p-2 font-bold">${mesesNombres[idx]}-${anio.slice(2)}</td>
                        <td class="p-2">${tMax.toFixed(1)}°C</td>
                        <td class="p-2">${tMin.toFixed(1)}°C</td>
                        <td class="p-2 text-blue-600">${hr.toFixed(0)}%</td>
                    </tr>`;
            });

            const layout = {
                images: [{
                    source: "./OFICIAL-GRÁFICA DE GIVONI (1)-Layout1.jpg",
                    xref: "x", yref: "y",
                    x: -5, y: 100, sizex: 55, sizey: 100,
                    sizing: "stretch", layer: "below"
                }],
                xaxis: { range: [-5, 50], gridcolor: 'rgba(0,0,0,0.05)', title: 'TEMPERATURA BULBO SECO (°C)', dtick: 5 },
                yaxis: { range: [0, 100], gridcolor: 'rgba(0,0,0,0.05)', title: 'HUMEDAD RELATIVA (%)', dtick: 10 },
                showlegend: false,
                margin: { t: 20, b: 60, l: 60, r: 20 },
                plot_bgcolor: 'white'
            };

            Plotly.newPlot('givoni-plot', traces, layout);
            document.getElementById('analysis-text').innerText = `ANÁLISIS PERIODO ${anio}: La superposición de datos en los meses seleccionados confirma una demanda crítica de ventilación cruzada mecánica (Zona 12) y control de humedad (Zona 14).`;
        }

        window.onload = ejecutarAnalisis;
    </script>
</body>
</html>
