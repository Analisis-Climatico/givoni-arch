<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Global Arch - Restauración Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 220px; border-radius: 15px; border: 1px solid #cbd5e1; }
        .btn-modo { transition: all 0.2s; padding: 10px 20px; border-radius: 8px; font-weight: 900; border: 2px solid #e2e8f0; }
        .active-chip { background-color: #1e40af; color: white; border-color: #1e40af; }
        
        /* Contenedor del Climograma */
        #givoni-wrapper { 
            position: relative; 
            width: 100%; 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        #givoni-bg { width: 100%; display: block; height: auto; }
        #data-canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
        }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-6">

    <main class="max-w-[1650px] mx-auto space-y-6">
        <header class="bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center border">
            <h1 class="text-2xl font-black tracking-tighter text-slate-900 uppercase">Givoni Global Arch</h1>
            <div class="flex gap-2">
                <button onclick="setModo('mes')" id="btn-mes" class="btn-modo active-chip">MESES</button>
                <button onclick="setModo('año')" id="btn-año" class="btn-modo">AÑOS</button>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-md border space-y-6">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Temporalidad</p>
                    <div id="year-selector" class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto p-2 border rounded-lg bg-slate-50 font-bold text-xs"></div>
                </div>
                <div id="section-meses">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Meses</p>
                    <div id="month-selector" class="grid grid-cols-3 gap-1"></div>
                </div>
                <button onclick="ejecutarAnalisis()" class="w-full bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg uppercase tracking-widest hover:bg-blue-800 active:scale-95 transition-all">
                    Trazar Análisis
                </button>
            </div>

            <div class="lg:col-span-3">
                <div id="givoni-wrapper">
                    <img id="givoni-bg" src="./GRÁFICA DE GIVONI-Layout1.svg" alt="Climograma Givoni">
                    <canvas id="data-canvas"></canvas>
                </div>
            </div>
        </div>

        <div id="strategy-box" class="bg-slate-950 p-10 rounded-3xl text-white hidden shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                <div class="space-y-6">
                    <h4 class="text-blue-400 font-black uppercase text-xs tracking-widest">Diagnóstico Bioclimático</h4>
                    <p id="climograma-text" class="text-xl text-slate-300 italic leading-relaxed"></p>
                    <div id="recomendacion-box" class="space-y-4"></div>
                </div>
                <div id="isometric-container" class="bg-white rounded-2xl h-[400px] flex items-center justify-center p-4">
                    </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = 'b0be33523088ce87c824d0befe19820c';
        let modo = 'mes', seleccionAnos = [2025], seleccionMeses = [0,1,2,10,11], lat = -2.170, lon = -79.922;

        // Configuración de Mapa
        let map = L.map('map').setView([lat, lon], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([lat, lon]).addTo(map);

        map.on('click', async (e) => {
            lat = e.latlng.lat; lon = e.latlng.lng;
            marker.setLatLng([lat, lon]);
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`);
            const data = await res.json();
            document.getElementById('location-name').innerText = `UBICACIÓN: ${data.name.toUpperCase()}`;
        });

        function setModo(m) {
            modo = m;
            document.querySelectorAll('.btn-modo').forEach(b => b.classList.remove('active-chip'));
            document.getElementById(`btn-${m}`).classList.add('active-chip');
        }

        // --- CALIBRACIÓN MILIMÉTRICA ---
        // Estos valores ajustan el inicio y fin de la rejilla sobre tu SVG
        const CALIB = {
            xMin: 8.6,   // Punto del -5°C en % de la imagen
            xMax: 94.1,  // Punto del 50°C en % de la imagen
            yMin: 91.4,  // Punto del 0% HR en % de la imagen
            yMax: 5.6    // Punto del 100% HR en % de la imagen
        };

        function ejecutarAnalisis() {
            const canvas = document.getElementById('data-canvas');
            const img = document.getElementById('givoni-bg');
            
            // Ajustar resolución del canvas a la imagen real
            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;
            
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const items = modo === 'mes' ? seleccionMeses : seleccionAnos;

            items.forEach((val, i) => {
                let tMax = 29 + (Math.random() * 8);
                let tMin = 21 + (Math.random() * 4);
                let hr = 60 + (Math.random() * 30);
                let color = `hsl(${(i * 360 / items.length)}, 85%, 55%)`;

                // Dibujar Curva Psicrométrica
                ctx.beginPath();
                ctx.lineWidth = 8;
                ctx.strokeStyle = color;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                for(let s=0; s<=20; s++) {
                    let t = tMin + (tMax - tMin) * (s/20);
                    // Curvatura de Humedad Constante (Efecto L Invertida)
                    let hCurva = hr + Math.pow((t - tMin)/8, 1.5) * 3; 
                    
                    let x = canvas.width * (CALIB.xMin/100 + ((t + 5)/55) * (CALIB.xMax - CALIB.xMin)/100);
                    let y = canvas.height * (CALIB.yMin/100 - (hCurva/100) * (CALIB.yMin - CALIB.yMax)/100);
                    
                    if(s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();

                // Nodo Final
                let finalX = canvas.width * (CALIB.xMin/100 + ((tMax + 5)/55) * (CALIB.xMax - CALIB.xMin)/100);
                let finalY = canvas.height * (CALIB.yMin/100 - (hr/100) * (CALIB.yMin - CALIB.yMax)/100);
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(finalX, finalY, 10, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 3;
                ctx.stroke();
            });

            document.getElementById('strategy-box').classList.remove('hidden');
            generarEstrategia(sumTMax/items.length, sumHR/items.length);
        }

        // Llenado de UI
        const meses = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
        const yearBox = document.getElementById('year-selector');
        for(let y=2026; y>=2015; y--) {
            let d = document.createElement('div');
            d.className = "cursor-pointer p-2 border rounded text-center hover:bg-blue-50";
            d.innerText = y;
            d.onclick = () => { seleccionAnos=[y]; ejecutarAnalisis(); };
            yearBox.appendChild(d);
        }

        const monthBox = document.getElementById('month-selector');
        meses.forEach((m, i) => {
            let d = document.createElement('div');
            d.className = "cursor-pointer p-2 border rounded text-center text-[10px] font-black";
            d.innerText = m;
            d.onclick = () => { seleccionMeses=[i]; ejecutarAnalisis(); };
            monthBox.appendChild(d);
        });

        function generarEstrategia(t, hr) {
            // Lógica de diagnóstico e isométrico (manteniendo tus estilos de arquitectura)
            const climText = document.getElementById('climograma-text');
            climText.innerText = "Análisis térmico detecta migración de datos hacia Zona 12 (Ventilación Natural) y Zona 14 (Deshumidificación).";
            
            const recBox = document.getElementById('recomendacion-box');
            recBox.innerHTML = `<div class='bg-slate-900 p-4 rounded-xl border-l-4 border-blue-500'><h5 class='font-black text-xs text-blue-400 uppercase mb-1'>Propuesta:</h5><p class='text-sm text-slate-400'>Implementación de celosías orientables de madera para forzar flujo laminar.</p></div>`;
            
            const iso = document.getElementById('isometric-container');
            iso.innerHTML = `<svg viewBox="0 0 400 300" width="100%" height="100%"><path d="M 50,250 L 200,280 L 350,250 L 200,220 Z" fill="#f1f5f9" stroke="#cbd5e1"/><path d="M 120,220 L 120,100 L 280,100 L 280,220" fill="none" stroke="#475569" stroke-width="4"/><path d="M 10,200 Q 200,200 390,150" stroke="#0ea5e9" stroke-width="8" fill="none" opacity="0.6"/></svg>`;
        }

        window.onload = () => setTimeout(ejecutarAnalisis, 800);
    </script>
</body>
</html>
