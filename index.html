<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsualizador - Motor SVG</title>
    <style>
        /* Estilos base para simular la interfaz del proyecto */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .panel {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            max-width: 800px;
            justify-content: center;
        }

        .strat-btn {
            background-color: #0f172a;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .strat-btn:hover {
            border-color: #64748b;
            color: #cbd5e1;
        }

        .strat-btn.active {
            background-color: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
            font-weight: bold;
        }

        #svg-canvas {
            width: 800px;
            height: 400px;
            background-color: #0f172a; /* Fondo oscuro para resaltar los trazos */
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 1px solid #334155;
        }

        /* Ajuste para mantener un esquema visual puramente diagramático.
          Descomenta la siguiente línea si prefieres ocultar todos los textos 
          y priorizar un gráfico minimalista sin explicaciones textuales.
        */
        /* text { display: none !important; } */

        /* Animaciones requeridas por el código SVG */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin { animation: spin 2s linear infinite; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="menu" id="menu">
            </div>
        <div id="svg-canvas"></div>
    </div>

    <script>
        // 1. SIMULACIÓN DE DATOS
        // Array con los nombres exactos que utiliza tu lógica condicional
        const strategies = [
            { t: "Ventilación regulable" }, { t: "Cubierta ventilada" }, { t: "Protección solar ligera" },
            { t: "Espacios de transición" }, { t: "Fachada permeable" }, { t: "Ventilación elevada" },
            { t: "Núcleo compacto" }, { t: "Envolvente térmica" }, { t: "Carpintería hermética" },
            { t: "Muro Trombe" }, { t: "Galería solar" }, { t: "Orientación solar estratégica" },
            { t: "Panel solar térmico" }, { t: "Cubierta captadora" }, { t: "Acumulación térmica hidráulica" },
            { t: "Patio húmedo" }, { t: "Fuente evaporativa" }, { t: "Material higroscópico" },
            { t: "Doble envolvente térmica" }, { t: "Acceso amortiguador" }, { t: "Aislamiento continuo" },
            { t: "Parasoles móviles" }, { t: "Fachada de doble piel" }, { t: "Cubierta extendida" },
            { t: "Muro acumulador" }, { t: "Piso de inercia térmica" }, { t: "Protección de masa térmica" },
            { t: "Espejo de agua climático" }, { t: "Nebulización pasiva" }, { t: "Vegetación refrescante" },
            { t: "Purgado nocturno" }, { t: "Lucernario térmico" }, { t: "Chimenea solar invertida" },
            { t: "Cubierta extractora" }, { t: "Ventilación mecánica asistida" }, { t: "Sectorización térmica" },
            { t: "Fachada aislada" }, { t: "Cámara ventilada" }, { t: "Otra estrategia de prueba" }
        ];

        // 2. GENERACIÓN DE LA INTERFAZ
        const menu = document.getElementById('menu');
        strategies.forEach((strat, index) => {
            const btn = document.createElement('button');
            btn.className = 'strat-btn';
            btn.textContent = index + 1;
            btn.title = strat.t;
            btn.onclick = () => window.renderSVGForStrategy(index);
            menu.appendChild(btn);
        });

        // =====================================================================
        // 3. TU MOTOR SVG PARAMÉTRICO (PEGADO EXACTAMENTE COMO LO ENVIASTE)
        // =====================================================================
window.renderSVGForStrategy = function(index) {
    const strat = strategies[index];
    
    // Control de botones activos en el menú
    document.querySelectorAll('.strat-btn').forEach((btn, idx) => {
        if(idx === index) btn.classList.add('active');
        else btn.classList.remove('active');
    });
    
    const t = strat.t; 
    let svgContent = `<rect width="100%" height="100%" fill="url(#blueprint-grid)" />`;

    // 1. DEFINICIÓN DE PATRONES, MARCADORES Y ESTILOS AVANZADOS
    const defsSVG = `
        <defs>
            <pattern id="blueprint-grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40 M 0 40 L 40 40" fill="none" stroke="#ffffff" stroke-width="0.75" opacity="0.08"/>
                <path d="M 200 0 L 0 0 0 200 M 0 200 L 200 200" fill="none" stroke="#ffffff" stroke-width="1.25" opacity="0.12"/>
            </pattern>
            <pattern id="hatch-concrete" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
                <line x1="0" y1="0" x2="0" y2="10" stroke="#cbd5e1" stroke-width="2" opacity="0.4"/>
            </pattern>
            <pattern id="hatch-insulation" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
                <line x1="0" y1="4" x2="8" y2="4" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
            </pattern>
            <pattern id="hatch-mass" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
                <rect width="10" height="10" fill="#a16207" opacity="0.3"/>
                <line x1="0" y1="0" x2="0" y2="10" stroke="#713f12" stroke-width="1.25" opacity="0.4"/>
                <line x1="0" y1="0" x2="10" y2="0" stroke="#713f12" stroke-width="1.25" opacity="0.4"/>
            </pattern>
            <pattern id="hatch-water" patternUnits="userSpaceOnUse" width="12" height="10">
                <rect width="12" height="10" fill="#3b82f6" opacity="0.4"/>
                <path d="M 0 5 Q 3 0 6 5 T 12 5" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
            </pattern>
            <pattern id="dots-humidity" patternUnits="userSpaceOnUse" width="12" height="12">
                <circle cx="3" cy="3" r="1.75" fill="#06b6d4" opacity="0.55"/>
                <circle cx="9" cy="9" r="1.75" fill="#06b6d4" opacity="0.55"/>
            </pattern>
            <pattern id="dots-glass-lines" patternUnits="userSpaceOnUse" width="15" height="15" patternTransform="rotate(45)">
                <line x1="0" y1="0" x2="0" y2="15" stroke="#38bdf8" stroke-width="2.5" opacity="0.3"/>
            </pattern>
            <pattern id="dots-higroscopic-dots" patternUnits="userSpaceOnUse" width="12" height="12">
                <circle cx="3" cy="3" r="1.5" fill="#cbd5e1" opacity="0.5"/>
                <circle cx="9" cy="9" r="1.5" fill="#cbd5e1" opacity="0.5"/>
            </pattern>
            <pattern id="dots-soil" patternUnits="userSpaceOnUse" width="15" height="15">
                <circle cx="2" cy="2" r="1.5" fill="#cbd5e1" opacity="0.3"/>
                <circle cx="8" cy="8" r="1.5" fill="#cbd5e1" opacity="0.3"/>
                <circle cx="14" cy="14" r="1.5" fill="#cbd5e1" opacity="0.3"/>
            </pattern>
            <pattern id="dots-sand" patternUnits="userSpaceOnUse" width="5" height="5">
                <circle cx="2" cy="2" r="0.75" fill="#d1d5db" opacity="0.25"/>
            </pattern>
            <pattern id="dots-perforated" width="4" height="4" patternUnits="userSpaceOnUse">
                <circle cx="2" cy="2" r="1" fill="#cbd5e1" opacity="0.5"/>
            </pattern>
            <pattern id="pattern-trees" patternUnits="userSpaceOnUse" width="60" height="60">
                <circle cx="30" cy="30" r="28" fill="#16a34a" opacity="0.08"/>
                <path d="M 30 5 L 35 15 L 25 15 Z" fill="#15803d" opacity="0.2"/>
            </pattern>
            <pattern id="pattern-crystal" patternUnits="userSpaceOnUse" width="20" height="20">
                <rect x="0" y="0" width="19" height="19" fill="#fafafa" stroke="#e2e8f0" stroke-width="0.5"/>
                <line x1="0" y1="0" x2="20" y2="20" stroke="#e2e8f0" stroke-width="0.25" opacity="0.3"/>
            </pattern>
            <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4" />
            </marker>
            <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
            </marker>
            <marker id="arrow-yellow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#fcd34d" />
            </marker>
            <style type="text/css">
                .text-blueprint { fill: white; font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
                .text-blueprint-night { fill: #fcd34d; font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
                .svg-sun-pulse { animation: sun-pulse 3s ease-in-out infinite; }
                @keyframes sun-pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
                .dots-soil-class { fill: url(#dots-soil); stroke: none; opacity: 0.5; }
                .dots-sand-class { fill: url(#dots-sand); stroke: none; opacity: 0.5; }
                .dots-humidity-class { fill: url(#dots-humidity); stroke: none; opacity: 0.6; }
                .linear-gradient-stack-class { fill: url(#gradient-stack); stroke: none; opacity: 0.5; }
                .linear-gradient-humidity-class { fill: url(#gradient-humidity); stroke: none; opacity: 0.6; }
                .dots- trees-class { fill: url(#pattern-trees); stroke: none; }
                .dots-perforated-class { fill: url(#perforated); stroke: none; opacity: 0.5; }
                .hatch-concrete-class { fill: url(#hatch-concrete); stroke: none; }
                .dots-glass-lines-class { fill: url(#glass-lines); stroke: none; opacity: 0.5; }
                .hatch-water-class { fill: url(#hatch-water); stroke: none; }
                .hatch-insulation-class { fill: url(#hatch-insulation); stroke: none; }
                .dots-higroscopic-dots-class { fill: url(#hygroscopic-dots); stroke: none; }
            </style>
        </defs>
    `;

    // 2. ELEMENTOS TÉCNICOS ESTÁNDAR
    const textObj = (x, y, text, type = 'standard') => `<text x="${x}" y="${y}" class="text-blueprint${type === 'standard' ? '' : `-${type}`}">${text}</text>`;
    const standardDoor = (x, y, scale = 1, flip = false) => `<g transform="translate(${x}, ${y}) scale(${scale}) ${flip ? 'scale(-1, 1)' : ''}" fill="none" stroke="#cbd5e1" stroke-width="1.5"><rect x="0" y="0" width="50" height="100" rx="2" class="hatch-concrete-class"/><path d="M 0 100 A 50 100 0 0 0 50 100"/><circle cx="42" cy="50" r="3" fill="#cbd5e1"/></g>`;
    const groundLine = `<rect x="0" y="340" width="800" height="60" fill="#111827"/><rect x="0" y="340" width="800" height="40" class="dots-sand-class"/><rect x="0" y="340" width="800" height="10" class="dots-soil-class"/><line x1="0" y1="340" x2="800" y2="340" stroke="#cbd5e1" stroke-width="2" class="opacity-50"/>`;
    const scaleFigure = `<g opacity="0.3" transform="translate(680, 245) scale(0.65)"><circle cx="15" cy="10" r="7" fill="#cbd5e1"/><path d="M10,20 L20,20 L20,45 L25,80 L18,80 L15,50 L12,80 L5,80 L10,45 Z" fill="#cbd5e1"/></g>`;
    const sunObj = `<circle cx="100" cy="70" r="25" fill="#f59e0b" class="svg-sun-pulse"/><circle cx="100" cy="70" r="30" fill="none" stroke="#fcd34d" stroke-width="1" stroke-dasharray="5 5" class="svg-sun-pulse"/>`;
    const sunContextAxo = `<circle cx="100" cy="70" r="25" fill="#f59e0b" class="svg-sun-pulse"/><path d="M 120 90 L 180 150" fill="none" stroke="#fcd34d" stroke-width="3" marker-end="url(#arrow-yellow)" class="svg-ray-bounce"/>`;

    // 3. LÓGICA CONDICIONAL DE DIBUJO DETALLADO (LAS 39 ESTRATEGIAS)
    
    // --- BLOQUE 1 (1 - 10) ---
    if (t === "Ventilación regulable") {
        svgContent += `
            ${groundLine}
            <path d="M 150 340 L 150 130 L 400 60 L 650 130 L 650 340 Z" fill="none" stroke="#cbd5e1" stroke-width="2"/>
            <path d="M 150 130 L 650 130" fill="none" stroke="#cbd5e1" stroke-width="1" opacity="0.3"/>
            <g transform="translate(400, 60)"><line x1="-30" y1="0" x2="30" y2="0" stroke="#cbd5e1" stroke-width="4"/><line x1="-20" y1="-5" x2="0" y2="-30" stroke="#cbd5e1" stroke-width="2" opacity="0.8"/></g>
            ${textObj(400, 250, "CEN. VENTILADA")}
            <rect x="145" y="160" width="10" height="130" fill="#38bdf8" opacity="0.3" stroke="#38bdf8" stroke-width="1"/><line x1="145" y1="160" x2="110" y2="135" stroke="#38bdf8" stroke-width="2.5"/>
            <rect x="645" y="160" width="10" height="130" class="dots-perforated-class"/><line x1="645" y1="160" x2="680" y2="135" stroke="#cbd5e1" stroke-width="1.5"/>
            <rect x="145" y="160" width="10" height="130" rx="1" fill="#38bdf8" opacity="0.2"/>
            <rect x="645" y="160" width="10" height="130" rx="1" fill="#cbd5e1" opacity="0.2"/>
            <path d="M 50 220 L 140 220" fill="none" stroke="#06b6d4" stroke-width="7" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
            <path d="M 160 220 C 350 220, 450 170, 400 70" fill="none" stroke="#06b6d4" stroke-width="5" opacity="0.8" marker-end="url(#arrow-blue)" class="svg-wind-flow-delayed"/>
            ${standardDoor(230, 240, 0.7)}
            ${standardDoor(570, 240, 0.7, true)}
        `;
    }
    else if (t === "Cubierta ventilada") {
        svgContent += `
            ${groundLine}
            <path d="M 250 340 L 250 160 L 550 160 L 550 340 Z" fill="none" stroke="#cbd5e1" stroke-width="2"/>
            <polygon points="230,160 400,90 570,160" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="1"/>
            <polygon points="230,140 400,70 570,140" fill="none" stroke="#e2e8f0" stroke-width="4"/><polygon points="230,140 400,70 570,140" fill="#cbd5e1" opacity="0.05"/>
            <polygon points="230,160 400,90 570,160" fill="#ea580c" opacity="0.1"/>
            <path d="M 230,160 L 230,135 M 400,90 L 400,65 M 570,160 L 570,135" stroke="#cbd5e1" stroke-width="1" opacity="0.4"/>
            <line x1="250" y1="160" x2="250" y2="137" stroke="#cbd5e1" stroke-width="4"/><line x1="550" y1="160" x2="550" y2="137" stroke="#cbd5e1" stroke-width="4"/>
            ${sunObj}
            ${textObj(400, 240, "ESPACIO VENTILADO")}
            <path d="M 200 135 L 300 115" fill="none" stroke="#06b6d4" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
            <path d="M 320 110 L 400 80" fill="none" stroke="#ea580c" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-float-up"/>
            <path d="M 400 70 L 480 95" fill="none" stroke="#ef4444" stroke-width="6" marker-end="url(#arrow-blue)" class="svg-float-up"/>
            ${standardDoor(360, 240, 0.7)}
        `;
    }
    else if (t === "Protección solar ligera") {
        svgContent += `
            ${groundLine}
            <rect x="250" y="100" width="300" height="240" fill="none" stroke="#cbd5e1" stroke-width="2"/>
            <rect x="330" y="150" width="140" height="120" class="dots-glass-lines-class" stroke="#38bdf8"/><rect x="330" y="150" width="140" height="120" fill="#fafafa" opacity="0.1"/>
            <line x1="220" y1="80" x2="220" y2="340" stroke="#a1a1aa" stroke-width="1" stroke-dasharray="4 2"/>
            <rect x="215" y="120" width="10" height="80" class="dots-perforated-class"/><rect x="215" y="220" width="10" height="90" class="dots-perforated-class"/>
            ${sunObj}
            ${textObj(400, 190, "PROTECCIÓN SOLAR")}
            <path d="M 130 90 L 215 160" fill="none" stroke="#fcd34d" stroke-width="4.5" marker-end="url(#arrow-yellow)" class="svg-ray-bounce"/>
            <path d="M 225 165 L 330 200" fill="none" stroke="#fcd34d" stroke-width="2.5" opacity="0.5" marker-end="url(#arrow-yellow)" class="svg-ray-bounce" style="animation-delay: 0.5s"/>
            <path d="M 215 160 L 160 120" fill="none" stroke="#fcd34d" stroke-width="3" opacity="0.7" marker-end="url(#arrow-yellow)" class="svg-ray-bounce"/>
            ${standardDoor(270, 240, 0.7)}
            ${standardDoor(480, 240, 0.7, true)}
        `;
    }
    else if (t === "Espacios de transición") {
        // Mantener como image_0.png
        svgContent += `
            ${groundLine}
            <rect x="150" y="100" width="500" height="240" rx="5" fill="none" stroke="#cbd5e1" stroke-width="2"/>
            <rect x="150" y="150" width="120" height="140" fill="#e2e8f0" opacity="0.2" stroke="#cbd5e1" stroke-width="1"/>
            <polygon points="120,150 150,110 300,110 330,150" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="1"/>
            <line x1="150" y1="150" x2="150" y2="290" stroke="#cbd5e1" stroke-width="6"/>
            ${textObj(210, 210, "ZONA TRANSICIÓN")} ${textObj(430, 210, "HABITACIÓN")}
            ${standardDoor(210, 290, 0.7)}
            ${standardDoor(540, 290, 0.7, true)}
        `;
    }
    else if (t === "Fachada permeable") {
        svgContent += `
            ${groundLine}
            <rect x="100" y="80" width="600" height="260" fill="none" stroke="#cbd5e1" stroke-width="2"/><rect x="100" y="80" width="600" height="260" fill="#0f172a" opacity="0.05"/>
            <g transform="translate(100, 80)">
                <line x1="0" y1="20" x2="600" y2="50" stroke="#cbd5e1" stroke-width="5"/>
                <line x1="0" y1="70" x2="600" y2="100" stroke="#cbd5e1" stroke-width="5"/>
                <line x1="0" y1="120" x2="600" y2="150" stroke="#cbd5e1" stroke-width="5"/>
                <line x1="0" y1="170" x2="600" y2="200" stroke="#cbd5e1" stroke-width="5"/>
                <line x1="0" y1="220" x2="600" y2="250" stroke="#cbd5e1" stroke-width="5"/>
            </g>
            <rect x="100" y="80" width="600" height="260" rx="3" fill="#38bdf8" opacity="0.1"/>
            <path d="M 50 180 L 150 200" fill="none" stroke="#06b6d4" stroke-width="7" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
            <path d="M 200 130 L 300 130" fill="none" stroke="#06b6d4" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-wind-flow" style="animation-delay: 0.5s"/>
            <path d="M 400 230 L 500 230" fill="none" stroke="#06b6d4" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-wind-flow" style="animation-delay: 1s"/>
            ${standardDoor(360, 240, 0.7)}
        `;
    }
    else if (t === "Ventilación elevada") {
        // Mantener como image_2.png
        svgContent += `
            ${groundLine}
            <path d="M 250 340 L 250 180 L 550 180 L 550 340 Z" fill="none" stroke="#cbd5e1" stroke-width="2"/>
            <rect x="380" y="60" width="40" height="20" class="dots-glass-lines-class"/><rect x="380" y="60" width="40" height="20" fill="#fafafa" opacity="0.1"/>
            <path d="M 350 250 Q 400 150 395 50" fill="none" stroke="#ef4444" stroke-width="6" stroke-dasharray="10 5" marker-end="url(#arrow-blue)" class="svg-float-up"/>
            <path d="M 450 250 Q 400 150 405 50" fill="none" stroke="#ef4444" stroke-width="6" stroke-dasharray="10 5" marker-end="url(#arrow-blue)" class="svg-float-up" style="animation-delay: 0.5s"/>
            ${textObj(400, 200, "ZONA CALIENTE")}
            ${scaleFigure}
            ${standardDoor(360, 240, 0.7)}
        `;
    }
    else if (t === "Núcleo compacto") {
        svgContent += `
            <rect x="50" y="50" width="700" height="300" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5 5"/><rect x="50" y="50" width="700" height="300" rx="10" fill="#0f172a" opacity="0.05"/>
            <rect x="150" y="100" width="500" height="200" rx="5" fill="#e2e8f0" opacity="0.2" stroke="#cbd5e1" stroke-width="2"/><rect x="150" y="100" width="500" height="200" rx="5" fill="#334155" opacity="0.1"/>
            <rect x="275" y="125" width="250" height="150" rx="3" class="hatch-mass-class" stroke="#ea580c" stroke-width="2"/><rect x="275" y="125" width="250" height="150" rx="3" class="hatch-mass-class"/>
            <line x1="275" y1="125" x2="150" y2="100" stroke="#cbd5e1" stroke-width="1.5" opacity="0.5"/><line x1="525" y1="125" x2="650" y2="100" stroke="#cbd5e1" stroke-width="1.5" opacity="0.5"/><line x1="275" y1="275" x2="150" y2="300" stroke="#cbd5e1" stroke-width="1.5" opacity="0.5"/><line x1="525" y1="275" x2="650" y2="300" stroke="#cbd5e1" stroke-width="1.5" opacity="0.5"/>
            ${textObj(210, 160, "SALA")} ${textObj(210, 240, "COMEDOR")} ${textObj(590, 200, "HABITACIÓN")}
            <circle cx="400" cy="200" r="50" fill="#ea580c" class="opacity-10 svg-heat-radiate"/>
            <path d="M 500 200 L 580 200" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 3" opacity="0.5" marker-end="url(#arrow-red)"/>
            ${standardDoor(350, 125, 0.6)}
            ${standardDoor(350, 275, 0.6, true)}
        `;
    }

    // NUEVAS ESTRATEGIAS
    else if (t === "Elevación palafítica") {

    else if (t === "Deshumidificación material") {
        svgContent += `

    else {
