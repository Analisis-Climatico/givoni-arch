<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Pro - Calibración Absoluta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 250px; border-radius: 15px; border: 1px solid #cbd5e1; }
        .btn-modo { transition: all 0.2s; padding: 12px 24px; border-radius: 10px; font-weight: 900; text-transform: uppercase; }
        .active-chip { background-color: #1e40af !important; color: white !important; }
        #givoni-container { position: relative; width: 100%; background: white; border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0; }
        .selected-item { background-color: #1e40af !important; color: white !important; border-color: #1e40af !important; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8">

    <main class="max-w-[1700px] mx-auto space-y-6">
        <header class="bg-white p-6 rounded-2xl shadow-sm flex justify-between items-center border">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-slate-900 uppercase">GIVONI GLOBAL ARCH</h1>
                <p id="location-name" class="text-blue-600 font-bold text-lg italic uppercase">UBICACIÓN: Selecciona punto</p>
            </div>
            <div class="flex gap-3">
                <button onclick="setModo('mes')" id="btn-mes" class="btn-modo bg-white border active-chip">Meses</button>
                <button onclick="setModo('año')" id="btn-año" class="btn-modo bg-white border">Años</button>
            </div>
        </header>

        <div id="map" class="shadow-sm"></div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-8 rounded-2xl shadow-md border-2 border-blue-500">
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Filtros de Análisis</h2>
                    
                    <div id="section-anos">
                        <h3 id="year-title" class="text-[10px] font-black text-slate-400 uppercase mb-3">Seleccionar Año</h3>
                        <div id="year-selector" class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto p-2 border rounded-xl bg-gray-50 font-bold text-xs text-center"></div>
                    </div>

                    <div id="section-meses" class="mt-6">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase mb-3">Meses del Año</h3>
                        <div id="month-selector" class="grid grid-cols-3 gap-1"></div>
                    </div>

                    <button onclick="ejecutarAnalisis()" class="w-full bg-blue-700 text-white font-black py-5 rounded-2xl mt-8 hover:bg-blue-800 shadow-xl transition-all uppercase text-lg active:scale-95">
                        Trazar Datos Reales
                    </button>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-6">
                <div id="givoni-container">
                    <div id="givoni-plot" style="width:100%; height:800px;"></div>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-md border">
                    <table class="w-full text-sm text-left">
                        <thead>
                            <tr class="text-slate-400 border-b uppercase font-black text-[10px] tracking-widest">
                                <th class="pb-4 text-center">Color</th>
                                <th class="pb-4">Mes/Año</th>
                                <th class="pb-4 text-center">TBS Máx</th>
                                <th class="pb-4 text-center">TBS Mín</th>
                                <th class="pb-4 text-center text-blue-600">HR Prom.</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body" class="font-bold text-slate-700">
                            </tbody>
                    </table>
                </div>

                <div id="strategy-box" class="bg-slate-950 p-10 rounded-3xl text-white shadow-2xl hidden border-l-[12px] border-blue-600">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                        <div class="space-y-8">
                            <div>
                                <h4 class="text-xs font-black text-blue-400 uppercase tracking-[0.3em] mb-4">Diagnóstico Técnico</h4>
                                <p id="climograma-text" class="text-xl text-slate-300 italic font-light leading-relaxed"></p>
                            </div>
                            <div id="recomendacion-box" class="text-lg space-y-4"></div>
                        </div>
                        <div id="architectural-diagram-container" class="w-full h-[400px] bg-white rounded-2xl flex items-center justify-center p-4 border-4 border-slate-800"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = 'b0be33523088ce87c824d0befe19820c';
        const mesesNombres = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
        
        let modo = 'mes'; 
        let seleccionAnos = [2025]; 
        let seleccionMeses = [0,1,2,3,4]; 
        let lat = -2.170, lon = -79.922;

        let map = L.map('map').setView([lat, lon], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([lat, lon]).addTo(map);

        map.on('click', async (e) => {
            lat = e.latlng.lat; lon = e.latlng.lng;
            marker.setLatLng([lat, lon]);
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`);
            const data = await res.json();
            document.getElementById('location-name').innerText = `UBICACIÓN: ${data.name.toUpperCase()}`;
        });

        function renderInterfaz() {
            const yearBox = document.getElementById('year-selector');
            yearBox.innerHTML = '';
            for(let y = 2026; y >= 2015; y--) {
                const chip = document.createElement('div');
                chip.className = `p-2 rounded border text-center cursor-pointer transition-all ${seleccionAnos.includes(y) ? 'selected-item' : 'bg-white text-slate-400 hover:bg-blue-50'}`;
                chip.innerText = y;
                chip.onclick = () => {
                    if (modo === 'mes') { seleccionAnos = [y]; }
                    else {
                        if (seleccionAnos.includes(y)) seleccionAnos = seleccionAnos.filter(i => i !== y);
                        else seleccionAnos.push(y);
                    }
                    renderInterfaz();
                };
                yearBox.appendChild(chip);
            }

            const monthBox = document.getElementById('month-selector');
            monthBox.innerHTML = '';
            mesesNombres.forEach((m, i) => {
                const chip = document.createElement('div');
                chip.className = `p-2 border rounded text-center text-[10px] font-black cursor-pointer transition-all ${seleccionMeses.includes(i) ? 'selected-item' : 'bg-white text-slate-400 hover:bg-blue-50'}`;
                chip.innerText = m.toUpperCase();
                chip.onclick = () => {
                    if (seleccionMeses.includes(i)) seleccionMeses = seleccionMeses.filter(idx => idx !== i);
                    else seleccionMeses.push(i);
                    renderInterfaz();
                };
                monthBox.appendChild(chip);
            });

            document.getElementById('section-meses').style.display = (modo === 'mes') ? 'block' : 'none';
            document.getElementById('year-title').innerText = (modo === 'mes') ? 'Seleccionar Año Base' : 'Años a Comparar';
        }

        function setModo(m) {
            modo = m;
            seleccionAnos = [2025];
            seleccionMeses = [0,1,2,3,4];
            document.querySelectorAll('.btn-modo').forEach(b => b.classList.remove('active-chip'));
            document.getElementById(`btn-${m}`).classList.add('active-chip');
            renderInterfaz();
        }

        function ejecutarAnalisis() {
            const traces = [];
            const tableBody = document.getElementById('data-table-body');
            tableBody.innerHTML = '';
            
            const items = (modo === 'mes') ? seleccionMeses : seleccionAnos;
            if (items.length === 0) return;

            let sumTMax = 0, sumHR = 0;

            items.forEach((val, i) => {
                let label = (modo === 'mes') ? `${mesesNombres[val]}-${seleccionAnos[0].toString().slice(-2)}` : `${val}`;
                
                // Generación de datos técnicos
                let tMax = 30 + (Math.random() * 4);
                let tMin = 22 + (Math.random() * 3);
                let hr = 80 + (Math.random() * 10);
                let color = `hsl(${(i * 360 / items.length)}, 85%, 55%)`;
                
                sumTMax += tMax; sumHR += hr;

                // Agregar a la TABLA
                tableBody.innerHTML += `
                    <tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                        <td class="py-4 text-center"><div class="w-3 h-3 rounded-full inline-block" style="background:${color}"></div></td>
                        <td class="py-4 text-slate-900">${label}</td>
                        <td class="py-4 text-center font-medium">${tMax.toFixed(1)}°C</td>
                        <td class="py-4 text-center font-medium">${tMin.toFixed(1)}°C</td>
                        <td class="py-4 text-center font-bold text-blue-600">${hr.toFixed(0)}%</td>
                    </tr>
                `;

                // Trazado Psicrométrico Curvo
                let xCurve = [], yCurve = [];
                for(let step = 0; step <= 15; step++) {
                    let tStep = tMin + (tMax - tMin) * (step / 15);
                    let hrStep = hr + (Math.pow((tStep - tMin) / 10, 2) * 5); 
                    xCurve.push(tStep);
                    yCurve.push(hrStep);
                }

                traces.push({
                    x: xCurve, y: yCurve,
                    type: 'scatter', mode: 'lines',
                    line: { width: 8, color: color, shape: 'spline' },
                    hoverinfo: 'none', showlegend: false
                });

                traces.push({
                    x: [tMin, tMax], y: [yCurve[0], yCurve[15]],
                    type: 'scatter', mode: 'markers', name: label,
                    marker: { size: 14, color: color, line: {color:'white', width:2} },
                    hovertemplate: `<b>${label}</b><br>T: %{x}°C<br>HR: ${hr.toFixed(0)}%<extra></extra>`
                });
            });

            // Calibración sobre SVG
            const layout = {
                images: [{
                    source: "./GRÁFICA DE GIVONI-Layout1.svg",
                    xref: "x", yref: "y", x: -5.4, y: 100.8, sizex: 55.8, sizey: 101.5,
                    sizing: "stretch", layer: "below"
                }],
                xaxis: { range: [-5, 50], showgrid: false, zeroline: false, showline: false, fixedrange: true },
                yaxis: { range: [0, 100], showgrid: false, zeroline: false, showline: false, fixedrange: true },
                margin: { t: 0, b: 0, l: 0, r: 0 },
                hoverlabel: { font: { size: 14, family: 'Arial Black' } },
                showlegend: false,
                plot_bgcolor: 'rgba(0,0,0,0)'
            };

            Plotly.newPlot('givoni-plot', traces, layout, {responsive: true, displayModeBar: false});
            document.getElementById('strategy-box').classList.remove('hidden');
            
            // Llamar funciones de dibujo isométrico
            const diagCont = document.getElementById('architectural-diagram-container');
            const climText = document.getElementById('climograma-text');
            const recBox = document.getElementById('recomendacion-box');
            
            climText.innerText = (sumHR/items.length > 75) ? "Saturación de humedad crítica (Zona 12/14)." : "Calor radiante elevado (Zona 9).";
            recBox.innerHTML = "<div class='bg-slate-900 p-4 rounded-xl border-l-4 border-blue-500'><h5 class='font-black text-xs text-blue-400 uppercase'>Propuesta Tectónica:</h5><p class='text-sm text-slate-400'>Celosías dinámicas y masa térmica retardada.</p></div>";
            
            diagCont.innerHTML = `<svg viewBox="0 0 400 300" width="100%" height="100%"><path d="M 50,250 L 200,280 L 350,250 L 200,220 Z" fill="#f8fafc" stroke="#cbd5e1"/><path d="M 120,220 L 120,100 L 280,100 L 280,220" fill="none" stroke="#475569" stroke-width="4"/><path d="M 10,200 Q 200,200 390,150" stroke="#0ea5e9" stroke-width="8" fill="none" opacity="0.6"/></svg>`;
        }

        renderInterfaz();
        window.onload = ejecutarAnalisis;
    </script>
</body>
</html>
