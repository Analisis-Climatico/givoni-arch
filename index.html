<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Climate Engine PRO - Calibración Tesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
        #map { height: 260px; border-radius: 22px; overflow: hidden; border: 1px solid #dbe2ea; }
        #chart { width: 100%; height: 760px; background: white; border-radius: 24px; overflow: hidden; border: 1px solid #dbe2ea; position: relative; }
        .btn-mode { padding: 10px 22px; border-radius: 12px; border: 1px solid #dbe2ea; font-size: 11px; font-weight: 900; transition: .2s; }
        .active-mode { background: #2563eb; color: white; border-color: #2563eb; }
        .selector-chip { padding: 10px; border-radius: 10px; border: 1px solid #dbe2ea; text-align: center; font-size: 11px; font-weight: 800; cursor: pointer; transition: .2s; background: white; }
        .selected-item { background: #2563eb; color: white; }
        .tooltip-box { position: absolute; pointer-events: none; background: #0f172a; color: white; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 700; opacity: 0; transition: .2s; z-index: 9999; }
        .zone-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; margin: 2px; font-size: 9px; font-weight: 900; text-transform: uppercase; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">
    <main class="max-w-[1900px] mx-auto space-y-6">
        <header class="bg-white rounded-3xl border shadow-sm p-6 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tight text-slate-800">Givoni Climate Engine</h1>
                <p class="text-xs uppercase tracking-[0.3em] text-slate-400 font-black mt-2">Arquitectura Bioclimática</p>
            </div>
            <div class="flex gap-2">
                <button onclick="setMode('mes')" id="btn-mes" class="btn-mode active-mode">MESES</button>
                <button onclick="setMode('año')" id="btn-año" class="btn-mode">AÑOS</button>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
            <div class="bg-white rounded-3xl border shadow-sm p-6 space-y-6">
                <div>
                    <p id="location-text" class="text-blue-600 font-black text-xs uppercase mb-4 italic">Ubicación: Guayaquil</p>
                    <p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">Seleccionar Año</p>
                    <div id="year-selector" class="grid grid-cols-2 gap-2 max-h-[400px] overflow-y-auto pr-1"></div>
                </div>
                <div id="month-section">
                    <p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">Meses</p>
                    <div id="month-selector" class="grid grid-cols-3 gap-2"></div>
                </div>
                <button onclick="runClimateAnalysis()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black uppercase rounded-2xl py-4 text-xs transition-all">Actualizar Climograma</button>
            </div>

            <div class="xl:col-span-3 space-y-6">
                <div id="chart"><div id="tooltip" class="tooltip-box"></div></div>

                <div class="bg-white rounded-3xl border overflow-hidden shadow-sm">
                    <table class="w-full text-xs">
                        <thead class="bg-slate-50 border-b text-slate-500 uppercase font-black text-center">
                            <tr>
                                <th class="p-4">Color</th><th class="p-4">Mes/Año</th>
                                <th class="p-4">Temp Máx</th><th class="p-4">Temp Mín</th>
                                <th class="p-4">HR %</th><th class="p-4 text-left">Zonas Detectadas</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="font-bold text-slate-700 text-center"></tbody>
                    </table>
                </div>

                <div class="bg-[#0f172a] rounded-3xl p-10 text-white border-l-[10px] border-blue-500">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <div>
                            <p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">Diagnóstico Bioclimático</p>
                            <p id="analysis-text" class="text-slate-300 leading-relaxed text-lg italic"></p>
                        </div>
                        <div>
                            <p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">Estrategias Arquitectónicas</p>
                            <div id="strategy-list" class="space-y-4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        let mode = 'mes', selectedYears = [2025], selectedMonths = [0,1,2,3,4], lat = -2.17, lon = -79.92;
        let currentZonesSVG = null;

        const zoneConfig = {
            "Z1": { color: "rgb(254, 204, 102)" }, "Z2": { color: "rgb(153, 27, 30)" }, "Z3": { color: "rgb(19, 103, 52)" },
            "Z4": { color: "rgb(19, 155, 72)" }, "Z5": { color: "rgb(24, 125, 129)" }, "Z6": { color: "rgb(209, 156, 199)" },
            "Z7": { color: "rgb(50, 162, 210)" }, "Z8": { color: "rgb(205, 105, 40)" }, "Z9": { color: "rgb(242, 113, 114)" },
            "Z10": { color: "rgb(147, 39, 143)" }, "Z11": { color: "rgb(241, 235, 31)" }, "Z12": { color: "rgb(46, 173, 141)" },
            "Z13": { color: "rgb(69, 84, 165)" }, "Z14": { color: "rgb(159, 119, 197)" }
        };

        const map = L.map('map').setView([lat,lon],7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const marker = L.marker([lat,lon]).addTo(map);

        map.on('click', async(e)=>{
            lat = e.latlng.lat; lon = e.latlng.lng; marker.setLatLng([lat,lon]);
            updateLocation(); runClimateAnalysis();
        });

        function setMode(m){
            mode = m;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active-mode'));
            document.getElementById(`btn-${m}`).classList.add('active-mode');
            document.getElementById('month-section').style.display = m === 'mes' ? 'block' : 'none';
            renderSelectors();
        }

        function renderSelectors(){
            const yearBox = document.getElementById('year-selector'); yearBox.innerHTML = '';
            const currentYear = new Date().getFullYear();
            for(let y=currentYear; y>=2000; y--){
                const chip = document.createElement('div');
                chip.className = `selector-chip ${selectedYears.includes(y) ? 'selected-item' : ''}`;
                chip.innerText = y;
                chip.onclick = ()=>{
                    if(mode === 'mes') selectedYears = [y];
                    else selectedYears.includes(y) ? selectedYears = selectedYears.filter(v=>v!==y) : selectedYears.push(y);
                    renderSelectors();
                };
                yearBox.appendChild(chip);
            }
            const monthBox = document.getElementById('month-selector'); monthBox.innerHTML = '';
            months.forEach((m,i)=>{
                const chip = document.createElement('div');
                chip.className = `selector-chip ${selectedMonths.includes(i) ? 'selected-item' : ''}`;
                chip.innerText = m;
                chip.onclick = ()=>{
                    selectedMonths.includes(i) ? selectedMonths = selectedMonths.filter(v=>v!==i) : selectedMonths.push(i);
                    renderSelectors();
                };
                monthBox.appendChild(chip);
            });
        }

        function detectZones(tMin, tMax, hr) {
            let detected = [];
            const checkPoint = (t, h) => {
                // Zona 13: Aire Acondicionado
                if (t > 40 || (t > 30 && h > 55) || (t > 37 && h > 30)) detected.push("Z13");
                // Zona 12: Ventilación
                if (t >= 20 && t <= 32 && h >= 50 && h <= 90) detected.push("Z12");
                // Zona 14: Deshumidificación
                if (h > 80 && t >= 20 && t <= 29) detected.push("Z14");
                // Zona 2: Confort Permisible
                if (t > 24.5 && t <= 27 && h >= 20 && h <= 80) detected.push("Z2");
                // Zona 1: Confort (Ajustada para no solaparse erróneamente)
                if (t >= 20 && t <= 24.5 && h >= 20 && h <= 70) detected.push("Z1");
                // Zona 9: Masa Térmica
                if (t > 27 && t <= 36 && h >= 5 && h <= 50) detected.push("Z9");
                // Zona 3: Ganancias Internas
                if (t >= 15 && t < 20 && h >= 20 && h <= 85) detected.push("Z3");
            };
            for(let s=0; s<=1; s+=0.1) checkPoint(tMin + (tMax - tMin) * s, hr);
            return [...new Set(detected)].sort((a,b) => parseInt(a.slice(1)) - parseInt(b.slice(1)));
        }

        async function drawChart(data){
            d3.select('#chart svg').remove();
            const width = 1600, height = 760;
            const margin = { top:20, right:20, bottom:60, left:20 };
            const innerWidth = width - margin.left - margin.right;
            const innerHeight = height - margin.top - margin.bottom;

            const svg = d3.select('#chart').append('svg').attr('width','100%').attr('height','100%').attr('viewBox',`0 0 ${width} ${height}`);
            const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
            const x = d3.scaleLinear().domain([-5,50]).range([0,innerWidth]);
            const y = d3.scaleLinear().domain([0,35]).range([innerHeight,0]);

            const response = await fetch('pruega-de-svg.svg');
            const rawSVG = await response.text();
            const parser = new DOMParser();
            const svgDoc = parser.parseFromString(rawSVG, "image/svg+xml");
            const importedSVG = document.importNode(svgDoc.documentElement, true);
            importedSVG.setAttribute("width",innerWidth);
            importedSVG.setAttribute("height",innerHeight);
            importedSVG.setAttribute("preserveAspectRatio","none");
            // RESTAURACIÓN DE LA POSICIÓN (No mover más arriba)
            importedSVG.setAttribute("transform","translate(0,65)");
            g.append("g").style("opacity","0.85").node().appendChild(importedSVG);

            data.forEach((d,i)=>{
                d.color = d3.interpolateRainbow(i/data.length);
                d.zones = detectZones(d.tMin, d.tMax, d.hr);
                const points = [];
                for(let s=0;s<=30;s++){
                    let t = d.tMin + ((d.tMax-d.tMin)*(s/30));
                    let sat = 0.61078 * Math.exp((17.27*t)/(t+237.3));
                    let vap = (d.hr/100) * sat;
                    let hum = 622 * (vap / (101.325 - vap));
                    points.push([x(t), y(hum)]);
                }
                // RESTAURACIÓN DEL GROSOR DE LÍNEA (5)
                g.append('path').attr('d', d3.line().curve(d3.curveBasis)(points))
                    .attr('fill','none').attr('stroke',d.color).attr('stroke-width',5).attr('stroke-linecap','round');
            });
            g.append('g').attr('transform', `translate(0,${innerHeight})`).call(d3.axisBottom(x));
        }

        function updateTable(data){
            const tbody = document.getElementById('table-body'); tbody.innerHTML = '';
            data.forEach(d=>{
                const badges = d.zones.map(z => `<span class="zone-badge" style="background:${zoneConfig[z]?.color || '#999'}">${z}</span>`).join(' ');
                tbody.innerHTML += `<tr class="border-b hover:bg-slate-50 transition-colors">
                    <td class="p-4"><div class="w-4 h-4 rounded-full mx-auto shadow-md" style="background:${d.color}"></div></td>
                    <td class="p-4 font-black">${d.label}</td><td class="p-4">${d.tMax.toFixed(1)}°C</td><td class="p-4">${d.tMin.toFixed(1)}°C</td>
                    <td class="p-4 text-blue-600 font-black">${d.hr.toFixed(0)}%</td>
                    <td class="p-4 text-left">${badges}</td></tr>`;
            });
        }

        function updateAnalysis(data){
            const avgHR = d3.mean(data, d => d.hr);
            const analysis = document.getElementById('analysis-text');
            const strategyList = document.getElementById('strategy-list');
            strategyList.innerHTML = '';
            let diagnosis = avgHR > 70 ? 'Clima con alta carga de humedad. Se requiere ventilación mecánica asistida o deshumidificación.' : 'Clima moderado con alta incidencia solar.';
            analysis.innerText = diagnosis;
            const strategies = avgHR > 70 ? ['Ventilación Cruzada', 'Deshumidificación', 'Celosías'] : ['Protección Solar', 'Masa Térmica'];
            strategies.forEach(s => {
                strategyList.innerHTML += `<div class="bg-slate-800 border border-slate-700 rounded-xl p-4"><p class="text-sm font-bold text-blue-300">${s}</p></div>`;
            });
        }

        async function runClimateAnalysis(){
            let results = [];
            if(mode === 'mes'){
                const year = selectedYears[0];
                const data = await fetchClimate(selectedYears[0]);
                selectedMonths.forEach(m => {
                    const tMax = data.daily.temperature_2m_max.filter((_,idx) => new Date(data.daily.time[idx]).getMonth() === m);
                    const tMin = data.daily.temperature_2m_min.filter((_,idx) => new Date(data.daily.time[idx]).getMonth() === m);
                    const hr = data.daily.relative_humidity_2m_mean.filter((_,idx) => new Date(data.daily.time[idx]).getMonth() === m);
                    results.push({ label: `${months[m]} ${year}`, tMax: d3.mean(tMax), tMin: d3.mean(tMin), hr: d3.mean(hr) });
                });
            } else {
                for(const y of selectedYears){
                    const data = await fetchClimate(y);
                    results.push({ label: `${y}`, tMax: d3.mean(data.daily.temperature_2m_max), tMin: d3.mean(data.daily.temperature_2m_min), hr: d3.mean(data.daily.relative_humidity_2m_mean) });
                }
            }
            await drawChart(results); updateTable(results); updateAnalysis(results);
        }

        async function fetchClimate(year){
            const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${year}-01-01&end_date=${year}-12-31&daily=temperature_2m_max,temperature_2m_min,relative_humidity_2m_mean&timezone=auto`.replace(/\s+/g,'');
            const res = await fetch(url); return await res.json();
        }
        async function updateLocation(){ const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`); const data = await res.json(); document.getElementById('location-text').innerText = `Ubicación: ${data.address.city || data.address.town || 'Guayaquil'}`; }

        renderSelectors(); updateLocation(); runClimateAnalysis();
    </script>
</body>
</html>
