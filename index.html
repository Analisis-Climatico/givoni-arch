<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Givoni Climate Engine PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
    background:#f1f5f9;
    font-family:Inter,sans-serif;
}

#map{
    height:260px;
    border-radius:22px;
    overflow:hidden;
    border:1px solid #dbe2ea;
}

#chart{
    width:100%;
    height:900px;
    background:white;
    border-radius:24px;
    overflow:hidden;
    border:1px solid #dbe2ea;
    position:relative;
}

.btn-mode{
    padding:10px 22px;
    border-radius:12px;
    border:1px solid #dbe2ea;
    font-size:11px;
    font-weight:900;
    transition:.2s;
}

.active-mode{
    background:#2563eb;
    color:white;
    border-color:#2563eb;
}

.selector-chip{
    padding:10px;
    border-radius:10px;
    border:1px solid #dbe2ea;
    text-align:center;
    font-size:11px;
    font-weight:800;
    cursor:pointer;
    transition:.2s;
    background:white;
}

.selected-item{
    background:#2563eb;
    color:white;
}

.tooltip-box{
    position:absolute;
    pointer-events:none;
    background:#0f172a;
    color:white;
    padding:12px;
    border-radius:12px;
    font-size:11px;
    font-weight:700;
    opacity:0;
    transition:.2s;
    z-index:9999;
}

</style>
</head>

<body class="p-4 md:p-8">

<main class="max-w-[1900px] mx-auto space-y-6">

<header class="bg-white rounded-3xl border shadow-sm p-6 flex justify-between items-center">

<div>

<h1 class="text-3xl font-black uppercase tracking-tight text-slate-800">
Givoni Climate Engine
</h1>

<p class="text-xs uppercase tracking-[0.3em] text-slate-400 font-black mt-2">
Arquitectura Bioclimática
</p>

</div>

<div class="flex gap-2">

<button onclick="setMode('mes')" id="btn-mes"
class="btn-mode active-mode">
MESES
</button>

<button onclick="setMode('año')" id="btn-año"
class="btn-mode">
AÑOS
</button>

</div>

</header>

<div id="map"></div>

<div class="grid grid-cols-1 xl:grid-cols-4 gap-6">

<!-- SIDEBAR -->

<div class="bg-white rounded-3xl border shadow-sm p-6 space-y-6">

<div>

<p id="location-text"
class="text-blue-600 font-black text-xs uppercase mb-4">
Ubicación: Guayaquil
</p>

<p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">
Seleccionar Año
</p>

<div id="year-selector"
class="grid grid-cols-2 gap-2 max-h-[420px] overflow-y-auto pr-1">
</div>

</div>

<div id="month-section">

<p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">
Meses
</p>

<div id="month-selector"
class="grid grid-cols-3 gap-2"></div>

</div>

<button onclick="runClimateAnalysis()"
class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black uppercase rounded-2xl py-4 text-xs transition-all">

Actualizar Climograma

</button>

</div>

<!-- MAIN -->

<div class="xl:col-span-3 space-y-6">

<!-- CHART -->

<div id="chart">

<img
src="./OFICIAL-GRÁFICA DE GIVONI (1)-Layout1.jpg"
id="givoni-bg"
style="
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:fill;
z-index:1;
pointer-events:none;
user-select:none;
"
/>

<div id="tooltip"
class="tooltip-box"></div>

</div>

<!-- TABLA -->

<div class="bg-white rounded-3xl border overflow-hidden shadow-sm">

<table class="w-full text-xs">

<thead class="bg-slate-50 border-b text-slate-500 uppercase font-black">

<tr>

<th class="p-4 text-center">Color</th>
<th class="p-4">Mes/Año</th>
<th class="p-4 text-center">Temp Máx</th>
<th class="p-4 text-center">Temp Mín</th>
<th class="p-4 text-center">HR</th>
<th class="p-4 text-center">Zonas</th>

</tr>

</thead>

<tbody id="table-body"
class="font-bold text-slate-700"></tbody>

</table>

</div>

<!-- ANALISIS -->

<div class="bg-[#0f172a] rounded-3xl p-10 text-white border-l-[10px] border-blue-500">

<div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

<div>

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Diagnóstico Bioclimático
</p>

<p id="analysis-text"
class="text-slate-300 leading-relaxed text-lg"></p>

</div>

<div>

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Estrategias Arquitectónicas
</p>

<div id="strategy-list"
class="space-y-4"></div>

</div>

</div>

</div>

</div>

</div>

</main>

<script>

/* =========================================================
VARIABLES
========================================================= */

const months = [
'Ene','Feb','Mar','Abr','May','Jun',
'Jul','Ago','Sep','Oct','Nov','Dic'
];

let mode = 'mes';

let selectedYears = [2025];
let selectedMonths = [0,1,2,3,4];

let lat = -2.17;
let lon = -79.92;

/* =========================================================
MAPA
========================================================= */

const map = L.map('map').setView([lat,lon],7);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

const marker = L.marker([lat,lon]).addTo(map);

map.on('click', async(e)=>{

lat = e.latlng.lat;
lon = e.latlng.lng;

marker.setLatLng([lat,lon]);

await updateLocation();

runClimateAnalysis();

});

/* =========================================================
UI
========================================================= */

function setMode(m){

mode = m;

document.querySelectorAll('.btn-mode')
.forEach(btn=>btn.classList.remove('active-mode'));

document.getElementById(`btn-${m}`)
.classList.add('active-mode');

document.getElementById('month-section').style.display =
mode === 'mes'
? 'block'
: 'none';

renderSelectors();

}

function renderSelectors(){

const yearBox = document.getElementById('year-selector');
yearBox.innerHTML = '';

const currentYear = new Date().getFullYear();

for(let y=currentYear;y>=2000;y--){

const chip = document.createElement('div');

chip.className = `selector-chip ${
selectedYears.includes(y)
? 'selected-item'
: ''
}`;

chip.innerText = y;

chip.onclick = ()=>{

if(mode === 'mes'){

selectedYears = [y];

}
else{

if(selectedYears.includes(y)){

selectedYears =
selectedYears.filter(v=>v!==y);

}
else{

selectedYears.push(y);

}

}

renderSelectors();

};

yearBox.appendChild(chip);

}

const monthBox =
document.getElementById('month-selector');

monthBox.innerHTML = '';

months.forEach((m,i)=>{

const chip = document.createElement('div');

chip.className = `selector-chip ${
selectedMonths.includes(i)
? 'selected-item'
: ''
}`;

chip.innerText = m;

chip.onclick = ()=>{

if(selectedMonths.includes(i)){

selectedMonths =
selectedMonths.filter(v=>v!==i);

}
else{

selectedMonths.push(i);

}

renderSelectors();

};

monthBox.appendChild(chip);

});

}

/* =========================================================
LOCATION
========================================================= */

async function updateLocation(){

try{

const response = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
);

const data = await response.json();

const city =
data.address.city ||
data.address.town ||
data.address.state ||
'Ubicación';

document.getElementById('location-text')
.innerText = `Ubicación: ${city}`;

}
catch(err){}

}

/* =========================================================
OPEN METEO
========================================================= */

async function fetchClimate(year){

const url = `
https://archive-api.open-meteo.com/v1/archive?
latitude=${lat}&
longitude=${lon}&
start_date=${year}-01-01&
end_date=${year}-12-31&
daily=temperature_2m_max,temperature_2m_min,relative_humidity_2m_mean&
timezone=auto
`;

const response = await fetch(
url.replace(/\s+/g,'')
);

return await response.json();

}

/* =========================================================
ZONAS
========================================================= */

const ZONES = [

{
id:1,
name:"Confort",
x1:21,
x2:27,
h1:40,
h2:70
},

{
id:4,
name:"Ventilación Natural",
x1:27,
x2:34,
h1:45,
h2:90
},

{
id:8,
name:"Enfriamiento Evaporativo",
x1:30,
x2:40,
h1:20,
h2:70
},

{
id:12,
name:"Deshumidificación",
x1:27,
x2:38,
h1:70,
h2:100
},

{
id:13,
name:"Aire Acondicionado",
x1:35,
x2:50,
h1:20,
h2:80
}

];

/* =========================================================
DETECTAR ZONAS
========================================================= */

function detectZones(tMax,tMin,hr){

const detected = [];

for(let t=tMin;t<=tMax;t+=0.5){

ZONES.forEach(zone=>{

if(
t >= zone.x1 &&
t <= zone.x2 &&
hr >= zone.h1 &&
hr <= zone.h2
){

if(!detected.includes(zone.name)){
detected.push(zone.name);
}

}

});

}

return detected;

}

/* =========================================================
DRAW CHART
========================================================= */

function drawChart(data){

d3.select('#chart svg').remove();

const width = 1600;
const height = 900;

/* =========================================================
CALIBRACIÓN DEL FONDO GIVONI
========================================================= */

const chartOffsetX = 118;
const chartOffsetY = 82;

const chartWidth = 1290;
const chartHeight = 690;

/* =========================================================
SVG
========================================================= */

const svg = d3.select('#chart')
.append('svg')
.style('position','absolute')
.style('inset','0')
.style('z-index','2')
.attr('width','100%')
.attr('height','100%')
.attr('viewBox',`0 0 ${width} ${height}`);

/* =========================================================
ESCALAS
========================================================= */

const x = d3.scaleLinear()
.domain([0,50])
.range([
chartOffsetX,
chartOffsetX + chartWidth
]);

const y = d3.scaleLinear()
.domain([0,100])
.range([
chartOffsetY + chartHeight,
chartOffsetY
]);

const tooltip =
document.getElementById('tooltip');

/* =========================================================
CURVAS
========================================================= */

data.forEach((d,i)=>{

const color =
d3.interpolateRainbow(i/data.length);

d.color = color;

const points = [];

for(let step=0;step<=40;step++){

const t =
d.tMin +
((d.tMax-d.tMin)*(step/40));

const hrCurve =
d.hr - (
(step/40) * 8
);

points.push([
x(t),
y(hrCurve)
]);

}

const line = d3.line()
.curve(d3.curveBasis);

svg.append('path')
.attr('d',line(points))
.attr('fill','none')
.attr('stroke',color)
.attr('stroke-width',8)
.attr('stroke-linecap','round')
.attr('opacity',0.95)

.on('mousemove',(event)=>{

tooltip.style.opacity = 1;

tooltip.style.left =
(event.pageX + 20) + 'px';

tooltip.style.top =
(event.pageY - 20) + 'px';

tooltip.innerHTML = `

<div class="space-y-2">

<p class="font-black text-blue-400">
${d.label}
</p>

<p>
Temperatura Máx:
<b>${d.tMax.toFixed(1)}°C</b>
</p>

<p>
Temperatura Mín:
<b>${d.tMin.toFixed(1)}°C</b>
</p>

<p>
Humedad:
<b>${d.hr.toFixed(0)}%</b>
</p>

<p>
Zonas:
<b>${d.zones.join(', ')}</b>
</p>

</div>

`;

})

.on('mouseleave',()=>{

tooltip.style.opacity = 0;

});

points.forEach(p=>{

svg.append('circle')
.attr('cx',p[0])
.attr('cy',p[1])
.attr('r',3)
.attr('fill',color);

});

});

}

/* =========================================================
TABLA
========================================================= */

function updateTable(data){

const tbody =
document.getElementById('table-body');

tbody.innerHTML = '';

data.forEach(d=>{

tbody.innerHTML += `

<tr class="border-b hover:bg-slate-50">

<td class="p-4 text-center">

<div class="w-4 h-4 rounded-full inline-block"
style="background:${d.color}">
</div>

</td>

<td class="p-4">
${d.label}
</td>

<td class="p-4 text-center">
${d.tMax.toFixed(1)}°C
</td>

<td class="p-4 text-center">
${d.tMin.toFixed(1)}°C
</td>

<td class="p-4 text-center text-blue-600 font-black">
${d.hr.toFixed(0)}%
</td>

<td class="p-4 text-center font-black text-[10px]">
${d.zones.join(', ')}
</td>

</tr>

`;

});

}

/* =========================================================
ANALISIS
========================================================= */

function updateAnalysis(data){

const analysis =
document.getElementById('analysis-text');

const strategyList =
document.getElementById('strategy-list');

strategyList.innerHTML = '';

const zoneCounter = {};

data.forEach(d=>{

d.zones.forEach(z=>{

zoneCounter[z] =
(zoneCounter[z] || 0) + 1;

});

});

const dominantZones =
Object.entries(zoneCounter)
.sort((a,b)=>b[1]-a[1])
.slice(0,3)
.map(v=>v[0]);

let text = `
El análisis bioclimático evidencia predominancia
en las zonas:
${dominantZones.join(', ')}.
`;

let strategies = [];

if(dominantZones.includes('Ventilación Natural')){

strategies.push(
'Ventilación cruzada continua'
);

strategies.push(
'Fachadas permeables'
);

}

if(dominantZones.includes('Deshumidificación')){

strategies.push(
'Deshumidificación pasiva'
);

strategies.push(
'Cubiertas ventiladas'
);

}

if(dominantZones.includes('Enfriamiento Evaporativo')){

strategies.push(
'Sistemas evaporativos'
);

strategies.push(
'Disipación térmica nocturna'
);

}

if(dominantZones.includes('Aire Acondicionado')){

strategies.push(
'Alta protección solar'
);

strategies.push(
'Reducción de ganancias térmicas'
);

}

analysis.innerText = text;

strategies.forEach(s=>{

strategyList.innerHTML += `

<div class="bg-slate-900 border border-slate-800 rounded-2xl p-5">

<p class="text-sm font-bold text-slate-300">
${s}
</p>

</div>

`;

});

}

/* =========================================================
MAIN
========================================================= */

async function runClimateAnalysis(){

let results = [];

/* =========================================================
MESES
========================================================= */

if(mode === 'mes'){

const year = selectedYears[0];

const data =
await fetchClimate(year);

for(let m=0;m<12;m++){

if(!selectedMonths.includes(m))
continue;

const tMax =
data.daily.temperature_2m_max
.filter((v,i)=>
new Date(data.daily.time[i]).getMonth()===m
);

const tMin =
data.daily.temperature_2m_min
.filter((v,i)=>
new Date(data.daily.time[i]).getMonth()===m
);

const hr =
data.daily.relative_humidity_2m_mean
.filter((v,i)=>
new Date(data.daily.time[i]).getMonth()===m
);

const avgMax =
tMax.reduce((a,b)=>a+b,0)/tMax.length;

const avgMin =
tMin.reduce((a,b)=>a+b,0)/tMin.length;

const avgHR =
hr.reduce((a,b)=>a+b,0)/hr.length;

results.push({

label:`${months[m]} ${year}`,

tMax:avgMax,
tMin:avgMin,
hr:avgHR,

zones:detectZones(
avgMax,
avgMin,
avgHR
)

});

}

}

/* =========================================================
AÑOS
========================================================= */

else{

for(const year of selectedYears){

const data =
await fetchClimate(year);

const avgMax =
data.daily.temperature_2m_max
.reduce((a,b)=>a+b,0)
/
data.daily.temperature_2m_max.length;

const avgMin =
data.daily.temperature_2m_min
.reduce((a,b)=>a+b,0)
/
data.daily.temperature_2m_min.length;

const avgHR =
data.daily.relative_humidity_2m_mean
.reduce((a,b)=>a+b,0)
/
data.daily.relative_humidity_2m_mean.length;

results.push({

label:`${year}`,

tMax:avgMax,
tMin:avgMin,
hr:avgHR,

zones:detectZones(
avgMax,
avgMin,
avgHR
)

});

}

}

drawChart(results);

updateTable(results);

updateAnalysis(results);

}

/* =========================================================
INIT
========================================================= */

renderSelectors();

updateLocation();

runClimateAnalysis();

</script>

</body>
</html>
