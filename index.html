<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Givoni Climate Engine V3</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
    background:#f1f5f9;
    font-family:Inter,sans-serif;
}

#map{
    height:260px;
    border-radius:18px;
    border:1px solid #dbe2ea;
    overflow:hidden;
}

#chart{
    width:100%;
    height:850px;
    background:white;
    border-radius:24px;
    border:1px solid #dbe2ea;
    overflow:hidden;
}

.btn-mode{
    padding:10px 20px;
    border-radius:12px;
    border:1px solid #dbe2ea;
    font-size:11px;
    font-weight:900;
    transition:.2s;
}

.active-mode{
    background:#2563eb;
    color:white;
    border-color:#2563eb;
}

.selector-chip{
    padding:10px;
    border-radius:10px;
    border:1px solid #dbe2ea;
    cursor:pointer;
    text-align:center;
    font-size:11px;
    font-weight:800;
    transition:.2s;
}

.selector-chip:hover{
    transform:translateY(-2px);
}

.selected-item{
    background:#2563eb;
    color:white;
}

.zone-label{
    font-size:11px;
    font-weight:900;
}

</style>
</head>

<body class="p-4 md:p-8">

<main class="max-w-[1900px] mx-auto space-y-6">

<!-- HEADER -->

<header class="bg-white rounded-3xl border shadow-sm p-6 flex justify-between items-center">

<div>
<h1 class="text-3xl font-black tracking-tight uppercase text-slate-800">
Givoni Climate Engine
</h1>

<p class="text-xs uppercase tracking-[0.3em] text-slate-400 font-black mt-2">
Arquitectura Bioclimática
</p>
</div>

<div class="flex gap-2">
<button onclick="setMode('mes')" id="btn-mes"
class="btn-mode active-mode">
MESES
</button>

<button onclick="setMode('año')" id="btn-año"
class="btn-mode">
AÑOS
</button>
</div>

</header>

<!-- MAPA -->

<div id="map"></div>

<!-- LAYOUT -->

<div class="grid grid-cols-1 xl:grid-cols-4 gap-6">

<!-- SIDEBAR -->

<div class="bg-white rounded-3xl border shadow-sm p-6 space-y-6">

<div>
<p id="location-text"
class="text-blue-600 font-black text-xs uppercase mb-4">
Ubicación: Guayaquil
</p>

<p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">
Seleccionar Año
</p>

<div id="year-selector"
class="grid grid-cols-2 gap-2"></div>
</div>

<div id="month-section">

<p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">
Meses
</p>

<div id="month-selector"
class="grid grid-cols-3 gap-2"></div>

</div>

<button onclick="runClimateAnalysis()"
class="w-full bg-blue-600 hover:bg-blue-700 transition-all text-white font-black uppercase py-4 rounded-2xl text-xs">

Actualizar Climograma

</button>

</div>

<!-- CONTENT -->

<div class="xl:col-span-3 space-y-6">

<div id="chart"></div>

<!-- TABLA -->

<div class="bg-white rounded-3xl border overflow-hidden shadow-sm">

<table class="w-full text-xs">

<thead class="bg-slate-50 border-b text-slate-500 uppercase font-black">

<tr>
<th class="p-4">Mes/Año</th>
<th class="p-4 text-center">Temp Máx</th>
<th class="p-4 text-center">Temp Mín</th>
<th class="p-4 text-center">HR</th>
<th class="p-4 text-center">Zona Dominante</th>
</tr>

</thead>

<tbody id="table-body"
class="font-bold text-slate-700"></tbody>

</table>

</div>

<!-- ANALISIS -->

<div id="analysis-box"
class="bg-[#0f172a] rounded-3xl p-10 text-white border-l-[10px] border-blue-500">

<div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

<div>

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Diagnóstico Bioclimático
</p>

<p id="analysis-text"
class="text-slate-300 leading-relaxed text-lg"></p>

</div>

<div>

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Estrategias Arquitectónicas
</p>

<div id="strategy-list"
class="space-y-4"></div>

</div>

</div>

</div>

</div>

</div>

</main>

<script>

/* =========================================================
   VARIABLES
========================================================= */

const months = [
'Ene','Feb','Mar','Abr','May','Jun',
'Jul','Ago','Sep','Oct','Nov','Dic'
];

let mode = 'mes';

let selectedYears = [2025];
let selectedMonths = [0,1,2,3,4];

let lat = -2.170;
let lon = -79.922;

/* =========================================================
   MAPA
========================================================= */

const map = L.map('map').setView([lat,lon],8);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

const marker = L.marker([lat,lon]).addTo(map);

map.on('click', async(e)=>{

lat = e.latlng.lat;
lon = e.latlng.lng;

marker.setLatLng([lat,lon]);

await updateLocation();

runClimateAnalysis();

});

/* =========================================================
   UI
========================================================= */

function setMode(m){

mode = m;

document.querySelectorAll('.btn-mode')
.forEach(btn=>btn.classList.remove('active-mode'));

document.getElementById(`btn-${m}`)
.classList.add('active-mode');

document.getElementById('month-section').style.display =
mode === 'mes'
? 'block'
: 'none';

renderSelectors();

}

function renderSelectors(){

const yearBox = document.getElementById('year-selector');
yearBox.innerHTML = '';

for(let y=2026;y>=2015;y--){

const chip = document.createElement('div');

chip.className = `selector-chip ${
selectedYears.includes(y)
? 'selected-item'
: ''
}`;

chip.innerText = y;

chip.onclick = ()=>{

if(mode === 'mes'){
selectedYears = [y];
}
else{

if(selectedYears.includes(y)){
selectedYears =
selectedYears.filter(v=>v!==y);
}
else{
selectedYears.push(y);
}

}

renderSelectors();

};

yearBox.appendChild(chip);

}

const monthBox = document.getElementById('month-selector');
monthBox.innerHTML = '';

months.forEach((m,i)=>{

const chip = document.createElement('div');

chip.className = `selector-chip ${
selectedMonths.includes(i)
? 'selected-item'
: ''
}`;

chip.innerText = m;

chip.onclick = ()=>{

if(selectedMonths.includes(i)){
selectedMonths =
selectedMonths.filter(v=>v!==i);
}
else{
selectedMonths.push(i);
}

renderSelectors();

};

monthBox.appendChild(chip);

});

}

/* =========================================================
   UBICACION
========================================================= */

async function updateLocation(){

try{

const response = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
);

const data = await response.json();

const city =
data.address.city ||
data.address.town ||
data.address.state ||
'Ubicación';

document.getElementById('location-text')
.innerText = `Ubicación: ${city}`;

}
catch(err){}

}

/* =========================================================
   OPEN METEO
========================================================= */

async function fetchClimateData(year){

const url = `
https://archive-api.open-meteo.com/v1/archive?
latitude=${lat}&
longitude=${lon}&
start_date=${year}-01-01&
end_date=${year}-12-31&
hourly=temperature_2m,relative_humidity_2m
`;

const response = await fetch(
url.replace(/\s+/g,'')
);

return await response.json();

}

/* =========================================================
   DETECTAR ZONA GIVONI
========================================================= */

function detectZone(temp,hr){

if(temp >= 21 && temp <= 27 && hr >= 30 && hr <= 70){
return 'Confort';
}

if(temp >= 27 && temp <= 34 && hr >= 20){
return 'Ventilación';
}

if(temp > 34){
return 'Masa Térmica';
}

if(temp < 20){
return 'Calefacción Solar';
}

if(hr > 80){
return 'Deshumidificación';
}

return 'Protección Solar';

}

/* =========================================================
   DIBUJAR DIAGRAMA GIVONI
========================================================= */

function drawChart(climate){

d3.select('#chart').html('');

const width = 1500;
const height = 850;

const margin = {
top:40,
right:120,
bottom:80,
left:70
};

const innerWidth =
width - margin.left - margin.right;

const innerHeight =
height - margin.top - margin.bottom;

const svg = d3.select('#chart')
.append('svg')
.attr('width','100%')
.attr('height',height)
.attr('viewBox',`0 0 ${width} ${height}`);

const g = svg.append('g')
.attr('transform',
`translate(${margin.left},${margin.top})`);

const x = d3.scaleLinear()
.domain([-5,50])
.range([0,innerWidth]);

const y = d3.scaleLinear()
.domain([0,100])
.range([innerHeight,0]);

/* GRID */

for(let t=-5;t<=50;t+=1){

g.append('line')
.attr('x1',x(t))
.attr('x2',x(t))
.attr('y1',0)
.attr('y2',innerHeight)
.attr('stroke',
t % 5 === 0
? '#d1d5db'
: '#e5e7eb')
.attr('stroke-width',
t % 5 === 0
? 1
: 0.5);

}

for(let h=0;h<=100;h+=5){

g.append('line')
.attr('x1',0)
.attr('x2',innerWidth)
.attr('y1',y(h))
.attr('y2',y(h))
.attr('stroke','#e5e7eb');

}

/* CURVAS RH */

for(let rh=10;rh<=100;rh+=10){

const points = [];

for(let t=-5;t<=50;t+=0.5){

const curve =
100 - ((100-rh) * Math.exp(-(t+5)/20));

points.push([
x(t),
y(curve)
]);

}

const line = d3.line();

g.append('path')
.attr('d',line(points))
.attr('fill','none')
.attr('stroke','#cbd5e1')
.attr('stroke-width',1);

}

/* ZONAS GIVONI */

const zones = [

{
name:'1',
label:'CONFORT',
color:'rgba(250,204,21,0.15)',
stroke:'#eab308',
points:[
[21,10],
[25,15],
[25,45],
[21,35]
]
},

{
name:'2',
label:'CONFORT PERMISIBLE',
color:'rgba(239,68,68,0.12)',
stroke:'#b91c1c',
points:[
[20,10],
[27,15],
[27,45],
[24,55],
[20,40]
]
},

{
name:'12',
label:'VENTILACIÓN',
color:'rgba(16,185,129,0.12)',
stroke:'#10b981',
points:[
[20,40],
[24,55],
[28,80],
[33,45],
[33,20],
[27,15]
]
},

{
name:'9',
label:'ALTA MASA TÉRMICA',
color:'rgba(244,114,182,0.12)',
stroke:'#ef4444',
points:[
[24,55],
[33,45],
[37,30],
[37,10],
[24,10]
]
},

{
name:'10',
label:'EVAPORACIÓN',
color:'rgba(168,85,247,0.12)',
stroke:'#9333ea',
points:[
[24,55],
[40,20],
[40,0],
[27,0]
]
},

{
name:'13',
label:'AIRE ACONDICIONADO',
color:'rgba(59,130,246,0.08)',
stroke:'#1d4ed8',
points:[
[33,45],
[50,45],
[50,0],
[40,0],
[40,20]
]
}

];

zones.forEach(zone=>{

const polygon =
zone.points.map(p=>[
x(p[0]),
y(p[1])
]);

g.append('polygon')
.attr('points',
polygon.join(' '))
.attr('fill',zone.color)
.attr('stroke',zone.stroke)
.attr('stroke-width',3);

g.append('text')
.attr('x',x(zone.points[0][0])+8)
.attr('y',y(zone.points[0][1])-8)
.text(zone.name)
.attr('fill',zone.stroke)
.attr('font-weight','900')
.attr('font-size','16px');

});

/* PUNTOS CLIMÁTICOS */

const temps =
climate.hourly.temperature_2m;

const humidity =
climate.hourly.relative_humidity_2m;

const times =
climate.hourly.time;

const monthData = {};

temps.forEach((temp,i)=>{

const hr = humidity[i];

const date = new Date(times[i]);
const month = date.getMonth();

if(mode === 'mes' &&
!selectedMonths.includes(month)){
return;
}

if(!monthData[month]){

monthData[month] = {
max:temp,
min:temp,
hr:[],
zone:[]
};

}

monthData[month].max =
Math.max(monthData[month].max,temp);

monthData[month].min =
Math.min(monthData[month].min,temp);

monthData[month].hr.push(hr);

monthData[month].zone.push(
detectZone(temp,hr)
);

/* PUNTO */

g.append('circle')
.attr('cx',x(temp))
.attr('cy',y(hr))
.attr('r',2)
.attr('fill','rgba(37,99,235,0.25)');

});

/* EJES */

g.append('g')
.attr('transform',
`translate(0,${innerHeight})`)
.call(d3.axisBottom(x));

g.append('g')
.call(d3.axisRight(y));

/* LABELS */

g.append('text')
.attr('x',innerWidth/2)
.attr('y',innerHeight+60)
.attr('font-size','18px')
.attr('font-weight','900')
.text('TEMPERATURA BULBO SECO (°C)');

g.append('text')
.attr('transform','rotate(-90)')
.attr('x',-innerHeight/2)
.attr('y',-40)
.attr('font-size','18px')
.attr('font-weight','900')
.text('HUMEDAD RELATIVA (%)');

/* TABLA */

updateTable(monthData);

/* ANALISIS */

updateAnalysis(monthData);

}

/* =========================================================
   TABLA
========================================================= */

function updateTable(monthData){

const tbody =
document.getElementById('table-body');

tbody.innerHTML = '';

Object.keys(monthData).forEach(month=>{

const data = monthData[month];

const avgHR =
data.hr.reduce((a,b)=>a+b,0)
/
data.hr.length;

const dominantZone =
modeZone(data.zone);

tbody.innerHTML += `

<tr class="border-b hover:bg-slate-50">

<td class="p-4">
${months[month]}
</td>

<td class="p-4 text-center">
${data.max.toFixed(1)}°C
</td>

<td class="p-4 text-center">
${data.min.toFixed(1)}°C
</td>

<td class="p-4 text-center text-blue-600 font-black">
${avgHR.toFixed(0)}%
</td>

<td class="p-4 text-center font-black">
${dominantZone}
</td>

</tr>

`;

});

}

/* =========================================================
   MODA
========================================================= */

function modeZone(arr){

return arr.sort(
(a,b)=>
arr.filter(v=>v===a).length
-
arr.filter(v=>v===b).length
).pop();

}

/* =========================================================
   ANALISIS DINAMICO
========================================================= */

function updateAnalysis(monthData){

const analysis =
document.getElementById('analysis-text');

const strategyList =
document.getElementById('strategy-list');

strategyList.innerHTML = '';

let avgTemp = 0;
let avgHR = 0;
let count = 0;

Object.values(monthData).forEach(d=>{

avgTemp += d.max;
avgHR +=
d.hr.reduce((a,b)=>a+b,0)
/ d.hr.length;

count++;

});

avgTemp /= count;
avgHR /= count;

let text = '';
let strategies = [];

if(avgTemp > 28 && avgHR > 75){

text = `
El análisis climático evidencia un clima cálido húmedo
con predominancia de condiciones fuera de la zona
de confort. Las altas temperaturas y humedad relativa
requieren estrategias pasivas enfocadas en ventilación
constante, control solar y disipación térmica.
`;

strategies = [
'Ventilación cruzada permanente',
'Cubiertas ventiladas',
'Protección solar horizontal',
'Fachadas permeables',
'Sombras profundas',
'Disipación térmica pasiva'
];

}

else if(avgTemp < 20){

text = `
El comportamiento climático muestra temperaturas
templadas frías, por lo que las estrategias deben
priorizar captación solar y conservación térmica.
`;

strategies = [
'Ganancia solar pasiva',
'Masa térmica',
'Protección contra viento',
'Compactación volumétrica'
];

}

else{

text = `
El clima presenta condiciones relativamente próximas
al confort térmico durante parte importante del año.
Las estrategias deben enfocarse en control solar
moderado y ventilación regulada.
`;

strategies = [
'Protección solar parcial',
'Ventilación moderada',
'Control térmico pasivo'
];

}

analysis.innerText = text;

strategies.forEach(s=>{

strategyList.innerHTML += `

<div class="bg-slate-900 rounded-2xl border border-slate-800 p-5">

<p class="text-sm font-bold text-slate-300">
${s}
</p>

</div>

`;

});

}

/* =========================================================
   RUN
========================================================= */

async function runClimateAnalysis(){

try{

const year =
selectedYears[0];

const climate =
await fetchClimateData(year);

drawChart(climate);

}
catch(err){
console.error(err);
}

}

/* =========================================================
   INIT
========================================================= */

renderSelectors();

updateLocation();

runClimateAnalysis();

</script>

</body>
</html>
