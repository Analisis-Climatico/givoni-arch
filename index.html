<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsualizador - Motor SVG</title>
    <style>
        /* Estilos base para simular la interfaz del proyecto */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .panel {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            max-width: 800px;
            justify-content: center;
        }

        .strat-btn {
            background-color: #0f172a;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .strat-btn:hover {
            border-color: #64748b;
            color: #cbd5e1;
        }

        .strat-btn.active {
            background-color: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
            font-weight: bold;
        }

        #svg-canvas {
            width: 800px;
            height: 400px;
            background-color: #0f172a; /* Fondo oscuro para resaltar los trazos */
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 1px solid #334155;
        }

        /* Ajuste para mantener un esquema visual puramente diagramático.
          Descomenta la siguiente línea si prefieres ocultar todos los textos 
          y priorizar un gráfico minimalista sin explicaciones textuales.
        */
        /* text { display: none !important; } */

        /* Animaciones requeridas por el código SVG */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin { animation: spin 2s linear infinite; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="menu" id="menu">
            </div>
        <div id="svg-canvas"></div>
    </div>

    <script>
        // 1. SIMULACIÓN DE DATOS
        // Array con los nombres exactos que utiliza tu lógica condicional
        const strategies = [
            { t: "Ventilación regulable" }, { t: "Cubierta ventilada" }, { t: "Protección solar ligera" },
            { t: "Espacios de transición" }, { t: "Fachada permeable" }, { t: "Ventilación elevada" },
            { t: "Núcleo compacto" }, { t: "Envolvente térmica" }, { t: "Carpintería hermética" },
            { t: "Muro Trombe" }, { t: "Galería solar" }, { t: "Orientación solar estratégica" },
            { t: "Panel solar térmico" }, { t: "Cubierta captadora" }, { t: "Acumulación térmica hidráulica" },
            { t: "Patio húmedo" }, { t: "Fuente evaporativa" }, { t: "Material higroscópico" },
            { t: "Doble envolvente térmica" }, { t: "Acceso amortiguador" }, { t: "Aislamiento continuo" },
            { t: "Parasoles móviles" }, { t: "Fachada de doble piel" }, { t: "Cubierta extendida" },
            { t: "Muro acumulador" }, { t: "Piso de inercia térmica" }, { t: "Protección de masa térmica" },
            { t: "Espejo de agua climático" }, { t: "Nebulización pasiva" }, { t: "Vegetación refrescante" },
            { t: "Purgado nocturno" }, { t: "Lucernario térmico" }, { t: "Chimenea solar invertida" },
            { t: "Cubierta extractora" }, { t: "Ventilación mecánica asistida" }, { t: "Sectorización térmica" },
            { t: "Fachada aislada" }, { t: "Cámara ventilada" }, { t: "Otra estrategia de prueba" }
        ];

        // 2. GENERACIÓN DE LA INTERFAZ
        const menu = document.getElementById('menu');
        strategies.forEach((strat, index) => {
            const btn = document.createElement('button');
            btn.className = 'strat-btn';
            btn.textContent = index + 1;
            btn.title = strat.t;
            btn.onclick = () => window.renderSVGForStrategy(index);
            menu.appendChild(btn);
        });

        // =====================================================================
        // 3. TU MOTOR SVG PARAMÉTRICO (PEGADO EXACTAMENTE COMO LO ENVIASTE)
        // =====================================================================
    window.renderSVGForStrategy = function(index) {
const strat = strategies[index];

// Control de botones activos en el menú
document.querySelectorAll('.strat-btn').forEach((btn, idx) => {
    if(idx === index) btn.classList.add('active');
    else btn.classList.remove('active');
});

const t = strat.t; // Título de la estrategia actual
let svgContent = `<rect width="100%" height="100%" fill="url(#blueprint-grid)" />`;

// 1. DEFS TÉCNICOS DETALLADOS (Pattern de masa térmica, aislamiento, gradientes térmicos)
const defsSVG = `
    <defs>
        <pattern id="blueprint-grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
            <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#475569" stroke-width="1" opacity="0.5"/>
        </pattern>
        <pattern id="hatch-concrete" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="8" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
        </pattern>
        <pattern id="hatch-insulation" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
            <path d="M 0 5 Q 2.5 0, 5 5 T 10 5" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
        </pattern>
        <pattern id="hatch-mass" patternUnits="userSpaceOnUse" width="12" height="12" patternTransform="rotate(45)">
            <rect width="12" height="12" fill="#713f12" opacity="0.3"/>
            <line x1="0" y1="0" x2="0" y2="12" stroke="#a16207" stroke-width="1" opacity="0.4"/>
            <line x1="0" y1="0" x2="12" y2="0" stroke="#a16207" stroke-width="1" opacity="0.4"/>
        </pattern>
        <linearGradient id="thermal-grad-wall" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ef4444" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#ea580c" stop-opacity="0.1"/>
        </linearGradient>
        <marker id="arrow-solar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#fcd34d" />
        </marker>
        <marker id="arrow-thermal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
`;

const groundLine = `
    <rect x="50" y="340" width="700" height="40" fill="url(#hatch-concrete)"/>
    <line x1="50" y1="340" x2="750" y2="340" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="50" y1="345" x2="750" y2="345" stroke="#64748b" stroke-width="0.5"/>
`;

// Ejes constructivos y cotas base para dar aspecto de plano técnico
const technicalAxes = `
    <line x1="400" y1="20" x2="400" y2="380" stroke="#475569" stroke-width="1" stroke-dasharray="15 5 5 5"/>
    <circle cx="400" cy="370" r="6" fill="none" stroke="#475569" stroke-width="1"/>
`;

// 3. INICIO DE LÓGICA CONDICIONAL DE DIBUJO DETALLADO

if (t === "Muro Trombe") {
    svgContent += `
        ${groundLine}
        ${technicalAxes}
        
        <g transform="translate(150, 60) scale(0.9)">
            <polygon points="50,280 250,280 300,240 100,240" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="1"/>
            
            <g fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.6">
                <polygon points="50,10 50,260 70,260 70,10 Z"/>
                <polygon points="55,15 55,255 75,255 75,15 Z" opacity="0.4"/>
            </g>
            <g fill="#64748b"> <rect x="48" y="10" width="24" height="4"/>
                <rect x="48" y="135" width="24" height="4"/>
                <rect x="48" y="258" width="24" height="4"/>
            </g>

            <g fill="none" stroke="#94a3b8" stroke-width="1.5">
                <line x1="80" y1="20" x2="80" y2="60" stroke-dasharray="5 3"/>
                <line x1="80" y1="220" x2="80" y2="260" stroke-dasharray="5 3"/>
                <line x1="100" y1="30" x2="140" y2="30" />
                <line x1="100" y1="45" x2="140" y2="45" />
                <line x1="100" y1="225" x2="140" y2="225" />
                <line x1="100" y1="240" x2="140" y2="240" />
            </g>

            <rect x="100" y="20" width="40" height="240" fill="url(#hatch-mass)" stroke="#cbd5e1" stroke-width="1"/>
            <rect x="100" y="20" width="40" height="240" fill="url(#thermal-grad-wall)"/> <polygon points="140,20 140,260 160,260 160,20 Z" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="1"/>
            <rect x="160" y="20" width="5" height="240" fill="url(#hatch-insulation)"/> <rect x="165" y="20" width="10" height="240" fill="#fafafa" stroke="#cbd5e1" stroke-width="0.5"/> <polygon points="40,20 180,20 200,-10 60,-10" fill="url(#hatch-concrete)" stroke="#cbd5e1"/>
            <polygon points="40,20 60,-10 120,-10 100,20" fill="#0f172a" opacity="0.2"/> 

            <g marker-end="url(#arrow-solar)">
                <path d="M 5 30 L 100 130" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="6 3"/>
                <path d="M -15 60 L 100 170" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="6 3"/>
                <path d="M -35 90 L 100 210" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="6 3"/>
            </g>
            <circle cx="10" cy="50" r="20" fill="none" stroke="#f59e0b" stroke-width="2" class="svg-sun-pulse"/>

            <rect x="100" y="20" width="40" height="240" fill="#ea580c" opacity="0.1" class="svg-heat-radiate"/>
            
            <g fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-thermal)">
                <path d="M 145 140 C 170 140, 190 120, 210 120"/>
                <path d="M 145 160 C 170 160, 190 140, 210 140"/>
                <path d="M 145 180 C 170 180, 190 160, 210 160"/>
                <path d="M 145 200 C 170 200, 190 180, 210 180"/>
            </g>
            
            <circle cx="120" cy="140" r="3" fill="#ef4444"/>
            <line x1="120" y1="140" x2="180" y2="140" stroke="#ef4444" stroke-width="0.5"/>
        </g>
    `;
}
else {
    svgContent += `
        ${groundLine}
        <rect x="300" y="200" width="200" height="40" rx="4" fill="rgba(15,23,42,0.85)" stroke="#334155"/>
        <line x1="400" y1="180" x2="400" y2="260" stroke="#475569" stroke-width="1"/>
        `;
}

document.getElementById('svg-canvas').innerHTML = `
    <svg viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet" class="w-full h-full drop-shadow-xl absolute inset-0 z-10">
        ${defsSVG}
        ${svgContent}
    </svg>
`;
};
        // Iniciar el renderizado con el primer elemento
        window.renderSVGForStrategy(0);
    </script>
</body>
</html>
