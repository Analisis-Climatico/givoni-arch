<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsualizador - Motor SVG</title>
    <style>
        /* Estilos base para simular la interfaz del proyecto */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .panel {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            max-width: 800px;
            justify-content: center;
        }

        .strat-btn {
            background-color: #0f172a;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .strat-btn:hover {
            border-color: #64748b;
            color: #cbd5e1;
        }

        .strat-btn.active {
            background-color: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
            font-weight: bold;
        }

        #svg-canvas {
            width: 800px;
            height: 400px;
            background-color: #0f172a; /* Fondo oscuro para resaltar los trazos */
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 1px solid #334155;
        }

        /* Ajuste para mantener un esquema visual puramente diagramático.
          Descomenta la siguiente línea si prefieres ocultar todos los textos 
          y priorizar un gráfico minimalista sin explicaciones textuales.
        */
        /* text { display: none !important; } */

        /* Animaciones requeridas por el código SVG */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin { animation: spin 2s linear infinite; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="menu" id="menu">
            </div>
        <div id="svg-canvas"></div>
    </div>

    <script>
        // 1. SIMULACIÓN DE DATOS
        // Array con los nombres exactos que utiliza tu lógica condicional
        const strategies = [
            { t: "Ventilación regulable" }, { t: "Cubierta ventilada" }, { t: "Protección solar ligera" },
            { t: "Espacios de transición" }, { t: "Fachada permeable" }, { t: "Ventilación elevada" },
            { t: "Núcleo compacto" }, { t: "Envolvente térmica" }, { t: "Carpintería hermética" },
            { t: "Muro Trombe" }, { t: "Galería solar" }, { t: "Orientación solar estratégica" },
            { t: "Panel solar térmico" }, { t: "Cubierta captadora" }, { t: "Acumulación térmica hidráulica" },
            { t: "Patio húmedo" }, { t: "Fuente evaporativa" }, { t: "Material higroscópico" },
            { t: "Doble envolvente térmica" }, { t: "Acceso amortiguador" }, { t: "Aislamiento continuo" },
            { t: "Parasoles móviles" }, { t: "Fachada de doble piel" }, { t: "Cubierta extendida" },
            { t: "Muro acumulador" }, { t: "Piso de inercia térmica" }, { t: "Protección de masa térmica" },
            { t: "Espejo de agua climático" }, { t: "Nebulización pasiva" }, { t: "Vegetación refrescante" },
            { t: "Purgado nocturno" }, { t: "Lucernario térmico" }, { t: "Chimenea solar invertida" },
            { t: "Cubierta extractora" }, { t: "Ventilación mecánica asistida" }, { t: "Sectorización térmica" },
            { t: "Fachada aislada" }, { t: "Cámara ventilada" }, { t: "Otra estrategia de prueba" }
        ];

        // 2. GENERACIÓN DE LA INTERFAZ
        const menu = document.getElementById('menu');
        strategies.forEach((strat, index) => {
            const btn = document.createElement('button');
            btn.className = 'strat-btn';
            btn.textContent = index + 1;
            btn.title = strat.t;
            btn.onclick = () => window.renderSVGForStrategy(index);
            menu.appendChild(btn);
        });

        // =====================================================================
        // 3. TU MOTOR SVG PARAMÉTRICO (PEGADO EXACTAMENTE COMO LO ENVIASTE)
        // =====================================================================
       window.renderSVGForStrategy = function(index) {
    const strat = strategies[index];
    
    document.querySelectorAll('.strat-btn').forEach((btn, idx) => {
        if(idx === index) btn.classList.add('active');
        else btn.classList.remove('active');
    });
    
    const t = strat.t; 
    let svgContent = `<rect width="100%" height="100%" fill="url(#blueprint-grid)" />`;

    // 1. DEFS AMPLIADOS PARA MAYOR COMPLEJIDAD TÉCNICA
    const defsSVG = `
        <defs>
            <pattern id="blueprint-grid" width="20" height="20" patternUnits="userSpaceOnUse">
                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
                <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#475569" stroke-width="1" opacity="0.5"/>
            </pattern>
            <pattern id="hatch-concrete" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
                <line x1="0" y1="0" x2="0" y2="8" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
            </pattern>
            <pattern id="hatch-insulation" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
                <path d="M 0 5 Q 2.5 0, 5 5 T 10 5" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
            </pattern>
            <linearGradient id="thermal-grad-trombe" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ef4444" stop-opacity="0.6"/>
                <stop offset="100%" stop-color="#ea580c" stop-opacity="0.1"/>
            </linearGradient>
            <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4" />
            </marker>
            <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
            </marker>
        </defs>
    `;

    const groundLine = `
        <rect x="50" y="340" width="700" height="40" fill="url(#hatch-concrete)"/>
        <line x1="50" y1="340" x2="750" y2="340" stroke="#cbd5e1" stroke-width="2"/>
        <line x1="50" y1="345" x2="750" y2="345" stroke="#64748b" stroke-width="0.5"/>
    `;
    
    // Ejes constructivos y cotas base para dar aspecto de plano técnico
    const technicalAxes = `
        <line x1="400" y1="20" x2="400" y2="380" stroke="#475569" stroke-width="1" stroke-dasharray="15 5 5 5"/>
        <circle cx="400" cy="370" r="6" fill="none" stroke="#475569" stroke-width="1"/>
    `;

    // 3. ESTRATEGIAS DETALLADAS (Ejemplos de alta complejidad)
    
    if (t === "Muro Trombe") {
        svgContent += `
            ${groundLine}
            ${technicalAxes}
            
            <rect x="360" y="100" width="40" height="240" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="1"/>
            <rect x="360" y="100" width="40" height="240" fill="url(#thermal-grad-trombe)"/>
            
            <rect x="330" y="90" width="3" height="260" fill="#38bdf8" opacity="0.6"/>
            <rect x="338" y="90" width="3" height="260" fill="#38bdf8" opacity="0.6"/>
            
            <rect x="328" y="90" width="15" height="4" fill="#64748b"/>
            <rect x="328" y="218" width="15" height="4" fill="#64748b"/>
            <rect x="328" y="346" width="15" height="4" fill="#64748b"/>
            
            <g stroke="#94a3b8" stroke-width="1.5">
                <line x1="360" y1="120" x2="400" y2="120" />
                <line x1="360" y1="135" x2="400" y2="135" />
                <line x1="360" y1="305" x2="400" y2="305" />
                <line x1="360" y1="320" x2="400" y2="320" />
            </g>

            <path d="M 430 312 L 380 312 L 348 280 L 348 150 L 380 127 L 430 127" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
            <path d="M 345 280 L 345 150" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4 2"/>
            <path d="M 351 280 L 351 150" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 2"/>
            
            <path d="M 150 50 L 330 160" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="6 3"/>
            <path d="M 130 80 L 330 200" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="6 3"/>
            <path d="M 110 110 L 330 240" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="6 3"/>
            <circle cx="120" cy="65" r="20" fill="none" stroke="#f59e0b" stroke-width="2" class="svg-sun-pulse"/>
            
            <circle cx="380" cy="220" r="3" fill="#ef4444"/>
            <line x1="380" y1="220" x2="440" y2="220" stroke="#ef4444" stroke-width="0.5"/>
        `;
    }
    else if (t === "Cubierta ventilada") {
        svgContent += `
            ${groundLine}
            ${technicalAxes}
            
            <polygon points="250,200 550,200 550,220 250,220" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="1"/>
            
            <rect x="250" y="190" width="300" height="10" fill="url(#hatch-insulation)"/>
            
            <g stroke="#64748b" stroke-width="2">
                <line x1="270" y1="190" x2="270" y2="155"/>
                <line x1="340" y1="190" x2="340" y2="140"/>
                <line x1="410" y1="190" x2="410" y2="125"/>
                <line x1="480" y1="190" x2="480" y2="110"/>
                <line x1="530" y1="190" x2="530" y2="100"/>
            </g>

            <polygon points="240,160 560,95 560,100 240,165" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
            <polygon points="240,160 560,95 560,100 240,165" fill="#ef4444" opacity="0.15"/>
            
            <path d="M 180 180 Q 250 175 300 165 T 580 90" fill="none" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrow-blue)"/>
            <path d="M 180 160 Q 250 160 300 150 T 580 75" fill="none" stroke="#06b6d4" stroke-width="1" stroke-dasharray="5 3"/>
            
            <path d="M 340 165 Q 360 145 380 135" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
            <path d="M 450 140 Q 470 120 490 110" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
            
            <circle cx="150" cy="80" r="15" fill="none" stroke="#f59e0b" stroke-width="2"/>
            <path d="M 165 90 L 300 135" fill="none" stroke="#fcd34d" stroke-width="1.5"/>
        `;
    }
    else if (t === "Ventilación regulable") {
        svgContent += `
            ${groundLine}
            ${technicalAxes}
            
            <polygon points="150,340 250,340 250,150 150,150" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="2 2"/>
            <rect x="230" y="150" width="20" height="190" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="1"/>
            <rect x="550" y="150" width="20" height="190" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="1"/>
            
            <g transform="translate(230, 200)">
                <rect x="-10" y="0" width="10" height="80" fill="#334155"/>
                <line x1="-8" y1="10" x2="-25" y2="15" stroke="#38bdf8" stroke-width="3"/>
                <line x1="-8" y1="35" x2="-25" y2="40" stroke="#38bdf8" stroke-width="3"/>
                <line x1="-8" y1="60" x2="-25" y2="65" stroke="#38bdf8" stroke-width="3"/>
            </g>
            
            <polygon points="180,150 620,150 620,130 180,130" fill="url(#hatch-concrete)"/>
            <polygon points="200,150 250,220 250,150" fill="#0f172a" opacity="0.2"/> 
            
            <path d="M 100 240 L 180 240 Q 210 240 240 220 T 350 200 T 520 180" fill="none" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrow-blue)"/>
            <path d="M 100 260 L 180 260 Q 220 260 250 240 T 350 220 T 520 200" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="8 4"/>
            <path d="M 120 215 L 180 215" fill="none" stroke="#06b6d4" stroke-width="1"/>
            
            <path d="M 520 180 Q 560 170 590 140" fill="none" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrow-blue)"/>
            <path d="M 400 280 Q 420 230 450 190" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4 2"/>
        `;
    }
    // --- FALLBACK PARA LAS RESTANTES MIENTRAS SE ACTUALIZAN ---
    else {
        svgContent += `
            ${groundLine}
            <rect x="300" y="200" width="200" height="40" rx="4" fill="rgba(15,23,42,0.85)" stroke="#334155"/>
            <line x1="400" y1="180" x2="400" y2="260" stroke="#475569" stroke-width="1"/>
            `;
    }

    document.getElementById('svg-canvas').innerHTML = `
        <svg viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet" class="w-full h-full drop-shadow-xl absolute inset-0 z-10">
            ${defsSVG}
            ${svgContent}
        </svg>
    `;
};
        // Iniciar el renderizado con el primer elemento
        window.renderSVGForStrategy(0);
    </script>
</body>
</html>
