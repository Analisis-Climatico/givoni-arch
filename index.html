<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Givoni Climate Engine PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
    background:#f1f5f9;
    font-family:Inter,sans-serif;
}

#map{
    height:260px;
    border-radius:22px;
    overflow:hidden;
    border:1px solid #dbe2ea;
}

#chart{
    width:100%;
    height:900px;
    background:white;
    border-radius:24px;
    overflow:hidden;
    border:1px solid #dbe2ea;
    position:relative;
}

.btn-mode{
    padding:10px 22px;
    border-radius:12px;
    border:1px solid #dbe2ea;
    font-size:11px;
    font-weight:900;
    transition:.2s;
}

.active-mode{
    background:#2563eb;
    color:white;
    border-color:#2563eb;
}

.selector-chip{
    padding:10px;
    border-radius:10px;
    border:1px solid #dbe2ea;
    text-align:center;
    font-size:11px;
    font-weight:800;
    cursor:pointer;
    transition:.2s;
    background:white;
}

.selector-chip:hover{
    transform:translateY(-2px);
}

.selected-item{
    background:#2563eb;
    color:white;
}

.tooltip-box{
    position:absolute;
    pointer-events:none;
    background:#0f172a;
    color:white;
    padding:12px;
    border-radius:12px;
    font-size:11px;
    font-weight:700;
    opacity:0;
    transition:.2s;
    z-index:9999;
    box-shadow:0 10px 40px rgba(0,0,0,.25);
}

</style>
</head>

<body class="p-4 md:p-8">

<main class="max-w-[1900px] mx-auto space-y-6">

<header class="bg-white rounded-3xl border shadow-sm p-6 flex justify-between items-center">

<div>

<h1 class="text-3xl font-black uppercase tracking-tight text-slate-800">
Givoni Climate Engine
</h1>

<p class="text-xs uppercase tracking-[0.3em] text-slate-400 font-black mt-2">
Arquitectura Bioclimática
</p>

</div>

<div class="flex gap-2">

<button onclick="setMode('mes')" id="btn-mes"
class="btn-mode active-mode">
MESES
</button>

<button onclick="setMode('año')" id="btn-año"
class="btn-mode">
AÑOS
</button>

</div>

</header>

<div id="map"></div>

<div class="grid grid-cols-1 xl:grid-cols-4 gap-6">

<!-- SIDEBAR -->

<div class="bg-white rounded-3xl border shadow-sm p-6 space-y-6">

<div>

<p id="location-text"
class="text-blue-600 font-black text-xs uppercase mb-4">
Ubicación: Guayaquil
</p>

<p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">
Seleccionar Año
</p>

<div id="year-selector"
class="grid grid-cols-2 gap-2 max-h-[420px] overflow-y-auto pr-1">
</div>

</div>

<div id="month-section">

<p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">
Meses
</p>

<div id="month-selector"
class="grid grid-cols-3 gap-2"></div>

</div>

<button onclick="runClimateAnalysis()"
class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black uppercase rounded-2xl py-4 text-xs transition-all">

Actualizar Climograma

</button>

</div>

<!-- MAIN -->

<div class="xl:col-span-3 space-y-6">

<div id="chart">

<div id="tooltip"
class="tooltip-box"></div>

</div>

<!-- TABLA -->

<div class="bg-white rounded-3xl border overflow-hidden shadow-sm">

<table class="w-full text-xs">

<thead class="bg-slate-50 border-b text-slate-500 uppercase font-black">

<tr>

<th class="p-4 text-center">Color</th>
<th class="p-4">Mes/Año</th>
<th class="p-4 text-center">Temp Máx</th>
<th class="p-4 text-center">Temp Mín</th>
<th class="p-4 text-center">HR</th>
<th class="p-4 text-center">Zona Dominante</th>

</tr>

</thead>

<tbody id="table-body"
class="font-bold text-slate-700"></tbody>

</table>

</div>

<!-- ANALISIS -->

<div class="bg-[#0f172a] rounded-3xl p-10 text-white border-l-[10px] border-blue-500">

<div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

<div>

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Diagnóstico Bioclimático
</p>

<p id="analysis-text"
class="text-slate-300 leading-relaxed text-lg"></p>

</div>

<div>

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Estrategias Arquitectónicas
</p>

<div id="strategy-list"
class="space-y-4"></div>

</div>

</div>

</div>

</div>

</div>

</main>

<script>

/* =========================================================
VARIABLES
========================================================= */

const months = [
'Ene','Feb','Mar','Abr','May','Jun',
'Jul','Ago','Sep','Oct','Nov','Dic'
];

let mode = 'mes';

let selectedYears = [2025];
let selectedMonths = [0,1,2,3,4];

let lat = -2.17;
let lon = -79.92;

/* =========================================================
MAPA
========================================================= */

const map = L.map('map').setView([lat,lon],7);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

const marker = L.marker([lat,lon]).addTo(map);

map.on('click', async(e)=>{

lat = e.latlng.lat;
lon = e.latlng.lng;

marker.setLatLng([lat,lon]);

await updateLocation();

runClimateAnalysis();

});

/* =========================================================
UI
========================================================= */

function setMode(m){

mode = m;

document.querySelectorAll('.btn-mode')
.forEach(btn=>btn.classList.remove('active-mode'));

document.getElementById(`btn-${m}`)
.classList.add('active-mode');

document.getElementById('month-section').style.display =
mode === 'mes'
? 'block'
: 'none';

renderSelectors();

}

function renderSelectors(){

const yearBox = document.getElementById('year-selector');
yearBox.innerHTML = '';

const currentYear = new Date().getFullYear();

for(let y=currentYear;y>=2000;y--){

const chip = document.createElement('div');

chip.className = `selector-chip ${
selectedYears.includes(y)
? 'selected-item'
: ''
}`;

chip.innerText = y;

chip.onclick = ()=>{

if(mode === 'mes'){

selectedYears = [y];

}
else{

if(selectedYears.includes(y)){

selectedYears =
selectedYears.filter(v=>v!==y);

}
else{

selectedYears.push(y);

}

}

renderSelectors();

};

yearBox.appendChild(chip);

}

const monthBox =
document.getElementById('month-selector');

monthBox.innerHTML = '';

months.forEach((m,i)=>{

const chip = document.createElement('div');

chip.className = `selector-chip ${
selectedMonths.includes(i)
? 'selected-item'
: ''
}`;

chip.innerText = m;

chip.onclick = ()=>{

if(selectedMonths.includes(i)){

selectedMonths =
selectedMonths.filter(v=>v!==i);

}
else{

selectedMonths.push(i);

}

renderSelectors();

};

monthBox.appendChild(chip);

});

}

/* =========================================================
LOCATION
========================================================= */

async function updateLocation(){

try{

const response = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
);

const data = await response.json();

const city =
data.address.city ||
data.address.town ||
data.address.state ||
'Ubicación';

document.getElementById('location-text')
.innerText = `Ubicación: ${city}`;

}
catch(err){}

}

/* =========================================================
OPEN METEO
========================================================= */

async function fetchClimate(year){

const url = `
https://archive-api.open-meteo.com/v1/archive?
latitude=${lat}&
longitude=${lon}&
start_date=${year}-01-01&
end_date=${year}-12-31&
daily=temperature_2m_max,temperature_2m_min,relative_humidity_2m_mean&
timezone=auto
`;

const response = await fetch(
url.replace(/\s+/g,'')
);

return await response.json();

}

/* =========================================================
CURVA GIVONI
========================================================= */

function givoniY(hr,temp){

return hr * Math.exp((temp-20)/20);

}

/* =========================================================
ZONA
========================================================= */

function detectZone(temp,hr){

if(temp >= 21 && temp <= 27 && hr >= 40 && hr <= 70){
return 'Confort';
}

if(temp > 27 && hr > 75){
return 'Deshumidificación';
}

if(temp > 30 && hr < 75){
return 'Ventilación';
}

if(temp < 20){
return 'Calefacción';
}

return 'Protección Solar';

}

/* =========================================================
DRAW
========================================================= */

function drawChart(data){

d3.select('#chart svg').remove();

const width = 1600;
const height = 900;

const margin = {
top:40,
right:70,
bottom:90,
left:70
};

const innerWidth =
width - margin.left - margin.right;

const innerHeight =
height - margin.top - margin.bottom;

const svg = d3.select('#chart')
.append('svg')
.attr('width','100%')
.attr('height',height)
.attr('viewBox',`0 0 ${width} ${height}`);

const g = svg.append('g')
.attr('transform',
`translate(${margin.left},${margin.top})`);

const x = d3.scaleLinear()
.domain([-5,50])
.range([0,innerWidth]);

const y = d3.scaleLinear()
.domain([0,140])
.range([innerHeight,0]);

/* =========================================================
GRID
========================================================= */

for(let t=-5;t<=50;t+=1){

g.append('line')
.attr('x1',x(t))
.attr('x2',x(t))
.attr('y1',0)
.attr('y2',innerHeight)
.attr('stroke',
t % 5 === 0
? '#d1d5db'
: '#edf2f7');

}

for(let h=0;h<=140;h+=5){

g.append('line')
.attr('x1',0)
.attr('x2',innerWidth)
.attr('y1',y(h))
.attr('y2',y(h))
.attr('stroke','#edf2f7');

}

/* =========================================================
CURVAS RH
========================================================= */

for(let hr=10;hr<=100;hr+=10){

const points = [];

for(let t=-5;t<=50;t+=0.5){

points.push([
x(t),
y(givoniY(hr,t))
]);

}

const line = d3.line()
.curve(d3.curveBasis);

g.append('path')
.attr('d',line(points))
.attr('fill','none')
.attr('stroke','#dbe2ea')
.attr('stroke-width',1);

}

/* =========================================================
ZONAS GIVONI
========================================================= */

const zones = [

{
stroke:'#facc15',
fill:'rgba(250,204,21,0.10)',
points:[[21,20],[25,30],[25,75],[21,60]]
},

{
stroke:'#dc2626',
fill:'rgba(220,38,38,0.08)',
points:[[20,20],[27,35],[27,60],[24,75],[20,55]]
},

{
stroke:'#10b981',
fill:'rgba(16,185,129,0.08)',
points:[[20,55],[24,75],[28,110],[33,55],[33,28],[27,35]]
},

{
stroke:'#9333ea',
fill:'rgba(168,85,247,0.08)',
points:[[24,75],[40,30],[40,0],[27,0]]
},

{
stroke:'#2563eb',
fill:'rgba(37,99,235,0.08)',
points:[[33,55],[50,55],[50,0],[40,0],[40,30]]
}

];

zones.forEach(zone=>{

const poly = zone.points.map(p=>[
x(p[0]),
y(p[1])
]);

g.append('polygon')
.attr('points',poly.join(' '))
.attr('fill',zone.fill)
.attr('stroke',zone.stroke)
.attr('stroke-width',3);

});

/* =========================================================
TOOLTIP
========================================================= */

const tooltip =
document.getElementById('tooltip');

/* =========================================================
CURVAS
========================================================= */

data.forEach((d,i)=>{

const color =
d3.interpolateRainbow(i/data.length);

d.color = color;

const points = [];

for(let step=0;step<=20;step++){

const t =
d.tMin +
((d.tMax-d.tMin)*(step/20));

const hrCurve =
givoniY(d.hr,t);

points.push([
x(t),
y(hrCurve)
]);

}

const line = d3.line()
.curve(d3.curveBasis);

g.append('path')
.attr('d',line(points))
.attr('fill','none')
.attr('stroke',color)
.attr('stroke-width',8)
.attr('stroke-linecap','round')
.attr('opacity',0.95)

.on('mousemove',(event)=>{

tooltip.style.opacity = 1;

tooltip.style.left =
(event.pageX + 20) + 'px';

tooltip.style.top =
(event.pageY - 20) + 'px';

tooltip.innerHTML = `
<div class="space-y-1">

<p>${d.label}</p>

<p>Temp Máx: ${d.tMax.toFixed(1)}°C</p>

<p>Temp Mín: ${d.tMin.toFixed(1)}°C</p>

<p>HR: ${d.hr.toFixed(0)}%</p>

<p>Zona: ${d.zone}</p>

</div>
`;

})

.on('mouseleave',()=>{

tooltip.style.opacity = 0;

});

});

/* =========================================================
AXES
========================================================= */

g.append('g')
.attr('transform',
`translate(0,${innerHeight})`)
.call(d3.axisBottom(x));

g.append('text')
.attr('x',innerWidth/2)
.attr('y',innerHeight+60)
.attr('font-size','20px')
.attr('font-weight','900')
.text('TEMPERATURA BULBO SECO (°C)');

g.append('text')
.attr('transform','rotate(-90)')
.attr('x',-innerHeight/2)
.attr('y',-40)
.attr('font-size','20px')
.attr('font-weight','900')
.text('HUMEDAD RELATIVA (%)');

}

/* =========================================================
TABLE
========================================================= */

function updateTable(data){

const tbody =
document.getElementById('table-body');

tbody.innerHTML = '';

data.forEach(d=>{

tbody.innerHTML += `

<tr class="border-b hover:bg-slate-50">

<td class="p-4 text-center">

<div class="w-4 h-4 rounded-full inline-block"
style="background:${d.color}">
</div>

</td>

<td class="p-4">
${d.label}
</td>

<td class="p-4 text-center">
${d.tMax.toFixed(1)}°C
</td>

<td class="p-4 text-center">
${d.tMin.toFixed(1)}°C
</td>

<td class="p-4 text-center text-blue-600 font-black">
${d.hr.toFixed(0)}%
</td>

<td class="p-4 text-center font-black">
${d.zone}
</td>

</tr>

`;

});

}

/* =========================================================
ANALISIS
========================================================= */

function updateAnalysis(data){

const analysis =
document.getElementById('analysis-text');

const strategyList =
document.getElementById('strategy-list');

strategyList.innerHTML = '';

let avgTemp = 0;
let avgHR = 0;

const zoneCount = {};

data.forEach(d=>{

avgTemp += d.tMax;
avgHR += d.hr;

zoneCount[d.zone] =
(zoneCount[d.zone] || 0) + 1;

});

avgTemp /= data.length;
avgHR /= data.length;

let dominantZone =
Object.keys(zoneCount).reduce((a,b)=>
zoneCount[a] > zoneCount[b]
? a
: b
);

let text = '';

let strategies = [];

if(dominantZone === 'Deshumidificación'){

text = `
El análisis climático evidencia predominancia de
condiciones cálido-húmedas con elevada humedad
relativa anual y temperaturas altas persistentes.
`;

strategies = [
'Ventilación cruzada permanente',
'Deshumidificación pasiva',
'Cubiertas ventiladas',
'Sombreado profundo',
'Fachadas permeables'
];

}

else if(dominantZone === 'Ventilación'){

text = `
El clima presenta altas temperaturas con necesidad
de disipación térmica constante mediante ventilación.
`;

strategies = [
'Ventilación natural continua',
'Protección solar horizontal',
'Disipación térmica nocturna'
];

}

else{

text = `
Las condiciones climáticas se aproximan parcialmente
a rangos de confort bioclimático.
`;

strategies = [
'Control solar moderado',
'Ventilación parcial',
'Control térmico pasivo'
];

}

analysis.innerText = text;

strategies.forEach(s=>{

strategyList.innerHTML += `

<div class="bg-slate-900 border border-slate-800 rounded-2xl p-5">

<p class="text-sm font-bold text-slate-300">
${s}
</p>

</div>

`;

});

}

/* =========================================================
MAIN
========================================================= */

async function runClimateAnalysis(){

let results = [];

/* =========================================================
MODO MESES
========================================================= */

if(mode === 'mes'){

const year = selectedYears[0];

const data =
await fetchClimate(year);

for(let m=0;m<12;m++){

if(!selectedMonths.includes(m))
continue;

const tMax =
data.daily.temperature_2m_max
.filter((v,i)=>
new Date(data.daily.time[i]).getMonth()===m
);

const tMin =
data.daily.temperature_2m_min
.filter((v,i)=>
new Date(data.daily.time[i]).getMonth()===m
);

const hr =
data.daily.relative_humidity_2m_mean
.filter((v,i)=>
new Date(data.daily.time[i]).getMonth()===m
);

const avgMax =
tMax.reduce((a,b)=>a+b,0)/tMax.length;

const avgMin =
tMin.reduce((a,b)=>a+b,0)/tMin.length;

const avgHR =
hr.reduce((a,b)=>a+b,0)/hr.length;

results.push({

label:`${months[m]} ${year}`,

tMax:avgMax,
tMin:avgMin,
hr:avgHR,

zone:detectZone(avgMax,avgHR)

});

}

}

/* =========================================================
MODO AÑOS
========================================================= */

else{

for(const year of selectedYears){

const data =
await fetchClimate(year);

const avgMax =
data.daily.temperature_2m_max
.reduce((a,b)=>a+b,0)
/
data.daily.temperature_2m_max.length;

const avgMin =
data.daily.temperature_2m_min
.reduce((a,b)=>a+b,0)
/
data.daily.temperature_2m_min.length;

const avgHR =
data.daily.relative_humidity_2m_mean
.reduce((a,b)=>a+b,0)
/
data.daily.relative_humidity_2m_mean.length;

results.push({

label:`${year}`,

tMax:avgMax,
tMin:avgMin,
hr:avgHR,

zone:detectZone(avgMax,avgHR)

});

}

}

drawChart(results);

updateTable(results);

updateAnalysis(results);

}

/* =========================================================
INIT
========================================================= */

renderSelectors();

updateLocation();

runClimateAnalysis();

</script>

</body>
</html>
