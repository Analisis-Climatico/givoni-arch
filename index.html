<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Pro - Análisis Bioclimático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 300px; border-radius: 12px; z-index: 1; }
        .controls-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <header class="bg-white shadow-sm p-4 mb-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-900">GivoniArch Pro</h1>
        <div id="location-display" class="text-sm font-medium text-blue-600 bg-blue-50 px-3 py-1 rounded-full">Ubicación: Guayaquil</div>
    </header>

    <main class="max-w-7xl mx-auto px-4 pb-10">
        
        <div id="map" class="shadow-inner mb-6"></div>

        <div class="bg-white p-4 rounded-xl shadow-sm border mb-6">
            <div class="controls-row items-center">
                <span class="font-bold text-gray-600">Rango de Análisis:</span>
                <select id="time-range" class="border rounded px-2 py-1 bg-white">
                    <option value="5">Próximos 5 días (Detallado)</option>
                    <option value="24">Análisis Mensual (Estimado)</option>
                    <option value="96">Análisis Anual (Tendencia)</option>
                </select>
                <button onclick="refreshData()" class="bg-blue-600 text-white px-4 py-1 rounded hover:bg-blue-700 transition">Actualizar Análisis</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <div class="bg-white p-4 rounded-xl shadow-sm border">
                    <div id="givoni-plot" style="width:100%; height:600px;"></div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white p-4 rounded-xl shadow-sm border max-h-[400px] overflow-y-auto">
                    <h2 class="font-bold mb-3 border-b pb-2 text-gray-700 text-sm uppercase">Cuadro de Temperaturas y Humedad</h2>
                    <table class="w-full text-xs text-left">
                        <thead>
                            <tr class="text-gray-400">
                                <th class="pb-2">Fecha/Mes</th>
                                <th class="pb-2">Máx</th>
                                <th class="pb-2">Mín</th>
                                <th class="pb-2">HR%</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body"></tbody>
                    </table>
                </div>

                <div id="analysis-section" class="bg-blue-900 p-6 rounded-xl text-white shadow-lg hidden">
                    <h3 class="font-bold mb-2 flex items-center gap-2">
                        <span>💡</span> Estrategia Bioclimática
                    </h3>
                    <p id="analysis-text" class="text-sm leading-relaxed opacity-90"></p>
                </div>
            </div>
        </div>
    </main>

  <script>
// 1. Configuración de Datos Históricos (Ejemplo de estructura para Guayaquil)
const datosHistoricos = [
    { periodo: "Ene 2025", tMax: 31.5, tMin: 23.8, hr: 81, color: "#ff0000" },
    { periodo: "Feb 2025", tMax: 32.0, tMin: 24.0, hr: 84, color: "#ff7f00" },
    { periodo: "Mar 2025", tMax: 32.4, tMin: 24.3, hr: 85, color: "#ffff00" },
    { periodo: "Dic 2024", tMax: 32.0, tMin: 24.0, hr: 84, color: "#00ff00" },
    { periodo: "Nov 2024", tMax: 32.8, tMin: 24.6, hr: 84, color: "#00ffff" },
    // El sistema puede seguir cargando años (2023, 2022...)
];

function inicializarGraficoOficial() {
    const traces = [];

    // 2. Trazado de líneas sobre la imagen estática
    datosHistoricos.forEach(mes => {
        traces.push({
            x: [mes.tMin, mes.tMax],
            y: [mes.hr, mes.hr],
            type: 'scatter',
            mode: 'lines+markers',
            name: mes.periodo,
            line: { width: 3, color: mes.color },
            marker: { size: 6, symbol: 'square' }
        });

        // Llenar tabla fundamental de la derecha
        const row = `<tr>
            <td class="p-2 border-b"><span class="inline-block w-3 h-3 rounded-full" style="background:${mes.color}"></span></td>
            <td class="p-2 border-b">${mes.periodo}</td>
            <td class="p-2 border-b font-bold">${mes.tMax}°</td>
            <td class="p-2 border-b">${mes.tMin}°</td>
            <td class="p-2 border-b text-blue-600">${mes.hr}%</td>
        </tr>`;
        document.getElementById('data-table-body').innerHTML += row;
    });

    // 3. Configuración del Layout para que coincida con tu imagen
    const layout = {
        images: [{
            source: "https://raw.githubusercontent.com/analisis-climatico/givoni-arch/main/OFICIAL-GRÁFICA%20DE%20GIVONI%20(1)-Layout1.jpg",
            xref: "x", yref: "y",
            x: -5, y: 100, // Coordenadas de inicio según tu escala
            sizex: 55, sizey: 100,
            sizing: "stretch",
            layer: "below"
        }],
        xaxis: { range: [-5, 50], title: "TEMPERATURA BULBO SECO (°C)", dtick: 5, gridcolor: "transparent" },
        yaxis: { range: [0, 100], title: "HUMEDAD RELATIVA (%)", dtick: 10, gridcolor: "transparent" },
        showlegend: false,
        margin: { t: 10, b: 50, l: 50, r: 10 }
    };

    Plotly.newPlot('givoni-plot', traces, layout);
    
    // Análisis General Multianual
    document.getElementById('analysis-text').innerText = "ANÁLISIS GENERAL: Basado en el registro histórico (2022-2025), la tendencia climática se desplaza hacia las zonas 12 y 14. Se recomienda una estrategia de ventilación cruzada rigurosa y deshumidificación pasiva.";
}

window.onload = inicializarGraficoOficial;
</script>
</body>
</html>
