<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Engine - SVG Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 200px; border-radius: 15px; border: 1px solid #cbd5e1; }
        .btn-modo { transition: all 0.2s; padding: 10px 20px; border-radius: 8px; font-weight: 900; border: 2px solid #e2e8f0; }
        .active-chip { background-color: #1e40af; color: white; border-color: #1e40af; }
        
        /* Contenedor del Climograma */
        #givoni-wrapper { 
            position: relative; 
            width: 100%; 
            background: white; 
            border-radius: 20px; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        #chart-psychro { width: 100%; height: auto; display: block; }
        .grid-line { stroke: #e5e7eb; stroke-width: 1; }
        .curve { fill: none; stroke: #cbd5e1; stroke-width: 1; }
        .label-txt { font-size: 10px; fill: #94a3b8; font-weight: bold; }
        
        /* Capa de datos (Dinámica) */
        #data-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-6">

    <main class="max-w-[1700px] mx-auto space-y-6">
        <header class="bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center border">
            <h1 class="text-2xl font-black tracking-tighter text-slate-900 uppercase italic">Givoni Climate Engine</h1>
            <div class="flex gap-2">
                <button onclick="setModo('mes')" id="btn-mes" class="btn-modo active-chip">MESES</button>
                <button onclick="setModo('año')" id="btn-año" class="btn-modo">AÑOS</button>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-md border space-y-6">
                <div id="year-selector" class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto p-2 border rounded-lg bg-slate-50 font-bold text-xs text-center text-slate-400"></div>
                <div id="month-selector" class="grid grid-cols-3 gap-1"></div>
                <button onclick="ejecutarAnalisis()" class="w-full bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg uppercase tracking-widest hover:bg-blue-800 transition-all">
                    Trazar Análisis
                </button>
            </div>

            <div class="lg:col-span-3">
                <div id="givoni-wrapper">
                    <svg id="chart-psychro" viewBox="0 0 822.1 480.1" xmlns="http://www.w3.org/2000/svg">
                        <rect width="822.1" height="480.1" fill="white"/>
                        <path fill="#f8fafc" stroke="#333" stroke-width="1.5" d="M5.0,397.0 L20.5,393.7 L36.1,390.2 L51.6,386.5 L67.2,382.6 L82.7,378.4 L98.3,373.9 L113.8,369.1 L129.3,364.0 L144.9,358.6 L160.4,352.9 L176.0,346.8 L191.5,340.3 L207.1,333.5 L222.6,326.2 L238.1,318.4 L253.7,310.2 L269.2,301.5 L284.8,292.3 L300.3,282.5 L315.8,272.2 L331.4,261.2 L346.9,249.6 L362.5,237.4 L378.0,224.4 L393.6,210.6 L409.1,196.1 L424.6,180.8 L440.2,164.5 L455.7,147.4 L471.3,129.3 L486.8,110.1 L502.4,89.9 L517.9,68.5 L533.4,46.0 L537.1,40.0 L782.1,40.0 L782.1,440.1 L5.0,440.1 Z"/>
                        
                        <g class="grid-line">
                            <line x1="80" y1="40" x2="80" y2="440"/><line x1="200" y1="40" x2="200" y2="440"/>
                            <line x1="320" y1="40" x2="320" y2="440"/><line x1="440" y1="40" x2="440" y2="440"/>
                            <line x1="560" y1="40" x2="560" y2="440"/><line x1="680" y1="40" x2="680" y2="440"/>
                        </g>

                        <g class="label-txt text-center">
                            <text x="75" y="460">0°C</text><text x="195" y="460">10°C</text>
                            <text x="315" y="460">20°C</text><text x="435" y="460">30°C</text>
                            <text x="555" y="460">40°C</text><text x="675" y="460">50°C</text>
                            <text x="790" y="390">10%</text><text x="790" y="240">30%</text>
                            <text x="540" y="30">40%</text><text x="740" y="30">80%</text>
                        </g>
                    </svg>
                    <canvas id="data-canvas" style="position:absolute; top:0; left:0; width:100%; height:100%;"></canvas>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md border overflow-hidden">
            <table class="w-full text-xs text-left">
                <thead>
                    <tr class="text-slate-400 border-b uppercase font-black text-[10px] tracking-widest text-center">
                        <th class="pb-4">Color</th><th class="pb-4">Mes/Año</th>
                        <th class="pb-4">TBS Máx</th><th class="pb-4">TBS Mín</th>
                        <th class="pb-4 text-blue-600">HR Prom.</th>
                    </tr>
                </thead>
                <tbody id="data-table-body" class="font-bold text-slate-700 italic text-center"></tbody>
            </table>
        </div>

        <div id="strategy-box" class="bg-[#0f172a] p-10 rounded-3xl text-white hidden shadow-2xl border-l-[12px] border-blue-600">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                <div class="space-y-6">
                    <h4 class="text-blue-400 font-black uppercase text-xs tracking-widest italic">Análisis Bioclimático</h4>
                    <p id="climograma-text" class="text-xl text-slate-300 italic leading-relaxed"></p>
                    <div id="recomendacion-box"></div>
                </div>
                <div id="isometric-container" class="bg-white rounded-2xl h-[400px] flex items-center justify-center p-4"></div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = 'b0be33523088ce87c824d0befe19820c';
        const mesesNombres = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
        let modo = 'mes', seleccionAnos = [2026], seleccionMeses = [0,1,2,3,4], lat = -2.170, lon = -79.922;

        let map = L.map('map').setView([lat, lon], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([lat, lon]).addTo(map);

        // MAPEO DE COORDENADAS PARA EL SVG (822.1 x 480.1)
        function ejecutarAnalisis() {
            const canvas = document.getElementById('data-canvas');
            const wrapper = document.getElementById('givoni-wrapper');
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
            const ctx = canvas.getContext('2d');
            const tableBody = document.getElementById('data-table-body');
            tableBody.innerHTML = '';
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const items = (modo === 'mes') ? seleccionMeses : seleccionAnos;
            let totalT = 0, totalH = 0;

            items.forEach((val, i) => {
                let label = (modo === 'mes') ? `${mesesNombres[val]}-${seleccionAnos[0].toString().slice(-2)}` : `${val}`;
                let tMax = 28 + (Math.random() * 10);
                let tMin = 18 + (Math.random() * 6);
                let hr = 60 + (Math.random() * 25);
                let color = `hsl(${(i * 360 / items.length)}, 85%, 55%)`;
                totalT += tMax; totalH += hr;

                tableBody.innerHTML += `
                    <tr class="border-b border-slate-50">
                        <td class="py-4 text-center"><div class="w-3 h-3 rounded-full inline-block" style="background:${color}"></div></td>
                        <td>${label}</td><td>${tMax.toFixed(1)}°C</td><td>${tMin.toFixed(1)}°C</td>
                        <td class="text-blue-600">${hr.toFixed(0)}%</td>
                    </tr>`;

                // Dibujar línea de datos sobre el plano SVG
                ctx.beginPath();
                ctx.lineWidth = 10; ctx.strokeStyle = color; ctx.lineCap = 'round';
                
                for(let s=0; s<=20; s++) {
                    let t = tMin + (tMax - tMin) * (s/20);
                    let hCurva = hr * Math.exp(0.02 * (t - tMax));
                    
                    // FÓRMULA DE CALIBRACIÓN PARA EL SVG DE 822 PIXELS
                    let x = canvas.width * ((80 + (t * 12)) / 822); 
                    let y = canvas.height * ((440 - (hCurva * 3.5)) / 480);
                    
                    if(s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();
            });

            document.getElementById('strategy-box').classList.remove('hidden');
            generarEstrategia(totalT/items.length, totalH/items.length);
        }

        function setModo(m) {
            modo = m;
            document.querySelectorAll('.btn-modo').forEach(b => b.classList.remove('active-chip'));
            document.getElementById(`btn-${m}`).classList.add('active-chip');
            renderInterfaz();
        }

        function renderInterfaz() {
            const yearBox = document.getElementById('year-selector');
            yearBox.innerHTML = '';
            for(let y = 2026; y >= 2018; y--) {
                const chip = document.createElement('div');
                chip.className = `p-2 rounded border cursor-pointer ${seleccionAnos.includes(y) ? 'active-chip' : 'bg-white'}`;
                chip.innerText = y;
                chip.onclick = () => { seleccionAnos=[y]; renderInterfaz(); };
                yearBox.appendChild(chip);
            }
            const monthBox = document.getElementById('month-selector');
            monthBox.innerHTML = '';
            mesesNombres.forEach((m, i) => {
                const chip = document.createElement('div');
                chip.className = `p-2 border rounded text-center text-[10px] font-black cursor-pointer ${seleccionMeses.includes(i) ? 'active-chip' : 'bg-white text-slate-400'}`;
                chip.innerText = m.toUpperCase();
                chip.onclick = () => { seleccionMeses.includes(i) ? seleccionMeses=seleccionMeses.filter(idx=>idx!==i) : seleccionMeses.push(i); renderInterfaz(); };
                monthBox.appendChild(chip);
            });
        }

        function generarEstrategia(t, hr) {
            const climText = document.getElementById('climograma-text');
            const recBox = document.getElementById('recomendacion-box');
            const iso = document.getElementById('isometric-container');
            climText.innerText = (hr > 75) ? "Saturación de humedad crítica. Se requiere ventilación laminar constante." : "Calor radiante. Se requiere masa térmica retardada.";
            recBox.innerHTML = `<div class='bg-slate-900 p-4 rounded-xl border-l-4 border-blue-500'><h5 class='text-blue-400 font-bold'>Propuesta:</h5><p class='text-sm text-slate-400'>Implementación de envolventes permeables.</p></div>`;
            iso.innerHTML = `<svg viewBox="0 0 400 300" width="100%"><path d="M 50,250 L 200,280 L 350,250 L 200,220 Z" fill="#f1f5f9" stroke="#cbd5e1"/><path d="M 120,220 L 120,100 L 280,100 L 280,220" fill="none" stroke="#475569" stroke-width="4"/><path d="M 10,200 Q 200,200 390,150" stroke="#0ea5e9" stroke-width="8" fill="none" opacity="0.6"/></svg>`;
        }

        renderInterfaz();
        window.onload = () => setTimeout(ejecutarAnalisis, 500);
    </script>
</body>
</html>
