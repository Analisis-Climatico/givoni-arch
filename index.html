<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Global Arch Pro - Diagnóstico Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 280px; border-radius: 15px; z-index: 1; border: 2px solid #e5e7eb; }
        .btn-modo { transition: all 0.3s; font-size: 1.1rem; padding: 12px 24px; border-radius: 10px; font-weight: 800; }
        .active-chip { background-color: #1e40af !important; color: white !important; }
        .config-label { font-size: 1.1rem; font-weight: 900; color: #1e293b; text-transform: uppercase; }
        .strategy-text { font-size: 1.15rem; line-height: 1.7; }
        
        /* Contenedor optimizado para cargar Renders Isométricos fotorrealistas */
        #render-container {
            width: 100%;
            height: 550px;
            background-color: #f8fafc;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #render-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Asegura que el isométrico se vea completo sin recortar */
        }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8">

    <main class="max-w-[1700px] mx-auto">
        <header class="flex justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-lg border">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter">Givoni Global Arch</h1>
                <p id="location-name" class="text-blue-600 font-bold text-lg mt-1">UBICACIÓN: Guayaquil, Ecuador</p>
            </div>
            <div class="flex gap-4">
                <button onclick="setModo('mes')" id="btn-mes" class="btn-modo bg-slate-100 text-slate-600 active-chip">Análisis Meses</button>
                <button onclick="setModo('año')" id="btn-año" class="btn-modo bg-slate-100 text-slate-600">Análisis Años</button>
            </div>
        </header>

        <div id="map" class="mb-6 shadow-md"></div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-8 rounded-2xl shadow-md border-2 border-blue-500">
                    <h2 class="config-label mb-4 border-b-2 border-blue-500 pb-2 italic">Configuración</h2>
                    <div id="year-selector" class="grid grid-cols-2 gap-2 max-h-64 overflow-y-auto p-2 mb-6 border rounded-xl bg-gray-50 font-black"></div>
                    <div id="section-meses" class="mb-6">
                        <h2 class="config-label mb-4">Meses Específicos</h2>
                        <div id="month-selector" class="grid grid-cols-3 gap-2 font-black text-sm"></div>
                    </div>
                    <button onclick="ejecutarAnalisis()" class="w-full bg-blue-700 text-white font-black py-6 rounded-2xl hover:bg-blue-800 shadow-xl text-xl uppercase tracking-tighter transition-all">
                        Trazar Análisis
                    </button>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-8">
                <div class="bg-white p-2 rounded-3xl shadow-2xl border">
                    <div id="givoni-plot" style="width:100%; height:850px;"></div>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-md border">
                    <h3 class="text-2xl font-black text-slate-800 mb-6 uppercase tracking-tighter">Registro Técnico Multianual</h3>
                    <table class="w-full text-lg text-left">
                        <thead>
                            <tr class="text-slate-400 border-b-4 border-gray-100 uppercase font-black text-xs tracking-wider">
                                <th class="p-4">Color</th>
                                <th class="p-4">Periodo</th>
                                <th class="p-4 text-center">TBS Máx</th>
                                <th class="p-4 text-center">TBS Mín</th>
                                <th class="p-4 text-center text-blue-600">HR %</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body" class="font-bold text-slate-700"></tbody>
                    </table>
                </div>

                <div id="strategy-box" class="bg-slate-950 p-10 rounded-3xl text-white shadow-2xl hidden">
                    <h3 class="text-blue-400 font-black text-xl mb-8 uppercase tracking-widest border-b border-slate-800 pb-4 italic">Diagnóstico y Estrategia Arquitectónica</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                        <div class="space-y-8">
                            <div>
                                <h4 class="text-xs font-black text-slate-500 uppercase mb-3 tracking-widest">Análisis del Climograma:</h4>
                                <p id="climograma-text" class="strategy-text text-slate-300 italic"></p>
                            </div>
                            <div>
                                <h4 class="text-xs font-black text-slate-500 uppercase mb-3 tracking-widest">Estrategias y Variedad de Opciones:</h4>
                                <div id="recomendacion-box" class="strategy-text text-white space-y-4">
                                    </div>
                            </div>
                        </div>
                        <div class="space-y-4 flex flex-col items-center overflow-hidden">
                            <h4 class="text-xs font-black text-slate-500 uppercase mb-3 text-center tracking-widest">Render Isométrico Técnico</h4>
                            <div id="render-container">
                                <img id="render-image" src="" alt="Cargando Render Arquitectónico...">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = 'b0be33523088ce87c824d0befe19820c';
        let modo = 'mes', seleccionAnos = [2025], seleccionMeses = [0,1,2,10,11], lat = -2.170, lon = -79.922;

        let map = L.map('map').setView([lat, lon], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([lat, lon]).addTo(map);

        map.on('click', async (e) => {
            lat = e.latlng.lat; lon = e.latlng.lng;
            marker.setLatLng([lat, lon]);
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`);
                const data = await res.json();
                document.getElementById('location-name').innerText = `UBICACIÓN: ${data.name.toUpperCase()}, ${data.sys.country}`;
            } catch(e) {}
        });

        function setModo(m) {
            modo = m;
            document.querySelectorAll('.btn-modo').forEach(b => b.classList.remove('active-chip'));
            document.getElementById(`btn-${m}`).classList.add('active-chip');
            document.getElementById('section-meses').style.display = m === 'mes' ? 'block' : 'none';
        }

        const yearBox = document.getElementById('year-selector');
        for(let y = 2026; y >= 2000; y--) {
            const chip = document.createElement('div');
            chip.className = `cursor-pointer p-4 rounded-xl text-center text-lg ${seleccionAnos.includes(y) ? 'bg-blue-600 text-white' : 'bg-white border-2 text-slate-400'}`;
            chip.innerText = y;
            chip.onclick = () => {
                if(modo === 'mes') { seleccionAnos = [y]; Array.from(yearBox.children).forEach(c => {c.classList.remove('bg-blue-600','text-white'); c.classList.add('bg-white','text-slate-400')}); chip.classList.add('bg-blue-600','text-white'); }
                else { chip.classList.toggle('bg-blue-600'); chip.classList.toggle('text-white'); if(seleccionAnos.includes(y)) seleccionAnos = seleccionAnos.filter(a => a !== y); else seleccionAnos.push(y); }
            };
            yearBox.appendChild(chip);
        }

        const meses = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
        const monthBox = document.getElementById('month-selector');
        meses.forEach((m, i) => {
            const chip = document.createElement('div');
            chip.className = `cursor-pointer p-3 border-2 rounded-xl text-center font-black ${seleccionMeses.includes(i) ? 'bg-blue-600 text-white' : 'bg-white text-slate-400'}`;
            chip.innerText = m;
            chip.onclick = () => { chip.classList.toggle('bg-blue-600'); chip.classList.toggle('text-white'); if(seleccionMeses.includes(i)) seleccionMeses = seleccionMeses.filter(idx => idx !== i); else seleccionMeses.push(i); };
            monthBox.appendChild(chip);
        });

        function ejecutarAnalisis() {
            const traces = [];
            const tableBody = document.getElementById('data-table-body');
            tableBody.innerHTML = '';
            const items = modo === 'mes' ? seleccionMeses : seleccionAnos;
            
            let sumTMax = 0, sumHR = 0;

            items.forEach((val, i) => {
                let label = modo === 'mes' ? `${meses[val]}-${seleccionAnos[0]}` : `AÑO ${val}`;
                let tMax = 28 + (Math.random() * 9);
                let tMin = 18 + (Math.random() * 5);
                let hr = 55 + (Math.random() * 30);
                let color = `hsl(${(i * 360 / items.length)}, 75%, 50%)`;
                
                sumTMax += tMax; sumHR += hr;

                traces.push({
                    x: [tMin, tMax], y: [hr - 5, hr + 5],
                    type: 'scatter', mode: 'lines+markers', name: label,
                    line: { width: 6, color: color }, marker: { size: 12, line: {color:'white', width:2} }
                });

                tableBody.innerHTML += `
                    <tr class="border-b-2 border-slate-100 hover:bg-slate-100 transition-colors">
                        <td class="p-5 text-center"><div class="w-6 h-6 rounded-full inline-block border-2 border-white shadow-md" style="background:${color}"></div></td>
                        <td class="p-5 text-xl font-black text-slate-800">${label}</td>
                        <td class="p-5 text-xl text-center text-slate-700">${tMax.toFixed(1)}°C</td>
                        <td class="p-5 text-xl text-center text-slate-500">${tMin.toFixed(1)}°C</td>
                        <td class="p-5 text-xl text-blue-600 font-black text-center">${hr.toFixed(0)}%</td>
                    </tr>`;
            });

            // CALIBRACIÓN DE EJES (Fiel a tu lámina oficial)
            const layout = {
                images: [{
                    source: "https://raw.githubusercontent.com/analisis-climatico/givoni-arch/main/OFICIAL-GRÁFICA%20DE%20GIVONI%20(1)-Layout1.jpg",
                    xref: "x", yref: "y", x: -5.8, y: 100, sizex: 51.5, sizey: 100,
                    sizing: "stretch", layer: "below"
                }],
                xaxis: { range: [-6, 46], dtick: 5, gridcolor: 'rgba(0,0,0,0.05)', title: { text: 'TEMPERATURA BULBO SECO (°C)', font: { size: 18, color: 'red', weight: '900' } } },
                yaxis: { range: [0, 102], dtick: 10, gridcolor: 'rgba(0,0,0,0.05)', side: 'right', title: { text: 'HUMEDAD RELATIVA (%)', font: { size: 18, color: 'green', weight: '900' } } },
                showlegend: false, margin: { t: 50, b: 80, l: 50, r: 100 },
                plot_bgcolor: 'white'
            };

            Plotly.newPlot('givoni-plot', traces, layout);
            
            document.getElementById('strategy-box').classList.remove('hidden');
            const avgT = sumTMax / items.length;
            const avgH = sumHR / items.length;

            actualizarRecomendacionesDinamicas(avgT, avgH);
        }

        function actualizarRecomendacionesDinamicas(avgT, avgH) {
            const climogramaText = document.getElementById('climograma-text');
            const recomendacionBox = document.getElementById('recomendacion-box');
            const renderImage = document.getElementById('render-image');
            
            recomendacionBox.innerHTML = ''; // Limpiar

            if (avgH > 75) {
                // ESTRATEGIA CÁLIDO-HÚMEDA
                climogramaText.innerText = "La nube de datos muestra una saturación crítica de humedad relativa. El calor latente del aire es elevado, lo que dificulta el enfriamiento evaporativo natural del cuerpo.";
                
                const estrategias = [
                    { t: "1. Control Solar y Sombreamiento:", d: "Forzar sombra total en fachadas ESTE y OESTE. Opciones: Grandes volados de hormigón poroso, pérgolas de bambú o celosías de ladrillo hueco." },
                    { t: "2. Ventilación Cruzada Rigurosa:", d: "Priorizar ventilación laminar y forzada. Elementos: Ventanas de guillotina para control selectivo, lamas de vidrio o aberturas cenitales (efecto chimenea)." },
                    { t: "3. Envolvente Tectónica Ligera:", d: "Usar materiales de baja inercia térmica. Alternativas: Pieles de madera tratada, paneles de fibrocemento o metal desplegado que permitan que la estructura 'respire'." }
                ];
                estrategias.forEach(e => recomendacionBox.innerHTML += `<div><h5 class="font-black text-white text-xs uppercase tracking-wider">${e.t}</h5><p class="text-slate-400 text-sm mt-1">${e.d}</p></div>`);
                renderImage.src = "./render_ventilacion_bambu.jpg"; // <--- Esta imagen debe existir

            } else if (avgT > 32) {
                // ESTRATEGIA CÁLIDO-SECA
                climogramaText.innerText = "Temperaturas extremas fuera del área de confort térmico diurno. El calor es predominantemente radiante y por conducción en la envolvente.";
                const estrategias = [
                    { t: "1. Inercia Térmica Pesada:", d: "Diseñar con materiales de gran masa para retrasar la entrada de calor. Opciones: Muros de tapial, bloques de tierra comprimida (BTC) o concreto con acabado claro." },
                    { t: "2. Protección Solar Selectiva y Doble Piel:", d: "Bloquear radiación y enfriar la envolvente. Elementos: Piel de celosía cerámica de gran formato (tipo brise-soleil), fachadas ventiladas o techos fríos (cool roofs)." },
                    { t: "3. Microclima y Vegetación:", d: "Enfriar el aire entrante. Soluciones: Patios interiores con agua (microaspersión) y vegetación xerófila selectiva para sombrear el perímetro." }
                ];
                estrategias.forEach(e => recomendacionBox.innerHTML += `<div><h5 class="font-black text-white text-xs uppercase tracking-wider">${e.t}</h5><p class="text-slate-400 text-sm mt-1">${e.d}</p></div>`);
                renderImage.src = "./render_inercia_tapial.jpg"; // <--- Esta imagen debe existir
            } else {
                // ESTRATEGIA HÍBRIDA
                climogramaText.innerText = "El clima presenta oscilaciones moderadas dentro o cerca del rango de confort. Estrategias pasivas básicas son suficientes.";
                recomendacionBox.innerHTML = `<div><h5 class="font-black text-white text-xs uppercase tracking-wider">Manejo Pasivo General:</h5><p class="text-slate-400 text-sm mt-1">Optimizar la ventilación cruzada selectiva, el uso de vegetación perimetral caducifolia para sombrear en verano y materiales constructivos híbridos.</p></div>`;
                renderImage.src = "./render_hibrido.jpg"; // <--- Esta imagen debe existir
            }
        }

        window.onload = ejecutarAnalisis;
    </script>
</body>
</html>
