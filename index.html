<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GivoniArch - Análisis Bioclimático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <!-- CABECERA Y MAPA -->
    <header class="bg-white shadow-sm p-6 mb-8">
        <h1 class="text-2xl font-bold text-gray-900">GivoniArch: Análisis Climático Global</h1>
        <p class="text-gray-500">Selecciona una ubicación y rango de años para el diagnóstico.</p>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        <!-- SECCIÓN 1: CLIMOGRAMA DE GIVONI -->
        <section class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2">Climograma de Givoni</h2>
            <div id="givoni-plot" style="width:100%; height:600px;"></div>
        </section>

        <!-- SECCIÓN 2: TABLA FUNDAMENTAL -->
        <section class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2">Cuadro de Temperaturas y Humedad</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50">
                            <th class="p-3 border-b">Color</th>
                            <th class="p-3 border-b">Periodo</th>
                            <th class="p-3 border-b">TBS Máx (°C)</th>
                            <th class="p-3 border-b">TBS Mín (°C)</th>
                            <th class="p-3 border-b">HR Promedio (%)</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body">
                        <!-- Los datos se cargarán aquí automáticamente -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- SECCIÓN 3: ANÁLISIS Y RECOMENDACIÓN -->
        <section id="analysis-section" class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8 hidden">
            <div class="bg-blue-50 p-6 rounded-xl border border-blue-100">
                <h3 class="text-lg font-bold text-blue-900 mb-2">Análisis General y Recomendación</h3>
                <p id="analysis-text" class="text-blue-800 leading-relaxed"></p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-inner border flex items-center justify-center">
                <p class="text-gray-400 italic">[Gráfico Arquitectónico de Estrategia]</p>
            </div>
        </section>
    </main>

    <script>
        // Aquí insertaremos la lógica del gráfico de Givoni y la API
    </script>
<script>
    const apiKey = 'b0be33523088ce87c824d0befe19820c';
const ciudad = 'Guayaquil'; 

function drawGivoniZones() {
    // Definición de zonas principales según tu referencia (Givoni simplificado para web)
    const zones = [
        { name: '1. Confort', x: [21, 26, 26, 21, 21], y: [20, 20, 80, 80, 20], color: 'rgba(255, 235, 156, 0.4)' },
        { name: '9. Protección Solar', x: [20, 45, 45, 20, 20], y: [0, 0, 10, 10, 0], color: 'rgba(255, 165, 0, 0.3)' },
        { name: '10. Enfriamiento Evaporativo', x: [30, 45, 45, 30, 30], y: [10, 10, 30, 30, 10], color: 'rgba(255, 105, 180, 0.3)' },
        { name: '12. Ventilación Natural', x: [20, 32, 32, 20, 20], y: [40, 40, 90, 90, 40], color: 'rgba(0, 255, 255, 0.3)' }
    ];

    const traces = zones.map(z => ({
        x: z.x, y: z.y, fill: 'toself', type: 'scatter', mode: 'lines',
        name: z.name, fillcolor: z.color, line: { color: 'gray', width: 1 }
    }));

    Plotly.newPlot('givoni-plot', traces, {
        title: 'Análisis Multianual - Diagrama de Givoni',
        xaxis: { title: 'Temperatura Bulbo Seco (°C)', range: [0, 50], gridcolor: '#eee' },
        yaxis: { title: 'Humedad Relativa (%)', range: [0, 100], gridcolor: '#eee' },
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(0,0,0,0)',
        margin: { t: 50, b: 50, l: 50, r: 50 }
    });
}

async function fetchWeatherData() {
    try {
        const response = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${ciudad}&units=metric&appid=${apiKey}`);
        const data = await response.json();
        
        const tableBody = document.getElementById('data-table-body');
        tableBody.innerHTML = ''; 

        // Procesamiento de datos para Guayaquil
        data.list.forEach((item, index) => {
            if(index % 8 === 0) { // Un dato por día para no saturar
                const row = `<tr>
                    <td class="p-3"><div class="w-4 h-4 rounded-full" style="background: hsl(${index * 15}, 70%, 50%)"></div></td>
                    <td class="p-3">${new Date(item.dt * 1000).toLocaleDateString()}</td>
                    <td class="p-3">${item.main.temp_max}°C</td>
                    <td class="p-3">${item.main.temp_min}°C</td>
                    <td class="p-3">${item.main.humidity}%</td>
                </tr>`;
                tableBody.innerHTML += row;
            }
        });

        document.getElementById('analysis-section').classList.remove('hidden');
        document.getElementById('analysis-text').innerText = "Análisis General: La mayoría de los puntos se desplazan hacia zonas de alta humedad (Zona 12 y 14). Se requiere una estrategia de deshumidificación activa y protección solar rigurosa.";
    } catch (e) {
        console.error("Error al cargar datos:", e);
    }
}

drawGivoniZones();
fetchWeatherData();
    </script>
</body>
</html>
