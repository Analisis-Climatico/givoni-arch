<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Climate Engine PRO - Tesis Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
        #map { height: 260px; border-radius: 22px; overflow: hidden; border: 1px solid #dbe2ea; }
        #chart { width: 100%; height: 760px; background: white; border-radius: 24px; overflow: hidden; border: 1px solid #dbe2ea; position: relative; }
        .btn-mode { padding: 10px 22px; border-radius: 12px; border: 1px solid #dbe2ea; font-size: 11px; font-weight: 900; transition: .2s; }
        .active-mode { background: #2563eb; color: white; border-color: #2563eb; }
        .selector-chip { padding: 10px; border-radius: 10px; border: 1px solid #dbe2ea; text-align: center; font-size: 11px; font-weight: 800; cursor: pointer; transition: .2s; background: white; }
        .selected-item { background: #2563eb; color: white; }
        .zone-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; margin: 2px; font-size: 9px; font-weight: 900; text-transform: uppercase; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">
    <main id="export-container" class="max-w-[1900px] mx-auto space-y-6">
        <header class="bg-white rounded-3xl border shadow-sm p-6 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tight text-slate-800 italic">Givoni Climate Engine</h1>
                <p class="text-xs uppercase tracking-[0.3em] text-slate-400 font-black mt-2">Diagnóstico Bioclimático Profesional</p>
            </div>
            <div class="flex gap-3">
                <div class="flex gap-1 bg-slate-100 p-1 rounded-xl">
                    <button onclick="setMode('mes')" id="btn-mes" class="btn-mode active-mode">MESES</button>
                    <button onclick="setMode('año')" id="btn-año" class="btn-mode">AÑOS</button>
                </div>
                <button onclick="downloadPDF()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-black px-6 py-3 rounded-xl text-[10px] uppercase shadow-lg transition-all">Exportar PDF</button>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
            <div class="bg-white rounded-3xl border shadow-sm p-6 space-y-6">
                <div>
                    <p id="location-text" class="text-blue-600 font-black text-xs uppercase mb-4 italic italic">Ubicación: Guayaquil</p>
                    <p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">Histórico (2026 - 2000)</p>
                    <div id="year-selector" class="grid grid-cols-2 gap-2 max-h-[350px] overflow-y-auto pr-2"></div>
                </div>
                <div id="section-meses">
                    <p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">Meses</p>
                    <div id="month-selector" class="grid grid-cols-3 gap-2"></div>
                </div>
                <button onclick="runClimateAnalysis()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black uppercase rounded-2xl py-5 text-xs transition-all shadow-md">Actualizar Análisis</button>
            </div>

            <div class="xl:col-span-3 space-y-6">
                <div id="chart"></div>

                <div class="bg-white rounded-3xl border overflow-hidden shadow-sm">
                    <table class="w-full text-xs">
                        <thead class="bg-slate-50 border-b text-slate-500 uppercase font-black">
                            <tr>
                                <th class="p-4">Color</th><th class="p-4">Periodo</th>
                                <th class="p-4">TBS Máx</th><th class="p-4">TBS Mín</th>
                                <th class="p-4">HR %</th><th class="p-4 text-left">Zonas Detectadas</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="font-bold text-slate-700 text-center"></tbody>
                    </table>
                </div>

                <div class="bg-[#0f172a] rounded-3xl p-10 text-white border-l-[12px] border-blue-600 shadow-2xl">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                        <div>
                            <p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5 italic">Análisis General del Cuadro de Datos</p>
                            <p id="analysis-text" class="text-slate-300 leading-relaxed text-lg font-medium"></p>
                        </div>
                        <div>
                            <p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5 italic">Propuestas de Diseño Arquitectónico</p>
                            <div id="strategy-list" class="space-y-4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        let mode = 'mes', selectedYears = [2025], selectedMonths = [0,1,2,3,4], lat = -2.17, lon = -79.92;
        let currentZonesSVG = null;

        const zoneConfig = {
            "Z1": { color: "rgb(254, 204, 102)" }, "Z2": { color: "rgb(153, 27, 30)" }, "Z3": { color: "rgb(19, 103, 52)" },
            "Z4": { color: "rgb(19, 155, 72)" }, "Z5": { color: "rgb(24, 125, 129)" }, "Z6": { color: "rgb(209, 156, 199)" },
            "Z7": { color: "rgb(50, 162, 210)" }, "Z8": { color: "rgb(205, 105, 40)" }, "Z9": { color: "rgb(242, 113, 114)" },
            "Z10": { color: "rgb(147, 39, 143)" }, "Z11": { color: "rgb(241, 235, 31)" }, "Z12": { color: "rgb(46, 173, 141)" },
            "Z13": { color: "rgb(69, 84, 165)" }, "Z14": { color: "rgb(159, 119, 197)" }
        };

        const map = L.map('map').setView([lat,lon],7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const marker = L.marker([lat,lon]).addTo(map);

        map.on('click', async(e)=>{
            lat = e.latlng.lat; lon = e.latlng.lng; marker.setLatLng([lat,lon]);
            updateLocation(); runClimateAnalysis();
        });

        function setMode(m){
            mode = m;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active-mode'));
            document.getElementById(`btn-${m}`).classList.add('active-mode');
            document.getElementById('month-section').style.display = m === 'mes' ? 'block' : 'none';
            renderSelectors();
        }

        function renderSelectors(){
            const yb = document.getElementById('year-selector'); yb.innerHTML = '';
            for(let y=2026; y>=2000; y--){
                const c = document.createElement('div');
                c.className = `selector-chip ${selectedYears.includes(y)?'selected-item':''}`;
                c.innerText = y;
                c.onclick = () => {
                    if(mode === 'mes') selectedYears = [y];
                    else selectedYears.includes(y) ? selectedYears = selectedYears.filter(v=>v!==y) : selectedYears.push(y);
                    renderSelectors();
                };
                yb.appendChild(c);
            }
            const mb = document.getElementById('month-selector'); mb.innerHTML = '';
            months.forEach((m,i)=>{
                const c = document.createElement('div');
                c.className = `selector-chip ${selectedMonths.includes(i)?'selected-item':''}`;
                c.innerText = m;
                c.onclick = () => {
                    selectedMonths.includes(i) ? selectedMonths = selectedMonths.filter(v=>v!==i) : selectedMonths.push(i);
                    renderSelectors();
                };
                mb.appendChild(c);
            });
        }

        function detectZones(tMin, tMax, hr) {
            let detected = [];
            const check = (t, h) => {
                if (t > 29 && h > 55) detected.push("Z13"); // Calibración crítica Enero
                if (t > 38) detected.push("Z13");
                if (t < 0) detected.push("Z7");
                if (t >= 0 && t < 10) detected.push("Z5");
                if (t >= 10 && t < 18) detected.push("Z4");
                if (t >= 18 && t < 21) detected.push("Z3");
                if (t < 20 && h < 30) detected.push("Z6");
                if (t >= 20 && h < 25) detected.push("Z8");
                if (t >= 20 && t <= 24.5 && h >= 20 && h <= 80) detected.push("Z1");
                if (t > 24.5 && t <= 27 && h >= 20 && h <= 80) detected.push("Z2");
                if (t >= 21 && t <= 33 && h >= 50) detected.push("Z12");
                if (t > 27 && t <= 36 && h <= 50) detected.push("Z9");
                if (t > 30 && h <= 35) detected.push("Z10");
                if (h > 80 && t >= 20) detected.push("Z14");
            };
            for(let s=0; s<=1; s+=0.02) check(tMin + (tMax - tMin) * s, hr);
            return [...new Set(detected)].sort((a,b) => parseInt(a.slice(1)) - parseInt(b.slice(1)));
        }

        async function drawChart(data){
            d3.select('#chart svg').remove();
            const width = 1600, height = 760;
            const margin = { top:20, right:20, bottom:60, left:20 };
            const innerWidth = width - margin.left - margin.right;
            const innerHeight = height - margin.top - margin.bottom;

            const svg = d3.select('#chart').append('svg').attr('width','100%').attr('height','100%').attr('viewBox',`0 0 ${width} ${height}`);
            const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
            const x = d3.scaleLinear().domain([-5,50]).range([0,innerWidth]);
            const y = d3.scaleLinear().domain([0,35]).range([innerHeight,0]);

            const response = await fetch('pruega-de-svg.svg');
            const rawSVG = await response.text();
            const parser = new DOMParser();
            const svgDoc = parser.parseFromString(rawSVG, "image/svg+xml");
            const importedSVG = document.importNode(svgDoc.documentElement, true);
            importedSVG.setAttribute("width",innerWidth);
            importedSVG.setAttribute("height",innerHeight);
            importedSVG.setAttribute("preserveAspectRatio","none");
            importedSVG.setAttribute("transform","translate(0,65)");
            g.append("g").style("opacity","0.85").node().appendChild(importedSVG);

            data.forEach((d,i)=>{
                d.color = d3.interpolateRainbow(i/data.length);
                const points = [];
                for(let s=0;s<=50;s++){
                    let t = d.tMin + ((d.tMax-d.tMin)*(s/50));
                    let sat = 0.61078 * Math.exp((17.27*t)/(t+237.3));
                    let vap = (d.hr/100) * sat;
                    let hum = 622 * (vap / (101.325 - vap));
                    points.push([x(t), y(hum)]);
                }
                g.append('path').attr('d', d3.line().curve(d3.curveBasis)(points))
                    .attr('fill','none').attr('stroke',d.color).attr('stroke-width',5).attr('stroke-linecap','round');
            });
            g.append('g').attr('transform', `translate(0,${innerHeight})`).call(d3.axisBottom(x));
        }

        function updateAnalysis(data){
            const tableBody = document.getElementById('table-body'); tableBody.innerHTML = '';
            let sumTMax = 0, sumTMin = 0, sumH = 0;

            data.forEach(d => {
                const zones = detectZones(d.tMin, d.tMax, d.hr);
                sumTMax += d.tMax; sumTMin += d.tMin; sumH += d.hr;
                const badges = zones.map(z => `<span class="zone-badge" style="background:${zoneConfig[z]?.color}">${z}</span>`).join(' ');
                tableBody.innerHTML += `<tr class="border-b">
                    <td class="p-4"><div class="w-3 h-3 rounded-full mx-auto" style="background:${d.color}"></div></td>
                    <td class="p-4 uppercase">${d.label}</td><td class="p-4">${d.tMax.toFixed(1)}°C</td><td class="p-4">${d.tMin.toFixed(1)}°C</td>
                    <td class="p-4 text-blue-600">${d.hr.toFixed(0)}%</td><td class="p-4 text-left">${badges}</td></tr>`;
            });

            const avgTMax = sumTMax / data.length;
            const avgHR = sumH / data.length;
            const osc = avgTMax - (sumTMin / data.length);

            // ANÁLISIS GENERAL EXTENSO
            let text = `El sector analizado presenta un perfil térmico con máximas de ${avgTMax.toFixed(1)}°C y una humedad del ${avgHR.toFixed(0)}%. `;
            if(avgHR > 70) {
                text += `La elevada carga higrométrica satura el aire, limitando la refrigeración por evaporación del cuerpo humano. Esto demanda que la arquitectura se comporte como una estructura permeable, priorizando el movimiento constante de aire para desplazar el calor latente. `;
            } else {
                text += `La atmósfera seca permite que la radiación solar sea el factor dominante, favoreciendo el uso de la inercia térmica para estabilizar el confort interior mediante el retraso del flujo de calor. `;
            }
            if(osc > 9) text += `Existe una amplitud térmica de ${osc.toFixed(1)}°C, lo cual es ideal para aplicar enfriamiento estructural nocturno.`;
            else text += `La baja oscilación térmica indica que el calor es persistente, obligando a usar dobles cubiertas y protección solar agresiva.`;
            
            document.getElementById('analysis-text').innerText = text;

            // RECOMENDACIONES TÉCNICAS MATERIALES
            const sl = document.getElementById('strategy-list'); sl.innerHTML = '';
            let recs = [];
            if(avgHR > 70) {
                recs.push({t: "Envolventes de Tejido y Celosía", d: "Uso de materiales permeables como bambú, madera o bloques calados para forzar ventilación laminar."});
                recs.push({t: "Palafitos o Suelo Elevado", d: "Levantar la casa del terreno para permitir flujo de aire inferior y controlar la humedad ascendente."});
            }
            if(avgTMax > 30) {
                recs.push({t: "Protección Solar de Gran Escala", d: "Aleros de más de 1.50m y pérgolas con vegetación de hoja ancha para sombrear fachadas expuestas."});
                recs.push({t: "Cubiertas de Doble Piel", d: "Cámara de aire entre el cielorraso y el techo para ventilar el calor acumulado por radiación zenital."});
            }
            recs.push({t: "Inercia Térmica Selectiva", d: "Uso de muros de BTC (Bloque de Tierra Comprimida) en zonas sociales para retrasar la ganancia térmica."});
            recs.push({t: "Colores de Alto Albedo", d: "Acabados claros o pinturas térmicas reflectivas en cubiertas para reducir la absorción de calor solar."});

            recs.forEach(r => {
                sl.innerHTML += `<div class="bg-slate-800/60 p-4 rounded-xl border border-slate-700 hover:border-blue-500 transition-all">
                    <p class="text-blue-400 font-black text-[10px] uppercase tracking-widest mb-1">${r.t}</p>
                    <p class="text-slate-300 text-xs leading-relaxed">${r.d}</p>
                </div>`;
            });
        }

        async function runClimateAnalysis(){
            let results = [];
            try {
                if(mode === 'mes'){
                    const data = await (await fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${selectedYears[0]}-01-01&end_date=${selectedYears[0]}-12-31&daily=temperature_2m_max,temperature_2m_min,relative_humidity_2m_mean&timezone=auto`)).json();
                    selectedMonths.forEach(m => {
                        const filter = (_,idx) => new Date(data.daily.time[idx]).getMonth() === m;
                        results.push({ label: `${months[m]} ${selectedYears[0]}`, tMax: d3.mean(data.daily.temperature_2m_max.filter(filter)), tMin: d3.mean(data.daily.temperature_2m_min.filter(filter)), hr: d3.mean(data.daily.relative_humidity_2m_mean.filter(filter)) });
                    });
                } else {
                    for(const y of selectedYears){
                        const d = await (await fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${y}-01-01&end_date=${y}-12-31&daily=temperature_2m_max,temperature_2m_min,relative_humidity_2m_mean&timezone=auto`)).json();
                        results.push({ label: `${y}`, tMax: d3.mean(d.daily.temperature_2m_max), tMin: d3.mean(d.daily.temperature_2m_min), hr: d3.mean(d.daily.relative_humidity_2m_mean) });
                    }
                }
                await drawChart(results); updateAnalysis(results);
            } catch(e) { console.error(e); }
        }

        function downloadPDF(){
            const { jsPDF } = window.jspdf;
            html2canvas(document.querySelector("#export-container"), { scale: 2 }).then(canvas => {
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfW = pdf.internal.pageSize.getWidth();
                const pdfH = (canvas.height * pdfW) / canvas.width;
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, pdfW, pdfH);
                pdf.save(`Analisis_Givoni_${lat.toFixed(2)}.pdf`);
            });
        }

        async function updateLocation(){ const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`); const data = await res.json(); document.getElementById('location-text').innerText = `Ubicación: ${data.address.city || data.address.town || 'Guayaquil'}`; }

        renderSelectors(); updateLocation(); runClimateAnalysis();
    </script>
</body>
</html>
