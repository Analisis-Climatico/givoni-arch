<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Climate Engine PRO - Tesis Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
        #map { height: 260px; border-radius: 22px; overflow: hidden; border: 1px solid #dbe2ea; }
        #chart { width: 100%; height: 760px; background: white; border-radius: 24px; overflow: hidden; border: 1px solid #dbe2ea; position: relative; }
        .btn-mode { padding: 10px 22px; border-radius: 12px; border: 1px solid #dbe2ea; font-size: 11px; font-weight: 900; transition: .2s; }
        .active-mode { background: #2563eb; color: white; border-color: #2563eb; }
        .selector-chip { padding: 10px; border-radius: 10px; border: 1px solid #dbe2ea; text-align: center; font-size: 11px; font-weight: 800; cursor: pointer; transition: .2s; background: white; }
        .selected-item { background: #2563eb; color: white; }
        .tooltip-box { position: absolute; pointer-events: none; background: #0f172a; color: white; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 700; opacity: 0; transition: .2s; z-index: 9999; }
        .export-btn { padding: 10px 16px; border-radius: 12px; background: white; border: 1px solid #dbe2ea; font-size: 11px; font-weight: 900; cursor: pointer; transition: .2s; }
        .export-btn:hover { background: #2563eb; color: white; }
        /* Estilos para los badges de zonas en la tabla */
        .zone-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; margin: 2px; font-size: 9px; font-weight: 900; text-transform: uppercase; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <main class="max-w-[1900px] mx-auto space-y-6">
        <header class="bg-white rounded-3xl border shadow-sm p-6 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tight text-slate-800">Givoni Climate Engine</h1>
                <p class="text-xs uppercase tracking-[0.3em] text-slate-400 font-black mt-2">Arquitectura Bioclimática</p>
            </div>
            <div class="flex gap-2">
                <button onclick="setMode('mes')" id="btn-mes" class="btn-mode active-mode">MESES</button>
                <button onclick="setMode('año')" id="btn-año" class="btn-mode">AÑOS</button>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
            <div class="bg-white rounded-3xl border shadow-sm p-6 space-y-6">
                <div>
                    <p id="location-text" class="text-blue-600 font-black text-xs uppercase mb-4">Ubicación: Guayaquil</p>
                    <p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">Seleccionar Año</p>
                    <div id="year-selector" class="grid grid-cols-2 gap-2 max-h-[420px] overflow-y-auto pr-1"></div>
                </div>
                <div id="month-section">
                    <p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">Meses</p>
                    <div id="month-selector" class="grid grid-cols-3 gap-2"></div>
                </div>
                <button onclick="runClimateAnalysis()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black uppercase rounded-2xl py-4 text-xs transition-all">
                    Actualizar Climograma
                </button>
            </div>

            <div class="xl:col-span-3 space-y-6">
                <div class="flex gap-3">
                    <button class="export-btn" onclick="downloadChart('png')">PNG</button>
                    <button class="export-btn" onclick="downloadChart('jpg')">JPG</button>
                    <button class="export-btn" onclick="downloadPDF()">PDF</button>
                </div>
                <div id="chart"><div id="tooltip" class="tooltip-box"></div></div>

                <div class="bg-white rounded-3xl border overflow-hidden shadow-sm">
                    <table class="w-full text-xs">
                        <thead class="bg-slate-50 border-b text-slate-500 uppercase font-black">
                            <tr>
                                <th class="p-4 text-center">Color</th>
                                <th class="p-4 text-center">Mes/Año</th>
                                <th class="p-4 text-center">Temp Máx</th>
                                <th class="p-4 text-center">Temp Mín</th>
                                <th class="p-4 text-center">HR</th>
                                <th class="p-4 text-left">Zonas Detectadas</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="font-bold text-slate-700 text-center"></tbody>
                    </table>
                </div>

                <div class="bg-[#0f172a] rounded-3xl p-10 text-white border-l-[10px] border-blue-500">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <div>
                            <p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">Diagnóstico Bioclimático</p>
                            <p id="analysis-text" class="text-slate-300 leading-relaxed text-lg"></p>
                        </div>
                        <div>
                            <p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">Estrategias Arquitectónicas</p>
                            <div id="strategy-list" class="space-y-4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        let mode = 'mes';
        let selectedYears = [2025];
        let selectedMonths = [0,1,2,3,4];
        let lat = -2.17;
        let lon = -79.92;
        let currentZonesSVG = null;

        // Configuración de colores RGB según tu cuadro de zonas
        const zoneConfig = {
            "Z1": { color: "rgb(254, 204, 102)", name: "Confort" },
            "Z2": { color: "rgb(153, 27, 30)", name: "Confort Permisible" },
            "Z3": { color: "rgb(19, 103, 52)", name: "Ganancias Internas" },
            "Z4": { color: "rgb(19, 155, 72)", name: "Pasivo Solar" },
            "Z5": { color: "rgb(24, 125, 129)", name: "Activo Solar" },
            "Z6": { color: "rgb(209, 156, 199)", name: "Humidificación" },
            "Z7": { color: "rgb(50, 162, 210)", name: "Convencional" },
            "Z8": { color: "rgb(205, 105, 40)", name: "Protección Solar" },
            "Z9": { color: "rgb(242, 113, 114)", name: "Alta Masa Térmica" },
            "Z10": { color: "rgb(147, 39, 143)", name: "Evaporación" },
            "Z11": { color: "rgb(241, 235, 31)", name: "Renovación Nocturna" },
            "Z12": { color: "rgb(46, 173, 141)", name: "Ventilación Natural" },
            "Z13": { color: "rgb(69, 84, 165)", name: "Aire Acondicionado" },
            "Z14": { color: "rgb(159, 119, 197)", name: "Deshumidificación" }
        };

        const map = L.map('map').setView([lat,lon],7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap' }).addTo(map);
        const marker = L.marker([lat,lon]).addTo(map);

        map.on('click', async(e)=>{
            lat = e.latlng.lat; lon = e.latlng.lng;
            marker.setLatLng([lat,lon]);
            await updateLocation();
            runClimateAnalysis();
        });

        function setMode(m){
            mode = m;
            document.querySelectorAll('.btn-mode').forEach(btn=>btn.classList.remove('active-mode'));
            document.getElementById(`btn-${m}`).classList.add('active-mode');
            document.getElementById('month-section').style.display = mode === 'mes' ? 'block' : 'none';
            renderSelectors();
        }

        function renderSelectors(){
            const yearBox = document.getElementById('year-selector');
            yearBox.innerHTML = '';
            const currentYear = new Date().getFullYear();
            for(let y=currentYear;y>=2000;y--){
                const chip = document.createElement('div');
                chip.className = `selector-chip ${selectedYears.includes(y) ? 'selected-item' : ''}`;
                chip.innerText = y;
                chip.onclick = ()=>{
                    if(mode === 'mes') selectedYears = [y];
                    else selectedYears.includes(y) ? selectedYears = selectedYears.filter(v=>v!==y) : selectedYears.push(y);
                    renderSelectors();
                };
                yearBox.appendChild(chip);
            }
            const monthBox = document.getElementById('month-selector');
            monthBox.innerHTML = '';
            months.forEach((m,i)=>{
                const chip = document.createElement('div');
                chip.className = `selector-chip ${selectedMonths.includes(i) ? 'selected-item' : ''}`;
                chip.innerText = m;
                chip.onclick = ()=>{
                    selectedMonths.includes(i) ? selectedMonths = selectedMonths.filter(v=>v!==i) : selectedMonths.push(i);
                    renderSelectors();
                };
                monthBox.appendChild(chip);
            });
        }

        async function updateLocation(){
            try{
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const data = await response.json();
                const city = data.address.city || data.address.town || data.address.state || 'Ubicación';
                document.getElementById('location-text').innerText = `Ubicación: ${city}`;
            }catch(err){}
        }

        async function fetchClimate(year){
            const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${year}-01-01&end_date=${year}-12-31&daily=temperature_2m_max,temperature_2m_min,relative_humidity_2m_mean&timezone=auto`.replace(/\s+/g,'');
            const response = await fetch(url);
            return await response.json();
        }

        async function loadZonesSVG(){
            if(currentZonesSVG) return currentZonesSVG;
            const response = await fetch('pruega-de-svg.svg'); // Asegúrate que el nombre sea correcto
            const text = await response.text();
            currentZonesSVG = text;
            return text;
        }

        // LÓGICA DE DETECCIÓN MULTI-PUNTO CORREGIDA
        function detectZones(tMin, tMax, hr) {
            let detected = [];
            const check = (t, h) => {
                // Mapeo lógico de las zonas según tu SVG (Valores aproximados para calibrar)
                if (t >= 20 && t <= 25 && h >= 20 && h <= 80) detected.push("Z1");
                if (t > 25 && t <= 27 && h >= 20 && h <= 80) detected.push("Z2");
                if (t >= 15 && t < 20 && h >= 20 && h <= 80) detected.push("Z3");
                if (t >= 5 && t < 15 && h >= 20 && h <= 80) detected.push("Z4");
                if (t >= -5 && t < 5 && h >= 20 && h <= 80) detected.push("Z5");
                if (h < 20 && t < 20) detected.push("Z6");
                if (t < -5) detected.push("Z7");
                if (t > 20 && h < 20) detected.push("Z8");
                if (t >= 27 && t <= 35 && h >= 20 && h <= 50) detected.push("Z9");
                if (t > 30 && h < 30) detected.push("Z10");
                if (t >= 35 && t <= 45 && h >= 10 && h <= 40) detected.push("Z11");
                if (t >= 20 && t <= 30 && h >= 60 && h <= 95) detected.push("Z12");
                if (t > 40 || h > 90) detected.push("Z13");
                if (h > 80 && t > 20 && t < 30) detected.push("Z14");
            };

            // Muestreo: revisamos 5 puntos en la línea del mes
            [0, 0.25, 0.5, 0.75, 1].forEach(s => {
                let t = tMin + (tMax - tMin) * s;
                check(t, hr);
            });

            return [...new Set(detected)].sort((a,b) => parseInt(a.slice(1)) - parseInt(b.slice(1)));
        }

        async function drawChart(data){
            d3.select('#chart svg').remove();
            const width = 1600, height = 760;
            const margin = { top:20, right:20, bottom:60, left:20 };
            const innerWidth = width - margin.left - margin.right;
            const innerHeight = height - margin.top - margin.bottom;

            const svg = d3.select('#chart').append('svg')
                .attr('width','100%').attr('height','100%')
                .attr('viewBox',`0 0 ${width} ${height}`);

            const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
            const x = d3.scaleLinear().domain([-5,50]).range([0,innerWidth]);
            const y = d3.scaleLinear().domain([0,35]).range([innerHeight,0]);

            // Grilla de fondo
            for(let i=-5;i<=50;i+=5) g.append('line').attr('x1',x(i)).attr('x2',x(i)).attr('y1',0).attr('y2',innerHeight).attr('stroke','#e2e8f0');
            for(let i=0;i<=35;i+=5) g.append('line').attr('x1',0).attr('x2',innerWidth).attr('y1',y(i)).attr('y2',y(i)).attr('stroke','#f1f5f9');

            const rawSVG = await loadZonesSVG();
            const parser = new DOMParser();
            const svgDoc = parser.parseFromString(rawSVG, "image/svg+xml");
            const importedSVG = document.importNode(svgDoc.documentElement, true);
            importedSVG.setAttribute("width",innerWidth);
            importedSVG.setAttribute("height",innerHeight);
            importedSVG.setAttribute("preserveAspectRatio","none");
            importedSVG.setAttribute("transform","translate(0,65)");
            importedSVG.style.opacity = "0.82";
            importedSVG.style.pointerEvents = "none";
            g.append("g").node().appendChild(importedSVG);

            const tooltip = document.getElementById('tooltip');

            data.forEach((d,i)=>{
                d.color = d3.interpolateRainbow(i/data.length);
                d.zones = detectZones(d.tMin, d.tMax, d.hr);

                const points = [];
                for(let s=0;s<=30;s++){
                    let t = d.tMin + ((d.tMax-d.tMin)*(s/30));
                    let saturation = 0.61078 * Math.exp((17.27*t)/(t+237.3));
                    let vaporPressure = (d.hr/100) * saturation;
                    let humidityRatio = 622 * (vaporPressure / (101.325 - vaporPressure));
                    points.push([x(t), y(humidityRatio)]);
                }

                g.append('path')
                    .attr('d', d3.line().curve(d3.curveBasis)(points))
                    .attr('fill','none').attr('stroke',d.color).attr('stroke-width',5)
                    .on('mousemove',(event)=>{
                        tooltip.style.opacity = 1;
                        tooltip.style.left = (event.pageX-150)+'px';
                        tooltip.style.top = (event.pageY-80)+'px';
                        tooltip.innerHTML = `<div class="space-y-1"><p class="text-blue-400">${d.label}</p><p>Máx: ${d.tMax.toFixed(1)}°C</p><p>HR: ${d.hr.toFixed(0)}%</p></div>`;
                    })
                    .on('mouseleave',()=> tooltip.style.opacity = 0);
            });

            g.append('g').attr('transform', `translate(0,${innerHeight})`).call(d3.axisBottom(x));
        }

        function updateTable(data){
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            data.forEach(d=>{
                const badges = d.zones.map(z => {
                    const cfg = zoneConfig[z] || {color: "#ccc", name: "Desconocida"};
                    const isDark = ["Z2", "Z3", "Z5", "Z10", "Z13"].includes(z);
                    return `<span class="zone-badge" style="background:${cfg.color}; color:${isDark ? 'white' : 'black'}">${z}</span>`;
                }).join(' ');

                tbody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50">
                        <td class="p-4 text-center"><div class="w-4 h-4 rounded-full" style="background:${d.color}"></div></td>
                        <td class="p-4 text-center">${d.label}</td>
                        <td class="p-4 text-center">${d.tMax.toFixed(1)}°C</td>
                        <td class="p-4 text-center">${d.tMin.toFixed(1)}°C</td>
                        <td class="p-4 text-center text-blue-600 font-black">${d.hr.toFixed(0)}%</td>
                        <td class="p-4 text-left">${badges}</td>
                    </tr>`;
            });
        }

        function updateAnalysis(data){
            const avgTemp = data.reduce((a,b)=>a+b.tMax,0)/data.length;
            const avgHR = data.reduce((a,b)=>a+b.hr,0)/data.length;
            const analysis = document.getElementById('analysis-text');
            const strategyList = document.getElementById('strategy-list');
            strategyList.innerHTML = '';
            let diagnosis = '', strategies = [];

            if(avgHR > 75){
                diagnosis = 'Clima cálido húmedo: Necesidad crítica de ventilación cruzada y deshumidificación pasiva.';
                strategies = ['Ventilación cruzada', 'Cubiertas ventiladas', 'Sombreamiento solar'];
            } else if(avgTemp > 30){
                diagnosis = 'Clima cálido seco: Necesidad de protección solar intensa e inercia térmica.';
                strategies = ['Muros térmicos', 'Ventilación nocturna', 'Aleros profundos'];
            } else {
                diagnosis = 'Condiciones templadas: Potencial de confort pasivo natural mediante diseño solar.';
                strategies = ['Captación solar directa', 'Inercia térmica ligera'];
            }

            analysis.innerText = diagnosis;
            strategies.forEach(s=> {
                strategyList.innerHTML += `<div class="bg-slate-900 border border-slate-800 rounded-2xl p-4"><p class="text-sm font-bold text-slate-300">${s}</p></div>`;
            });
        }

        async function runClimateAnalysis(){
            let results = [];
            if(mode === 'mes'){
                const year = selectedYears[0];
                const data = await fetchClimate(year);
                for(let m=0;m<12;m++){
                    if(!selectedMonths.includes(m)) continue;
                    const tMax = data.daily.temperature_2m_max.filter((v,i)=> new Date(data.daily.time[i]).getMonth()===m);
                    const tMin = data.daily.temperature_2m_min.filter((v,i)=> new Date(data.daily.time[i]).getMonth()===m);
                    const hr = data.daily.relative_humidity_2m_mean.filter((v,i)=> new Date(data.daily.time[i]).getMonth()===m);
                    results.push({
                        label:`${months[m]} ${year}`,
                        tMax: d3.mean(tMax), tMin: d3.mean(tMin), hr: d3.mean(hr)
                    });
                }
            } else {
                for(const year of selectedYears){
                    const data = await fetchClimate(year);
                    results.push({
                        label:`${year}`,
                        tMax: d3.mean(data.daily.temperature_2m_max),
                        tMin: d3.mean(data.daily.temperature_2m_min),
                        hr: d3.mean(data.daily.relative_humidity_2m_mean)
                    });
                }
            }
            await drawChart(results);
            updateTable(results);
            updateAnalysis(results);
        }

        function downloadChart(type){
            const svg = document.querySelector('#chart svg');
            const serializer = new XMLSerializer();
            const source = serializer.serializeToString(svg);
            const image = new Image();
            image.src = 'data:image/svg+xml;charset=utf-8,'+ encodeURIComponent(source);
            image.onload = function(){
                const canvas = document.createElement('canvas');
                canvas.width = 1600; canvas.height = 760;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'white'; ctx.fillRect(0,0,1600,760);
                ctx.drawImage(image,0,0);
                const link = document.createElement('a');
                link.download = `climograma.${type}`;
                link.href = canvas.toDataURL(`image/${type}`);
                link.click();
            };
        }

        function downloadPDF(){
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('landscape','px',[1600,760]);
            const svg = document.querySelector('#chart svg');
            const serializer = new XMLSerializer();
            const source = serializer.serializeToString(svg);
            const image = new Image();
            image.src = 'data:image/svg+xml;charset=utf-8,'+ encodeURIComponent(source);
            image.onload = function(){
                const canvas = document.createElement('canvas');
                canvas.width = 1600; canvas.height = 760;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'white'; ctx.fillRect(0,0,1600,760);
                ctx.drawImage(image,0,0);
                const imgData = canvas.toDataURL('image/png');
                pdf.addImage(imgData,'PNG',0,0,1600,760);
                pdf.save('climograma.pdf');
            };
        }

        renderSelectors();
        updateLocation();
        runClimateAnalysis();
    </script>
</body>
</html>
