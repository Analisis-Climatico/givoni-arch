<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Climate Engine PRO - Calibración Quirúrgica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
        #map { height: 260px; border-radius: 22px; overflow: hidden; border: 1px solid #dbe2ea; }
        #chart { width: 100%; height: 760px; background: white; border-radius: 24px; overflow: hidden; border: 1px solid #dbe2ea; position: relative; }
        .btn-mode { padding: 10px 22px; border-radius: 12px; border: 1px solid #dbe2ea; font-size: 11px; font-weight: 900; transition: .2s; }
        .active-mode { background: #2563eb; color: white; border-color: #2563eb; }
        .selector-chip { padding: 10px; border-radius: 10px; border: 1px solid #dbe2ea; text-align: center; font-size: 11px; font-weight: 800; cursor: pointer; transition: .2s; background: white; }
        .selected-item { background: #2563eb; color: white; }
        .tooltip-box { position: absolute; pointer-events: none; background: #0f172a; color: white; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 700; opacity: 0; transition: .2s; z-index: 9999; }
        .zone-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; margin: 2px; font-size: 9px; font-weight: 900; text-transform: uppercase; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">
    <main class="max-w-[1900px] mx-auto space-y-6">
        <header class="bg-white rounded-3xl border shadow-sm p-6 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tight text-slate-800">Givoni Climate Engine</h1>
                <p class="text-xs uppercase tracking-[0.3em] text-slate-400 font-black mt-2">Detección de Zonas en Tiempo Real</p>
            </div>
            <div class="flex gap-2">
                <button onclick="setMode('mes')" id="btn-mes" class="btn-mode active-mode">MESES</button>
                <button onclick="setMode('año')" id="btn-año" class="btn-mode">AÑOS</button>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
            <div class="bg-white rounded-3xl border shadow-sm p-6 space-y-6">
                <div>
                    <p id="location-text" class="text-blue-600 font-black text-xs uppercase mb-4">Ubicación: Guayaquil</p>
                    <div id="year-selector" class="grid grid-cols-2 gap-2 max-h-[300px] overflow-y-auto pr-1"></div>
                </div>
                <div id="month-section">
                    <div id="month-selector" class="grid grid-cols-3 gap-2"></div>
                </div>
                <button onclick="runClimateAnalysis()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black uppercase rounded-2xl py-4 text-xs transition-all">Actualizar Climograma</button>
            </div>

            <div class="xl:col-span-3 space-y-6">
                <div id="chart"><div id="tooltip" class="tooltip-box"></div></div>

                <div class="bg-white rounded-3xl border overflow-hidden shadow-sm">
                    <table class="w-full text-xs">
                        <thead class="bg-slate-50 border-b text-slate-500 uppercase font-black">
                            <tr>
                                <th class="p-4">Color</th>
                                <th class="p-4">Mes/Año</th>
                                <th class="p-4">Temp Máx</th>
                                <th class="p-4">Temp Mín</th>
                                <th class="p-4">HR</th>
                                <th class="p-4 text-left">Zonas Detectadas</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="font-bold text-slate-700 text-center"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        let mode = 'mes', selectedYears = [2025], selectedMonths = [0], lat = -2.17, lon = -79.92;

        const zoneConfig = {
            "Z1": { color: "rgb(254, 204, 102)" }, "Z2": { color: "rgb(153, 27, 30)" }, "Z3": { color: "rgb(19, 103, 52)" },
            "Z4": { color: "rgb(19, 155, 72)" }, "Z5": { color: "rgb(24, 125, 129)" }, "Z6": { color: "rgb(209, 156, 199)" },
            "Z7": { color: "rgb(50, 162, 210)" }, "Z8": { color: "rgb(205, 105, 40)" }, "Z9": { color: "rgb(242, 113, 114)" },
            "Z10": { color: "rgb(147, 39, 143)" }, "Z11": { color: "rgb(241, 235, 31)" }, "Z12": { color: "rgb(46, 173, 141)" },
            "Z13": { color: "rgb(69, 84, 165)" }, "Z14": { color: "rgb(159, 119, 197)" }
        };

        const map = L.map('map').setView([lat,lon],7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const marker = L.marker([lat,lon]).addTo(map);

        map.on('click', async(e)=>{
            lat = e.latlng.lat; lon = e.latlng.lng; marker.setLatLng([lat,lon]);
            updateLocation(); runClimateAnalysis();
        });

        // LÓGICA DE DETECCIÓN CALIBRADA SEGÚN IMAGEN
        function detectZones(tMin, tMax, hr) {
            let detected = [];
            const checkPoint = (t, h) => {
                // Zona 13: Aire Acondicionado (Fuera de los polígonos de confort y estrategias pasivas)
                if (t > 40 || h > 90 || (t > 32 && h > 50) || (t > 38)) detected.push("Z13");
                
                // Zona 12: Ventilación Natural y Mecánica (Inclinada hacia la derecha)
                if (t >= 20 && t <= 32 && h >= 55 && h <= 90) detected.push("Z12");
                
                // Zona 14: Deshumidificación Convencional (Extremo superior izquierdo)
                if (h > 80 && t >= 20 && t <= 28) detected.push("Z14");

                // Zona 2: Confort Permisible (El polígono pequeño inclinado a la derecha de Z1)
                if (t > 24 && t <= 27 && h >= 20 && h <= 75) detected.push("Z2");

                // Zona 1: Confort (El centro)
                if (t >= 20 && t <= 24 && h >= 20 && h <= 80) detected.push("Z1");

                // Zona 9: Alta Masa Térmica (Abajo a la derecha)
                if (t > 27 && t <= 36 && h >= 5 && h <= 50) detected.push("Z9");

                // Zona 3: Ganancias Internas (Verde a la izquierda de Z1)
                if (t >= 15 && t < 20 && h >= 20 && h <= 80) detected.push("Z3");
            };

            // Muestreamos la línea en 10 puntos para no perder ninguna zona que "toque"
            for(let s=0; s<=1; s+=0.1) {
                let t = tMin + (tMax - tMin) * s;
                // Calculamos la HR aproximada en ese punto de la curva
                checkPoint(t, hr);
            }

            return [...new Set(detected)].sort((a,b) => parseInt(a.slice(1)) - parseInt(b.slice(1)));
        }

        // ... (Resto de funciones de fetchClimate, updateLocation, renderSelectors iguales)

        async function drawChart(data){
            d3.select('#chart svg').remove();
            const width = 1600, height = 760;
            const margin = { top:20, right:20, bottom:60, left:20 };
            const innerWidth = width - margin.left - margin.right;
            const innerHeight = height - margin.top - margin.bottom;

            const svg = d3.select('#chart').append('svg').attr('width','100%').attr('height','100%').attr('viewBox',`0 0 ${width} ${height}`);
            const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
            const x = d3.scaleLinear().domain([-5,50]).range([0,innerWidth]);
            const y = d3.scaleLinear().domain([0,35]).range([innerHeight,0]);

            // Carga de SVG de fondo (asegúrate de que el nombre sea correcto)
            const response = await fetch('pruega-de-svg.svg'); 
            const rawSVG = await response.text();
            const parser = new DOMParser();
            const svgDoc = parser.parseFromString(rawSVG, "image/svg+xml");
            const importedSVG = document.importNode(svgDoc.documentElement, true);
            importedSVG.setAttribute("width",innerWidth);
            importedSVG.setAttribute("height",innerHeight);
            importedSVG.setAttribute("preserveAspectRatio","none");
            g.append("g").style("opacity","0.8").node().appendChild(importedSVG);

            data.forEach((d,i)=>{
                d.color = d3.interpolateRainbow(i/data.length);
                d.zones = detectZones(d.tMin, d.tMax, d.hr);

                const points = [];
                for(let s=0;s<=30;s++){
                    let t = d.tMin + ((d.tMax-d.tMin)*(s/30));
                    let saturation = 0.61078 * Math.exp((17.27*t)/(t+237.3));
                    let vaporPressure = (d.hr/100) * saturation;
                    let humidityRatio = 622 * (vaporPressure / (101.325 - vaporPressure));
                    points.push([x(t), y(humidityRatio)]);
                }

                g.append('path').attr('d', d3.line().curve(d3.curveBasis)(points))
                    .attr('fill','none').attr('stroke',d.color).attr('stroke-width',6).attr('stroke-linecap','round');
            });
        }

        function updateTable(data){
            const tbody = document.getElementById('table-body'); tbody.innerHTML = '';
            data.forEach(d=>{
                const badges = d.zones.map(z => `<span class="zone-badge" style="background:${zoneConfig[z]?.color || '#999'}">${z}</span>`).join(' ');
                tbody.innerHTML += `<tr class="border-b hover:bg-slate-50">
                    <td class="p-4"><div class="w-4 h-4 rounded-full mx-auto" style="background:${d.color}"></div></td>
                    <td class="p-4">${d.label}</td><td class="p-4">${d.tMax.toFixed(1)}°C</td><td class="p-4">${d.tMin.toFixed(1)}°C</td>
                    <td class="p-4 text-blue-600 font-black">${d.hr.toFixed(0)}%</td>
                    <td class="p-4 text-left">${badges}</td></tr>`;
            });
        }

        // Funciones auxiliares simplificadas para que el código funcione de una vez
        async function runClimateAnalysis(){
            let results = [];
            const year = selectedYears[0];
            try {
                const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${year}-01-01&end_date=${year}-12-31&daily=temperature_2m_max,temperature_2m_min,relative_humidity_2m_mean&timezone=auto`;
                const res = await fetch(url);
                const data = await res.json();
                selectedMonths.forEach(m => {
                    const tMax = data.daily.temperature_2m_max.filter((_,idx) => new Date(data.daily.time[idx]).getMonth() === m);
                    const tMin = data.daily.temperature_2m_min.filter((_,idx) => new Date(data.daily.time[idx]).getMonth() === m);
                    const hr = data.daily.relative_humidity_2m_mean.filter((_,idx) => new Date(data.daily.time[idx]).getMonth() === m);
                    results.push({
                        label: `${months[m]} ${year}`,
                        tMax: d3.mean(tMax), tMin: d3.mean(tMin), hr: d3.mean(hr)
                    });
                });
                await drawChart(results);
                updateTable(results);
            } catch(e) { console.error(e); }
        }

        function setMode(m){ mode = m; document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active-mode')); document.getElementById(`btn-${m}`).classList.add('active-mode'); renderSelectors(); }
        function renderSelectors(){
            const yb = document.getElementById('year-selector'); yb.innerHTML = '';
            [2025,2024,2023,2022].forEach(y => {
                const c = document.createElement('div'); c.className = `selector-chip ${selectedYears.includes(y)?'selected-item':''}`; c.innerText = y;
                c.onclick = () => { selectedYears = [y]; renderSelectors(); }; yb.appendChild(c);
            });
            const mb = document.getElementById('month-selector'); mb.innerHTML = '';
            months.forEach((m,i) => {
                const c = document.createElement('div'); c.className = `selector-chip ${selectedMonths.includes(i)?'selected-item':''}`; c.innerText = m;
                c.onclick = () => { if(selectedMonths.includes(i)) selectedMonths = selectedMonths.filter(x=>x!==i); else selectedMonths.push(i); renderSelectors(); }; mb.appendChild(c);
            });
        }
        async function updateLocation(){ const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`); const data = await res.json(); document.getElementById('location-text').innerText = `Ubicación: ${data.address.city || data.address.town || 'Desconocida'}`; }

        renderSelectors(); updateLocation(); runClimateAnalysis();
    </script>
</body>
</html>
