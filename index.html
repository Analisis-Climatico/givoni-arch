<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsualizador - Motor SVG</title>
    <style>
        /* Estilos base para simular la interfaz del proyecto */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .panel {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            max-width: 800px;
            justify-content: center;
        }

        .strat-btn {
            background-color: #0f172a;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .strat-btn:hover {
            border-color: #64748b;
            color: #cbd5e1;
        }

        .strat-btn.active {
            background-color: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
            font-weight: bold;
        }

        #svg-canvas {
            width: 800px;
            height: 400px;
            background-color: #0f172a; /* Fondo oscuro para resaltar los trazos */
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 1px solid #334155;
        }

        /* Ajuste para mantener un esquema visual puramente diagramático.
          Descomenta la siguiente línea si prefieres ocultar todos los textos 
          y priorizar un gráfico minimalista sin explicaciones textuales.
        */
        /* text { display: none !important; } */

        /* Animaciones requeridas por el código SVG */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin { animation: spin 2s linear infinite; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="menu" id="menu">
            </div>
        <div id="svg-canvas"></div>
    </div>

    <script>
        // 1. SIMULACIÓN DE DATOS
        // Array con los nombres exactos que utiliza tu lógica condicional
        const strategies = [
            { t: "Ventilación regulable" }, { t: "Cubierta ventilada" }, { t: "Protección solar ligera" },
            { t: "Espacios de transición" }, { t: "Fachada permeable" }, { t: "Ventilación elevada" },
            { t: "Núcleo compacto" }, { t: "Envolvente térmica" }, { t: "Carpintería hermética" },
            { t: "Muro Trombe" }, { t: "Galería solar" }, { t: "Orientación solar estratégica" },
            { t: "Panel solar térmico" }, { t: "Cubierta captadora" }, { t: "Acumulación térmica hidráulica" },
            { t: "Patio húmedo" }, { t: "Fuente evaporativa" }, { t: "Material higroscópico" },
            { t: "Doble envolvente térmica" }, { t: "Acceso amortiguador" }, { t: "Aislamiento continuo" },
            { t: "Parasoles móviles" }, { t: "Fachada de doble piel" }, { t: "Cubierta extendida" },
            { t: "Muro acumulador" }, { t: "Piso de inercia térmica" }, { t: "Protección de masa térmica" },
            { t: "Espejo de agua climático" }, { t: "Nebulización pasiva" }, { t: "Vegetación refrescante" },
            { t: "Purgado nocturno" }, { t: "Lucernario térmico" }, { t: "Chimenea solar invertida" },
            { t: "Cubierta extractora" }, { t: "Ventilación mecánica asistida" }, { t: "Sectorización térmica" },
            { t: "Fachada aislada" }, { t: "Cámara ventilada" }, { t: "Otra estrategia de prueba" }
        ];

        // 2. GENERACIÓN DE LA INTERFAZ
        const menu = document.getElementById('menu');
        strategies.forEach((strat, index) => {
            const btn = document.createElement('button');
            btn.className = 'strat-btn';
            btn.textContent = index + 1;
            btn.title = strat.t;
            btn.onclick = () => window.renderSVGForStrategy(index);
            menu.appendChild(btn);
        });

        // =====================================================================
        // 3. TU MOTOR SVG PARAMÉTRICO (PEGADO EXACTAMENTE COMO LO ENVIASTE)
        // =====================================================================
        window.renderSVGForStrategy = function(index) {
            const strat = strategies[index];
            
            // Control de botones activos en el menú
            document.querySelectorAll('.strat-btn').forEach((btn, idx) => {
                if(idx === index) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            
            const t = strat.t; // Título de la estrategia actual
            let svgContent = `<rect width="100%" height="100%" fill="url(#blueprint-grid)" />`;

            // 1. DEFINICIÓN DE TODOS LOS PATRONES Y MARCADORES (Se cargan una sola vez)
            const defsSVG = `
                <defs>
                    <pattern id="blueprint-grid" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M 40 0 L 0 0 0 40 M 0 40 L 40 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
                        <path d="M 200 0 L 0 0 0 200 M 0 200 L 200 200" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1"/>
                    </pattern>
                    <pattern id="hatch-concrete" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
                        <line x1="0" y1="0" x2="0" y2="10" stroke="#cbd5e1" stroke-width="2" opacity="0.4"/>
                    </pattern>
                    <pattern id="hatch-insulation" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
                        <line x1="0" y1="4" x2="8" y2="4" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
                    </pattern>
                    <pattern id="hatch-mass" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
                        <rect width="10" height="10" fill="#a16207" opacity="0.3"/>
                        <line x1="0" y1="0" x2="0" y2="10" stroke="#713f12" stroke-width="1" opacity="0.4"/>
                        <line x1="0" y1="0" x2="10" y2="0" stroke="#713f12" stroke-width="1" opacity="0.4"/>
                    </pattern>
                    <pattern id="hatch-water" patternUnits="userSpaceOnUse" width="12" height="10">
                        <rect width="12" height="10" fill="#3b82f6" opacity="0.4"/>
                        <path d="M 0 5 Q 3 0 6 5 T 12 5" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
                    </pattern>
                    <pattern id="hygroscopic-dots" patternUnits="userSpaceOnUse" width="12" height="12">
                        <circle cx="3" cy="3" r="1.5" fill="#3b82f6" opacity="0.5"/>
                    </pattern>
                    <pattern id="glass-lines" patternUnits="userSpaceOnUse" width="15" height="15" patternTransform="rotate(45)">
                        <line x1="0" y1="0" x2="0" y2="15" stroke="#38bdf8" stroke-width="2" opacity="0.3"/>
                    </pattern>
                    <pattern id="perforated" width="4" height="4" patternUnits="userSpaceOnUse">
                        <circle cx="2" cy="2" r="1" fill="#cbd5e1" opacity="0.5"/>
                    </pattern>
                    <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4" />
                    </marker>
                    <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
                    </marker>
                    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#fcd34d" />
                    </marker>
                </defs>
            `;

            // 2. ELEMENTOS COMUNES REUTILIZABLES
            const groundLine = `<rect x="50" y="340" width="700" height="40" fill="url(#hatch-concrete)" stroke="#e2e8f0" stroke-width="1.5" class="opacity-80"/><line x1="50" y1="340" x2="750" y2="340" stroke="#e2e8f0" stroke-width="2" class="opacity-50"/>`;
            const scaleFigure = `<g opacity="0.4" transform="translate(450, 245) scale(0.65)"><circle cx="15" cy="10" r="7" fill="#cbd5e1"/><path d="M10,20 L20,20 L20,45 L25,80 L18,80 L15,50 L12,80 L5,80 L10,45 Z" fill="#cbd5e1"/></g>`;
            const sunObj = `<circle cx="100" cy="70" r="25" fill="#f59e0b" class="svg-sun-pulse"/>`;
            const sunContextAxo = `${sunObj}<path d="M 120 90 L 180 150" fill="none" stroke="#fcd34d" stroke-width="3" marker-end="url(#arrow-yellow)" class="svg-ray-bounce"/>`;

            // 3. INICIO DE LÓGICA CONDICIONAL DE DIBUJO (LAS 42 ESTRATEGIAS)
            
            // --- BLOQUE 1 (1 - 10) ---
            if (t === "Ventilación regulable") {
                svgContent += `
                    ${groundLine}
                    <path d="M 200 340 L 200 150 L 400 80 L 600 150 L 600 340" fill="none" stroke="#cbd5e1" stroke-width="2"/>
                    <path d="M 200 150 L 600 150" fill="none" stroke="#cbd5e1" stroke-width="1" opacity="0.5"/>
                    <rect x="195" y="180" width="10" height="100" fill="#38bdf8" opacity="0.3" stroke="#38bdf8"/>
                    <line x1="195" y1="180" x2="160" y2="160" stroke="#38bdf8" stroke-width="2"/>
                    <g transform="translate(400, 80)">
                        <line x1="-30" y1="0" x2="30" y2="0" stroke="#cbd5e1" stroke-width="3"/>
                        <line x1="-20" y1="-5" x2="0" y2="-25" stroke="#cbd5e1" stroke-width="2" opacity="0.8"/>
                    </g>
                    <rect x="595" y="180" width="10" height="100" fill="#cbd5e1" stroke="#cbd5e1"/>
                    <path d="M 100 230 L 190 230" fill="none" stroke="#06b6d4" stroke-width="6" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
                    <path d="M 210 230 C 350 230, 450 180, 400 70" fill="none" stroke="#06b6d4" stroke-width="4" opacity="0.7" marker-end="url(#arrow-blue)" class="svg-wind-flow-delayed"/>
                    <text x="400" y="300" fill="#06b6d4" font-size="12" font-weight="bold" font-family="Inter" text-anchor="middle">Ingreso Aire Fresco / Control de Salida</text>
                `;
            }
            else if (t === "Cubierta ventilada") {
                svgContent += `
                    ${groundLine}
                    <path d="M 250 340 L 250 180 L 550 180 L 550 340" fill="none" stroke="#cbd5e1" stroke-width="2"/>
                    <polygon points="230,180 400,100 570,180" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="1"/>
                    <polygon points="230,160 400,80 570,160" fill="none" stroke="#e2e8f0" stroke-width="3"/>
                    <polygon points="240,170 400,95 560,170" fill="#ea580c" opacity="0.1"/>
                    ${sunObj}
                    <path d="M 220 170 L 300 135" fill="none" stroke="#06b6d4" stroke-width="4" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
                    <path d="M 320 125 L 400 85" fill="none" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow-blue)" class="svg-float-up"/>
                    <path d="M 400 80 L 480 120" fill="none" stroke="#ef4444" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-float-up"/>
                    <text x="400" y="60" fill="#ef4444" font-size="11" font-weight="bold" font-family="Inter" text-anchor="middle">Evacuación Calor Acumulado</text>
                `;
            }
            else if (t === "Protección solar ligera") {
                svgContent += `
                    ${groundLine}
                    <rect x="350" y="100" width="200" height="240" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="2"/>
                    <rect x="390" y="150" width="120" height="100" fill="url(#glass-lines)" stroke="#38bdf8"/>
                    <line x1="310" y1="80" x2="310" y2="340" stroke="#a1a1aa" stroke-width="1" stroke-dasharray="2 2"/>
                    <rect x="305" y="120" width="10" height="60" fill="url(#perforated)"/>
                    <rect x="305" y="200" width="10" height="80" fill="url(#perforated)"/>
                    ${sunObj}
                    <path d="M 130 90 L 305 160" fill="none" stroke="#fcd34d" stroke-width="4" marker-end="url(#arrow-yellow)" class="svg-ray-bounce"/>
                    <path d="M 315 165 L 390 200" fill="none" stroke="#fcd34d" stroke-width="2" opacity="0.5" marker-end="url(#arrow-yellow)" class="svg-ray-bounce" style="animation-delay: 0.5s"/>
                    <path d="M 305 160 L 250 120" fill="none" stroke="#fcd34d" stroke-width="3" opacity="0.7" marker-end="url(#arrow-yellow)" class="svg-ray-bounce"/>
                    <text x="310" y="70" fill="white" font-size="10" font-family="Inter" text-anchor="middle">Piel Ligera Textile</text>
                `;
            }
            else if (t === "Espacios de transición") {
                svgContent += `
                    ${groundLine}
                    <rect x="400" y="120" width="200" height="220" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="2"/>
                    <rect x="250" y="120" width="150" height="220" fill="#e2e8f0" opacity="0.3" stroke="#cbd5e1" stroke-width="1"/>
                    <polygon points="220,120 400,50 630,120" fill="none" stroke="#cbd5e1" stroke-width="2"/>
                    <line x1="250" y1="120" x2="250" y2="340" stroke="#cbd5e1" stroke-width="5"/>
                    ${sunObj}
                    <path d="M 50 180 L 150 180" fill="none" stroke="#06b6d4" stroke-width="6" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
                    <path d="M 120 90 L 250 160" fill="none" stroke="#fcd34d" stroke-width="4" marker-end="url(#arrow-yellow)" class="svg-ray-bounce"/>
                    <path d="M 170 180 C 250 180, 300 200, 390 200" fill="none" stroke="#06b6d4" stroke-width="4" opacity="0.8" marker-end="url(#arrow-blue)" class="svg-wind-flow-delayed"/>
                    <text x="325" y="150" fill="white" font-size="12" font-weight="bold" font-family="Inter" text-anchor="middle">Galería (Amortiguador)</text>
                `;
            }
            else if (t === "Fachada permeable") {
                svgContent += `
                    ${groundLine}
                    <path d="M 300 340 L 300 150 L 600 150 L 600 340 Z" fill="none" stroke="#cbd5e1" stroke-width="1" opacity="0.3"/>
                    <g transform="translate(200, 340) scale(1, -1)">
                        <rect x="0" y="0" width="100" height="190" fill="url(#hatch-concrete)" stroke="#cbd5e1" opacity="0.2"/>
                        <line x1="0" y1="20" x2="100" y2="50" stroke="#cbd5e1" stroke-width="4"/>
                        <line x1="0" y1="60" x2="100" y2="90" stroke="#cbd5e1" stroke-width="4"/>
                        <line x1="0" y1="100" x2="100" y2="130" stroke="#cbd5e1" stroke-width="4"/>
                        <line x1="0" y1="140" x2="100" y2="170" stroke="#cbd5e1" stroke-width="4"/>
                    </g>
                    <g transform="translate(300, 150)">
                        <rect x="0" y="0" width="300" height="190" fill="url(#hatch-concrete)" stroke="#cbd5e1" opacity="0.2"/>
                        <rect x="40" y="20" width="10" height="150" fill="#cbd5e1"/>
                        <rect x="90" y="20" width="10" height="150" fill="#cbd5e1"/>
                        <rect x="140" y="20" width="10" height="150" fill="#cbd5e1"/>
                        <rect x="190" y="20" width="10" height="150" fill="#cbd5e1"/>
                        <rect x="240" y="20" width="10" height="150" fill="#cbd5e1"/>
                    </g>
                    <path d="M 100 250 L 250 280" fill="none" stroke="#06b6d4" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
                    <path d="M 200 200 L 450 200" fill="none" stroke="#06b6d4" stroke-width="7" marker-end="url(#arrow-blue)" class="svg-wind-flow" style="animation-delay: 0.5s"/>
                    <text x="250" y="360" fill="#06b6d4" font-size="10" font-family="Inter" text-anchor="middle">Muro Lateral</text>
                    <text x="450" y="360" fill="#06b6d4" font-size="10" font-family="Inter" text-anchor="middle">Muro Frontal</text>
                `;
            }
            else if (t === "Ventilación elevada") {
                svgContent += `
                    ${groundLine}
                    <path d="M 250 340 L 250 120 L 550 120 L 550 340" fill="none" stroke="#cbd5e1" stroke-width="2"/>
                    <polygon points="220,120 400,50 580,120" fill="none" stroke="#cbd5e1" stroke-width="2"/>
                    <rect x="250" y="140" width="20" height="40" fill="url(#glass-lines)" stroke="#38bdf8"/>
                    <rect x="530" y="140" width="20" height="40" fill="url(#glass-lines)" stroke="#38bdf8"/>
                    <rect x="250" y="180" width="20" height="160" fill="url(#hatch-concrete)" stroke="#cbd5e1"/>
                    <rect x="530" y="180" width="20" height="160" fill="url(#hatch-concrete)" stroke="#cbd5e1"/>
                    <path d="M 350 300 Q 400 200 300 150" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="10 5" class="svg-float-up"/>
                    <path d="M 450 280 Q 400 180 500 150" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="10 5" class="svg-float-up" style="animation-delay: 0.5s"/>
                    <path d="M 280 150 L 200 130" fill="none" stroke="#ef4444" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
                    <path d="M 520 150 L 600 130" fill="none" stroke="#ef4444" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
                    <text x="400" y="100" fill="#ef4444" font-size="12" font-weight="bold" font-family="Inter" text-anchor="middle">Salida Aire Caliente</text>
                `;
            }
            else if (t === "Núcleo compacto") {
                svgContent += `
                    <rect x="100" y="50" width="600" height="300" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5 5"/>
                    <rect x="200" y="100" width="400" height="200" rx="5" fill="#e2e8f0" opacity="0.1" stroke="#cbd5e1" stroke-width="2"/>
                    <rect x="325" y="125" width="150" height="150" rx="3" fill="url(#hatch-concrete)" stroke="#ea580c" stroke-width="2"/>
                    <line x1="325" y1="125" x2="200" y2="100" stroke="#cbd5e1" stroke-width="1" opacity="0.5"/>
                    <line x1="475" y1="125" x2="600" y2="100" stroke="#cbd5e1" stroke-width="1" opacity="0.5"/>
                    <line x1="325" y1="275" x2="200" y2="300" stroke="#cbd5e1" stroke-width="1" opacity="0.5"/>
                    <line x1="475" y1="275" x2="600" y2="300" stroke="#cbd5e1" stroke-width="1" opacity="0.5"/>
                    <circle cx="400" cy="200" r="50" fill="#ea580c" class="opacity-10 svg-heat-radiate"/>
                    <path d="M 475 200 L 550 200" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 5" opacity="0.5" marker-end="url(#arrow-yellow)"/>
                    <text x="400" y="205" fill="#ea580c" font-size="14" font-weight="bold" font-family="Space Grotesk" text-anchor="middle">NÚCLEO</text>
                `;
            }
            else if (t === "Envolvente térmica") {
                svgContent += `
                    ${groundLine}
                    <polygon points="300,100 350,80 550,80 500,100" fill="#d1d5db" stroke="#cbd5e1"/>
                    <rect x="300" y="100" width="200" height="240" fill="#cbd5e1" stroke="#cbd5e1"/>
                    <polygon points="500,100 550,80 550,320 500,340" fill="#a1a1aa" stroke="#cbd5e1"/>
                    <g transform="translate(500, 100)">
                        <rect x="0" y="0" width="10" height="240" fill="#64748b"/>
                        <rect x="10" y="0" width="25" height="240" fill="url(#hatch-concrete)"/>
                        <rect x="35" y="0" width="10" height="240" fill="url(#hatch-insulation)"/>
                        <rect x="45" y="0" width="5" height="240" fill="#94a3b8"/>
                    </g>
                    ${sunObj}
                    <path d="M 600 150 L 555 150" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow-yellow)" class="svg-ray-bounce"/>
                    <path d="M 535 150 L 505 150" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.3" marker-end="url(#arrow-yellow)"/>
                    <text x="400" y="200" fill="white" font-size="12" font-weight="bold" font-family="Inter" text-anchor="middle">Interior</text>
                    <text x="560" y="60" fill="#f59e0b" font-size="10" font-family="Inter" text-anchor="middle">Capa Aislante Continua</text>
                `;
            }
            else if (t === "Carpintería hermética") {
                svgContent += `
                    ${groundLine}
                    <rect x="300" y="80" width="200" height="100" fill="url(#hatch-concrete)" stroke="#cbd5e1"/>
                    <rect x="300" y="240" width="200" height="100" fill="url(#hatch-concrete)" stroke="#cbd5e1"/>
                    <rect x="380" y="180" width="40" height="60" fill="#d1d5db" stroke="#71717a" stroke-width="2"/>
                    <rect x="395" y="185" width="10" height="50" fill="url(#glass-lines)" stroke="#38bdf8"/>
                    <circle cx="380" cy="180" r="4" fill="#ef4444" class="animate-pulse"/>
                    <circle cx="420" cy="180" r="4" fill="#ef4444" class="animate-pulse"/>
                    <circle cx="380" cy="240" r="4" fill="#ef4444" class="animate-pulse"/>
                    <circle cx="420" cy="240" r="4" fill="#ef4444" class="animate-pulse"/>
                    <path d="M 600 210 L 430 210" fill="none" stroke="#06b6d4" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
                    <path d="M 425 210 Q 415 210 420 200 T 425 190" fill="none" stroke="#06b6d4" stroke-width="3" opacity="0.7"/>
                    <text x="400" y="160" fill="white" font-size="10" font-family="Inter" text-anchor="middle">Sello Hermético</text>
                `;
            }
            else if (t === "Muro Trombe") {
                svgContent += `
                    ${groundLine}
                    <rect x="350" y="100" width="20" height="240" fill="url(#hatch-concrete)" stroke="#cbd5e1"/>
                    <rect x="330" y="100" width="20" height="240" fill="#1f2937" stroke="#111827"/>
                    <rect x="300" y="100" width="30" height="240" fill="#ea580c" opacity="0.1"/>
                    <rect x="295" y="80" width="5" height="280" fill="url(#glass-lines)" stroke="#38bdf8" opacity="0.8"/>
                    ${sunObj}
                    <path d="M 130 90 L 315 180" fill="none" stroke="#fcd34d" stroke-width="4" marker-end="url(#arrow-yellow)" class="svg-ray-bounce"/>
                    <rect x="330" y="100" width="20" height="240" fill="#ea580c" class="opacity-10 svg-heat-radiate"/>
                    <path d="M 370 220 L 450 220" fill="none" stroke="#ea580c" stroke-width="4" stroke-dasharray="10 5" marker-end="url(#arrow-yellow)" class="svg-float-up"/>

            else if (t === "Nebulización pasiva") {

                    ${groundLine}

                    <line x1="150" y1="340" x2="150" y2="200" stroke="#cbd5e1" stroke-width="3"/>

                    <g fill="#3b82f6" opacity="0.1" class="animate-pulse" style="animation-delay: 0.5s"><circle cx="280" cy="280" r="45"/></g>
                    ${scaleFigure}
                    <path d="M 50 180 L 130 190" fill="none" stroke="#ef4444" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>

            }
            else if (t === "Vegetación refrescante") {
                svgContent += `
                    ${groundLine}
                    <path d="M 300 340 L 300 180 L 500 180 L 500 340 Z" fill="none" stroke="#cbd5e1" stroke-width="2"/>

                    <path d="M 400 80 L 400 30" fill="none" stroke="#ef4444" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-float-up"/>
                    ${scaleFigure}
                `;
            }
            else if (t === "Sectorización térmica") {
                svgContent += `
                    <rect x="150" y="80" width="500" height="220" rx="5" fill="none" stroke="#cbd5e1" stroke-width="3"/>

            else if (t === "Fachada aislada") {

            else {

            document.getElementById('svg-canvas').innerHTML = `
                <svg viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet" class="w-full h-full drop-shadow-xl absolute inset-0 z-10">

                    ${svgContent}

        };

        // Iniciar el renderizado con el primer elemento
        window.renderSVGForStrategy(0);
    </script>
