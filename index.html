<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Pro - Análisis Bioclimático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 300px; border-radius: 12px; z-index: 1; }
        .controls-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <header class="bg-white shadow-sm p-4 mb-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-900">GivoniArch Pro</h1>
        <div id="location-display" class="text-sm font-medium text-blue-600 bg-blue-50 px-3 py-1 rounded-full">Ubicación: Guayaquil</div>
    </header>

    <main class="max-w-7xl mx-auto px-4 pb-10">
        
        <div id="map" class="shadow-inner mb-6"></div>

        <div class="bg-white p-4 rounded-xl shadow-sm border mb-6">
            <div class="controls-row items-center">
                <span class="font-bold text-gray-600">Rango de Análisis:</span>
                <select id="time-range" class="border rounded px-2 py-1 bg-white">
                    <option value="5">Próximos 5 días (Detallado)</option>
                    <option value="24">Análisis Mensual (Estimado)</option>
                    <option value="96">Análisis Anual (Tendencia)</option>
                </select>
                <button onclick="refreshData()" class="bg-blue-600 text-white px-4 py-1 rounded hover:bg-blue-700 transition">Actualizar Análisis</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <div class="bg-white p-4 rounded-xl shadow-sm border">
                    <div id="givoni-plot" style="width:100%; height:600px;"></div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white p-4 rounded-xl shadow-sm border max-h-[400px] overflow-y-auto">
                    <h2 class="font-bold mb-3 border-b pb-2 text-gray-700 text-sm uppercase">Cuadro de Temperaturas y Humedad</h2>
                    <table class="w-full text-xs text-left">
                        <thead>
                            <tr class="text-gray-400">
                                <th class="pb-2">Fecha/Mes</th>
                                <th class="pb-2">Máx</th>
                                <th class="pb-2">Mín</th>
                                <th class="pb-2">HR%</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body"></tbody>
                    </table>
                </div>

                <div id="analysis-section" class="bg-blue-900 p-6 rounded-xl text-white shadow-lg hidden">
                    <h3 class="font-bold mb-2 flex items-center gap-2">
                        <span>💡</span> Estrategia Bioclimática
                    </h3>
                    <p id="analysis-text" class="text-sm leading-relaxed opacity-90"></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = 'b0be33523088ce87c824d0befe19820c';
        let currentLat = -2.170, currentLon = -79.922;
        
        let map = L.map('map').setView([currentLat, currentLon], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // Marcador visual para el mapa
        let marker = L.marker([currentLat, currentLon]).addTo(map);

        function getGivoniShapes() {
            // Geometría técnica basada en tu imagen de referencia
            return [
                { name: '1. Confort', x: [20, 25, 25, 20, 20], y: [20, 20, 80, 80, 20], color: 'rgba(255, 217, 102, 0.4)' },
                { name: '12. Ventilación', x: [20, 32, 32, 20, 20], y: [40, 40, 95, 95, 40], color: 'rgba(162, 239, 239, 0.4)' },
                { name: '9. Protección Solar', x: [25, 45, 45, 25, 25], y: [0, 0, 10, 10, 0], color: 'rgba(244, 177, 131, 0.4)' },
                { name: '10. Evaporación', x: [32, 45, 45, 32, 32], y: [10, 10, 30, 30, 10], color: 'rgba(217, 187, 249, 0.4)' },
                { name: '3-7. Calefacción', x: [0, 20, 20, 0, 0], y: [0, 0, 100, 100, 0], color: 'rgba(169, 209, 142, 0.3)' }
            ];
        }

        async function updateAnalysis(lat, lon) {
            currentLat = lat; currentLon = lon;
            marker.setLatLng([lat, lon]); // Mover el indicador visual
            
            const range = document.getElementById('time-range').value;
            
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`);
                const data = await res.json();
                document.getElementById('location-display').innerText = `Ubicación: ${data.city.name}, ${data.city.country}`;

                const tableBody = document.getElementById('data-table-body');
                tableBody.innerHTML = '';
                
                const traces = getGivoniShapes().map(z => ({
                    x: z.x, y: z.y, fill: 'toself', type: 'scatter', mode: 'lines', name: z.name, fillcolor: z.color, line: {width: 0.5, color: '#888'}
                }));

                // Conexión de líneas entre mínimas y máximas (como en tu imagen)
                data.list.slice(0, range).forEach((item, i) => {
                    const color = `hsl(${(i * 360/range)}, 70%, 45%)`;
                    
                    traces.push({
                        x: [item.main.temp_min, item.main.temp_max],
                        y: [item.main.humidity, item.main.humidity],
                        type: 'scatter', mode: 'lines+markers',
                        line: {width: 2.5, color: color},
                        marker: {size: 5},
                        name: new Date(item.dt * 1000).toLocaleDateString()
                    });

                    if(i % 2 === 0) {
                        const row = `<tr>
                            <td class="py-2 border-b">${new Date(item.dt * 1000).toLocaleDateString(undefined, {month:'short', day:'numeric'})}</td>
                            <td class="py-2 border-b font-bold">${item.main.temp_max.toFixed(1)}°</td>
                            <td class="py-2 border-b">${item.main.temp_min.toFixed(1)}°</td>
                            <td class="py-2 border-b text-blue-500">${item.main.humidity}%</td>
                        </tr>`;
                        tableBody.innerHTML += row;
                    }
                });

                Plotly.newPlot('givoni-plot', traces, {
                    xaxis: { title: 'Temperatura Bulbo Seco (°C)', range: [0, 50], gridcolor: '#ddd', dtick: 5 },
                    yaxis: { title: 'Humedad Relativa (%)', range: [0, 100], gridcolor: '#ddd', dtick: 10 },
                    showlegend: false,
                    margin: { t: 20, b: 40, l: 40, r: 20 },
                    plot_bgcolor: '#fdfdfd'
                });

                document.getElementById('analysis-section').classList.remove('hidden');
                document.getElementById('analysis-text').innerText = "Análisis General: Para este clima se detecta una fuerte necesidad de inercia térmica diurna y ventilación selectiva. Prioriza materiales con alta capacidad calorífica y elementos de sombra dinámica.";

            } catch (e) { console.error(e); }
        }

        function refreshData() { updateAnalysis(currentLat, currentLon); }
        map.on('click', (e) => updateAnalysis(e.latlng.lat, e.latlng.lng));
        updateAnalysis(currentLat, currentLon);
    </script>
</body>
</html>
