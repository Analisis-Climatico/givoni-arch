<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Global - Análisis Bioclimático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <!-- Librería para el Mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 350px; border-radius: 12px; margin-bottom: 2rem; z-index: 1; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <header class="bg-white shadow-sm p-6 mb-6">
        <h1 class="text-3xl font-bold text-gray-900">Givoni Global Arch</h1>
        <p class="text-gray-500 italic">Haz clic en el mapa para analizar el clima de cualquier ciudad del mundo.</p>
    </header>

    <main class="max-w-7xl mx-auto px-4 pb-20">
        
        <!-- MAPA INTERACTIVO -->
        <div id="map" class="shadow-md"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- COLUMNA IZQUIERDA: GRÁFICO (Ocupa 2 espacios) -->
            <div class="lg:col-span-2 space-y-6">
                <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <h2 class="text-xl font-bold mb-4 text-gray-700">Climograma de Givoni (14 Zonas)</h2>
                    <div id="givoni-plot" style="width:100%; height:650px;"></div>
                </section>

                <section id="analysis-section" class="hidden space-y-4">
                    <div class="bg-white p-6 rounded-xl border-l-4 border-blue-500 shadow-sm">
                        <h3 class="text-lg font-bold text-blue-900 mb-2">Estrategia Maestra</h3>
                        <p id="analysis-text" class="text-gray-700 leading-relaxed"></p>
                    </div>
                    <!-- Contenedor para el Diagrama con colores suaves -->
                    <div class="bg-white p-8 rounded-xl shadow-sm border flex items-center justify-center min-h-[300px]">
                         <p class="text-gray-400 italic text-center">Visualización de Estrategia Arquitectónica<br>(Colores suaves y técnicos)</p>
                    </div>
                </section>
            </div>

            <!-- COLUMNA DERECHA: TABLA (Ocupa 1 espacio) -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-fit">
                <h2 class="text-xl font-bold mb-4 text-gray-700">Tabla Fundamental</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50">
                                <th class="p-2 border-b">Mes</th>
                                <th class="p-2 border-b">T. Máx</th>
                                <th class="p-2 border-b">T. Mín</th>
                                <th class="p-2 border-b">HR%</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    // Reemplaza el bloque <script> actual por este:

<script>
const apiKey = 'b0be33523088ce87c824d0befe19820c';
let map = L.map('map').setView([-2.170, -79.922], 12); 

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Definición de las 14 Zonas de tu referencia
function getGivoniShapes() {
    return [
        { name: '1. Confort', x: [20, 25, 25, 20, 20], y: [20, 20, 80, 80, 20], color: 'rgba(255, 200, 0, 0.3)' },
        { name: '2. Confort Permisible', x: [20, 27, 27, 20, 20], y: [12, 12, 90, 90, 12], color: 'rgba(255, 100, 0, 0.2)' },
        { name: '8. Protección Solar', x: [20, 45, 45, 27, 20], y: [0, 0, 10, 15, 12], color: 'rgba(255, 165, 0, 0.15)' },
        { name: '12. Ventilación Natural', x: [20, 31, 31, 20, 20], y: [40, 40, 95, 95, 40], color: 'rgba(0, 200, 200, 0.2)' },
        { name: '10. Enfriamiento Evaporativo', x: [31, 45, 45, 31, 31], y: [10, 10, 30, 30, 10], color: 'rgba(200, 0, 200, 0.2)' },
        { name: '11. Masa Térmica / Renov. Nocturna', x: [31, 42, 42, 31, 31], y: [0, 0, 15, 15, 0], color: 'rgba(255, 255, 0, 0.2)' },
        { name: '13. Aire Acondicionado', x: [40, 50, 50, 40, 40], y: [0, 0, 100, 100, 0], color: 'rgba(100, 149, 237, 0.15)' },
        // ... (Zonas de calefacción a la izquierda)
        { name: '3-7. Calefacción', x: [-5, 20, 20, -5, -5], y: [0, 0, 100, 100, 0], color: 'rgba(0, 150, 0, 0.1)' }
    ];
}

async function updateAnalysis(lat, lon) {
    try {
        const response = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`);
        const data = await response.json();
        
        const tableBody = document.getElementById('data-table-body');
        tableBody.innerHTML = '';
        const traces = getGivoniShapes().map(z => ({
            x: z.x, y: z.y, fill: 'toself', type: 'scatter', mode: 'lines', name: z.name, fillcolor: z.color, line: {width: 0.5, color: '#999'}
        }));

        let totalHum = 0;
        let totalTemp = 0;

        data.list.forEach((item, i) => {
            totalHum += item.main.humidity;
            totalTemp += item.main.temp;
            
            // Solo graficamos puntos clave para no saturar
            if(i % 4 === 0) {
                traces.push({
                    x: [item.main.temp_min, item.main.temp_max],
                    y: [item.main.humidity, item.main.humidity],
                    type: 'scatter', mode: 'lines+markers',
                    line: {width: 2, color: `hsl(${i * 20}, 70%, 50%)`},
                    marker: {size: 6},
                    name: new Date(item.dt * 1000).toLocaleDateString()
                });

                const row = `<tr>
                    <td class="p-2 border-b text-xs">${new Date(item.dt * 1000).toLocaleDateString(undefined, {month:'short', day:'numeric'})}</td>
                    <td class="p-2 border-b font-bold">${item.main.temp_max}°</td>
                    <td class="p-2 border-b">${item.main.temp_min}°</td>
                    <td class="p-2 border-b text-blue-600">${item.main.humidity}%</td>
                </tr>`;
                tableBody.innerHTML += row;
            }
        });

        // Lógica de Análisis General
        const avgHum = totalHum / data.list.length;
        const avgTemp = totalTemp / data.list.length;
        let recomendacion = "";

        if (avgHum > 70) {
            recomendacion = "El análisis multianual muestra una saturación de humedad constante. Se requiere ventilación cruzada forzada y materiales que no retengan vapor.";
        } else if (avgTemp > 30) {
            recomendacion = "Tendencia de alta radiación solar. Se recomienda el uso de inercia térmica pesada y protección solar exterior tipo brise-soleil.";
        } else {
            recomendacion = "El clima se mantiene en zonas de confort relativo. Estrategias pasivas básicas son suficientes.";
        }

        Plotly.newPlot('givoni-plot', traces, {
            xaxis: { title: 'Temperatura (°C)', range: [0, 50], gridcolor: '#eee', dtick: 5 },
            yaxis: { title: 'Humedad (%)', range: [0, 100], gridcolor: '#eee', dtick: 10 },
            showlegend: false,
            margin: { t: 10, b: 40, l: 40, r: 10 }
        });

        document.getElementById('analysis-section').classList.remove('hidden');
        document.getElementById('analysis-text').innerText = recomendacion;

    } catch (e) { console.error(e); }
}

map.on('click', (e) => updateAnalysis(e.latlng.lat, e.latlng.lng));
updateAnalysis(-2.170, -79.922);
</script>
</body>
</html>
