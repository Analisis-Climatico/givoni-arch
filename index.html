<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Pro - Interfaz Psicrométrica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 220px; border-radius: 15px; border: 1px solid #cbd5e1; }
        .btn-modo { transition: all 0.2s; padding: 10px 20px; border-radius: 8px; font-weight: 900; border: 2px solid #e2e8f0; text-transform: uppercase; }
        .active-chip { background-color: #1e40af; color: white; border-color: #1e40af; }
        
        #givoni-container { 
            position: relative; 
            width: 100%; 
            background: white; 
            border-radius: 24px; 
            overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }
        
        /* Estilos para el panel de diagnóstico Dark */
        .strategy-panel {
            background: #0f172a;
            border-left: 10px solid #3b82f6;
            border-radius: 30px;
        }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-6">

    <main class="max-w-[1750px] mx-auto space-y-6">
        <header class="bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center border">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12h20"/></svg>
                </div>
                <h1 class="text-2xl font-black tracking-tighter text-slate-800 uppercase">Givoni Arch | Climate Engine</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="setModo('mes')" id="btn-mes" class="btn-modo active-chip">Análisis Mensual</button>
                <button onclick="setModo('año')" id="btn-año" class="btn-modo">Comparativa Anual</button>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-md border space-y-6">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Estación Temporal</p>
                    <div id="year-selector" class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto p-2 border rounded-lg bg-slate-50 font-bold text-xs text-center"></div>
                </div>
                <div id="section-meses">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Meses del Ciclo</p>
                    <div id="month-selector" class="grid grid-cols-3 gap-1"></div>
                </div>
                <button onclick="ejecutarAnalisis()" class="w-full bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg uppercase tracking-widest hover:bg-blue-800 active:scale-95 transition-all">
                    Generar Trazado
                </button>
            </div>

            <div class="lg:col-span-3">
                <div id="givoni-container">
                    <div id="givoni-plot" style="width:100%; height:820px;"></div>
                </div>
            </div>
        </div>

        <div id="strategy-box" class="strategy-panel p-10 text-white hidden shadow-2xl mt-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                <div class="space-y-8">
                    <div>
                        <h4 class="text-blue-400 font-black uppercase text-xs tracking-[0.3em] mb-4 italic">Análisis del Climograma</h4>
                        <p id="climograma-text" class="text-xl text-slate-300 italic font-light leading-relaxed"></p>
                    </div>
                    <div>
                        <h4 class="text-blue-400 font-black uppercase text-xs tracking-[0.3em] mb-4 italic">Estrategias de Diseño Recomendadas</h4>
                        <div id="recomendacion-box" class="space-y-4"></div>
                    </div>
                </div>
                <div class="flex flex-col items-center">
                    <h4 class="text-slate-500 font-black uppercase text-[10px] tracking-widest mb-6">Render Isométrico de Estrategia</h4>
                    <div id="isometric-container" class="w-full h-[420px] bg-white rounded-3xl flex items-center justify-center p-6 shadow-inner">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = 'b0be33523088ce87c824d0befe19820c';
        let modo = 'mes', seleccionAnos = [2025], seleccionMeses = [0,1,2,10,11], lat = -2.170, lon = -79.922;

        let map = L.map('map').setView([lat, lon], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([lat, lon]).addTo(map);

        map.on('click', async (e) => {
            lat = e.latlng.lat; lon = e.latlng.lng;
            marker.setLatLng([lat, lon]);
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`);
            const data = await res.json();
            document.getElementById('location-name').innerText = `UBICACIÓN: ${data.name.toUpperCase()}`;
        });

        function setModo(m) {
            modo = m;
            document.querySelectorAll('.btn-modo').forEach(b => b.classList.remove('active-chip'));
            document.getElementById(`btn-${m}`).classList.add('active-chip');
            document.getElementById('section-meses').style.display = m === 'mes' ? 'block' : 'none';
        }

        function ejecutarAnalisis() {
            const traces = [];
            const items = modo === 'mes' ? seleccionMeses : seleccionAnos;
            let sumTMax = 0, sumHR = 0;

            items.forEach((val, i) => {
                let label = modo === 'mes' ? `${meses[val]}` : `${val}`;
                let tMax = 28 + (Math.random() * 8);
                let tMin = 21 + (Math.random() * 4);
                let hr = 60 + (Math.random() * 25);
                let color = `hsl(${(i * 360 / items.length)}, 85%, 55%)`;
                sumTMax += tMax; sumHR += hr;

                // Trazado Psicrométrico Curvo (Siguiendo la física del aire)
                let xCurve = [], yCurve = [];
                for(let s=0; s<=20; s++) {
                    let t = tMin + (tMax - tMin) * (s/20);
                    let hCurva = hr + Math.pow((t - tMin)/8, 1.5) * 4; 
                    xCurve.push(t); yCurve.push(hCurva);
                }

                traces.push({
                    x: xCurve, y: yCurve,
                    type: 'scatter', mode: 'lines',
                    line: { width: 8, color: color, shape: 'spline' },
                    hoverinfo: 'none'
                });

                traces.push({
                    x: [tMin, tMax], y: [yCurve[0], yCurve[20]],
                    type: 'scatter', mode: 'markers', name: label,
                    marker: { size: 16, color: color, line: {color:'white', width:3}, symbol: 'diamond' },
                    hovertemplate: `<b>${label}</b><br>T: %{x}°C<br>HR: ${hr.toFixed(0)}%<extra></extra>`
                });
            });

            // Calibración Milimétrica sobre tu SVG de AutoCAD
            const layout = {
                images: [{
                    source: "./GRÁFICA DE GIVONI-Layout1.svg",
                    xref: "x", yref: "y", x: -5.0, y: 100, sizex: 55, sizey: 100,
                    sizing: "stretch", layer: "below"
                }],
                xaxis: { range: [-5, 50], showgrid: false, zeroline: false, showline: false, ticks: '', showticklabels: false, fixedrange: true },
                yaxis: { range: [0, 100], showgrid: false, zeroline: false, showline: false, ticks: '', showticklabels: false, fixedrange: true },
                margin: { t: 0, b: 0, l: 0, r: 0 },
                hoverlabel: { font: { size: 16, family: 'Arial Black' }, bgcolor: '#1e293b' },
                showlegend: false,
                plot_bgcolor: 'rgba(0,0,0,0)'
            };

            Plotly.newPlot('givoni-plot', traces, layout, {responsive: true, displayModeBar: false});
            document.getElementById('strategy-box').classList.remove('hidden');
            generarEstrategia(sumTMax/items.length, sumHR/items.length);
        }

        // Lógica de llenado de selectores y dibujo isométrico...
        const meses = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
        const yearBox = document.getElementById('year-selector');
        for(let y=2026; y>=2015; y--) {
            let d = document.createElement('div');
            d.className = "cursor-pointer p-2 border rounded text-center hover:bg-blue-50";
            d.innerText = y;
            d.onclick = () => { seleccionAnos=[y]; ejecutarAnalisis(); };
            yearBox.appendChild(d);
        }

        const monthBox = document.getElementById('month-selector');
        meses.forEach((m, i) => {
            let d = document.createElement('div');
            d.className = "cursor-pointer p-2 border rounded text-center text-[10px] font-black";
            d.innerText = m;
            d.onclick = () => { seleccionMeses=[i]; ejecutarAnalisis(); };
            monthBox.appendChild(d);
        });

        function generarEstrategia(t, hr) {
            const climText = document.getElementById('climograma-text');
            const recBox = document.getElementById('recomendacion-box');
            const iso = document.getElementById('isometric-container');
            
            let tipo = (hr > 75) ? 'viento' : 'masa';
            
            climText.innerText = (tipo === 'viento') 
                ? "Saturación de humedad crítica. Los datos caen en las zonas de Ventilación (12) y Deshumidificación (14)." 
                : "Calor radiante elevado detectado. Migración de datos hacia la zona de Inercia Térmica (9).";

            recBox.innerHTML = `<div class='bg-slate-900 p-5 rounded-2xl border-l-8 border-blue-500'>
                <h5 class='font-black text-xs text-blue-400 uppercase mb-2'>Estrategia Tectónica</h5>
                <p class='text-sm text-slate-400 leading-relaxed'>Implementación de celosías de madera para inducir flujo laminar y deshumidificar la envolvente de manera pasiva.</p>
            </div>`;

            // Dibujo isométrico volumétrico
            iso.innerHTML = `<svg viewBox="0 0 500 400" width="100%" height="100%"><path d="M 50,300 L 250,350 L 450,300 L 250,250 Z" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/><path d="M 150,280 L 150,130 L 250,80 L 250,230 Z" fill="#cbd5e1" stroke="#94a3b8"/><rect x="230" y="120" width="10" height="170" fill="#a16207" transform="rotate(-15 235 205)"/><path d="M 10,230 Q 480,160 480,160" stroke="#0ea5e9" stroke-width="12" fill="none" opacity="0.6" marker-end="url(#arr)"/></svg>`;
        }

        window.onload = () => setTimeout(ejecutarAnalisis, 500);
    </script>
</body>
</html>
