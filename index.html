<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Global Arch - Calibración Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 250px; border-radius: 15px; border: 2px solid #e2e8f0; }
        .btn-modo { transition: all 0.3s; padding: 10px 20px; border-radius: 8px; font-weight: 800; }
        .active-chip { background-color: #1e40af !important; color: white !important; }
        #givoni-plot { border-radius: 20px; background: white; }
    </style>
</head>
<body class="bg-slate-100 p-4">

    <main class="max-w-[1600px] mx-auto space-y-6">
        <header class="bg-white p-6 rounded-2xl shadow-sm flex justify-between items-center border">
            <div>
                <h1 class="text-2xl font-black uppercase tracking-tighter">Givoni Global Arch</h1>
                <p id="location-name" class="text-blue-600 font-bold italic">UBICACIÓN: Selecciona en el mapa</p>
            </div>
            <div class="flex gap-2">
                <button onclick="setModo('mes')" id="btn-mes" class="btn-modo bg-white border active-chip">MESES</button>
                <button onclick="setModo('año')" id="btn-año" class="btn-modo bg-white border">AÑOS</button>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border space-y-6">
                <div id="year-selector" class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto p-2 border rounded-lg bg-slate-50 text-sm font-bold"></div>
                <div id="section-meses">
                    <p class="text-xs font-black uppercase text-slate-400 mb-2">Meses Seleccionados</p>
                    <div id="month-selector" class="grid grid-cols-3 gap-1"></div>
                </div>
                <button onclick="ejecutarAnalisis()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl hover:bg-blue-800 transition-all uppercase tracking-widest shadow-lg">
                    Actualizar Gráfico
                </button>
            </div>

            <div class="lg:col-span-3 space-y-6">
                <div class="bg-white p-4 rounded-3xl shadow-xl border">
                    <div id="givoni-plot" style="width:100%; height:750px;"></div>
                </div>

                <div id="strategy-box" class="bg-slate-900 p-8 rounded-3xl text-white hidden border-b-8 border-blue-500">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <h4 class="text-blue-400 font-black uppercase text-xs tracking-widest mb-4">Análisis Técnico</h4>
                            <p id="climograma-text" class="text-slate-300 italic mb-6"></p>
                            <div id="recomendacion-box" class="space-y-4"></div>
                        </div>
                        <div id="architectural-diagram-container" class="bg-white rounded-xl h-[350px]"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = 'b0be33523088ce87c824d0befe19820c';
        let modo = 'mes', seleccionAnos = [2025], seleccionMeses = [0,1,2,10,11], lat = -2.170, lon = -79.922;

        let map = L.map('map').setView([lat, lon], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([lat, lon]).addTo(map);

        map.on('click', async (e) => {
            lat = e.latlng.lat; lon = e.latlng.lng;
            marker.setLatLng([lat, lon]);
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`);
            const data = await res.json();
            document.getElementById('location-name').innerText = `UBICACIÓN: ${data.name.toUpperCase()}`;
        });

        function setModo(m) {
            modo = m;
            document.querySelectorAll('.btn-modo').forEach(b => b.classList.remove('active-chip'));
            document.getElementById(`btn-${m}`).classList.add('active-chip');
        }

        const yearBox = document.getElementById('year-selector');
        for(let y = 2026; y >= 2010; y--) {
            const chip = document.createElement('div');
            chip.className = `cursor-pointer p-2 rounded border text-center ${seleccionAnos.includes(y) ? 'bg-blue-600 text-white' : 'bg-white text-slate-400'}`;
            chip.innerText = y;
            chip.onclick = () => { seleccionAnos = [y]; Array.from(yearBox.children).forEach(c => {c.classList.remove('bg-blue-600','text-white'); c.classList.add('bg-white','text-slate-400')}); chip.classList.add('bg-blue-600','text-white'); };
            yearBox.appendChild(chip);
        }

        const meses = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
        const monthBox = document.getElementById('month-selector');
        meses.forEach((m, i) => {
            const chip = document.createElement('div');
            chip.className = `cursor-pointer p-2 border rounded text-center text-xs font-bold ${seleccionMeses.includes(i) ? 'bg-blue-600 text-white' : 'bg-white text-slate-400'}`;
            chip.innerText = m;
            chip.onclick = () => { chip.classList.toggle('bg-blue-600'); chip.classList.toggle('text-white'); if(seleccionMeses.includes(i)) seleccionMeses = seleccionMeses.filter(idx => idx !== i); else seleccionMeses.push(i); };
            monthBox.appendChild(chip);
        });

        function ejecutarAnalisis() {
            const traces = [];
            const items = modo === 'mes' ? seleccionMeses : seleccionAnos;
            let sumTMax = 0, sumHR = 0;

            items.forEach((val, i) => {
                let label = modo === 'mes' ? `${meses[val]}` : `${val}`;
                let tMax = 25 + (Math.random() * 10);
                let tMin = 15 + (Math.random() * 8);
                let hr = 50 + (Math.random() * 30);
                let color = `hsl(${(i * 360 / items.length)}, 80%, 50%)`;
                sumTMax += tMax; sumHR += hr;

                traces.push({
                    x: [tMin, tMax], 
                    y: [hr - 2, hr + 2],
                    type: 'scatter', mode: 'lines+markers', name: label,
                    hovertemplate: `<b>${label}</b><br>T: %{x}°C<br>HR: %{y}%<extra></extra>`,
                    line: { width: 8, color: color },
                    marker: { size: 12, line: {color:'white', width:2} }
                });
            });

            // L INVERTIDA VERDE CALIBRADA
            traces.push({
                x: [21.5, 45, 45], y: [100, 100, 0],
                type: 'scatter', mode: 'lines',
                line: { color: '#00aa00', width: 3 }, hoverinfo: 'none', showlegend: false
            });

            const layout = {
                images: [{
                    source: "./OFICIAL-GRÁFICA DE GIVONI (1)-Layout1.jpg",
                    xref: "x", yref: "y",
                    x: -6.0, // Alineación exacta con el -5 de tu imagen
                    y: 101.5, // Alineación exacta con el 100%
                    sizex: 52.8, // Estiramiento horizontal para que calce el 45
                    sizey: 103, // Estiramiento vertical
                    sizing: "stretch", layer: "below"
                }],
                xaxis: { 
                    range: [-6, 46], showgrid: false, zeroline: false, showline: false, ticks: '', showticklabels: false 
                },
                yaxis: { 
                    range: [0, 105], showgrid: false, zeroline: false, showline: false, ticks: '', showticklabels: false 
                },
                margin: { t: 0, b: 0, l: 0, r: 0 }, // Cero márgenes para que la imagen ocupe todo el div
                hoverlabel: { font: { size: 16, family: 'Arial Black' } },
                showlegend: false,
                plot_bgcolor: 'rgba(0,0,0,0)'
            };

            Plotly.newPlot('givoni-plot', traces, layout, {responsive: true});
            document.getElementById('strategy-box').classList.remove('hidden');
            // (La lógica de diagnóstico e isométrico se mantiene igual...)
        }

        window.onload = ejecutarAnalisis;
    </script>
</body>
</html>
