<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Global Arch Pro - Generador Tectónico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 280px; border-radius: 15px; z-index: 1; border: 2px solid #e5e7eb; }
        .btn-modo { transition: all 0.3s; font-size: 1.1rem; padding: 12px 24px; border-radius: 10px; font-weight: 800; }
        .active-chip { background-color: #1e40af !important; color: white !important; }
        .config-label { font-size: 1.1rem; font-weight: 900; color: #1e293b; text-transform: uppercase; }
        .strategy-text { font-size: 1.2rem; line-height: 1.7; }
        #architectural-diagram-container {
            width: 100%;
            height: 550px;
            background-color: #ffffff;
            border-radius: 20px;
            border: 2px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 text-slate-800">

    <main class="max-w-[1700px] mx-auto">
        <header class="flex justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-lg border">
            <div>
                <h1 class="text-3xl font-black tracking-tighter uppercase">Givoni Global Arch</h1>
                <p id="location-name" class="text-blue-600 font-black text-xl mt-1 italic">UBICACIÓN: Selecciona un punto</p>
            </div>
            <div class="flex gap-4">
                <button onclick="setModo('mes')" id="btn-mes" class="btn-modo bg-slate-100 active-chip">Análisis Meses</button>
                <button onclick="setModo('año')" id="btn-año" class="btn-modo bg-slate-100">Análisis Años</button>
            </div>
        </header>

        <div id="map" class="mb-6 shadow-md"></div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-8 rounded-2xl shadow-md border-2 border-blue-500">
                    <h2 class="config-label mb-4 border-b-2 border-blue-500 pb-2">Configuración</h2>
                    <div id="year-selector" class="grid grid-cols-2 gap-3 max-h-64 overflow-y-auto p-2 mb-6 border rounded-xl bg-gray-50 font-black"></div>
                    <div id="section-meses" class="mb-6">
                        <h2 class="config-label mb-4">Meses</h2>
                        <div id="month-selector" class="grid grid-cols-3 gap-2 font-black text-sm"></div>
                    </div>
                    <button onclick="ejecutarAnalisis()" class="w-full bg-blue-700 text-white font-black py-6 rounded-2xl hover:bg-blue-800 shadow-xl text-xl uppercase tracking-tighter transition-all">
                        Trazar Análisis
                    </button>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-8">
                <div class="bg-white p-2 rounded-3xl shadow-2xl border">
                    <div id="givoni-plot" style="width:100%; height:850px;"></div>
                </div>

                <div id="strategy-box" class="bg-slate-950 p-10 rounded-3xl text-white shadow-2xl hidden">
                    <h3 class="text-blue-400 font-black text-xl mb-8 uppercase tracking-widest border-b border-slate-800 pb-4 italic">Diagnóstico y Estrategia Arquitectónica</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                        <div class="space-y-8">
                            <div>
                                <h4 class="text-xs font-black text-slate-500 uppercase mb-3">Análisis del Climograma:</h4>
                                <p id="climograma-text" class="strategy-text text-slate-300 italic font-light"></p>
                            </div>
                            <div>
                                <h4 class="text-xs font-black text-slate-500 uppercase mb-3 text-blue-300">Propuesta Técnica:</h4>
                                <div id="recomendacion-box" class="strategy-text text-white space-y-4"></div>
                            </div>
                        </div>
                        <div class="space-y-4 flex flex-col items-center">
                            <h4 class="text-xs font-black text-slate-500 uppercase mb-3 text-center tracking-widest">Sección Isométrica Técnica</h4>
                            <div id="architectural-diagram-container"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = 'b0be33523088ce87c824d0befe19820c';
        let modo = 'mes', seleccionAnos = [2025], seleccionMeses = [0,1,2,10,11], lat = -2.170, lon = -79.922;

        let map = L.map('map').setView([lat, lon], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([lat, lon]).addTo(map);

        map.on('click', async (e) => {
            lat = e.latlng.lat; lon = e.latlng.lng;
            marker.setLatLng([lat, lon]);
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`);
                const data = await res.json();
                document.getElementById('location-name').innerText = `UBICACIÓN: ${data.name.toUpperCase()}, ${data.sys.country}`;
            } catch(e) {}
        });

        function setModo(m) {
            modo = m;
            document.querySelectorAll('.btn-modo').forEach(b => b.classList.remove('active-chip'));
            document.getElementById(`btn-${m}`).classList.add('active-chip');
            document.getElementById('section-meses').style.display = m === 'mes' ? 'block' : 'none';
        }

        const yearBox = document.getElementById('year-selector');
        for(let y = 2026; y >= 2000; y--) {
            const chip = document.createElement('div');
            chip.className = `cursor-pointer p-4 rounded-xl text-center font-black text-lg ${seleccionAnos.includes(y) ? 'bg-blue-600 text-white shadow-lg' : 'bg-white border-2 text-slate-400'}`;
            chip.innerText = y;
            chip.onclick = () => {
                if(modo === 'mes') { seleccionAnos = [y]; Array.from(yearBox.children).forEach(c => {c.classList.remove('bg-blue-600','text-white'); c.classList.add('bg-white','text-slate-400')}); chip.classList.add('bg-blue-600','text-white'); }
                else { chip.classList.toggle('bg-blue-600'); chip.classList.toggle('text-white'); if(seleccionAnos.includes(y)) seleccionAnos = seleccionAnos.filter(a => a !== y); else seleccionAnos.push(y); }
            };
            yearBox.appendChild(chip);
        }

        const meses = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
        const monthBox = document.getElementById('month-selector');
        meses.forEach((m, i) => {
            const chip = document.createElement('div');
            chip.className = `cursor-pointer p-3 border-2 rounded-xl text-center font-black ${seleccionMeses.includes(i) ? 'bg-blue-600 text-white' : 'bg-white text-slate-400'}`;
            chip.innerText = m;
            chip.onclick = () => { chip.classList.toggle('bg-blue-600'); chip.classList.toggle('text-white'); if(seleccionMeses.includes(i)) seleccionMeses = seleccionMeses.filter(idx => idx !== i); else seleccionMeses.push(i); };
            monthBox.appendChild(chip);
        });

        function ejecutarAnalisis() {
            const traces = [];
            const items = modo === 'mes' ? seleccionMeses : seleccionAnos;
            let sumTMax = 0, sumHR = 0;

            items.forEach((val, i) => {
                let label = modo === 'mes' ? `${meses[val]}-${seleccionAnos[0]}` : `AÑO ${val}`;
                let tMax = 28 + (Math.random() * 8);
                let tMin = 18 + (Math.random() * 6);
                let hr = 60 + (Math.random() * 25);
                let color = `hsl(${(i * 360 / items.length)}, 75%, 50%)`;
                sumTMax += tMax; sumHR += hr;

                traces.push({
                    x: [tMin, tMax], y: [hr - 5, hr + 5],
                    type: 'scatter', mode: 'lines+markers', name: label,
                    line: { width: 6, color: color }, marker: { size: 12, line: {color:'white', width:2} }
                });
            });

            const layout = {
                images: [{
                    source: "https://raw.githubusercontent.com/analisis-climatico/givoni-arch/main/OFICIAL-GRÁFICA%20DE%20GIVONI%20(1)-Layout1.jpg",
                    xref: "x", yref: "y", x: -5.8, y: 100, sizex: 51.5, sizey: 100,
                    sizing: "stretch", layer: "below"
                }],
                xaxis: { range: [-6, 46], dtick: 5, gridcolor: 'rgba(0,0,0,0.05)', title: { text: 'TBS (°C)', font: { size: 18, color: 'red', weight: '900' } } },
                yaxis: { range: [0, 102], dtick: 10, gridcolor: 'rgba(0,0,0,0.05)', side: 'right', title: { text: 'HR (%)', font: { size: 18, color: 'green', weight: '900' } } },
                showlegend: false, margin: { t: 50, b: 100, l: 50, r: 100 }
            };

            Plotly.newPlot('givoni-plot', traces, layout);
            document.getElementById('strategy-box').classList.remove('hidden');
            
            generarVisualizacionPro(sumTMax / items.length, sumHR / items.length);
        }

        function generarVisualizacionPro(avgT, avgH) {
            const climText = document.getElementById('climograma-text');
            const recBox = document.getElementById('recomendacion-box');
            recBox.innerHTML = '';
            let tipo = 'ventilacion';

            if (avgH > 75) {
                climText.innerText = "Saturación crítica de humedad detectada. El calor latente del aire exige una renovación constante para permitir el confort evaporativo.";
                recBox.innerHTML = `<div><h5 class="font-black text-white text-sm uppercase">Ventilación Cruzada Inducida:</h5><p class="text-slate-400 text-sm">Aberturas cenitales y celosías de bambú para liberar calor acumulado.</p></div>`;
                tipo = 'ventilacion';
            } else if (avgT > 32) {
                climText.innerText = "Altas temperaturas diurnas registradas. El calor es radiante, requiriendo masa térmica profunda y sombra total.";
                recBox.innerHTML = `<div><h5 class="font-black text-white text-sm uppercase">Inercia Térmica:</h5><p class="text-slate-400 text-sm">Muros de Ladrillo o BTC con doble envolvente ventilada para enfriamiento retardado.</p></div>`;
                tipo = 'masa';
            } else {
                climText.innerText = "Condiciones estables. Se recomienda potenciar microclimas mediante vegetación y patios internos.";
                recBox.innerHTML = `<div><h5 class="font-black text-white text-sm uppercase">Barreras Vegetales:</h5><p class="text-slate-400 text-sm">Vegetación caducifolia perimetral para humidificar y refrescar brisas.</p></div>`;
                tipo = 'vegetacion';
            }

            dibujarIsometricoComplejo(tipo);
        }

        function dibujarIsometricoComplejo(tipo) {
            const container = document.getElementById('architectural-diagram-container');
            const c = { 
                wall: '#cbd5e1', 
                wallSection: '#94a3b8', 
                roof: '#e2e8f0', 
                wood: '#a16207', 
                wind: '#38bdf8', 
                sun: '#f97316' 
            };
            
            let svg = `<svg viewBox="0 0 500 500" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">`;
            
            // Base Suelo
            svg += `<path d="M 50,350 L 250,400 L 450,350 L 250,300 Z" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>`;

            if (tipo === 'ventilacion') {
                // Sección Isométrica: Muro cortado + Celosía + Viento
                svg += `
                <path d="M 250,280 L 250,130 L 400,180 L 400,330 Z" fill="${c.wall}" stroke="#64748b"/>
                <path d="M 100,330 L 100,180 L 130,170 L 130,320 Z" fill="${c.wallSection}" stroke="#475569"/>
                <path d="M 100,180 L 250,130 L 400,180 L 250,230 Z" fill="${c.roof}" stroke="#64748b"/>
                <path d="M 100,180 L 100,195 L 250,245 L 250,230 Z" fill="#94a3b8" stroke="#64748b"/>
                <rect x="180" y="160" width="8" height="150" fill="${c.wood}" transform="skewY(-18)"/>
                <rect x="210" y="175" width="8" height="150" fill="${c.wood}" transform="skewY(-18)"/>
                <path d="M 10,300 Q 150,300 250,250" stroke="${c.wind}" stroke-width="12" fill="none" opacity="0.6" marker-end="url(#arr)"/>
                <path d="M 250,250 Q 350,200 480,220" stroke="${c.wind}" stroke-width="12" fill="none" opacity="0.6" marker-end="url(#arr)"/>`;
            } else if (tipo === 'masa') {
                // Sección Isométrica: Muro Grueso + Protección Solar
                svg += `
                <path d="M 150,330 L 150,130 L 190,120 L 190,320 Z" fill="${c.wallSection}" stroke="#1e293b"/>
                <path d="M 190,320 L 350,320 L 350,120 L 190,120 Z" fill="#475569" stroke="#1e293b"/>
                <path d="M 50,130 L 350,130 L 300,100 L 20,100 Z" fill="#334155" stroke="#0f172a"/>
                <circle cx="50" cy="50" r="30" fill="${c.sun}"/>
                <line x1="50" y1="80" x2="140" y2="180" stroke="${c.sun}" stroke-width="6" stroke-dasharray="10,5"/>`;
            } else {
                // Sección: Estructura + Vegetación
                svg += `
                <path d="M 180,330 L 180,130 L 350,130 L 350,330 Z" fill="${c.wall}" stroke="#64748b"/>
                <circle cx="100" cy="220" r="70" fill="#22c55e" opacity="0.7"/>
                <rect x="92" y="220" width="16" height="130" fill="#78350f"/>`;
            }

            svg += `<defs><marker id="arr" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="${c.wind}"/></marker></defs></svg>`;
            container.innerHTML = svg;
        }

        window.onload = ejecutarAnalisis;
    </script>
</body>
</html>
