<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Climate Engine PRO - Versión Full Tesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
        #map { height: 260px; border-radius: 22px; overflow: hidden; border: 1px solid #dbe2ea; }
        #chart { width: 100%; height: 760px; background: white; border-radius: 24px; overflow: hidden; border: 1px solid #dbe2ea; position: relative; }
        .btn-mode { padding: 10px 22px; border-radius: 12px; border: 1px solid #dbe2ea; font-size: 11px; font-weight: 900; transition: .2s; }
        .active-mode { background: #2563eb; color: white; border-color: #2563eb; }
        .selector-chip { padding: 10px; border-radius: 10px; border: 1px solid #dbe2ea; text-align: center; font-size: 11px; font-weight: 800; cursor: pointer; transition: .2s; background: white; }
        .selected-item { background: #2563eb; color: white; }
        .zone-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; margin: 2px; font-size: 9px; font-weight: 900; text-transform: uppercase; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">
    <main id="export-container" class="max-w-[1900px] mx-auto space-y-6">
        <header class="bg-white rounded-3xl border shadow-sm p-6 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tight text-slate-800">Givoni Climate Engine</h1>
                <p class="text-xs uppercase tracking-[0.3em] text-slate-400 font-black mt-2">Arquitectura Bioclimática - Análisis de Ciclos</p>
            </div>
            <div class="flex gap-3">
                <div class="flex gap-1 bg-slate-100 p-1 rounded-xl">
                    <button onclick="setMode('mes')" id="btn-mes" class="btn-mode active-mode">MESES</button>
                    <button onclick="setMode('año')" id="btn-año" class="btn-mode">AÑOS</button>
                </div>
                <button onclick="downloadPDF()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-black px-6 py-3 rounded-xl text-[10px] uppercase transition-all shadow-lg">Descargar PDF</button>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
            <div class="bg-white rounded-3xl border shadow-sm p-6 space-y-6">
                <div>
                    <p id="location-text" class="text-blue-600 font-black text-xs uppercase mb-4 italic">Ubicación: Guayaquil</p>
                    <p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">Rango de Años (Hasta 2000)</p>
                    <div id="year-selector" class="grid grid-cols-2 gap-2 max-h-[300px] overflow-y-auto pr-2"></div>
                </div>
                <div id="section-meses">
                    <p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">Selección de Meses</p>
                    <div id="month-selector" class="grid grid-cols-3 gap-2"></div>
                </div>
                <button onclick="runClimateAnalysis()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black uppercase rounded-2xl py-5 text-xs transition-all shadow-md">Actualizar Análisis</button>
            </div>

            <div class="xl:col-span-3 space-y-6">
                <div id="chart"></div>

                <div class="bg-white rounded-3xl border overflow-hidden shadow-sm">
                    <table class="w-full text-xs">
                        <thead class="bg-slate-50 border-b text-slate-500 uppercase font-black text-center">
                            <tr>
                                <th class="p-4">ID</th><th class="p-4">Periodo</th>
                                <th class="p-4">T. Máx</th><th class="p-4">T. Mín</th>
                                <th class="p-4">HR %</th><th class="p-4 text-left">Zonas Detectadas</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="font-bold text-slate-700 text-center"></tbody>
                    </table>
                </div>

                <div class="bg-[#0f172a] rounded-3xl p-10 text-white border-l-[10px] border-blue-500 shadow-2xl">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <div>
                            <p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5 italic">Diagnóstico Bioclimático General</p>
                            <p id="analysis-text" class="text-slate-300 leading-relaxed text-lg font-medium"></p>
                        </div>
                        <div>
                            <p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5 italic">Estrategias de Diseño Recomendadas</p>
                            <div id="strategy-list" class="grid grid-cols-1 gap-4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        let mode = 'mes', selectedYears = [2025], selectedMonths = [0,1,2,3,4], lat = -2.17, lon = -79.92;

        const zoneConfig = {
            "Z1": { color: "rgb(254, 204, 102)", name: "Confort Térmico" }, 
            "Z2": { color: "rgb(153, 27, 30)", name: "Confort Permisible" },
            "Z3": { color: "rgb(19, 103, 52)", name: "Calefacción por Ganancias Internas" },
            "Z4": { color: "rgb(19, 155, 72)", name: "Calefacción Solar Pasiva" },
            "Z5": { color: "rgb(24, 125, 129)", name: "Calefacción Solar Activa" },
            "Z6": { color: "rgb(209, 156, 199)", name: "Humidificación" },
            "Z7": { color: "rgb(50, 162, 210)", name: "Calefacción Convencional" },
            "Z8": { color: "rgb(205, 105, 40)", name: "Protección Solar" },
            "Z9": { color: "rgb(242, 113, 114)", name: "Enfriamiento por Masa Térmica" },
            "Z10": { color: "rgb(147, 39, 143)", name: "Enfriamiento Evaporativo" },
            "Z11": { color: "rgb(241, 235, 31)", name: "Masa Térmica con Renovación Nocturna" },
            "Z12": { color: "rgb(46, 173, 141)", name: "Enfriamiento por Ventilación" },
            "Z13": { color: "rgb(69, 84, 165)", name: "Aire Acondicionado / Refrigeración" },
            "Z14": { color: "rgb(159, 119, 197)", name: "Deshumidificación" }
        };

        const map = L.map('map').setView([lat,lon],7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const marker = L.marker([lat,lon]).addTo(map);

        map.on('click', async(e)=>{
            lat = e.latlng.lat; lon = e.latlng.lng; marker.setLatLng([lat,lon]);
            updateLocation(); runClimateAnalysis();
        });

        function setMode(m){
            mode = m;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active-mode'));
            document.getElementById(`btn-${m}`).classList.add('active-mode');
            document.getElementById('section-meses').style.display = m === 'mes' ? 'block' : 'none';
            renderSelectors();
        }

        function renderSelectors(){
            const yb = document.getElementById('year-selector'); yb.innerHTML = '';
            for(let y=2026; y>=2000; y--){
                const c = document.createElement('div');
                c.className = `selector-chip ${selectedYears.includes(y)?'selected-item':''}`;
                c.innerText = y;
                c.onclick = () => {
                    if(mode === 'mes') selectedYears = [y];
                    else selectedYears.includes(y) ? selectedYears = selectedYears.filter(v=>v!==y) : selectedYears.push(y);
                    renderSelectors();
                };
                yb.appendChild(c);
            }
            const mb = document.getElementById('month-selector'); mb.innerHTML = '';
            months.forEach((m,i)=>{
                const c = document.createElement('div');
                c.className = `selector-chip ${selectedMonths.includes(i)?'selected-item':''}`;
                c.innerText = m;
                c.onclick = () => {
                    selectedMonths.includes(i) ? selectedMonths = selectedMonths.filter(v=>v!==i) : selectedMonths.push(i);
                    renderSelectors();
                };
                mb.appendChild(c);
            });
        }

        function detectZones(tMin, tMax, hr) {
            let detected = [];
            const checkPoint = (t, h) => {
                if (t < 0) detected.push("Z7");
                if (t >= 0 && t < 7) detected.push("Z5");
                if (t >= 7 && t < 15) detected.push("Z4");
                if (t >= 15 && t < 20) detected.push("Z3");
                if (t < 20 && h < 30) detected.push("Z6");
                if (t >= 20 && h < 20) detected.push("Z8");
                if (t >= 20 && t <= 25 && h >= 20 && h <= 80) detected.push("Z1");
                if (t > 25 && t <= 27 && h >= 20 && h <= 80) detected.push("Z2");
                if (t >= 20 && t <= 32 && h >= 50 && h <= 90) detected.push("Z12");
                if (t > 27 && t <= 36 && h >= 10 && h <= 50) detected.push("Z9");
                if (t > 30 && t <= 40 && h >= 5 && h <= 30) detected.push("Z10");
                if (t > 36 && t <= 45 && h >= 5 && h <= 30) detected.push("Z11");
                if (h > 80 && t >= 20 && t <= 30) detected.push("Z14");
                if (t > 40 || (t > 32 && h > 60) || (t > 38)) detected.push("Z13");
            };
            for(let s=0; s<=1; s+=0.05) checkPoint(tMin + (tMax - tMin) * s, hr);
            return [...new Set(detected)].sort((a,b) => parseInt(a.slice(1)) - parseInt(b.slice(1)));
        }

        async function drawChart(data){
            d3.select('#chart svg').remove();
            const width = 1600, height = 760;
            const margin = { top:20, right:20, bottom:60, left:20 };
            const innerWidth = width - margin.left - margin.right;
            const innerHeight = height - margin.top - margin.bottom;

            const svg = d3.select('#chart').append('svg').attr('width','100%').attr('height','100%').attr('viewBox',`0 0 ${width} ${height}`);
            const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
            const x = d3.scaleLinear().domain([-5,50]).range([0,innerWidth]);
            const y = d3.scaleLinear().domain([0,35]).range([innerHeight,0]);

            const response = await fetch('pruega-de-svg.svg');
            const rawSVG = await response.text();
            const parser = new DOMParser();
            const svgDoc = parser.parseFromString(rawSVG, "image/svg+xml");
            const importedSVG = document.importNode(svgDoc.documentElement, true);
            importedSVG.setAttribute("width",innerWidth);
            importedSVG.setAttribute("height",innerHeight);
            importedSVG.setAttribute("preserveAspectRatio","none");
            importedSVG.setAttribute("transform","translate(0,65)");
            g.append("g").style("opacity","0.85").node().appendChild(importedSVG);

            data.forEach((d,i)=>{
                d.color = d3.interpolateRainbow(i/data.length);
                const points = [];
                for(let s=0;s<=30;s++){
                    let t = d.tMin + ((d.tMax-d.tMin)*(s/30));
                    let sat = 0.61078 * Math.exp((17.27*t)/(t+237.3));
                    let vap = (d.hr/100) * sat;
                    let hum = 622 * (vap / (101.325 - vap));
                    points.push([x(t), y(hum)]);
                }
                g.append('path').attr('d', d3.line().curve(d3.curveBasis)(points))
                    .attr('fill','none').attr('stroke',d.color).attr('stroke-width',5).attr('stroke-linecap','round');
            });
            g.append('g').attr('transform', `translate(0,${innerHeight})`).call(d3.axisBottom(x));
        }

        function updateAnalysis(data){
            const tableBody = document.getElementById('table-body'); tableBody.innerHTML = '';
            const allZones = new Set();
            let totalTMax = 0, totalHR = 0;

            data.forEach(d => {
                const zones = detectZones(d.tMin, d.tMax, d.hr);
                zones.forEach(z => allZones.add(z));
                totalTMax += d.tMax; totalHR += d.hr;

                const badges = zones.map(z => `<span class="zone-badge" style="background:${zoneConfig[z]?.color}">${z}</span>`).join(' ');
                tableBody.innerHTML += `<tr class="border-b"><td class="p-4"><div class="w-3 h-3 rounded-full mx-auto" style="background:${d.color}"></div></td>
                    <td class="p-4">${d.label}</td><td class="p-4">${d.tMax.toFixed(1)}°C</td><td class="p-4">${d.tMin.toFixed(1)}°C</td>
                    <td class="p-4 text-blue-600">${d.hr.toFixed(0)}%</td><td class="p-4 text-left">${badges}</td></tr>`;
            });

            // Lógica de Recomendaciones
            const avgT = totalTMax / data.length;
            const avgHR = totalHR / data.length;
            const diagnosis = document.getElementById('analysis-text');
            const strategies = document.getElementById('strategy-list');
            strategies.innerHTML = '';

            let text = `El análisis indica un predominio de zonas de ${avgT > 28 ? 'calor intenso' : 'confort moderado'}. `;
            if(avgHR > 75) text += "La humedad relativa elevada es el factor crítico, requiriendo estrategias de deshumidificación y ventilación constante.";
            else text += "Se observa un clima con oscilaciones térmicas que permiten el uso de masa térmica.";
            diagnosis.innerText = text;

            const uniqueZones = Array.from(allZones);
            uniqueZones.forEach(z => {
                strategies.innerHTML += `<div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <p class="text-blue-400 font-black text-[10px] uppercase">${z} - ${zoneConfig[z]?.name}</p>
                    <p class="text-slate-400 text-xs mt-1">Implementar soluciones de ${zoneConfig[z]?.name.toLowerCase()} para optimizar el confort.</p>
                </div>`;
            });
        }

        async function runClimateAnalysis(){
            let results = [];
            const year = selectedYears[0];
            try {
                const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${year}-01-01&end_date=${year}-12-31&daily=temperature_2m_max,temperature_2m_min,relative_humidity_2m_mean&timezone=auto`.replace(/\s+/g,'');
                const res = await fetch(url);
                const data = await res.json();
                
                if(mode === 'mes'){
                    selectedMonths.forEach(m => {
                        const tMax = data.daily.temperature_2m_max.filter((_,idx) => new Date(data.daily.time[idx]).getMonth() === m);
                        const tMin = data.daily.temperature_2m_min.filter((_,idx) => new Date(data.daily.time[idx]).getMonth() === m);
                        const hr = data.daily.relative_humidity_2m_mean.filter((_,idx) => new Date(data.daily.time[idx]).getMonth() === m);
                        results.push({ label: `${months[m]} ${year}`, tMax: d3.mean(tMax), tMin: d3.mean(tMin), hr: d3.mean(hr) });
                    });
                } else {
                    for(const y of selectedYears){
                        const d = await (await fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${y}-01-01&end_date=${y}-12-31&daily=temperature_2m_max,temperature_2m_min,relative_humidity_2m_mean&timezone=auto`)).json();
                        results.push({ label: `${y}`, tMax: d3.mean(d.daily.temperature_2m_max), tMin: d3.mean(d.daily.temperature_2m_min), hr: d3.mean(d.daily.relative_humidity_2m_mean) });
                    }
                }
                await drawChart(results); updateAnalysis(results);
            } catch(e) { console.error(e); }
        }

        function downloadPDF(){
            const { jsPDF } = window.jspdf;
            html2canvas(document.querySelector("#export-container")).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('p', 'mm', 'a4');
                const imgProps = pdf.getImageProperties(imgData);
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(`Reporte_Bioclimatico_${lat.toFixed(2)}.pdf`);
            });
        }

        async function updateLocation(){ const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`); const data = await res.json(); document.getElementById('location-text').innerText = `Ubicación: ${data.address.city || data.address.town || 'Guayaquil'}`; }

        renderSelectors(); updateLocation(); runClimateAnalysis();
    </script>
</body>
</html>
