<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Givoni Climate Engine PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
background:#f1f5f9;
font-family:Inter,sans-serif;
}

#map{
height:260px;
border-radius:22px;
overflow:hidden;
border:1px solid #dbe2ea;
}

#chart{
width:100%;
height:760px;
background:white;
border-radius:24px;
overflow:hidden;
border:1px solid #dbe2ea;
position:relative;
}

.btn-mode{
padding:10px 22px;
border-radius:12px;
border:1px solid #dbe2ea;
font-size:11px;
font-weight:900;
transition:.2s;
}

.active-mode{
background:#2563eb;
color:white;
border-color:#2563eb;
}

.selector-chip{
padding:10px;
border-radius:10px;
border:1px solid #dbe2ea;
text-align:center;
font-size:11px;
font-weight:800;
cursor:pointer;
transition:.2s;
background:white;
}

.selected-item{
background:#2563eb;
color:white;
}

.tooltip-box{
position:absolute;
pointer-events:none;
background:#0f172a;
color:white;
padding:12px;
border-radius:12px;
font-size:11px;
font-weight:700;
opacity:0;
transition:.2s;
z-index:9999;
}

</style>
</head>

<body class="p-4 md:p-8">

<main class="max-w-[1900px] mx-auto space-y-6">

<header class="bg-white rounded-3xl border shadow-sm p-6 flex justify-between items-center">

<div>

<h1 class="text-3xl font-black uppercase tracking-tight text-slate-800">
Givoni Climate Engine
</h1>

<p class="text-xs uppercase tracking-[0.3em] text-slate-400 font-black mt-2">
Arquitectura Bioclimática
</p>

</div>

<div class="flex gap-2">

<button onclick="setMode('mes')"
id="btn-mes"
class="btn-mode active-mode">
MESES
</button>

<button onclick="setMode('año')"
id="btn-año"
class="btn-mode">
AÑOS
</button>

</div>

</header>

<div id="map"></div>

<div class="grid grid-cols-1 xl:grid-cols-4 gap-6">

<div class="bg-white rounded-3xl border shadow-sm p-6 space-y-6">

<div>

<p id="location-text"
class="text-blue-600 font-black text-xs uppercase mb-4">
Ubicación: Guayaquil
</p>

<p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">
Seleccionar Año
</p>

<div id="year-selector"
class="grid grid-cols-2 gap-2 max-h-[420px] overflow-y-auto pr-1">
</div>

</div>

<div id="month-section">

<p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">
Meses
</p>

<div id="month-selector"
class="grid grid-cols-3 gap-2">
</div>

</div>

<button onclick="runClimateAnalysis()"
class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black uppercase rounded-2xl py-4 text-xs transition-all">

Actualizar Climograma

</button>

</div>

<div class="xl:col-span-3 space-y-6">

<div id="chart">

<div id="tooltip"
class="tooltip-box">
</div>

</div>

<div class="bg-white rounded-3xl border overflow-hidden shadow-sm">

<table class="w-full text-xs">

<thead class="bg-slate-50 border-b text-slate-500 uppercase font-black">

<tr>

<th class="p-4 text-center">Color</th>
<th class="p-4">Mes/Año</th>
<th class="p-4 text-center">Temp Máx</th>
<th class="p-4 text-center">Temp Mín</th>
<th class="p-4 text-center">HR</th>
<th class="p-4 text-center">Zonas Detectadas</th>

</tr>

</thead>

<tbody id="table-body"
class="font-bold text-slate-700">
</tbody>

</table>

</div>

<div class="bg-[#0f172a] rounded-3xl p-10 text-white border-l-[10px] border-blue-500">

<div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

<div>

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Diagnóstico Bioclimático
</p>

<p id="analysis-text"
class="text-slate-300 leading-relaxed text-lg">
</p>

</div>

<div>

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Estrategias Arquitectónicas
</p>

<div id="strategy-list"
class="space-y-4">
</div>

</div>

</div>

</div>

</div>

</div>

</main>

<script>

const months = [
'Ene','Feb','Mar','Abr','May','Jun',
'Jul','Ago','Sep','Oct','Nov','Dic'
];

const zoneDictionary = {

1:'Zona de Confort',
2:'Confort Permisible',
3:'Calefacción por Ganancias Internas',
4:'Calefacción Solar Pasiva',
5:'Calefacción Solar Activa',
6:'Humidificación',
7:'Calefacción Convencional',
8:'Protección Solar',
9:'Refrigeración por Alta Masa Térmica',
10:'Enfriamiento por Evaporación',
11:'Alta Masa Térmica + Ventilación Nocturna',
12:'Ventilación Natural y Mecánica',
13:'Aire Acondicionado',
14:'Deshumidificación Convencional'

};

function detectZones(temp,hr){

let zones = [];

if(hr >= 75){
zones.push(14);
}

if(temp >= 26 && hr >= 65){
zones.push(12);
}

if(temp >= 30 && hr >= 55){
zones.push(13);
}

if(temp >= 28 && hr <= 60){
zones.push(10);
}

if(temp >= 24 && temp <= 30 && hr >= 50){
zones.push(2);
}

if(temp >= 22 && temp <= 27 && hr >= 40 && hr <= 70){
zones.push(1);
}

if(temp >= 20 && hr >= 70){
zones.push(8);
}

if(zones.length === 0){
zones.push(1);
}

return [...new Set(zones)];

}

let mode = 'mes';

let selectedYears = [2025];
let selectedMonths = [0,1,2,3,4];

let lat = -2.17;
let lon = -79.92;

let currentZonesSVG = null;

const map = L.map('map').setView([lat,lon],7);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

const marker = L.marker([lat,lon]).addTo(map);

map.on('click', async(e)=>{

lat = e.latlng.lat;
lon = e.latlng.lng;

marker.setLatLng([lat,lon]);

await updateLocation();

runClimateAnalysis();

});

function setMode(m){

mode = m;

document.querySelectorAll('.btn-mode')
.forEach(btn=>btn.classList.remove('active-mode'));

document.getElementById(`btn-${m}`)
.classList.add('active-mode');

document.getElementById('month-section').style.display =
mode === 'mes'
? 'block'
: 'none';

renderSelectors();

}

function renderSelectors(){

const yearBox = document.getElementById('year-selector');

yearBox.innerHTML = '';

const currentYear = new Date().getFullYear();

for(let y=currentYear;y>=2000;y--){

const chip = document.createElement('div');

chip.className = `selector-chip ${
selectedYears.includes(y)
? 'selected-item'
: ''
}`;

chip.innerText = y;

chip.onclick = ()=>{

if(mode === 'mes'){

selectedYears = [y];

}
else{

if(selectedYears.includes(y)){

selectedYears =
selectedYears.filter(v=>v!==y);

}
else{

selectedYears.push(y);

}

}

renderSelectors();

};

yearBox.appendChild(chip);

}

const monthBox =
document.getElementById('month-selector');

monthBox.innerHTML = '';

months.forEach((m,i)=>{

const chip = document.createElement('div');

chip.className = `selector-chip ${
selectedMonths.includes(i)
? 'selected-item'
: ''
}`;

chip.innerText = m;

chip.onclick = ()=>{

if(selectedMonths.includes(i)){

selectedMonths =
selectedMonths.filter(v=>v!==i);

}
else{

selectedMonths.push(i);

}

renderSelectors();

};

monthBox.appendChild(chip);

});

}

async function updateLocation(){

try{

const response = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
);

const data = await response.json();

const city =
data.address.city ||
data.address.town ||
data.address.state ||
'Ubicación';

document.getElementById('location-text')
.innerText = `Ubicación: ${city}`;

}
catch(err){}

}

async function fetchClimate(year){

const url = `
https://archive-api.open-meteo.com/v1/archive?
latitude=${lat}&
longitude=${lon}&
start_date=${year}-01-01&
end_date=${year}-12-31&
daily=temperature_2m_max,temperature_2m_min,relative_humidity_2m_mean&
timezone=auto
`;

const response = await fetch(
url.replace(/\s+/g,'')
);

return await response.json();

}

async function loadZonesSVG(){

if(currentZonesSVG) return currentZonesSVG;

const response = await fetch('pruega-de-svg.svg');

const text = await response.text();

currentZonesSVG = text;

return text;

}

async function drawChart(data){

d3.select('#chart svg').remove();

const width = 1600;
const height = 760;

const margin = {
top:20,
right:20,
bottom:60,
left:20
};

const innerWidth =
width - margin.left - margin.right;

const innerHeight =
height - margin.top - margin.bottom;

const svg = d3.select('#chart')
.append('svg')
.attr('width','100%')
.attr('height','100%')
.attr('viewBox',`0 0 ${width} ${height}`);

const g = svg.append('g')
.attr(
'transform',
`translate(${margin.left},${margin.top})`
);

const x = d3.scaleLinear()
.domain([-5,50])
.range([0,innerWidth]);

const y = d3.scaleLinear()
.domain([0,35])
.range([innerHeight,0]);

for(let i=-5;i<=50;i+=1){

g.append('line')
.attr('x1',x(i))
.attr('x2',x(i))
.attr('y1',0)
.attr('y2',innerHeight)
.attr('stroke','#e2e8f0')
.attr('stroke-width',0.8);

}

for(let i=0;i<=35;i+=1){

g.append('line')
.attr('x1',0)
.attr('x2',innerWidth)
.attr('y1',y(i))
.attr('y2',y(i))
.attr('stroke','#f1f5f9')
.attr('stroke-width',0.8);

}

const humidityLabels = [
100,90,80,70,60,50,40
];

humidityLabels.forEach((hr,index)=>{

let points = [];

for(let t=-5; t<=50; t+=0.2){

let saturation =
0.61078 *
Math.exp((17.27*t)/(t+237.3));

let vaporPressure =
(hr/100) * saturation;

let humidityRatio =
622 * (
vaporPressure /
(101.325 - vaporPressure)
);

points.push([
x(t),
y(humidityRatio)
]);

}

g.append('path')
.attr(
'd',
d3.line()
.curve(d3.curveBasis)(points)
)
.attr('fill','none')
.attr('stroke','#cbd5e1')
.attr('stroke-width',1);

const labelX = innerWidth - (index * 80) - 90;

const labelY = 18;

g.append('text')
.attr('x',labelX)
.attr('y',labelY)
.text(`${hr}%`)
.attr('fill','#334155')
.attr('font-size','28px')
.attr('font-weight','900');

});

const rawSVG = await loadZonesSVG();

const parser = new DOMParser();

const svgDoc = parser.parseFromString(
rawSVG,
"image/svg+xml"
);

const importedSVG =
document.importNode(
svgDoc.documentElement,
true
);

importedSVG.setAttribute("x",0);
importedSVG.setAttribute("y",0);

importedSVG.setAttribute(
"width",
innerWidth
);

importedSVG.setAttribute(
"height",
innerHeight
);

importedSVG.setAttribute(
"preserveAspectRatio",
"none"
);

importedSVG.setAttribute(
"transform",
"translate(0,62)"
);

importedSVG.style.opacity = "0.82";

importedSVG.style.pointerEvents = "none";

const zoneLayer = g.append("g")
.attr("class","zones-layer");

zoneLayer.node().appendChild(importedSVG);

const tooltip =
document.getElementById('tooltip');

data.forEach((d,i)=>{

const color =
d3.interpolateRainbow(i/data.length);

d.color = color;

const points = [];

for(let s=0;s<=30;s++){

let t =
d.tMin +
((d.tMax-d.tMin)*(s/30));

let saturation =
0.61078 *
Math.exp((17.27*t)/(t+237.3));

let vaporPressure =
(d.hr/100) * saturation;

let humidityRatio =
622 * (
vaporPressure /
(101.325 - vaporPressure)
);

points.push([
x(t),
y(humidityRatio)
]);

}

g.append('path')
.attr(
'd',
d3.line()
.curve(d3.curveBasis)(points)
)
.attr('fill','none')
.attr('stroke',color)
.attr('stroke-width',6)
.attr('stroke-linecap','round')

.on('mousemove',(event)=>{

tooltip.style.opacity = 1;

tooltip.style.left =
(event.pageX+20)+'px';

tooltip.style.top =
(event.pageY-20)+'px';

tooltip.innerHTML = `
<div class="space-y-2">

<p class="font-black text-blue-400">
${d.label}
</p>

<p>
Temp Máx:
<b>${d.tMax.toFixed(1)}°C</b>
</p>

<p>
Temp Mín:
<b>${d.tMin.toFixed(1)}°C</b>
</p>

<p>
HR:
<b>${d.hr.toFixed(0)}%</b>
</p>

</div>
`;

})

.on('mouseleave',()=>{

tooltip.style.opacity = 0;

});

});

g.append('g')
.attr(
'transform',
`translate(0,${innerHeight})`
)
.call(
d3.axisBottom(x)
.ticks(12)
);

}

function updateTable(data){

const tbody =
document.getElementById('table-body');

tbody.innerHTML = '';

data.forEach(d=>{

tbody.innerHTML += `
<tr class="border-b hover:bg-slate-50">

<td class="p-4 text-center align-middle">
<div class="w-4 h-4 rounded-full inline-block"
style="background:${d.color}">
</div>
</td>

<td class="p-4 text-center align-middle">
${d.label}
</td>

<td class="p-4 text-center align-middle">
${d.tMax.toFixed(1)}°C
</td>

<td class="p-4 text-center align-middle">
${d.tMin.toFixed(1)}°C
</td>

<td class="p-4 text-center text-blue-600 font-black align-middle">
${d.hr.toFixed(0)}%
</td>

<td class="p-4 text-center align-middle">

<div class="flex flex-col gap-2 items-center">

${d.zones.map(zone=>`

<div class="bg-blue-100
text-blue-700
px-3
py-1
rounded-full
text-[10px]
font-black">

${zone}

</div>

`).join('')}

</div>

</td>

</tr>
`;

});

}

function updateAnalysis(data){

const analysis =
document.getElementById('analysis-text');

const strategyList =
document.getElementById('strategy-list');

strategyList.innerHTML = '';

let combinedZones = [];

data.forEach(d=>{

d.zones.forEach(z=>{

if(!combinedZones.includes(z)){
combinedZones.push(z);
}

});

});

analysis.innerHTML = `
El análisis climático evidencia una predominancia de condiciones térmicas asociadas a:

<b class="text-blue-400">
${combinedZones.join(', ')}
</b>.

Las temperaturas elevadas combinadas con altos porcentajes de humedad relativa generan ambientes con riesgo de sobrecalentamiento, sensación térmica elevada y baja disipación natural del calor corporal.

El climograma indica que las estrategias arquitectónicas deben priorizar sistemas de ventilación natural cruzada, control solar pasivo, protección de envolventes y reducción de ganancias térmicas directas.

Asimismo, el comportamiento climático detectado evidencia la necesidad de incorporar soluciones bioclimáticas adaptativas capaces de responder tanto al incremento térmico diurno como a la acumulación de humedad ambiental.
`;

const strategies = [

'Cubiertas ventiladas con cámara de aire',
'Parasoles verticales y horizontales',
'Vegetación de sombra y barreras verdes',
'Celosías permeables',
'Ventilación cruzada permanente',
'Materiales reflectivos de baja absorción térmica',
'Patios internos bioclimáticos',
'Protección solar profunda en fachadas',
'Sistemas de extracción de aire caliente'

];

strategies.forEach(s=>{

strategyList.innerHTML += `
<div class="bg-slate-900 border border-slate-800 rounded-2xl p-5">

<p class="text-sm font-bold text-slate-300">
${s}
</p>

</div>
`;

});

}

async function runClimateAnalysis(){

let results = [];

if(mode === 'mes'){

const year = selectedYears[0];

const data =
await fetchClimate(year);

for(let m=0;m<12;m++){

if(!selectedMonths.includes(m))
continue;

const tMax =
data.daily.temperature_2m_max
.filter((v,i)=>
new Date(data.daily.time[i]).getMonth()===m
);

const tMin =
data.daily.temperature_2m_min
.filter((v,i)=>
new Date(data.daily.time[i]).getMonth()===m
);

const hr =
data.daily.relative_humidity_2m_mean
.filter((v,i)=>
new Date(data.daily.time[i]).getMonth()===m
);

const avgMax =
tMax.reduce((a,b)=>a+b,0)/tMax.length;

const avgMin =
tMin.reduce((a,b)=>a+b,0)/tMin.length;

const avgHR =
hr.reduce((a,b)=>a+b,0)/hr.length;

const detectedZones =
detectZones(avgMax,avgHR);

results.push({

label:`${months[m]} ${year}`,

tMax:avgMax,
tMin:avgMin,
hr:avgHR,

zones:detectedZones.map(z=>
`Zona ${z}: ${zoneDictionary[z]}`
)

});

}

}
else{

for(const year of selectedYears){

const data =
await fetchClimate(year);

const avgMax =
data.daily.temperature_2m_max
.reduce((a,b)=>a+b,0)
/
data.daily.temperature_2m_max.length;

const avgMin =
data.daily.temperature_2m_min
.reduce((a,b)=>a+b,0)
/
data.daily.temperature_2m_min.length;

const avgHR =
data.daily.relative_humidity_2m_mean
.reduce((a,b)=>a+b,0)
/
data.daily.relative_humidity_2m_mean.length;

const detectedZones =
detectZones(avgMax,avgHR);

results.push({

label:`${year}`,

tMax:avgMax,
tMin:avgMin,
hr:avgHR,

zones:detectedZones.map(z=>
`Zona ${z}: ${zoneDictionary[z]}`
)

});

}

}

await drawChart(results);

updateTable(results);

updateAnalysis(results);

}

renderSelectors();

updateLocation();

runClimateAnalysis();

</script>

</body>
</html>
