<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsualizador - Motor SVG</title>
    <style>
        /* Estilos base para simular la interfaz del proyecto */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .panel {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            max-width: 800px;
            justify-content: center;
        }

        .strat-btn {
            background-color: #0f172a;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .strat-btn:hover {
            border-color: #64748b;
            color: #cbd5e1;
        }

        .strat-btn.active {
            background-color: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
            font-weight: bold;
        }

        #svg-canvas {
            width: 800px;
            height: 400px;
            background-color: #0f172a; /* Fondo oscuro para resaltar los trazos */
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 1px solid #334155;
        }

        /* Ajuste para mantener un esquema visual puramente diagramático.
          Descomenta la siguiente línea si prefieres ocultar todos los textos 
          y priorizar un gráfico minimalista sin explicaciones textuales.
        */
        /* text { display: none !important; } */

        /* Animaciones requeridas por el código SVG */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin { animation: spin 2s linear infinite; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="menu" id="menu">
            </div>
        <div id="svg-canvas"></div>
    </div>

    <script>
        // 1. SIMULACIÓN DE DATOS
        // Array con los nombres exactos que utiliza tu lógica condicional
        const strategies = [
            { t: "Ventilación regulable" }, { t: "Cubierta ventilada" }, { t: "Protección solar ligera" },
            { t: "Espacios de transición" }, { t: "Fachada permeable" }, { t: "Ventilación elevada" },
            { t: "Núcleo compacto" }, { t: "Envolvente térmica" }, { t: "Carpintería hermética" },
            { t: "Muro Trombe" }, { t: "Galería solar" }, { t: "Orientación solar estratégica" },
            { t: "Panel solar térmico" }, { t: "Cubierta captadora" }, { t: "Acumulación térmica hidráulica" },
            { t: "Patio húmedo" }, { t: "Fuente evaporativa" }, { t: "Material higroscópico" },
            { t: "Doble envolvente térmica" }, { t: "Acceso amortiguador" }, { t: "Aislamiento continuo" },
            { t: "Parasoles móviles" }, { t: "Fachada de doble piel" }, { t: "Cubierta extendida" },
            { t: "Muro acumulador" }, { t: "Piso de inercia térmica" }, { t: "Protección de masa térmica" },
            { t: "Espejo de agua climático" }, { t: "Nebulización pasiva" }, { t: "Vegetación refrescante" },
            { t: "Purgado nocturno" }, { t: "Lucernario térmico" }, { t: "Chimenea solar invertida" },
            { t: "Cubierta extractora" }, { t: "Ventilación mecánica asistida" }, { t: "Sectorización térmica" },
            { t: "Fachada aislada" }, { t: "Cámara ventilada" }, { t: "Otra estrategia de prueba" }
        ];

        // 2. GENERACIÓN DE LA INTERFAZ
        const menu = document.getElementById('menu');
        strategies.forEach((strat, index) => {
            const btn = document.createElement('button');
            btn.className = 'strat-btn';
            btn.textContent = index + 1;
            btn.title = strat.t;
            btn.onclick = () => window.renderSVGForStrategy(index);
            menu.appendChild(btn);
        });

        // =====================================================================
        // 3. TU MOTOR SVG PARAMÉTRICO (PEGADO EXACTAMENTE COMO LO ENVIASTE)
        // =====================================================================
window.renderSVGForStrategy = function(index) {
    const strat = strategies[index] || { t: "" };
    
    // Control de botones activos en la UI
    document.querySelectorAll('.strat-btn').forEach((btn, idx) => {
        if(idx === index) btn.classList.add('active');
        else btn.classList.remove('active');
    });
    
    const t = strat.t; 
    let svgContent = `<rect width="100%" height="100%" fill="url(#blueprint-grid)" />`;

    // 1. DEFINICIÓN DE PATRONES, MARCADORES Y ANIMACIONES CSS
    const defsSVG = `
        <defs>
            <pattern id="blueprint-grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40 M 0 40 L 40 40" fill="none" stroke="#ffffff" stroke-width="0.75" opacity="0.08"/>
                <path d="M 200 0 L 0 0 0 200 M 0 200 L 200 200" fill="none" stroke="#ffffff" stroke-width="1.25" opacity="0.12"/>
            </pattern>
            <pattern id="hatch-concrete" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
                <line x1="0" y1="0" x2="0" y2="10" stroke="#cbd5e1" stroke-width="2" opacity="0.4"/>
            </pattern>
            <pattern id="hatch-insulation" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
                <line x1="0" y1="4" x2="8" y2="4" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
            </pattern>
            <pattern id="hatch-mass" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
                <rect width="10" height="10" fill="#a16207" opacity="0.3"/>
                <line x1="0" y1="0" x2="0" y2="10" stroke="#713f12" stroke-width="1.25" opacity="0.4"/>
            </pattern>
            <pattern id="hatch-water" patternUnits="userSpaceOnUse" width="12" height="10">
                <rect width="12" height="10" fill="#3b82f6" opacity="0.4"/>
                <path d="M 0 5 Q 3 0 6 5 T 12 5" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
            </pattern>
            <pattern id="hygroscopic-dots" patternUnits="userSpaceOnUse" width="10" height="10">
                <circle cx="3" cy="3" r="1.5" fill="#3b82f6" opacity="0.6"/>
                <circle cx="8" cy="8" r="1" fill="#3b82f6" opacity="0.4"/>
            </pattern>
            <pattern id="glass-lines" patternUnits="userSpaceOnUse" width="15" height="15" patternTransform="rotate(45)">
                <line x1="0" y1="0" x2="0" y2="15" stroke="#38bdf8" stroke-width="2.5" opacity="0.3"/>
            </pattern>
            <pattern id="glass-block" patternUnits="userSpaceOnUse" width="15" height="15">
                <rect width="15" height="15" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
                <line x1="0" y1="0" x2="15" y2="15" stroke="#38bdf8" stroke-width="0.5" opacity="0.3"/>
            </pattern>
            <pattern id="perforated" width="8" height="8" patternUnits="userSpaceOnUse">
                <circle cx="4" cy="4" r="2" fill="#cbd5e1" opacity="0.5"/>
            </pattern>
            <pattern id="pattern-trees" patternUnits="userSpaceOnUse" width="40" height="40">
                <circle cx="20" cy="20" r="18" fill="#16a34a" opacity="0.1"/>
                <path d="M 20 5 L 25 15 L 15 15 Z" fill="#15803d" opacity="0.3"/>
            </pattern>
            <pattern id="dots-sand" patternUnits="userSpaceOnUse" width="6" height="6">
                <circle cx="3" cy="3" r="1" fill="#cbd5e1" opacity="0.3"/>
            </pattern>
            <pattern id="dots-soil" patternUnits="userSpaceOnUse" width="12" height="12">
                <circle cx="4" cy="4" r="1.5" fill="#94a3b8" opacity="0.4"/>
                <circle cx="10" cy="10" r="1" fill="#94a3b8" opacity="0.2"/>
            </pattern>
            <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4" />
            </marker>
            <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
            </marker>
            <marker id="arrow-yellow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#fcd34d" />
            </marker>
            
            <style type="text/css">
                /* Animación del sol */
                .svg-sun-pulse { transform-origin: center; transform-box: fill-box; animation: sun-pulse 3s ease-in-out infinite; }
                @keyframes sun-pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

                /* Animación de viento (celeste) */
                .svg-wind-flow { stroke-dasharray: 12 8; animation: flow-wind 1s linear infinite; }
                .svg-wind-flow-delayed { stroke-dasharray: 12 8; animation: flow-wind 1s linear infinite; animation-delay: 0.5s; }
                @keyframes flow-wind { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }

                /* Animación de calor subiendo / irradiando (rojo/naranja) */
                .svg-float-up { stroke-dasharray: 10 10; animation: flow-heat 1.2s linear infinite; }
                @keyframes flow-heat { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }

                /* Animación de rayos solares (amarillo) */
                .svg-ray-bounce { stroke-dasharray: 15 10; animation: flow-ray 1.5s linear infinite; }
                @keyframes flow-ray { from { stroke-dashoffset: 25; } to { stroke-dashoffset: 0; } }

                /* Irradiación de calor (masas térmicas) */
                .svg-heat-radiate { animation: heat-pulse 2s ease-in-out infinite alternate; }
                @keyframes heat-pulse { 0% { opacity: 0.05; } 100% { opacity: 0.3; } }
                
                /* Rotación mecánica */
                .animate-spin { transform-origin: center; transform-box: fill-box; animation: spin 2s linear infinite; }
                @keyframes spin { 100% { transform: rotate(360deg); } }
                
                /* Nebulizador */
                .animate-pulse { animation: simple-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
                @keyframes simple-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
            </style>
        </defs>
    `;

    // 2. ELEMENTOS BASE COMUNES
    const groundLine = `<rect x="0" y="340" width="800" height="60" fill="#111827"/><rect x="0" y="340" width="800" height="40" fill="url(#dots-sand)"/><rect x="0" y="340" width="800" height="10" fill="url(#dots-soil)"/><line x1="0" y1="340" x2="800" y2="340" stroke="#cbd5e1" stroke-width="2" opacity="0.5"/>`;
    const sunObj = `<circle cx="100" cy="70" r="25" fill="#f59e0b" class="svg-sun-pulse"/><circle cx="100" cy="70" r="30" fill="none" stroke="#fcd34d" stroke-width="1" stroke-dasharray="5 5" class="svg-sun-pulse"/>`;
    const drawHouse = (x, y, w, h) => `
        <rect x="${x}" y="${y}" width="${w}" height="${h}" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="2"/>
        <polygon points="${x-20},${y} ${x+(w/2)},${y-80} ${x+w+20},${y}" fill="none" stroke="#cbd5e1" stroke-width="3"/>
        <line x1="${x-20}" y1="${y}" x2="${x+w+20}" y2="${y}" stroke="#cbd5e1" stroke-width="3"/>
    `;

    // 3. LÓGICAS CONDICIONALES DE DIBUJO ESTRATÉGICO
    
    if (t === "Ventilación regulable" || index === 0) {
        svgContent += `
            ${groundLine}
            ${drawHouse(250, 160, 300, 180)}
            <rect x="250" y="220" width="20" height="60" fill="url(#glass-lines)" stroke="#38bdf8"/>
            <rect x="390" y="220" width="20" height="60" fill="url(#glass-lines)" stroke="#38bdf8"/>
            <rect x="530" y="220" width="20" height="60" fill="url(#glass-lines)" stroke="#38bdf8"/>
            <path d="M 120 250 L 240 250" fill="none" stroke="#06b6d4" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
            <path d="M 270 250 Q 330 250 380 250" fill="none" stroke="#06b6d4" stroke-width="4" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
            <path d="M 410 250 Q 470 250 520 250" fill="none" stroke="#06b6d4" stroke-width="4" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
            <path d="M 550 250 L 680 250" fill="none" stroke="#06b6d4" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
        `;
    }
    else if (t === "Cubierta ventilada" || index === 1) {
        svgContent += `
            ${groundLine}
            <rect x="250" y="180" width="300" height="160" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="2"/>
            <rect x="260" y="140" width="10" height="40" fill="#94a3b8"/>
            <rect x="395" y="100" width="10" height="80" fill="#94a3b8"/>
            <rect x="530" y="140" width="10" height="40" fill="#94a3b8"/>
            <polygon points="220,140 400,60 580,140 580,130 400,50 220,130" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
            <line x1="220" y1="140" x2="580" y2="140" stroke="#cbd5e1" stroke-width="2"/>
            ${sunObj}
            <path d="M 150 160 L 650 160" fill="none" stroke="#06b6d4" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
            <path d="M 400 60 L 480 30" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow-red)" class="svg-float-up"/>
        `;
    }
    else if (t === "Protección solar ligera" || index === 2) {
        svgContent += `
            ${groundLine}
            ${drawHouse(300, 160, 250, 180)}
            <line x1="220" y1="340" x2="220" y2="120" stroke="#a1a1aa" stroke-width="2" stroke-dasharray="4 4"/>
            <rect x="215" y="150" width="10" height="140" fill="url(#perforated)"/>
            ${sunObj}
            <path d="M 130 90 L 215 170" fill="none" stroke="#fcd34d" stroke-width="4" marker-end="url(#arrow-yellow)" class="svg-ray-bounce"/>
            <path d="M 225 180 L 300 220" fill="none" stroke="#fcd34d" stroke-width="2" opacity="0.3" marker-end="url(#arrow-yellow)" class="svg-ray-bounce"/>
            <path d="M 215 170 L 160 130" fill="none" stroke="#fcd34d" stroke-width="3" opacity="0.8" marker-end="url(#arrow-yellow)" class="svg-ray-bounce"/>
        `;
    }
    else if (t === "Espacios de transición" || index === 3) {
        svgContent += `
            ${groundLine}
            <rect x="400" y="120" width="200" height="220" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="2"/>
            <rect x="250" y="120" width="150" height="220" fill="#e2e8f0" opacity="0.3" stroke="#cbd5e1" stroke-width="1"/>
            <polygon points="220,120 400,50 630,120" fill="none" stroke="#cbd5e1" stroke-width="2"/>
            <line x1="220" y1="120" x2="630" y2="120" stroke="#cbd5e1" stroke-width="2"/>
            <line x1="250" y1="120" x2="250" y2="340" stroke="#cbd5e1" stroke-width="5"/>
            ${sunObj}
            <path d="M 50 180 L 150 180" fill="none" stroke="#06b6d4" stroke-width="6" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
            <path d="M 120 90 L 250 160" fill="none" stroke="#fcd34d" stroke-width="4" marker-end="url(#arrow-yellow)" class="svg-ray-bounce"/>
            <path d="M 170 180 C 250 180, 300 200, 390 200" fill="none" stroke="#06b6d4" stroke-width="4" opacity="0.8" marker-end="url(#arrow-blue)" class="svg-wind-flow-delayed"/>
        `;
    }
    else if (t === "Fachada permeable" || index === 4) {
        svgContent += `
            ${groundLine}
            <rect x="200" y="120" width="15" height="220" fill="url(#perforated)" stroke="#94a3b8" stroke-width="2"/>
            ${drawHouse(300, 160, 250, 180)}
            <path d="M 80 220 L 180 220" fill="none" stroke="#06b6d4" stroke-width="6" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
            <path d="M 230 220 L 290 220" fill="none" stroke="#06b6d4" stroke-width="3" opacity="0.7" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
            <path d="M 230 260 L 290 260" fill="none" stroke="#06b6d4" stroke-width="3" opacity="0.7" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
        `;
    }
    else if (t === "Ventilación elevada" || index === 5) {
        svgContent += `
            ${groundLine}
            ${drawHouse(250, 160, 300, 180)}
            <rect x="250" y="180" width="20" height="40" fill="url(#glass-lines)" stroke="#38bdf8"/>
            <rect x="530" y="180" width="20" height="40" fill="url(#glass-lines)" stroke="#38bdf8"/>
            <path d="M 350 300 Q 400 220 300 190" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow-blue)" class="svg-float-up"/>
            <path d="M 450 300 Q 400 220 500 190" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow-blue)" class="svg-float-up"/>
            <path d="M 280 190 L 200 170" fill="none" stroke="#ef4444" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-float-up"/>
            <path d="M 520 190 L 600 170" fill="none" stroke="#ef4444" stroke-width="5" marker-end="url(#arrow-blue)" class="svg-float-up"/>
        `;
    }
    else if (t === "Núcleo compacto" || index === 6) {
        svgContent += `
            <rect x="150" y="60" width="500" height="280" fill="none" stroke="#cbd5e1" stroke-width="5"/>
            <line x1="150" y1="160" x2="330" y2="160" stroke="#cbd5e1" stroke-width="3"/>
            <line x1="470" y1="160" x2="650" y2="160" stroke="#cbd5e1" stroke-width="3"/>
            <line x1="150" y1="260" x2="330" y2="260" stroke="#cbd5e1" stroke-width="3"/>
            <line x1="470" y1="260" x2="650" y2="260" stroke="#cbd5e1" stroke-width="3"/>
            <line x1="330" y1="60" x2="330" y2="160" stroke="#cbd5e1" stroke-width="3"/>
            <line x1="470" y1="60" x2="470" y2="160" stroke="#cbd5e1" stroke-width="3"/>
            <line x1="330" y1="260" x2="330" y2="340" stroke="#cbd5e1" stroke-width="3"/>
            <line x1="470" y1="260" x2="470" y2="340" stroke="#cbd5e1" stroke-width="3"/>
            <rect x="330" y="160" width="140" height="100" fill="url(#hatch-concrete)" stroke="#ea580c" stroke-width="3"/>
            <rect x="330" y="160" width="140" height="100" fill="#ea580c" opacity="0.1"/>
            <circle cx="400" cy="200" r="60" fill="#ea580c" opacity="0.15" class="svg-heat-radiate"/>
            <path d="M 400 160 L 400 110" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow-red)" class="svg-float-up"/>
            <path d="M 400 260 L 400 310" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow-red)" class="svg-float-up"/>
            <path d="M 330 210 L 250 210" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow-red)" class="svg-float-up"/>
            <path d="M 470 210 L 550 210" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow-red)" class="svg-float-up"/>
        `;
    }
    else if (t === "Envolvente térmica" || index === 7) {
        svgContent += `
            ${groundLine}
            ${drawHouse(300, 160, 250, 180)}
            <rect x="290" y="160" width="10" height="180" fill="url(#hatch-insulation)"/>
            <rect x="285" y="160" width="5" height="180" fill="#64748b"/>
            ${sunObj}
            <path d="M 120 90 L 275 160" fill="none" stroke="#fcd34d" stroke-width="5" marker-end="url(#arrow-yellow)" class="svg-ray-bounce"/>
        `;
    }
    else if (t === "Carpintería hermética" || index === 8) {
        svgContent += `
            ${groundLine}
            <rect x="350" y="50" width="100" height="80" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="2"/>
            <rect x="350" y="270" width="100" height="70" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="2"/>
            <rect x="380" y="130" width="40" height="140" fill="#d1d5db" stroke="#71717a" stroke-width="2"/>
            <rect x="395" y="135" width="10" height="130" fill="url(#glass-lines)" stroke="#38bdf8"/>
            <circle cx="380" cy="130" r="5" fill="#ef4444"/>
            <circle cx="420" cy="130" r="5" fill="#ef4444"/>
            <circle cx="380" cy="270" r="5" fill="#ef4444"/>
            <circle cx="420" cy="270" r="5" fill="#ef4444"/>
            <path d="M 600 200 L 440 200" fill="none" stroke="#06b6d4" stroke-width="6" marker-end="url(#arrow-blue)" class="svg-wind-flow"/>
            <path d="M 430 200 Q 415 200 420 170" fill="none" stroke="#06b6d4" stroke-width="3" opacity="0.5"/>
        `;
    }
    else if (t === "Muro Trombe" || index === 9) {
        svgContent += `
            ${groundLine}
            <rect x="340" y="90" width="10" height="250" fill="url(#glass-lines)" stroke="#38bdf8"/>
            <rect x="350" y="90" width="30" height="250" fill="#ea580c" opacity="0.1"/>
            <rect x="380" y="90" width="40" height="250" fill="url(#hatch-mass)" stroke="#713f12" stroke-width="2"/>
            <rect x="380" y="90" width="10" height="250" fill="#1f2937"/>
            <rect x="420" y="90" width="20" height="250" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="2"/>
            <polygon points="320,80 460,50 460,70 340,90" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
            ${sunObj}
            <path d="M 120 100 L 330 180" fill="none" stroke="#fcd34d" stroke-width="5" marker-end="url(#arrow-yellow)" class="svg-ray-bounce"/>
            <rect x="380" y="90" width="40" height="250" fill="#ea580c" opacity="0.2" class="svg-heat-radiate"/>
            <path d="M 450 150 L 550 150" fill="none" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow-red)" class="svg-float-up"/>
            <path d="M 450 250 L 550 250" fill="none" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow-red)" class="svg-float-up"/>
        `;
    }
    else if (t === "Galería solar" || index === 10) {
