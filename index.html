<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Givoni Climate Engine PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
background:#f1f5f9;
font-family:Inter,sans-serif;
}

#map{
height:260px;
border-radius:22px;
overflow:hidden;
border:1px solid #dbe2ea;
}

#chart{
width:100%;
height:760px;
background:white;
border-radius:24px;
overflow:hidden;
border:1px solid #dbe2ea;
position:relative;
}

.btn-mode{
padding:10px 22px;
border-radius:12px;
border:1px solid #dbe2ea;
font-size:11px;
font-weight:900;
transition:.2s;
}

.active-mode{
background:#2563eb;
color:white;
border-color:#2563eb;
}

.selector-chip{
padding:10px;
border-radius:10px;
border:1px solid #dbe2ea;
text-align:center;
font-size:11px;
font-weight:800;
cursor:pointer;
transition:.2s;
background:white;
}

.selected-item{
background:#2563eb;
color:white;
}

.tooltip-box{
position:absolute;
pointer-events:none;
background:#0f172a;
color:white;
padding:12px;
border-radius:12px;
font-size:11px;
font-weight:700;
opacity:0;
transition:.2s;
z-index:9999;
}

.export-btn{
padding:10px 16px;
border-radius:12px;
background:white;
border:1px solid #dbe2ea;
font-size:11px;
font-weight:900;
cursor:pointer;
transition:.2s;
}

.export-btn:hover{
background:#2563eb;
color:white;
}

</style>
</head>

<body class="p-4 md:p-8">

<main class="max-w-[1900px] mx-auto space-y-6">

<header class="bg-white rounded-3xl border shadow-sm p-6 flex justify-between items-center">

<div>

<h1 class="text-3xl font-black uppercase tracking-tight text-slate-800">
Givoni Climate Engine
</h1>

<p class="text-xs uppercase tracking-[0.3em] text-slate-400 font-black mt-2">
Arquitectura Bioclimática
</p>

</div>

<div class="flex gap-2">

<button onclick="setMode('mes')"
id="btn-mes"
class="btn-mode active-mode">
MESES
</button>

<button onclick="setMode('año')"
id="btn-año"
class="btn-mode">
AÑOS
</button>

</div>

</header>

<div id="map"></div>

<div class="grid grid-cols-1 xl:grid-cols-4 gap-6">

<div class="bg-white rounded-3xl border shadow-sm p-6 space-y-6">

<div>

<p id="location-text"
class="text-blue-600 font-black text-xs uppercase mb-4">
Ubicación: Guayaquil
</p>

<p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">
Seleccionar Año
</p>

<div id="year-selector"
class="grid grid-cols-2 gap-2 max-h-[420px] overflow-y-auto pr-1">
</div>

</div>

<div id="month-section">

<p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-black mb-3">
Meses
</p>

<div id="month-selector"
class="grid grid-cols-3 gap-2">
</div>

</div>

<button onclick="runClimateAnalysis()"
class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black uppercase rounded-2xl py-4 text-xs transition-all">

Actualizar Climograma

</button>

</div>

<div class="xl:col-span-3 space-y-6">

<div class="flex gap-3">

<button class="export-btn" onclick="downloadChart('png')">
DESCARGAR PNG
</button>

<button class="export-btn" onclick="downloadChart('jpg')">
DESCARGAR JPG
</button>

<button class="export-btn" onclick="downloadPDF()">
DESCARGAR PDF
</button>

</div>

<div id="chart">

<div id="tooltip"
class="tooltip-box">
</div>

</div>

<div class="bg-white rounded-3xl border overflow-hidden shadow-sm">

<table class="w-full text-xs">

<thead class="bg-slate-50 border-b text-slate-500 uppercase font-black">

<tr>

<th class="p-4 text-center">Color</th>
<th class="p-4 text-center">Mes/Año</th>
<th class="p-4 text-center">Temp Máx</th>
<th class="p-4 text-center">Temp Mín</th>
<th class="p-4 text-center">HR</th>
<th class="p-4 text-center">Zonas Detectadas</th>

</tr>

</thead>

<tbody id="table-body"
class="font-bold text-slate-700 text-center">
</tbody>

</table>

</div>

<div class="bg-[#0f172a] rounded-3xl p-10 text-white border-l-[10px] border-blue-500">

<div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

<div>

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Diagnóstico Bioclimático
</p>

<p id="analysis-text"
class="text-slate-300 leading-relaxed text-lg">
</p>

</div>

<div>

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Estrategias Arquitectónicas
</p>

<div id="strategy-list"
class="space-y-4">
</div>

</div>

</div>

<div class="mt-10">

<p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-black mb-5">
Gráfico Conceptual Arquitectónico
</p>

<div id="strategy-graphic"
class="bg-white rounded-3xl p-6 flex justify-center items-center">
</div>

</div>

</div>

</div>

</div>

</main>

<script>

const months = [
'Ene','Feb','Mar','Abr','May','Jun',
'Jul','Ago','Sep','Oct','Nov','Dic'
];

const zoneNames = {
'Z1':'Confort',
'Z2':'Ventilación Natural',
'Z3':'Masa Térmica',
'Z4':'Enfriamiento Evaporativo',
'Z5':'Ganancia Solar',
'Z6':'Humidificación',
'Z7':'Protección Solar',
'Z8':'Deshumidificación',
'Z9':'Ventilación Cruzada',
'Z10':'Enfriamiento Mecánico',
'Z11':'Calefacción Pasiva',
'Z12':'Alta Humedad',
'Z13':'Ventilación Intensiva',
'Z14':'Clima Extremo'
};

let mode = 'mes';

let selectedYears = [2025];
let selectedMonths = [0,1,2,3,4];

let lat = -2.17;
let lon = -79.92;

let currentZonesSVG = null;

const map = L.map('map').setView([lat,lon],7);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

const marker = L.marker([lat,lon]).addTo(map);

map.on('click', async(e)=>{

lat = e.latlng.lat;
lon = e.latlng.lng;

marker.setLatLng([lat,lon]);

await updateLocation();

runClimateAnalysis();

});

function setMode(m){

mode = m;

document.querySelectorAll('.btn-mode')
.forEach(btn=>btn.classList.remove('active-mode'));

document.getElementById(`btn-${m}`)
.classList.add('active-mode');

document.getElementById('month-section').style.display =
mode === 'mes'
? 'block'
: 'none';

renderSelectors();

}

function renderSelectors(){

const yearBox = document.getElementById('year-selector');

yearBox.innerHTML = '';

const currentYear = new Date().getFullYear();

for(let y=currentYear;y>=2000;y--){

const chip = document.createElement('div');

chip.className = `selector-chip ${
selectedYears.includes(y)
? 'selected-item'
: ''
}`;

chip.innerText = y;

chip.onclick = ()=>{

if(mode === 'mes'){

selectedYears = [y];

}else{

if(selectedYears.includes(y)){

selectedYears =
selectedYears.filter(v=>v!==y);

}else{

selectedYears.push(y);

}

}

renderSelectors();

};

yearBox.appendChild(chip);

}

const monthBox =
document.getElementById('month-selector');

monthBox.innerHTML = '';

months.forEach((m,i)=>{

const chip = document.createElement('div');

chip.className = `selector-chip ${
selectedMonths.includes(i)
? 'selected-item'
: ''
}`;

chip.innerText = m;

chip.onclick = ()=>{

if(selectedMonths.includes(i)){

selectedMonths =
selectedMonths.filter(v=>v!==i);

}else{

selectedMonths.push(i);

}

renderSelectors();

};

monthBox.appendChild(chip);

});

}

async function updateLocation(){

try{

const response = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
);

const data = await response.json();

const city =
data.address.city ||
data.address.town ||
data.address.state ||
'Ubicación';

document.getElementById('location-text')
.innerText = `Ubicación: ${city}`;

}catch(err){}

}

async function fetchClimate(year){

const url = `
https://archive-api.open-meteo.com/v1/archive?
latitude=${lat}&
longitude=${lon}&
start_date=${year}-01-01&
end_date=${year}-12-31&
daily=temperature_2m_max,temperature_2m_min,relative_humidity_2m_mean&
timezone=auto
`;

const response = await fetch(
url.replace(/\s+/g,'')
);

return await response.json();

}

async function loadZonesSVG(){

if(currentZonesSVG) return currentZonesSVG;

const response = await fetch('pruega-de-svg.svg');

const text = await response.text();

currentZonesSVG = text;

return text;

}

function detectZones(hr,tMax,tMin){

let zones = [];

const avgTemp = (tMax + tMin) / 2;

if(avgTemp >= 20 && avgTemp <= 27 && hr >= 30 && hr <= 70){
zones.push('Z1');
}

if(avgTemp >= 24 && avgTemp <= 32 && hr >= 40 && hr <= 75){
zones.push('Z2');
}

if(avgTemp >= 28 && hr <= 45){
zones.push('Z3');
}

if(avgTemp >= 26 && hr <= 50){
zones.push('Z4');
}

if(avgTemp <= 20){
zones.push('Z5');
}

if(hr <= 30){
zones.push('Z6');
}

if(tMax >= 30){
zones.push('Z7');
}

if(hr >= 75){
zones.push('Z8');
}

if(avgTemp >= 27 && hr >= 60){
zones.push('Z9');
}

if(tMax >= 34){
zones.push('Z10');
}

if(tMin <= 16){
zones.push('Z11');
}

if(hr >= 80){
zones.push('Z12');
}

if(tMax >= 32 && hr >= 70){
zones.push('Z13');
}

if(tMax >= 35 || (tMax >= 30 && hr >= 85)){
zones.push('Z14');
}

zones = [...new Set(zones)];

if(zones.length === 0){
zones.push('Z1');
}

return zones;

}

async function drawChart(data){

d3.select('#chart svg').remove();

const width = 1600;
const height = 760;

const margin = {
top:20,
right:20,
bottom:60,
left:20
};

const innerWidth =
width - margin.left - margin.right;

const innerHeight =
height - margin.top - margin.bottom;

const svg = d3.select('#chart')
.append('svg')
.attr('width','100%')
.attr('height','100%')
.attr('viewBox',`0 0 ${width} ${height}`);

const g = svg.append('g')
.attr(
'transform',
`translate(${margin.left},${margin.top})`
);

const x = d3.scaleLinear()
.domain([-5,50])
.range([0,innerWidth]);

const y = d3.scaleLinear()
.domain([0,35])
.range([innerHeight,0]);

for(let i=-5;i<=50;i+=1){

g.append('line')
.attr('x1',x(i))
.attr('x2',x(i))
.attr('y1',0)
.attr('y2',innerHeight)
.attr('stroke','#e2e8f0')
.attr('stroke-width',0.8);

}

for(let i=0;i<=35;i+=1){

g.append('line')
.attr('x1',0)
.attr('x2',innerWidth)
.attr('y1',y(i))
.attr('y2',y(i))
.attr('stroke','#f1f5f9')
.attr('stroke-width',0.8);

}

for(let hr=10; hr<=100; hr+=10){

let points = [];

for(let t=-5; t<=50; t+=0.2){

let saturation =
0.61078 *
Math.exp((17.27*t)/(t+237.3));

let vaporPressure =
(hr/100) * saturation;

let humidityRatio =
622 * (
vaporPressure /
(101.325 - vaporPressure)
);

points.push([
x(t),
y(humidityRatio)
]);

}

g.append('path')
.attr(
'd',
d3.line()
.curve(d3.curveBasis)(points)
)
.attr('fill','none')
.attr('stroke','#cbd5e1')
.attr('stroke-width',1);

if(hr<=30){

g.append('text')
.attr('x',innerWidth+5)
.attr('y',points[points.length-1][1])
.attr('font-size','11px')
.attr('fill','#64748b')
.text(`${hr}%`);

}else{

const mid = points[Math.floor(points.length*0.70)];

g.append('text')
.attr('x',mid[0])
.attr('y',mid[1]-10)
.attr('font-size','11px')
.attr('fill','#64748b')
.text(`${hr}%`);

}

}

const rawSVG = await loadZonesSVG();

const parser = new DOMParser();

const svgDoc = parser.parseFromString(
rawSVG,
"image/svg+xml"
);

const importedSVG =
document.importNode(
svgDoc.documentElement,
true
);

importedSVG.setAttribute("x",0);
importedSVG.setAttribute("y",0);

importedSVG.setAttribute(
"width",
innerWidth
);

importedSVG.setAttribute(
"height",
innerHeight
);

importedSVG.setAttribute(
"preserveAspectRatio",
"none"
);

importedSVG.setAttribute(
"transform",
"translate(0,65)"
);

importedSVG.style.opacity = "0.82";

importedSVG.style.pointerEvents = "none";

const zoneLayer = g.append("g");

zoneLayer.node().appendChild(importedSVG);

const tooltip =
document.getElementById('tooltip');

data.forEach((d,i)=>{

const color =
d3.interpolateRainbow(i/data.length);

d.color = color;

d.zones = detectZones(d.hr,d.tMax,d.tMin);

const points = [];

for(let s=0;s<=30;s++){

let t =
d.tMin +
((d.tMax-d.tMin)*(s/30));

let saturation =
0.61078 *
Math.exp((17.27*t)/(t+237.3));

let vaporPressure =
(d.hr/100) * saturation;

let humidityRatio =
622 * (
vaporPressure /
(101.325 - vaporPressure)
);

points.push([
x(t),
y(humidityRatio)
]);

}

g.append('path')
.attr(
'd',
d3.line()
.curve(d3.curveBasis)(points)
)
.attr('fill','none')
.attr('stroke',color)
.attr('stroke-width',4)
.attr('stroke-linecap','round')

.on('mousemove',(event)=>{

tooltip.style.opacity = 1;

tooltip.style.left =
(event.pageX-150)+'px';

tooltip.style.top =
(event.pageY-80)+'px';

tooltip.innerHTML = `
<div class="space-y-2">

<p class="font-black text-blue-400">
${d.label}
</p>

<p>Temp Máx: <b>${d.tMax.toFixed(1)}°C</b></p>
<p>Temp Mín: <b>${d.tMin.toFixed(1)}°C</b></p>
<p>HR: <b>${d.hr.toFixed(0)}%</b></p>

<p>Zonas:</p>

<p class="text-green-400">
${d.zones.map(z=>`${z}`).join(', ')}
</p>

</div>
`;

})

.on('mouseleave',()=>{

tooltip.style.opacity = 0;

});

});

g.append('g')
.attr(
'transform',
`translate(0,${innerHeight})`
)
.call(
d3.axisBottom(x)
.ticks(12)
);

}

function updateTable(data){

const tbody =
document.getElementById('table-body');

tbody.innerHTML = '';

data.forEach(d=>{

const zoneText =
d.zones.map(z=>`${z}: ${zoneNames[z]}`).join('<br>');

tbody.innerHTML += `
<tr class="border-b hover:bg-slate-50">

<td class="p-4 text-center">
<div class="w-4 h-4 rounded-full inline-block"
style="background:${d.color}">
</div>
</td>

<td class="p-4 text-center">${d.label}</td>

<td class="p-4 text-center">
${d.tMax.toFixed(1)}°C
</td>

<td class="p-4 text-center">
${d.tMin.toFixed(1)}°C
</td>

<td class="p-4 text-center text-blue-600 font-black">
${d.hr.toFixed(0)}%
</td>

<td class="p-4 text-center">
${zoneText}
</td>

</tr>
`;

});

}

function updateAnalysis(data){

const analysis =
document.getElementById('analysis-text');

const strategyList =
document.getElementById('strategy-list');

const graphic =
document.getElementById('strategy-graphic');

strategyList.innerHTML = '';

const avgTemp =
data.reduce((a,b)=>a+b.tMax,0)/data.length;

const avgHR =
data.reduce((a,b)=>a+b.hr,0)/data.length;

let diagnosis = '';
let strategies = [];
let graphicSVG = '';

if(avgHR>=75){

diagnosis =
'El análisis climático evidencia un comportamiento cálido húmedo con elevados niveles de humedad relativa y temperaturas altas durante gran parte del periodo analizado. Las curvas del climograma se desplazan principalmente hacia zonas relacionadas con deshumidificación, ventilación cruzada y control solar.';

strategies = [
'Celosías orientables de madera',
'Cubiertas ventiladas',
'Vegetación tropical de sombra',
'Ventilación cruzada permanente',
'Materiales ligeros reflectivos'
];

graphicSVG = `
<svg viewBox="0 0 500 250" width="100%">
<rect x="100" y="80" width="300" height="120" fill="#e2e8f0"/>
<polygon points="80,80 250,20 420,80" fill="#94a3b8"/>
<line x1="30" y1="130" x2="470" y2="90" stroke="#0ea5e9" stroke-width="10"/>
<circle cx="60" cy="180" r="30" fill="#16a34a"/>
<circle cx="440" cy="180" r="30" fill="#16a34a"/>
</svg>
`;

}else{

diagnosis =
'Las condiciones climáticas presentan mayor estabilidad térmica y menor carga de humedad.';

strategies = [
'Aprovechamiento lumínico',
'Ventilación natural controlada'
];

graphicSVG = `
<svg viewBox="0 0 500 250" width="100%">
<rect x="120" y="70" width="260" height="130" fill="#dbeafe"/>
<polygon points="100,70 250,20 400,70" fill="#93c5fd"/>
</svg>
`;

}

analysis.innerText = diagnosis;

strategies.forEach(s=>{

strategyList.innerHTML += `
<div class="bg-slate-900 border border-slate-800 rounded-2xl p-5">
<p class="text-sm font-bold text-slate-300">
${s}
</p>
</div>
`;

});

graphic.innerHTML = graphicSVG;

}

function downloadChart(type){

const svg =
document.querySelector('#chart svg');

const serializer =
new XMLSerializer();

const source =
serializer.serializeToString(svg);

const image =
new Image();

image.src =
'data:image/svg+xml;charset=utf-8,'+
encodeURIComponent(source);

image.onload = function(){

const canvas =
document.createElement('canvas');

canvas.width = 1600;
canvas.height = 760;

const ctx =
canvas.getContext('2d');

ctx.fillStyle = 'white';
ctx.fillRect(0,0,1600,760);

ctx.drawImage(image,0,0);

const link =
document.createElement('a');

link.download = `climograma.${type}`;

link.href =
canvas.toDataURL(`image/${type}`);

link.click();

};

}

function downloadPDF(){

const { jsPDF } = window.jspdf;

const pdf = new jsPDF(
'landscape',
'px',
[1600,760]
);

const svg =
document.querySelector('#chart svg');

const serializer =
new XMLSerializer();

const source =
serializer.serializeToString(svg);

const image =
new Image();

image.src =
'data:image/svg+xml;charset=utf-8,'+
encodeURIComponent(source);

image.onload = function(){

const canvas =
document.createElement('canvas');

canvas.width = 1600;
canvas.height = 760;

const ctx =
canvas.getContext('2d');

ctx.fillStyle = 'white';
ctx.fillRect(0,0,1600,760);

ctx.drawImage(image,0,0);

const imgData =
canvas.toDataURL('image/png');

pdf.addImage(
imgData,
'PNG',
0,
0,
1600,
760
);

pdf.save('climograma.pdf');

};

}

async function runClimateAnalysis(){

let results = [];

if(mode === 'mes'){

const year = selectedYears[0];

const data =
await fetchClimate(year);

for(let m=0;m<12;m++){

if(!selectedMonths.includes(m))
continue;

const tMax =
data.daily.temperature_2m_max
.filter((v,i)=>
new Date(data.daily.time[i]).getMonth()===m
);

const tMin =
data.daily.temperature_2m_min
.filter((v,i)=>
new Date(data.daily.time[i]).getMonth()===m
);

const hr =
data.daily.relative_humidity_2m_mean
.filter((v,i)=>
new Date(data.daily.time[i]).getMonth()===m
);

results.push({

label:`${months[m]} ${year}`,

tMax:tMax.reduce((a,b)=>a+b,0)/tMax.length,

tMin:tMin.reduce((a,b)=>a+b,0)/tMin.length,

hr:hr.reduce((a,b)=>a+b,0)/hr.length

});

}

}else{

for(const year of selectedYears){

const data =
await fetchClimate(year);

results.push({

label:`${year}`,

tMax:
data.daily.temperature_2m_max
.reduce((a,b)=>a+b,0)
/
data.daily.temperature_2m_max.length,

tMin:
data.daily.temperature_2m_min
.reduce((a,b)=>a+b,0)
/
data.daily.temperature_2m_min.length,

hr:
data.daily.relative_humidity_2m_mean
.reduce((a,b)=>a+b,0)
/
data.daily.relative_humidity_2m_mean.length

});

}

}

await drawChart(results);

updateTable(results);

updateAnalysis(results);

}

renderSelectors();

updateLocation();

runClimateAnalysis();

</script>

</body>
</html>
