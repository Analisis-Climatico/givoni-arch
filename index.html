<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Givoni Climate Engine</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
    background:#eef2f7;
    font-family:Inter,sans-serif;
}

#map{
    height:260px;
    border-radius:18px;
    overflow:hidden;
}

#chart-wrapper{
    position:relative;
    width:100%;
    height:760px;
    overflow:hidden;
    background:white;
    border-radius:24px;
    border:1px solid #dce2ea;
}

#chart-canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:2;
}

#givoni-zones{
    position:absolute;
    left:0;
    top:58px;
    width:100%;
    height:calc(100% - 58px);
    z-index:1;
    pointer-events:none;
    opacity:0.97;
}

.tooltip-custom{
    position:absolute;
    z-index:99999;
    background:#0f172a;
    color:white;
    padding:12px;
    border-radius:14px;
    font-size:12px;
    font-weight:700;
    pointer-events:none;
    display:none;
    min-width:180px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.btn-chip{
    padding:10px;
    border-radius:12px;
    font-weight:800;
    font-size:11px;
    border:1px solid #d7dde7;
    cursor:pointer;
    transition:.2s;
}

.active-chip{
    background:#2563eb;
    color:white;
}

</style>
</head>

<body class="p-6">

<div class="max-w-[1900px] mx-auto space-y-6">

<div id="map"></div>

<div class="grid grid-cols-1 lg:grid-cols-4 gap-6">

<div class="bg-white rounded-3xl border p-6 space-y-6">

<div>
<h3 class="text-xs font-black tracking-[3px] text-blue-700 uppercase mb-4">
Ubicación:
<span id="location-name">Guayaquil</span>
</h3>

<div class="flex gap-2 mb-4">

<button onclick="setModo('mes')"
id="btn-mes"
class="btn-chip active-chip">
MESES
</button>

<button onclick="setModo('año')"
id="btn-año"
class="btn-chip">
AÑOS
</button>

</div>

<p class="text-[10px] font-black tracking-[4px] text-slate-400 uppercase mb-2">
Seleccionar Año
</p>

<div id="year-selector"
class="grid grid-cols-2 gap-2 max-h-80 overflow-y-auto">
</div>

<div id="meses-box">

<p class="text-[10px] font-black tracking-[4px] text-slate-400 uppercase mt-6 mb-2">
Meses
</p>

<div id="month-selector"
class="grid grid-cols-3 gap-2">
</div>

</div>

</div>

<button onclick="ejecutarAnalisis()"
class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xs uppercase">
Actualizar Climograma
</button>

<div class="space-y-3">

<button onclick="descargarPNG()"
class="w-full bg-slate-900 text-white py-3 rounded-xl text-xs font-black">
Descargar PNG
</button>

</div>

</div>

<div class="lg:col-span-3">

<div id="chart-wrapper">

<img
src="pruega-de-svg.svg"
id="givoni-zones">

<canvas id="chart-canvas"></canvas>

<div id="tooltip"
class="tooltip-custom"></div>

</div>

</div>

</div>

<div class="bg-white rounded-3xl overflow-hidden border">

<table class="w-full text-sm">

<thead class="bg-slate-50 text-slate-500 uppercase text-[11px]">

<tr>

<th class="p-5">Color</th>
<th>Mes/Año</th>
<th>Temp Máx</th>
<th>Temp Mín</th>
<th>HR</th>
<th>Zona</th>

</tr>

</thead>

<tbody id="table-body"></tbody>

</table>

</div>

<div class="bg-[#081120] text-white rounded-3xl p-10">

<h2 class="text-3xl font-black mb-8">
Diagnóstico Bioclimático
</h2>

<p id="diagnostico"
class="text-slate-300 leading-relaxed text-lg">
</p>

<div id="estrategias"
class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-10">
</div>

<h2 class="text-3xl font-black mt-14 mb-8">
Concepto Arquitectónico Referencial
</h2>

<div id="concepto-arquitectonico"
class="grid grid-cols-1 md:grid-cols-3 gap-6">
</div>

</div>

</div>

<script>

const meses = [
"Ene","Feb","Mar","Abr","May","Jun",
"Jul","Ago","Sep","Oct","Nov","Dic"
];

const apiKey = "b0be33523088ce87c824d0befe19820c";

let modo = "mes";

let seleccionMeses = [0,1,2];

let seleccionAnos = [2025];

let lat = -2.17;
let lon = -79.92;

const canvas = document.getElementById("chart-canvas");
const ctx = canvas.getContext("2d");

const tooltip = document.getElementById("tooltip");

const puntosInteractivos = [];

let scale = 1;

const map = L.map("map").setView([lat,lon],8);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

const marker = L.marker([lat,lon]).addTo(map);

map.on("click", async(e)=>{

    lat = e.latlng.lat;
    lon = e.latlng.lng;

    marker.setLatLng([lat,lon]);

    try{

        const res = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`
        );

        const data = await res.json();

        document.getElementById("location-name").innerText =
        data.name;

    }catch(err){}

});

function setModo(m){

    modo = m;

    document.getElementById("btn-mes")
    .classList.remove("active-chip");

    document.getElementById("btn-año")
    .classList.remove("active-chip");

    document.getElementById(`btn-${m}`)
    .classList.add("active-chip");

    document.getElementById("meses-box").style.display =
    m === "mes" ? "block" : "none";

}

function renderInterfaz(){

    const yearBox =
    document.getElementById("year-selector");

    yearBox.innerHTML = "";

    for(let y=2026;y>=2000;y--){

        const div = document.createElement("div");

        div.className = `
        btn-chip
        ${seleccionAnos.includes(y)
        ? 'active-chip'
        : ''}
        `;

        div.innerText = y;

        div.onclick = ()=>{

            if(modo === "mes"){

                seleccionAnos = [y];

            }else{

                if(seleccionAnos.includes(y)){

                    seleccionAnos =
                    seleccionAnos.filter(a=>a!==y);

                }else{

                    seleccionAnos.push(y);

                }

            }

            renderInterfaz();

        };

        yearBox.appendChild(div);

    }

    const monthBox =
    document.getElementById("month-selector");

    monthBox.innerHTML = "";

    meses.forEach((m,i)=>{

        const div = document.createElement("div");

        div.className = `
        btn-chip
        ${seleccionMeses.includes(i)
        ? 'active-chip'
        : ''}
        `;

        div.innerText = m;

        div.onclick = ()=>{

            if(seleccionMeses.includes(i)){

                seleccionMeses =
                seleccionMeses.filter(x=>x!==i);

            }else{

                seleccionMeses.push(i);

            }

            renderInterfaz();

        };

        monthBox.appendChild(div);

    });

}

function dibujarBase(){

    canvas.width =
    canvas.parentElement.clientWidth;

    canvas.height =
    canvas.parentElement.clientHeight;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const paddingLeft = 115;
    const graphTop = 52;
    const graphWidth = canvas.width - 175;
    const graphHeight = canvas.height - 115;

    ctx.strokeStyle = "#d9e0ea";

    for(let i=-5;i<=50;i++){

        const x =
        paddingLeft + ((i+5)/55)*graphWidth;

        ctx.beginPath();
        ctx.moveTo(x,graphTop);
        ctx.lineTo(x,graphTop+graphHeight);
        ctx.stroke();

        ctx.fillStyle = "#475569";
        ctx.font = "11px Inter";

        ctx.fillText(
            i,
            x-4,
            graphTop+graphHeight+20
        );

    }

    for(let h=0;h<=100;h+=10){

        const y =
        graphTop + graphHeight -
        (h/100)*graphHeight;

        ctx.beginPath();
        ctx.moveTo(paddingLeft,y);
        ctx.lineTo(
            paddingLeft+graphWidth,
            y
        );

        ctx.strokeStyle = "#edf2f7";
        ctx.stroke();

        ctx.fillStyle = "#64748b";
        ctx.font = "12px Inter";

        ctx.fillText(
            `${h}%`,
            paddingLeft+graphWidth+10,
            y+4
        );

    }

}

function obtenerZona(t,h){

    if(h>80 && t>27) return 14;
    if(t>38) return 13;
    if(t>32 && h<55) return 10;
    if(t>30) return 12;
    if(t>26) return 9;
    if(t>22) return 2;
    return 1;

}

const nombresZonas = {

1:'Zona 1 · Confort',
2:'Zona 2 · Confort Permisible',
9:'Zona 9 · Alta Masa Térmica',
10:'Zona 10 · Enfriamiento por Evaporación',
12:'Zona 12 · Ventilación Natural y Mecánica',
13:'Zona 13 · Aire Acondicionado',
14:'Zona 14 · Deshumidificación'

};

function ejecutarAnalisis(){

    dibujarBase();

    puntosInteractivos.length = 0;

    const table =
    document.getElementById("table-body");

    table.innerHTML = "";

    const items =
    modo === "mes"
    ? seleccionMeses
    : seleccionAnos;

    let zonasDetectadas = [];

    items.forEach((item,index)=>{

        let label;

        if(modo==="mes"){

            label =
            `${meses[item]} ${seleccionAnos[0]}`;

        }else{

            label = item;

        }

        const tmax =
        29 + Math.random()*6;

        const tmin =
        22 + Math.random()*3;

        const hr =
        70 + Math.random()*25;

        const zona =
        obtenerZona(tmax,hr);

        zonasDetectadas.push(zona);

        const color =
        `hsl(${index*60},80%,55%)`;

        const paddingLeft = 115;
        const graphTop = 52;
        const graphWidth = canvas.width - 175;
        const graphHeight = canvas.height - 115;

        const x1 =
        paddingLeft + ((tmin+5)/55)*graphWidth;

        const x2 =
        paddingLeft + ((tmax+5)/55)*graphWidth;

        const y =
        graphTop + graphHeight -
        (hr/100)*graphHeight;

        ctx.beginPath();

        ctx.moveTo(x1,y);

        ctx.lineTo(x2,y-80);

        ctx.lineWidth = 7;
        ctx.lineCap = "round";
        ctx.strokeStyle = color;

        ctx.stroke();

        puntosInteractivos.push({

            x:x2,
            y:y-80,
            label,
            tmax:tmax.toFixed(1),
            tmin:tmin.toFixed(1),
            hr:hr.toFixed(0),
            zona:nombresZonas[zona]

        });

        table.innerHTML += `

        <tr class="border-t">

        <td class="p-5">
            <div
            style="
            width:18px;
            height:18px;
            border-radius:999px;
            background:${color};
            ">
            </div>
        </td>

        <td>${label}</td>

        <td>${tmax.toFixed(1)}°C</td>

        <td>${tmin.toFixed(1)}°C</td>

        <td class="text-blue-600 font-black">
        ${hr.toFixed(0)}%
        </td>

        <td>
        ${nombresZonas[zona]}
        </td>

        </tr>

        `;

    });

    generarDiagnostico(zonasDetectadas);

}

function generarDiagnostico(zonas){

    const diagnostico =
    document.getElementById("diagnostico");

    const estrategias =
    document.getElementById("estrategias");

    const concepto =
    document.getElementById("concepto-arquitectonico");

    if(zonas.includes(14)){

        diagnostico.innerHTML = `
        El análisis bioclimático evidencia condiciones
        de elevada humedad relativa y altas temperaturas
        durante gran parte del período analizado,
        generando ambientes con sensación térmica elevada
        y baja disipación natural del calor.
        <br><br>
        El climograma indica predominancia en zonas de
        deshumidificación y ventilación natural,
        por lo que el diseño arquitectónico debe
        priorizar estrategias pasivas de enfriamiento,
        ventilación cruzada permanente,
        control solar y selección de materiales
        de baja inercia térmica.
        `;

    }

    estrategias.innerHTML = `

    <div class="bg-white/5 rounded-2xl p-6 border border-white/10">
        <h3 class="font-black text-lg mb-3">
        Ventilación Cruzada
        </h3>
        <p class="text-slate-300 text-sm leading-relaxed">
        Uso de aperturas opuestas,
        celosías orientables,
        patios ventilados y dobles alturas
        para maximizar circulación de aire.
        </p>
    </div>

    <div class="bg-white/5 rounded-2xl p-6 border border-white/10">
        <h3 class="font-black text-lg mb-3">
        Protección Solar
        </h3>
        <p class="text-slate-300 text-sm leading-relaxed">
        Incorporación de vegetación,
        aleros,
        filtros solares,
        fachadas ventiladas
        y cubiertas reflectivas.
        </p>
    </div>

    <div class="bg-white/5 rounded-2xl p-6 border border-white/10">
        <h3 class="font-black text-lg mb-3">
        Materialidad Pasiva
        </h3>
        <p class="text-slate-300 text-sm leading-relaxed">
        Uso de madera,
        bambú,
        paneles ventilados,
        pisos fríos
        y materiales transpirables.
        </p>
    </div>

    `;

    concepto.innerHTML = `

    <div class="bg-white rounded-2xl overflow-hidden">
        <img
        src="https://images.unsplash.com/photo-1511818966892-d7d671e672a2?q=80&w=1200"
        class="w-full h-56 object-cover">
    </div>

    <div class="bg-white rounded-2xl overflow-hidden">
        <img
        src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200"
        class="w-full h-56 object-cover">
    </div>

    <div class="bg-white rounded-2xl overflow-hidden">
        <img
        src="https://images.unsplash.com/photo-1494526585095-c41746248156?q=80&w=1200"
        class="w-full h-56 object-cover">
    </div>

    `;

}

canvas.addEventListener('mousemove',(e)=>{

    const rect =
    canvas.getBoundingClientRect();

    const mouseX =
    e.clientX - rect.left;

    const mouseY =
    e.clientY - rect.top;

    let found = false;

    puntosInteractivos.forEach(p=>{

        const dx = mouseX - p.x;
        const dy = mouseY - p.y;

        if(Math.sqrt(dx*dx+dy*dy)<15){

            tooltip.style.display='block';

            tooltip.style.left =
            `${e.pageX+15}px`;

            tooltip.style.top =
            `${e.pageY-70}px`;

            tooltip.innerHTML = `
            <strong>${p.label}</strong><br>
            Temp Máx: ${p.tmax}°C<br>
            Temp Mín: ${p.tmin}°C<br>
            HR: ${p.hr}%<br>
            ${p.zona}
            `;

            found = true;

        }

    });

    if(!found){

        tooltip.style.display='none';

    }

});

canvas.addEventListener('wheel',(e)=>{

    e.preventDefault();

    if(e.deltaY<0){

        scale += .05;

    }else{

        scale -= .05;

    }

    scale = Math.min(Math.max(scale,1),2);

    canvas.style.transform =
    `scale(${scale})`;

    canvas.style.transformOrigin =
    'center center';

});

function descargarPNG(){

    const link =
    document.createElement('a');

    link.download =
    'climograma-givoni.png';

    link.href =
    canvas.toDataURL();

    link.click();

}

renderInterfaz();

setTimeout(ejecutarAnalisis,500);

</script>

</body>
</html>
