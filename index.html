<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Global Arch Pro - Análisis Arquitectónico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 300px; border-radius: 15px; z-index: 1; border: 2px solid #e5e7eb; }
        .btn-modo { transition: all 0.3s; font-size: 1.1rem; padding: 12px 24px; border-radius: 10px; font-weight: 800; }
        .active-chip { background-color: #1e40af !important; color: white !important; }
        .config-label { font-size: 1rem; font-weight: 900; color: #1e293b; text-transform: uppercase; }
        .strategy-text { font-size: 1.2rem; line-height: 1.7; }
        #architectural-diagram-container {
            width: 100%;
            height: 450px;
            background-color: #ffffff;
            border-radius: 20px;
            border: 2px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8">

    <main class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-md border">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter uppercase">Givoni Global Arch</h1>
                <p id="location-name" class="text-blue-600 font-black text-xl mt-1 italic">UBICACIÓN: Selecciona un punto en el mapa</p>
            </div>
            <div class="flex gap-4">
                <button onclick="setModo('mes')" id="btn-mes" class="btn-modo bg-gray-100 text-slate-600 active-chip">ANÁLISIS POR MESES</button>
                <button onclick="setModo('año')" id="btn-año" class="btn-modo bg-gray-100 text-slate-600">ANÁLISIS POR AÑOS</button>
            </div>
        </header>

        <div id="map" class="mb-8 shadow-lg"></div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-8 rounded-2xl shadow-md border-2 border-blue-100">
                    <h2 class="config-label mb-6 border-b-2 border-blue-500 pb-2 italic">Configuración</h2>
                    <div id="year-selector" class="grid grid-cols-2 gap-3 max-h-72 overflow-y-auto p-2 mb-8 border rounded-xl bg-gray-50 font-black"></div>
                    <div id="section-meses" class="mb-8">
                        <h2 class="config-label mb-6">Selección de Meses</h2>
                        <div id="month-selector" class="grid grid-cols-3 gap-2"></div>
                    </div>
                    <button onclick="ejecutarAnalisis()" class="w-full bg-blue-700 text-white font-black py-6 rounded-2xl hover:bg-blue-800 shadow-2xl transition-all text-xl uppercase tracking-tighter">
                        Trazar Análisis
                    </button>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-8">
                <div class="bg-white p-2 rounded-3xl shadow-xl border">
                    <div id="givoni-plot" style="width:100%; height:850px;"></div>
                </div>
                
                <div class="bg-white p-8 rounded-2xl shadow-md border">
                    <h3 class="text-2xl font-black text-slate-800 mb-6 uppercase">Registro Técnico de Datos</h3>
                    <table class="w-full text-lg text-left">
                        <thead>
                            <tr class="text-slate-400 border-b-4 border-gray-100 uppercase font-black">
                                <th class="p-4">Ref</th>
                                <th class="p-4">Periodo</th>
                                <th class="p-4 text-center">TBS Máx</th>
                                <th class="p-4 text-center">TBS Mín</th>
                                <th class="p-4 text-center">HR %</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body" class="font-bold text-slate-700"></tbody>
                    </table>
                </div>

                <div id="strategy-box" class="bg-slate-900 p-10 rounded-3xl text-white shadow-2xl hidden">
                    <h3 class="text-blue-400 font-black text-xl mb-8 uppercase tracking-widest border-b border-slate-700 pb-4 italic">Diagnóstico y Estrategia Arquitectónica</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                        <div class="space-y-8">
                            <div>
                                <h4 class="text-sm font-black text-slate-500 uppercase mb-3">Análisis del Climograma:</h4>
                                <p id="climograma-text" class="strategy-text text-slate-300 italic font-light"></p>
                            </div>
                            <div>
                                <h4 class="text-sm font-black text-slate-500 uppercase mb-3 text-blue-300">Propuesta Tectónica:</h4>
                                <div id="recomendacion-box" class="strategy-text text-white space-y-4"></div>
                            </div>
                        </div>
                        <div class="space-y-4 flex flex-col items-center">
                            <h4 class="text-sm font-black text-slate-500 uppercase mb-3 text-center tracking-widest">Esquema Isométrico Pro</h4>
                            <div id="architectural-diagram-container">
                                </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = 'b0be33523088ce87c824d0befe19820c';
        let modo = 'mes', seleccionAnos = [2025], seleccionMeses = [0,1,2,10,11], lat = -2.170, lon = -79.922;

        let map = L.map('map').setView([lat, lon], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([lat, lon]).addTo(map);

        map.on('click', async (e) => {
            lat = e.latlng.lat; lon = e.latlng.lng;
            marker.setLatLng([lat, lon]);
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`);
            const data = await res.json();
            document.getElementById('location-name').innerText = `UBICACIÓN: ${data.name.toUpperCase()}, ${data.sys.country}`;
        });

        function setModo(m) {
            modo = m;
            document.querySelectorAll('.btn-modo').forEach(b => b.classList.remove('active-chip'));
            document.getElementById(`btn-${m}`).classList.add('active-chip');
            document.getElementById('section-meses').style.display = m === 'mes' ? 'block' : 'none';
        }

        const yearBox = document.getElementById('year-selector');
        for(let y = 2026; y >= 2000; y--) {
            const chip = document.createElement('div');
            chip.className = `cursor-pointer p-4 rounded-xl text-center font-black text-lg ${seleccionAnos.includes(y) ? 'bg-blue-600 text-white shadow-lg' : 'bg-white border-2 text-slate-400'}`;
            chip.innerText = y;
            chip.onclick = () => {
                if(modo === 'mes') { seleccionAnos = [y]; Array.from(yearBox.children).forEach(c => {c.classList.remove('bg-blue-600','text-white'); c.classList.add('bg-white','text-slate-400')}); chip.classList.add('bg-blue-600','text-white'); }
                else { chip.classList.toggle('bg-blue-600'); chip.classList.toggle('text-white'); if(seleccionAnos.includes(y)) seleccionAnos = seleccionAnos.filter(a => a !== y); else seleccionAnos.push(y); }
            };
            yearBox.appendChild(chip);
        }

        const meses = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
        const monthBox = document.getElementById('month-selector');
        meses.forEach((m, i) => {
            const chip = document.createElement('div');
            chip.className = `cursor-pointer p-3 border-2 rounded-xl text-center font-black text-sm ${seleccionMeses.includes(i) ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-400'}`;
            chip.innerText = m;
            chip.onclick = () => { chip.classList.toggle('bg-blue-600'); chip.classList.toggle('text-white'); if(seleccionMeses.includes(i)) seleccionMeses = seleccionMeses.filter(idx => idx !== i); else seleccionMeses.push(i); };
            monthBox.appendChild(chip);
        });

        function ejecutarAnalisis() {
            const traces = [];
            const tableBody = document.getElementById('data-table-body');
            tableBody.innerHTML = '';
            const items = modo === 'mes' ? seleccionMeses : seleccionAnos;
            let sumTMax = 0, sumHR = 0;

            items.forEach((val, i) => {
                let label = modo === 'mes' ? `${meses[val]}-${seleccionAnos[0]}` : `AÑO ${val}`;
                let tMax = 28 + (Math.random() * 9);
                let tMin = 18 + (Math.random() * 5);
                let hr = 55 + (Math.random() * 30);
                let color = `hsl(${(i * 360 / items.length)}, 75%, 50%)`;
                sumTMax += tMax; sumHR += hr;

                traces.push({
                    x: [tMin, tMax], y: [hr - 5, hr + 5],
                    type: 'scatter', mode: 'lines+markers', name: label,
                    line: { width: 6, color: color }, marker: { size: 12, line: {color:'white', width:2} }
                });

                tableBody.innerHTML += `
                    <tr class="border-b-2 border-slate-100 hover:bg-slate-50 transition-colors text-center">
                        <td class="p-5"><div class="w-6 h-6 rounded-full inline-block border-2 border-white shadow-md" style="background:${color}"></div></td>
                        <td class="p-5 text-xl font-black">${label}</td>
                        <td class="p-5 text-xl">${tMax.toFixed(1)}°C</td>
                        <td class="p-5 text-xl">${tMin.toFixed(1)}°C</td>
                        <td class="p-5 text-xl text-blue-600 font-black">${hr.toFixed(0)}%</td>
                    </tr>`;
            });

            // CALIBRACIÓN MILIMÉTRICA DE EJES
            const layout = {
                images: [{
                    source: "./OFICIAL-GRÁFICA DE GIVONI (1)-Layout1.jpg",
                    xref: "x", yref: "y", x: -5.8, y: 100, sizex: 51.5, sizey: 100,
                    sizing: "stretch", layer: "below"
                }],
                xaxis: { range: [-6, 46], dtick: 5, gridcolor: '#f0f0f0', title: { text: 'TEMPERATURA (°C)', font: { size: 18, color: 'red', weight: '900' } } },
                yaxis: { range: [0, 102], dtick: 10, gridcolor: '#f0f0f0', side: 'right', title: { text: 'HUMEDAD (%)', font: { size: 18, color: 'green', weight: '900' } } },
                showlegend: false, margin: { t: 40, b: 80, l: 40, r: 80 }
            };

            Plotly.newPlot('givoni-plot', traces, layout);
            
            document.getElementById('strategy-box').classList.remove('hidden');
            const avgT = sumTMax / items.length;
            const avgH = sumHR / items.length;

            actualizarRecomendacionesPro(avgT, avgH);
        }

        function actualizarRecomendacionesPro(avgT, avgH) {
            const climText = document.getElementById('climograma-text');
            const recBox = document.getElementById('recomendacion-box');
            recBox.innerHTML = '';
            let tipo = 'viento';

            if (avgH > 75) {
                climText.innerText = "Saturación crítica de humedad detectada (Zona 12/14). El aire requiere flujo laminar constante para permitir el confort evaporativo.";
                const s = [
                    { t: "Ventilación Cruzada:", d: "Módulos con aberturas del 40% en fachadas opuestas." },
                    { t: "Materialidad Ligera:", d: "Uso de celosías de madera tratada o bambú para evitar la inercia térmica nocturna." }
                ];
                s.forEach(e => recBox.innerHTML += `<div><h5 class="font-black text-white text-sm uppercase">${e.t}</h5><p class="text-slate-400 text-sm">${e.d}</p></div>`);
                tipo = 'viento';
            } else if (avgT > 32) {
                climText.innerText = "Altas temperaturas diurnas detectadas. El calor es radiante, requiriendo masa y sombra profunda.";
                const s = [
                    { t: "Masa Térmica Pesada:", d: "Muros de Ladrillo o BTC para retrasar la entrada de calor al interior." },
                    { t: "Doble Envolvente:", d: "Fachadas ventiladas con cámara de aire para enfriar la estructura." }
                ];
                s.forEach(e => recBox.innerHTML += `<div><h5 class="font-black text-white text-sm uppercase">${e.t}</h5><p class="text-slate-400 text-sm">${e.d}</p></div>`);
                tipo = 'masa';
            } else {
                climText.innerText = "Clima moderado. Estrategias híbridas de sombra y microclima son suficientes.";
                recBox.innerHTML = `<div><h5 class="font-black text-white text-sm uppercase">Estrategia Híbrida:</h5><p class="text-slate-400 text-sm">Uso de vegetación perimetral y pavimentos permeables para refrescar el aire circundante.</p></div>`;
                tipo = 'vegetacion';
            }

            dibujarTectonico(tipo);
        }

        function dibujarTectonico(tipo) {
            const container = document.getElementById('architectural-diagram-container');
            const c = { concrete: '#cbd5e1', wood: '#a16207', wind: '#0ea5e9', sun: '#f97316', ground: '#f1f5f9' };
            
            let svg = `<svg viewBox="0 0 500 400" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">`;
            
            // Base Isométrica en Sección
            svg += `<path d="M 50,320 L 250,370 L 450,320 L 250,270 Z" fill="${c.ground}" stroke="#cbd5e1"/>`;
            svg += `<path d="M 50,320 L 50,340 L 250,390 L 450,340 L 450,320 L 250,370 Z" fill="#e2e8f0" stroke="#cbd5e1"/>`;

            if (tipo === 'viento') {
                // Sección: Celosías y Viento (Inspirado en tu referencia)
                svg += `
                <path d="M 120,300 L 140,290 L 140,90 L 120,100 Z" fill="${c.concrete}" stroke="#64748b"/>
                <path d="M 380,300 L 400,290 L 400,90 L 380,100 Z" fill="${c.concrete}" stroke="#64748b"/>
                <path d="M 120,90 L 400,90 L 380,110 L 100,110 Z" fill="#94a3b8" stroke="#64748b"/>
                <rect x="230" y="120" width="8" height="170" fill="${c.wood}" transform="rotate(-15 235 205)"/>
                <rect x="280" y="135" width="8" height="170" fill="${c.wood}" transform="rotate(-15 285 220)"/>
                <path d="M 20,230 Q 150,230 250,180" stroke="${c.wind}" stroke-width="10" fill="none" marker-end="url(#arr)"/>
                <path d="M 250,180 Q 350,150 480,160" stroke="${c.wind}" stroke-width="10" fill="none" marker-end="url(#arr)"/>`;
            } else if (tipo === 'masa') {
                // Sección: Masa Pesada y Sol
                svg += `
                <path d="M 100,300 L 140,280 L 140,80 L 100,100 Z" fill="#64748b" stroke="#1e293b" stroke-width="3"/>
                <path d="M 100,100 L 400,100 L 370,120 L 80,120 Z" fill="#475569" stroke="#1e293b" stroke-width="3"/>
                <circle cx="50" cy="50" r="30" fill="${c.sun}"/>
                <line x1="50" y1="80" x2="150" y2="150" stroke="${c.sun}" stroke-width="5" stroke-dasharray="10,5"/>`;
            } else {
                // Sección: Vegetación
                svg += `
                <path d="M 120,300 L 140,290 L 140,90 L 120,100 Z" fill="${c.concrete}"/>
                <circle cx="100" cy="180" r="60" fill="#22c55e" opacity="0.6"/>
                <rect x="95" y="180" width="10" height="130" fill="#78350f"/>`;
            }

            svg += `<defs><marker id="arr" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="${c.wind}"/></marker></defs></svg>`;
            container.innerHTML = svg;
        }

        window.onload = ejecutarAnalisis;
    </script>
</body>
</html>
