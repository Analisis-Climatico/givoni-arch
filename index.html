<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsualizador - Motor SVG</title>
    <style>
        /* Estilos base para simular la interfaz del proyecto */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .panel {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            max-width: 800px;
            justify-content: center;
        }

        .strat-btn {
            background-color: #0f172a;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .strat-btn:hover {
            border-color: #64748b;
            color: #cbd5e1;
        }

        .strat-btn.active {
            background-color: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
            font-weight: bold;
        }

        #svg-canvas {
            width: 800px;
            height: 400px;
            background-color: #0f172a; /* Fondo oscuro para resaltar los trazos */
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 1px solid #334155;
        }

        /* Ajuste para mantener un esquema visual puramente diagramático.
          Descomenta la siguiente línea si prefieres ocultar todos los textos 
          y priorizar un gráfico minimalista sin explicaciones textuales.
        */
        /* text { display: none !important; } */

        /* Animaciones requeridas por el código SVG */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin { animation: spin 2s linear infinite; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="menu" id="menu">
            </div>
        <div id="svg-canvas"></div>
    </div>

    <script>
        // 1. SIMULACIÓN DE DATOS
        // Array con los nombres exactos que utiliza tu lógica condicional
        const strategies = [
            { t: "Ventilación regulable" }, { t: "Cubierta ventilada" }, { t: "Protección solar ligera" },
            { t: "Espacios de transición" }, { t: "Fachada permeable" }, { t: "Ventilación elevada" },
            { t: "Núcleo compacto" }, { t: "Envolvente térmica" }, { t: "Carpintería hermética" },
            { t: "Muro Trombe" }, { t: "Galería solar" }, { t: "Orientación solar estratégica" },
            { t: "Panel solar térmico" }, { t: "Cubierta captadora" }, { t: "Acumulación térmica hidráulica" },
            { t: "Patio húmedo" }, { t: "Fuente evaporativa" }, { t: "Material higroscópico" },
            { t: "Doble envolvente térmica" }, { t: "Acceso amortiguador" }, { t: "Aislamiento continuo" },
            { t: "Parasoles móviles" }, { t: "Fachada de doble piel" }, { t: "Cubierta extendida" },
            { t: "Muro acumulador" }, { t: "Piso de inercia térmica" }, { t: "Protección de masa térmica" },
            { t: "Espejo de agua climático" }, { t: "Nebulización pasiva" }, { t: "Vegetación refrescante" },
            { t: "Purgado nocturno" }, { t: "Lucernario térmico" }, { t: "Chimenea solar invertida" },
            { t: "Cubierta extractora" }, { t: "Ventilación mecánica asistida" }, { t: "Sectorización térmica" },
            { t: "Fachada aislada" }, { t: "Cámara ventilada" }, { t: "Otra estrategia de prueba" }
        ];

        // 2. GENERACIÓN DE LA INTERFAZ
        const menu = document.getElementById('menu');
        strategies.forEach((strat, index) => {
            const btn = document.createElement('button');
            btn.className = 'strat-btn';
            btn.textContent = index + 1;
            btn.title = strat.t;
            btn.onclick = () => window.renderSVGForStrategy(index);
            menu.appendChild(btn);
        });

        // =====================================================================
        // 3. TU MOTOR SVG PARAMÉTRICO (PEGADO EXACTAMENTE COMO LO ENVIASTE)
        // =====================================================================
window.renderSVGForStrategy = function(index) {
    const strat = strategies[index];
    
    // Control de botones activos
    document.querySelectorAll('.strat-btn').forEach((btn, idx) => {
        if(idx === index) btn.classList.add('active');
        else btn.classList.remove('active');
    });
    
    const t = strat.t; 
    let svgContent = `<rect width="100%" height="100%" fill="url(#blueprint-grid)" />`;

    // 1. DEFINICIÓN DE PATRONES Y MARCADORES
    const defsSVG = `
        <defs>
            <pattern id="blueprint-grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40 M 0 40 L 40 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
                <path d="M 200 0 L 0 0 0 200 M 0 200 L 200 200" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1"/>
            </pattern>
            <pattern id="hatch-concrete" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
                <line x1="0" y1="0" x2="0" y2="10" stroke="#cbd5e1" stroke-width="2" opacity="0.4"/>
            </pattern>
            <pattern id="hatch-insulation" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
                <line x1="0" y1="4" x2="8" y2="4" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
            </pattern>
            <pattern id="hatch-mass" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
                <rect width="10" height="10" fill="#a16207" opacity="0.3"/>
                <line x1="0" y1="0" x2="0" y2="10" stroke="#713f12" stroke-width="1" opacity="0.4"/>
                <line x1="0" y1="0" x2="10" y2="0" stroke="#713f12" stroke-width="1" opacity="0.4"/>
            </pattern>
            <pattern id="hatch-water" patternUnits="userSpaceOnUse" width="12" height="10">
                <rect width="12" height="10" fill="#3b82f6" opacity="0.4"/>
                <path d="M 0 5 Q 3 0 6 5 T 12 5" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
            </pattern>
            <pattern id="hygroscopic-dots" patternUnits="userSpaceOnUse" width="12" height="12">
                <circle cx="3" cy="3" r="1.5" fill="#3b82f6" opacity="0.5"/>
            </pattern>
            <pattern id="glass-lines" patternUnits="userSpaceOnUse" width="15" height="15" patternTransform="rotate(45)">
                <line x1="0" y1="0" x2="0" y2="15" stroke="#38bdf8" stroke-width="2" opacity="0.3"/>
            </pattern>
            <pattern id="glass-block" patternUnits="userSpaceOnUse" width="20" height="20">
                <rect width="20" height="20" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
                <line x1="0" y1="0" x2="20" y2="20" stroke="#38bdf8" stroke-width="0.5" opacity="0.2"/>
            </pattern>
            <pattern id="perforated" width="6" height="6" patternUnits="userSpaceOnUse">
                <circle cx="3" cy="3" r="1.5" fill="#cbd5e1" opacity="0.5"/>
            </pattern>
            <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4" />
            </marker>
            <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
            </marker>
            <marker id="arrow-yellow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#fcd34d" />
            </marker>
        </defs>
    `;

    // 2. ELEMENTOS COMUNES REUTILIZABLES
    const groundLine = `<rect x="50" y="340" width="700" height="40" fill="url(#hatch-concrete)" stroke="#e2e8f0" stroke-width="1.5" class="opacity-80"/><line x1="50" y1="340" x2="750" y2="340" stroke="#e2e8f0" stroke-width="2" class="opacity-50"/>`;
    const scaleFigure = `<g opacity="0.4" transform="translate(450, 245) scale(0.65)"><circle cx="15" cy="10" r="7" fill="#cbd5e1"/><path d="M10,20 L20,20 L20,45 L25,80 L18,80 L15,50 L12,80 L5,80 L10,45 Z" fill="#cbd5e1"/></g>`;
    const sunObj = `<circle cx="100" cy="70" r="25" fill="#f59e0b" class="svg-sun-pulse"/>`;
    
    // Helper para casa estándar (Cubo + Triángulo)
    const baseHouse = `
        <rect x="250" y="160" width="300" height="180" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="2"/>
        <polygon points="220,160 400,80 580,160" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    `;

    // 3. LÓGICA CONDICIONAL 
    
    if (t === "Ventilación regulable") {
        svgContent += `
            ${groundLine}
            ${baseHouse}
            <rect x="250" y="200" width="30" height="60" fill="url(#glass-lines)" stroke="#38bdf8"/>
            <rect x="385" y="180" width="30" height="60" fill="url(#glass-lines)" stroke="#38bdf8"/>
            <rect x="520" y="200" width="30" height="60" fill="url(#glass-lines)" stroke="#38bdf8"/>
            <path d="M 150 230 L 260 230" fill="none" stroke="#06b6d4" stroke-width="5" marker-end="url(#arrow-blue)"/>
            <path d="M 280 230 Q 340 230 380 210" fill="none" stroke="#06b6d4" stroke-width="3" marker-end="url(#arrow-blue)"/>
            <path d="M 420 210 Q 480 210 540 230" fill="none" stroke="#06b6d4" stroke-width="3" marker-end="url(#arrow-blue)"/>
            <path d="M 550 230 L 650 230" fill="none" stroke="#06b6d4" stroke-width="4" marker-end="url(#arrow-blue)"/>
        `;
    }
    else if (t === "Cubierta ventilada") {
        svgContent += `
            ${groundLine}
            <rect x="250" y="160" width="300" height="180" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="2"/>
            <polygon points="220,140 400,60 580,140" fill="none" stroke="#e2e8f0" stroke-width="4"/>
            <polygon points="220,140 400,60 580,140" fill="#ea580c" opacity="0.1"/>
            <line x1="250" y1="160" x2="250" y2="135" stroke="#cbd5e1" stroke-width="3"/>
            <line x1="400" y1="160" x2="400" y2="60" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="5 5"/>
            <line x1="550" y1="160" x2="550" y2="135" stroke="#cbd5e1" stroke-width="3"/>
            ${sunObj}
            <path d="M 180 150 Q 250 145 300 125" fill="none" stroke="#06b6d4" stroke-width="4" marker-end="url(#arrow-blue)"/>
            <path d="M 320 115 L 380 90" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow-blue)"/>
            <path d="M 420 85 L 500 120" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow-blue)"/>
        `;
    }
    else if (t === "Protección solar ligera") {
        svgContent += `
            ${groundLine}
            ${baseHouse}
            <path d="M 180 150 Q 250 120 400 40 Q 550 120 620 150" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="6 4"/>
            <line x1="200" y1="340" x2="200" y2="140" stroke="#a1a1aa" stroke-width="2" stroke-dasharray="4 4"/>
            <rect x="195" y="180" width="10" height="100" fill="url(#perforated)"/>
            ${sunObj}
            <path d="M 130 90 L 195 180" fill="none" stroke="#fcd34d" stroke-width="4" marker-end="url(#arrow-yellow)"/>
            <path d="M 205 190 L 250 210" fill="none" stroke="#fcd34d" stroke-width="2" opacity="0.5" marker-end="url(#arrow-yellow)"/>
            <path d="M 195 180 L 150 150" fill="none" stroke="#fcd34d" stroke-width="3" opacity="0.7" marker-end="url(#arrow-yellow)"/>
        `;
    }
    else if (t === "Espacios de transición") {
        svgContent += `
            ${groundLine}
            <rect x="350" y="140" width="250" height="200" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="2"/>
            <rect x="200" y="140" width="150" height="200" fill="#e2e8f0" opacity="0.3" stroke="#cbd5e1" stroke-width="1"/>
            <polygon points="170,140 350,60 630,140" fill="none" stroke="#cbd5e1" stroke-width="2"/>
            <line x1="200" y1="140" x2="200" y2="340" stroke="#cbd5e1" stroke-width="4"/>
            ${sunObj}
            <path d="M 50 200 L 180 200" fill="none" stroke="#06b6d4" stroke-width="5" marker-end="url(#arrow-blue)"/>
            <path d="M 120 90 L 200 160" fill="none" stroke="#fcd34d" stroke-width="4" marker-end="url(#arrow-yellow)"/>
            <path d="M 220 200 C 280 200, 320 220, 340 220" fill="none" stroke="#06b6d4" stroke-width="3" opacity="0.8" marker-end="url(#arrow-blue)"/>
        `;
    }
    else if (t === "Fachada permeable") {
        svgContent += `
            ${groundLine}
            ${baseHouse}
            <rect x="250" y="160" width="300" height="180" fill="none" stroke="#cbd5e1" stroke-width="2"/>
            <g transform="translate(250, 160)">
                <rect x="20" y="20" width="15" height="140" fill="url(#perforated)" stroke="#94a3b8"/>
                <rect x="60" y="20" width="15" height="140" fill="url(#perforated)" stroke="#94a3b8"/>
                <rect x="100" y="20" width="15" height="140" fill="url(#perforated)" stroke="#94a3b8"/>
                <rect x="140" y="20" width="15" height="140" fill="url(#perforated)" stroke="#94a3b8"/>
                <rect x="180" y="20" width="15" height="140" fill="url(#perforated)" stroke="#94a3b8"/>
                <rect x="220" y="20" width="15" height="140" fill="url(#perforated)" stroke="#94a3b8"/>
                <rect x="260" y="20" width="15" height="140" fill="url(#perforated)" stroke="#94a3b8"/>
            </g>
            <path d="M 100 250 L 230 250" fill="none" stroke="#06b6d4" stroke-width="5" marker-end="url(#arrow-blue)"/>
            <path d="M 270 250 L 530 250" fill="none" stroke="#06b6d4" stroke-width="4" marker-end="url(#arrow-blue)"/>
        `;
    }
    else if (t === "Ventilación elevada") {
        svgContent += `
            ${groundLine}
            ${baseHouse}
            <rect x="250" y="180" width="20" height="40" fill="url(#glass-lines)" stroke="#38bdf8"/>
            <rect x="530" y="180" width="20" height="40" fill="url(#glass-lines)" stroke="#38bdf8"/>
            <path d="M 350 300 Q 400 220 300 190" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="8 4" marker-end="url(#arrow-blue)"/>
            <path d="M 450 280 Q 400 200 500 190" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="8 4" marker-end="url(#arrow-blue)"/>
            <path d="M 280 190 L 200 170" fill="none" stroke="#ef4444" stroke-width="5" marker-end="url(#arrow-blue)"/>
            <path d="M 520 190 L 600 170" fill="none" stroke="#ef4444" stroke-width="5" marker-end="url(#arrow-blue)"/>
        `;
    }
    else if (t === "Núcleo compacto") {
        svgContent += `
            <rect x="100" y="50" width="600" height="300" rx="4" fill="none" stroke="#cbd5e1" stroke-width="3"/>
            <rect x="300" y="125" width="200" height="150" fill="url(#hatch-concrete)" stroke="#ea580c" stroke-width="2"/>
            <line x1="100" y1="125" x2="300" y2="125" stroke="#cbd5e1" stroke-width="2"/>
            <line x1="500" y1="125" x2="700" y2="125" stroke="#cbd5e1" stroke-width="2"/>
            <line x1="100" y1="275" x2="300" y2="275" stroke="#cbd5e1" stroke-width="2"/>
            <line x1="500" y1="275" x2="700" y2="275" stroke="#cbd5e1" stroke-width="2"/>
            <line x1="300" y1="50" x2="300" y2="125" stroke="#cbd5e1" stroke-width="2"/>
            <line x1="500" y1="50" x2="500" y2="125" stroke="#cbd5e1" stroke-width="2"/>
            <line x1="300" y1="275" x2="300" y2="350" stroke="#cbd5e1" stroke-width="2"/>
            <line x1="500" y1="275" x2="500" y2="350" stroke="#cbd5e1" stroke-width="2"/>
            <circle cx="400" cy="200" r="50" fill="#ea580c" opacity="0.2"/>
            <path d="M 400 200 L 480 200" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arrow-yellow)"/>
            <path d="M 400 200 L 400 140" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arrow-yellow)"/>
        `;
    }
    else if (t === "Envolvente térmica") {
        svgContent += `
            ${groundLine}
            <rect x="350" y="80" width="60" height="260" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="2"/>
            <rect x="410" y="80" width="20" height="260" fill="url(#hatch-insulation)"/>
            <rect x="430" y="80" width="10" height="260" fill="#64748b"/>
            ${sunObj}
            <path d="M 600 150 L 460 150" fill="none" stroke="#ef4444" stroke-width="5" marker-end="url(#arrow-yellow)"/>
            <path d="M 440 150 L 415 150" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.4" marker-end="url(#arrow-yellow)"/>
            <path d="M 460 150 L 520 110" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.6" marker-end="url(#arrow-yellow)"/>
        `;
    }
    else if (t === "Carpintería hermética") {
        svgContent += `
            ${groundLine}
            <rect x="350" y="50" width="100" height="100" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="2"/>
            <rect x="350" y="270" width="100" height="70" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="2"/>
            <rect x="380" y="150" width="40" height="120" fill="#d1d5db" stroke="#71717a" stroke-width="2"/>
            <rect x="395" y="155" width="10" height="110" fill="url(#glass-lines)" stroke="#38bdf8"/>
            <circle cx="380" cy="150" r="5" fill="#ef4444"/>
            <circle cx="420" cy="150" r="5" fill="#ef4444"/>
            <circle cx="380" cy="270" r="5" fill="#ef4444"/>
            <circle cx="420" cy="270" r="5" fill="#ef4444"/>
            <path d="M 600 210 L 430 210" fill="none" stroke="#06b6d4" stroke-width="6" marker-end="url(#arrow-blue)"/>
            <path d="M 425 210 Q 415 210 420 180" fill="none" stroke="#06b6d4" stroke-width="3" opacity="0.5"/>
        `;
    }
    else if (t === "Muro Trombe") {
        svgContent += `
            ${groundLine}
            <rect x="350" y="60" width="40" height="280" fill="url(#hatch-mass)" stroke="#713f12" stroke-width="2"/>
            <rect x="350" y="60" width="10" height="280" fill="#1f2937"/>
            <rect x="390" y="60" width="20" height="280" fill="#ea580c" opacity="0.1"/>
            <rect x="410" y="50" width="5" height="290" fill="url(#glass-lines)" stroke="#38bdf8"/>
            ${sunObj}
            <path d="M 600 120 L 425 180" fill="none" stroke="#fcd34d" stroke-width="5" marker-end="url(#arrow-yellow)"/>
            <rect x="350" y="60" width="40" height="280" fill="#ea580c" opacity="0.2"/>
            <path d="M 340 280 L 250 280" fill="none" stroke="#ea580c" stroke-width="4" stroke-dasharray="8 4" marker-end="url(#arrow-red)"/>
            <path d="M 340 100 L 250 100" fill="none" stroke="#ea580c" stroke-width="4" stroke-dasharray="8 4" marker-end="url(#arrow-red)"/>
        `;
    }
    else if (t === "Galería solar") {
        svgContent += `
            ${groundLine}
            <rect x="250" y="50" width="10" height="290" fill="#e2e8f0" stroke="#cbd5e1"/>
            <rect x="350" y="50" width="30" height="290" fill="url(#glass-block)"/>
            <rect x="450" y="50" width="50" height="290" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="2"/>
            ${sunObj}
            <path d="M 120 120 L 230 180" fill="none" stroke="#fcd34d" stroke-width="5" marker-end="url(#arrow-yellow)"/>
            <path d="M 265 190 L 330 220" fill="none" stroke="#fcd34d" stroke-width="3" opacity="0.7" marker-end="url(#arrow-yellow)"/>
            <path d="M 390 240 L 430 260" fill="none" stroke="#fcd34d" stroke-width="2" opacity="0.4" marker-end="url(#arrow-yellow)"/>
            <path d="M 280 280 Q 300 150 340 100" fill="none" stroke="#ea580c" stroke-width="4" stroke-dasharray="6 4" marker-end="url(#arrow-red)"/>
        `;
    }
    else if (t === "Orientación solar estratégica") {
        svgContent += `
            <rect x="100" y="100" width="600" height="200" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5 5"/>
            <path d="M 150 250 A 250 100 0 0 1 650 250" fill="none" stroke="#fcd34d" stroke-width="3" stroke-dasharray="8 4"/>
            <circle cx="150" cy="250" r="10" fill="#fcd34d"/>
            <circle cx="400" cy="50" r="20" fill="#f59e0b"/>
            <circle cx="650" cy="250" r="10" fill="#fcd34d"/>
            <rect x="300" y="150" width="200" height="100" fill="url(#hatch-concrete)" stroke="#cbd5e1" stroke-width="3"/>
            <line x1="400" y1="150" x2="400" y2="250" stroke="#cbd5e1" stroke-width="3"/>
            <path d="M 400 75 L 400 140" fill="none" stroke="#fcd34d" stroke-width="6" marker-end="url(#arrow-yellow)"/>
            <path d="M 350 85 L 350 140" fill="none" stroke="#fcd34d" stroke-width="4" opacity="0.7" marker-end="url(#arrow-yellow)"/>
            <path d="M 450 85 L 450 140" fill="none" stroke="#fcd34d" stroke-width="4" opacity="0.7" marker-end="url(#arrow-yellow)"/>
        `;
    }
    else if (t === "Panel solar térmico") {
        svgContent += `
            ${groundLine}
            ${baseHouse}
            <g transform="translate(320, 115) rotate(-24)">
                <rect x="0" y="0" width="80" height="10" fill="#111827" stroke="#cbd5e1"/>
                <rect x="5" y="2" width="70" height="6" fill="#1e3a8a" stroke="#38bdf8"/>
            </g>
            <rect x="420" y="200" width="40" height="80" rx="3" fill="#cbd5e1" stroke="#94a3b8"/>
            <path d="M 330 120 L 330 200 L 420 230" fill="none" stroke="#06b6d4" stroke-width="4" marker-end="url(#arrow-blue)"/>

            ${groundLine}
            <rect x="350" y="80" width="80" height="260" fill="url(#hygroscopic-dots)" stroke="#3b82f6" stroke-width="2"/>
            <rect x="350" y="80" width="80" height="260" fill="#fafafa" opacity="0.1"/>
            <path d="M 250 200 C 300 200, 320 180, 340 180" fill="none" stroke="#06b6d4" stroke-width="5" marker-end="url(#arrow-blue)"/>
            <circle cx="360" cy="180" r="8" fill="#06b6d4" opacity="0.6"/>
            <circle cx="390" cy="150" r="6" fill="#06b6d4" opacity="0.6"/>
            <circle cx="410" cy="220" r="10" fill="#06b6d4" opacity="0.6"/>
            <path d="M 440 200 C 480 200, 500 220, 550 220" fill="none" stroke="#cbd5e1" stroke-width="4" marker-end="url(#arrow-blue)"/>
        `;
    }
    else {
        svgContent += `
            ${groundLine}
            <rect x="300" y="200" width="200" height="40" rx="4" fill="rgba(15,23,42,0.8)" stroke="#334155"/>
        `;
    }

    document.getElementById('svg-canvas').innerHTML = `
        <svg viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet" class="w-full h-full drop-shadow-xl absolute inset-0 z-10">
            ${defsSVG}
            ${svgContent}
        </svg>
    `;
};
        // Iniciar el renderizado con el primer elemento
        window.renderSVGForStrategy(0);
    </script>
