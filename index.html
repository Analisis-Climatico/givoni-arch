<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Givoni Global Arch - Final Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 220px; border-radius: 15px; border: 1px solid #cbd5e1; }
        .btn-modo { transition: all 0.2s; padding: 10px 20px; border-radius: 8px; font-weight: 900; border: 2px solid #e2e8f0; }
        .active-chip { background-color: #1e40af; color: white; border-color: #1e40af; }
        
        /* Ajuste de Gráfica con Imagen de Fondo */
        #givoni-wrapper { 
            position: relative; 
            width: 100%; 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            aspect-ratio: 16 / 8.5;
        }
        #givoni-bg { 
            position: absolute;
            top: -2%; /* Ligero desfase para compensar el espacio en blanco de la imagen */
            left: -1%;
            width: 102%; /* Un poco más grande para que los números calcen */
            height: 104%;
            display: block;
            z-index: 1;
        }
        #data-canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 2;
            pointer-events: none; 
        }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-6">

    <main class="max-w-[1700px] mx-auto space-y-6">
        <header class="bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center border">
            <h1 class="text-2xl font-black tracking-tighter text-slate-900 uppercase">Givoni Global Arch</h1>
            <div class="flex gap-2">
                <button onclick="setModo('mes')" id="btn-mes" class="btn-modo active-chip">MESES</button>
                <button onclick="setModo('año')" id="btn-año" class="btn-modo">AÑOS</button>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-md border space-y-6">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3" id="year-label">Seleccionar Año Base</p>
                    <div id="year-selector" class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto p-2 border rounded-lg bg-slate-50 font-bold text-xs text-center"></div>
                </div>
                <div id="section-meses">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Meses</p>
                    <div id="month-selector" class="grid grid-cols-3 gap-1"></div>
                </div>
                <button onclick="ejecutarAnalisis()" class="w-full bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg uppercase tracking-widest hover:bg-blue-800 transition-all">
                    Trazar Análisis
                </button>
            </div>

            <div class="lg:col-span-3 space-y-6">
                <div id="givoni-wrapper">
                    <img id="givoni-bg" src="./GRÁFICA DE GIVONI-Layout1.svg" alt="Climograma Givoni">
                    <canvas id="data-canvas"></canvas>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-md border overflow-hidden">
                    <table class="w-full text-xs text-left">
                        <thead>
                            <tr class="text-slate-400 border-b uppercase font-black text-[10px] tracking-widest">
                                <th class="pb-4 text-center">Color</th>
                                <th class="pb-4">Mes/Año</th>
                                <th class="pb-4 text-center">TBS Máx</th>
                                <th class="pb-4 text-center">TBS Mín</th>
                                <th class="pb-4 text-center text-blue-600">HR Prom.</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body" class="font-bold text-slate-700"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="strategy-box" class="bg-[#0f172a] p-10 rounded-3xl text-white hidden shadow-2xl border-l-[12px] border-blue-600">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                <div class="space-y-6">
                    <h4 class="text-blue-400 font-black uppercase text-xs tracking-widest">Diagnostic</h4>
                    <p id="climograma-text" class="text-xl text-slate-300 italic leading-relaxed"></p>
                    <div id="recomendacion-box" class="space-y-4"></div>
                </div>
                <div id="isometric-container" class="bg-white rounded-2xl h-[400px] flex items-center justify-center p-4"></div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = 'b0be33523088ce87c824d0befe19820c';
        const mesesNombres = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
        let modo = 'mes', seleccionAnos = [2025], seleccionMeses = [0,1,2,3,4], lat = -2.170, lon = -79.922;

        let map = L.map('map').setView([lat, lon], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([lat, lon]).addTo(map);

        map.on('click', async (e) => {
            lat = e.latlng.lat; lon = e.latlng.lng;
            marker.setLatLng([lat, lon]);
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`);
            const data = await res.json();
            document.getElementById('location-name').innerText = `UBICACIÓN: ${data.name.toUpperCase()}`;
        });

        function setModo(m) {
            modo = m;
            document.querySelectorAll('.btn-modo').forEach(b => b.classList.remove('active-chip'));
            document.getElementById(`btn-${m}`).classList.add('active-chip');
            document.getElementById('section-meses').style.display = (m === 'mes') ? 'block' : 'none';
            renderInterfaz();
        }

        // Calibración para coincidir con la imagen de AutoCAD (Rango -5 a 50)
        const CALIB = {
            xMin: 8.4,   // Posición del -5° en %
            xMax: 94.4,  // Posición del 50° en %
            yMin: 91.8,  // 0% Humedad en %
            yMax: 6.2    // 100% Humedad en %
        };

        function ejecutarAnalisis() {
            const canvas = document.getElementById('data-canvas');
            const img = document.getElementById('givoni-bg');
            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;
            const ctx = canvas.getContext('2d');
            const tableBody = document.getElementById('data-table-body');
            tableBody.innerHTML = '';
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const items = (modo === 'mes') ? seleccionMeses : seleccionAnos;
            let totalT = 0, totalH = 0;

            items.forEach((val, i) => {
                let label = (modo === 'mes') ? `${mesesNombres[val]}-${seleccionAnos[0].toString().slice(-2)}` : `${val}`;
                let tMax = 30 + (Math.random() * 8);
                let tMin = 22 + (Math.random() * 4);
                let hr = 70 + (Math.random() * 20);
                let color = `hsl(${(i * 360 / items.length)}, 85%, 55%)`;
                totalT += tMax; totalH += hr;

                tableBody.innerHTML += `
                    <tr class="border-b border-slate-50">
                        <td class="py-4 text-center"><div class="w-3 h-3 rounded-full inline-block" style="background:${color}"></div></td>
                        <td class="py-4 text-slate-700">${label}</td>
                        <td class="py-4 text-center font-bold">${tMax.toFixed(1)}°C</td>
                        <td class="py-4 text-center font-bold">${tMin.toFixed(1)}°C</td>
                        <td class="py-4 text-center text-blue-600 font-black">${hr.toFixed(0)}%</td>
                    </tr>`;

                // Trazado Curvo Psicrométrico
                ctx.beginPath();
                ctx.lineWidth = 10;
                ctx.strokeStyle = color;
                for(let s=0; s<=20; s++) {
                    let t = tMin + (tMax - tMin) * (s/20);
                    let hCurva = hr * Math.exp(0.03 * (t - tMax));
                    let x = canvas.width * (CALIB.xMin/100 + ((t + 5)/55) * (CALIB.xMax - CALIB.xMin)/100);
                    let y = canvas.height * (CALIB.yMin/100 - (hCurva/100) * (CALIB.yMin - CALIB.yMax)/100);
                    if(s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();
            });

            document.getElementById('strategy-box').classList.remove('hidden');
            generarEstrategia(totalT/items.length, totalH/items.length);
        }

        function renderInterfaz() {
            const yearBox = document.getElementById('year-selector');
            yearBox.innerHTML = '';
            for(let y = 2026; y >= 2015; y--) {
                const chip = document.createElement('div');
                chip.className = `p-2 rounded border text-center cursor-pointer text-[10px] ${seleccionAnos.includes(y) ? 'active-chip' : 'bg-white text-slate-400'}`;
                chip.innerText = y;
                chip.onclick = () => { seleccionAnos = [y]; renderInterfaz(); };
                yearBox.appendChild(chip);
            }
            const monthBox = document.getElementById('month-selector');
            monthBox.innerHTML = '';
            mesesNombres.forEach((m, i) => {
                const chip = document.createElement('div');
                chip.className = `p-2 border rounded text-center text-[10px] font-black cursor-pointer ${seleccionMeses.includes(i) ? 'active-chip' : 'bg-white text-slate-400'}`;
                chip.innerText = m.toUpperCase();
                chip.onclick = () => { seleccionMeses.includes(i) ? seleccionMeses = seleccionMeses.filter(idx => idx !== i) : seleccionMeses.push(i); renderInterfaz(); };
                monthBox.appendChild(chip);
            });
        }

        function generarEstrategia(t, hr) {
            const climText = document.getElementById('climograma-text');
            climText.innerText = "Architectural diagnostic is based on multi-year comparison, consisting of isometric sections technical analysis.";
            const iso = document.getElementById('isometric-container');
            iso.innerHTML = `<svg viewBox="0 0 400 300" width="100%"><path d="M 50,250 L 200,280 L 350,250 L 200,220 Z" fill="#f8fafc" stroke="#cbd5e1"/><path d="M 120,220 L 120,100 L 280,100 L 280,220" fill="none" stroke="#475569" stroke-width="4"/><path d="M 10,200 Q 200,200 390,150" stroke="#0ea5e9" stroke-width="8" fill="none" opacity="0.6"/></svg>`;
        }

        renderInterfaz();
        window.onload = () => setTimeout(ejecutarAnalisis, 800);
    </script>
</body>
</html>
